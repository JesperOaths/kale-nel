<!DOCTYPE html>
<html lang="nl"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Drink statistieken</title><script>window.GEJAST_PAGE_VERSION='v582';</script><script src='./gejast-config.js?v582'></script><script src='./gejast-home-gate.js?v371'></script><script src='./gejast-drinks-analytics.js?v371'></script>
  <style>
    :root{--line:rgba(0,0,0,.08);--muted:#6b6257;--paper:rgba(255,251,245,.84);--ink:#1a1714}
    *{box-sizing:border-box} body{margin:0;padding:14px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.92),rgba(244,240,232,.94)),url('./site-bg-mobile.webp') center/cover fixed;color:var(--ink)}
    .wrap{max-width:1120px;margin:0 auto}.card{background:var(--paper);border:1px solid rgba(255,255,255,.72);border-radius:26px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.08);background:#111;color:#fff;text-decoration:none;font-weight:800}.btn.alt{background:#f3efe6;color:#111}
    .logo{width:58px;height:58px;object-fit:contain}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}.metric{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:8px}.metric .value{font-size:1.3rem;font-weight:900}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.panel h2{margin:0 0 10px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.meta{color:var(--muted);font-size:.92rem}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
    @media(max-width:860px){.grid,.metrics{grid-template-columns:1fr 1fr}} @media(max-width:640px){.grid,.metrics{grid-template-columns:1fr}}
  </style>
</head><body><div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn alt" href="./drinks.html">Overzicht</a><a class="btn alt" href="./drinks_add.html">Drinks toevoegen</a><a class="btn alt" href="./drinks_history.html">Historie</a></div><h1 style="margin:14px 0 6px">Drink statistieken</h1><div id="statusLine" class="meta">Canonieke stats uit bevestigde drankjes.</div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div><div id="metrics" class="metrics"></div><div class="grid"><section class="panel"><h2>Top drinkers</h2><div id="topPlayers" class="list"></div></section><section class="panel"><h2>Per dranktype</h2><div id="byType" class="list"></div></section><section class="panel"><h2>Locaties</h2><div id="byLocation" class="list"></div></section><section class="panel"><h2>Recent bevestigd</h2><div id="recent" class="list"></div></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const analytics=window.GEJAST_DRINKS_ANALYTICS; const esc=analytics.esc; function renderList(el,rows,fmt,empty='Nog geen data.'){el.innerHTML=(rows||[]).length?rows.map(fmt).join(''):`<div class="meta">${empty}</div>`;} async function load(){try{const data=await analytics.getGlobalStats(160); const totals=data.totals||{}; document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">Totaal drankjes</div><div class="value">${Number(totals.all_events||0)}</div></div><div class="metric"><div class="label">Totaal units</div><div class="value">${analytics.fmtUnits(totals.all_units)}</div></div><div class="metric"><div class="label">Deze week</div><div class="value">${Number(totals.week_events||0)}</div></div><div class="metric"><div class="label">Deze maand</div><div class="value">${Number(totals.month_events||0)}</div></div>`; renderList(document.getElementById('topPlayers'), data.top_players, r=>`<div class="row"><div><strong>${esc(r.player_name)}</strong><div class="meta">${Number(r.events||0)} drankjes</div></div><div><strong>${analytics.fmtUnits(r.units)}u</strong></div></div>`); renderList(document.getElementById('byType'), data.by_type, r=>`<div class="row"><div><strong>${esc(r.event_type_label||r.event_type_key)}</strong><div class="meta">${Number(r.events||0)} drankjes</div></div><div><strong>${analytics.fmtUnits(r.units)}u</strong></div></div>`); renderList(document.getElementById('byLocation'), data.by_location, r=>`<div class="row"><div><strong>${esc(r.location_label||'Locatie onbekend')}</strong><div class="meta">${Number(r.events||0)} drankjes</div></div><div><strong>${analytics.fmtUnits(r.units)}u</strong></div></div>`); renderList(document.getElementById('recent'), (data.history||[]).slice(0,16), r=>`<div class="row"><div><strong>${esc(r.player_name)} · ${esc(r.event_type_label||r.event_type_key)}</strong><div class="meta">${analytics.dateLabel(r.verified_at||r.created_at)}</div></div><div><strong>${analytics.fmtUnits(r.total_units)}u</strong></div></div>`); }catch(err){document.getElementById('statusLine').textContent=err.message||String(err);}} load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
