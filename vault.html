<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klaverjas Spelkluis</title>
  <style>
    :root { --gold:#dab33e; --black:#111; --dark: rgba(10,10,10,0.88); --line: rgba(255,255,255,0.08); --muted: rgba(255,255,255,0.72); }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(9,9,9,0.78), rgba(9,9,9,0.78)),
        url('./wordtergejast.png') center/cover no-repeat fixed;
      color:#fff;
      min-height:100vh;
    }
    .page { width:min(1240px,100%); margin:0 auto; padding:20px 16px 88px; }
    .top-nav { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .nav-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .nav-brand { color: var(--gold); text-decoration:none; font-weight:800; font-size:20px; letter-spacing:-.03em; }
    .nav-links { display:flex; gap:10px; flex-wrap:wrap; }
    .nav-links a {
      text-decoration:none; color:#f4efe5; font-size:13px; font-weight:700;
      padding:8px 12px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08);
    }
    .shell { background: rgba(12,12,12,0.84); border:1px solid rgba(255,255,255,0.08); border-radius: 26px; padding: 24px; box-shadow: 0 20px 46px rgba(0,0,0,0.28); }
    h1 { color: var(--gold); margin:0 0 10px; }
    h2 { margin:0 0 12px; font-size:20px; }
    .intro { color: var(--muted); font-size:14px; margin:0 0 18px; }
    .hero-grid, .grid { display:grid; gap:16px; margin-top:16px; }
    .hero-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .card { background: rgba(18,18,18,0.92); padding: 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); }
    .stat-label { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:#9d947f; }
    .stat-val { font-size:28px; font-weight:900; color: var(--gold); margin-top:6px; }
    .muted { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse: collapse; }
    th { text-align:left; color:#9d947f; font-size:11px; text-transform:uppercase; letter-spacing:.08em; padding-bottom:8px; }
    td { padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:14px; vertical-align:top; }
    td.num { text-align:right; font-variant-numeric: tabular-nums; }
    .tags { display:flex; gap:8px; flex-wrap:wrap; }
    .tag { display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; background:rgba(255,255,255,0.08); color:#f4efe5; font-size:11px; font-weight:700; }
    .tag.gold { background:rgba(218,179,62,0.16); color:#f4dfa0; border:1px solid rgba(218,179,62,0.24); }
    .empty { background: rgba(255,255,255,0.04); border:1px dashed rgba(255,255,255,0.12); border-radius:18px; padding:20px; color:var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #gateNotice { padding: 32px 8px; text-align:center; color: rgba(255,255,255,0.75); }
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
    @media (max-width:900px){ .hero-grid, .grid { grid-template-columns:1fr; } }
    @media (max-width:640px){.site-credit-watermark{bottom:10px;font-size:12px;padding:7px 11px;max-width:calc(100vw - 24px);text-align:center}}
  </style>
  <link rel="canonical" href="https://kalenel.nl/vault.html" />
  <script id="force-https">(function(){var h=window.location.hostname||'';if((h==='kalenel.nl'||h.endsWith('.kalenel.nl'))&&window.location.protocol==='http:'){window.location.replace('https://'+window.location.host+window.location.pathname+window.location.search+window.location.hash);}})();</script>
  <script src="./gejast-config.js"></script>
</head>
<body>
  <div class="page">
    <div class="top-nav">
      <div class="nav-left">
        <a class="nav-brand" href="./index.html">Wordt er gejast</a>
        <div class="nav-links">
          <a href="./index.html">Start</a>
          <a href="./scorer.html">Scorer</a>
          <a href="./leaderboard.html">Ranglijst</a>
          <a href="./admin.html">Terug naar hub</a>
        </div>
      </div>
    </div>

    <div id="vaultApp" class="shell" style="display:none;">
      <h1>Klaverjas Spelkluis</h1>
      <p class="intro">Alleen admin analyse-overzicht. De vault leest ruwe match history uit <span class="mono">vault_history</span> en berekent er profiel-, partner-, roem-, contract- en stijlstatistieken overheen.</p>

      <div id="vaultContent"></div>
    </div>

    <div id="gateNotice" class="shell">Adminsessie controleren...</div>
  </div>

  <script>
    const SUPABASE_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_URL) || "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY) || "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const ADMIN_SESSION_KEY = "jas_admin_session_v8";
    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`, "Content-Type": "application/json", Accept: "application/json" }; }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.details || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getAdminSessionToken() { return sessionStorage.getItem(ADMIN_SESSION_KEY) || localStorage.getItem(ADMIN_SESSION_KEY); }
    async function ensureAdminGate() {
      const token = getAdminSessionToken();
      const notice = document.getElementById('gateNotice');
      if (!token) {
        notice.textContent = 'Geen adminsessie gevonden. Je wordt doorgestuurd naar de admin-login.';
        setTimeout(() => { window.location.href = './admin.html'; }, 800);
        return false;
      }
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_check_session`, {
          method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ admin_session_token: token })
        });
        const data = await parseResponse(res);
        if (data?.admin_session_token) {
          sessionStorage.setItem(ADMIN_SESSION_KEY, data.admin_session_token);
          localStorage.setItem(ADMIN_SESSION_KEY, data.admin_session_token);
        }
        document.getElementById('vaultApp').style.display = '';
        notice.style.display = 'none';
        return true;
      } catch {
        notice.textContent = 'Adminsessie verlopen of ongeldig. Je wordt doorgestuurd naar admin.';
        setTimeout(() => { window.location.href = './admin.html'; }, 1000);
        return false;
      }
    }

    function readHistory() {
      const raw = localStorage.getItem('vault_history');
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function teamForSeat(index) { return index === 0 || index === 2 ? 'W' : 'Z'; }
    function pairKey(a, b) { return [a, b].sort((x, y) => String(x).localeCompare(String(y), 'nl')).join(' + '); }
    function escapeHtml(value) { return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;'); }
    function avg(arr) { return arr.length ? arr.reduce((s, n) => s + Number(n || 0), 0) / arr.length : 0; }
    function sum(arr) { return arr.reduce((s, n) => s + Number(n || 0), 0); }
    function pct(a, b) { return b ? ((a / b) * 100).toFixed(1) + '%' : '0.0%'; }
    function stddev(values) {
      if (!values.length) return 0;
      const mean = avg(values);
      return Math.sqrt(avg(values.map((v) => Math.pow(Number(v || 0) - mean, 2))));
    }

    function ensurePlayer(store, name) {
      if (!name) return null;
      if (!store[name]) {
        store[name] = {
          name,
          matches: 0,
          wins: 0,
          losses: 0,
          pointsFor: 0,
          pointsAgainst: 0,
          margins: [],
          roundsPlayed: 0,
          roundsWon: 0,
          roundsLost: 0,
          taksWon: 0,
          roemFor: 0,
          roemAgainst: 0,
          bids: [],
          contractsCalled: 0,
          contractsMade: 0,
          natForced: 0,
          natSuffered: 0,
          pitFor: 0,
          favoriteSuit: {},
          successfulSuit: {},
          earlyMargins: [],
          lateMargins: [],
          partners: {},
          rivals: {},
          closeMatchWins: 0,
          closeMatches: 0,
          undoHeavy: 0,
          resumes: 0,
          abandonments: 0,
          corrections: 0
        };
      }
      return store[name];
    }

    function addMapCount(map, key, amount = 1) { if (!key) return; map[key] = (map[key] || 0) + amount; }
    function mapTop(map) {
      const items = Object.entries(map || {}).sort((a, b) => b[1] - a[1]);
      return items[0] ? items[0][0] : '-';
    }

    function analyseHistory(history) {
      const players = {};
      const partnerships = {};
      const rivalries = {};
      let totalRounds = 0;
      let totalTakken = 0;

      history.forEach((match, matchIndex) => {
        const seats = Array.isArray(match.players) ? match.players.filter(Boolean) : [];
        if (seats.length < 4) return;
        const teamW = [seats[0], seats[2]];
        const teamZ = [seats[1], seats[3]];
        const winner = Number(match.w || 0) === Number(match.z || 0) ? '' : (Number(match.w || 0) > Number(match.z || 0) ? 'W' : 'Z');
        const margin = Math.abs(Number(match.w || 0) - Number(match.z || 0));
        const close = margin <= 20;

        seats.forEach((name, idx) => {
          const side = teamForSeat(idx);
          const profile = ensurePlayer(players, name);
          profile.matches += 1;
          profile.pointsFor += side === 'W' ? Number(match.w || 0) : Number(match.z || 0);
          profile.pointsAgainst += side === 'W' ? Number(match.z || 0) : Number(match.w || 0);
          profile.margins.push((side === winner ? 1 : winner ? -1 : 0) * margin);
          if (winner) {
            if (side === winner) profile.wins += 1; else profile.losses += 1;
          }
          if (close) {
            profile.closeMatches += 1;
            if (side === winner) profile.closeMatchWins += 1;
          }
          if (match.resumed) profile.resumes += 1;
          if (match.abandoned) profile.abandonments += 1;
          if (match.undo_count) profile.undoHeavy += Number(match.undo_count || 0);
        });

        const partnerWKey = pairKey(teamW[0], teamW[1]);
        const partnerZKey = pairKey(teamZ[0], teamZ[1]);
        [partnerWKey, partnerZKey].forEach((key) => { if (!partnerships[key]) partnerships[key] = { pair:key, matches:0, wins:0, points:0, against:0 }; });
        partnerships[partnerWKey].matches += 1; partnerships[partnerWKey].points += Number(match.w || 0); partnerships[partnerWKey].against += Number(match.z || 0); if (winner === 'W') partnerships[partnerWKey].wins += 1;
        partnerships[partnerZKey].matches += 1; partnerships[partnerZKey].points += Number(match.z || 0); partnerships[partnerZKey].against += Number(match.w || 0); if (winner === 'Z') partnerships[partnerZKey].wins += 1;

        teamW.forEach((a) => teamZ.forEach((b) => {
          const key = pairKey(a, b);
          if (!rivalries[key]) rivalries[key] = { pair:key, meetings:0, winMargin:0 };
          rivalries[key].meetings += 1;
          rivalries[key].winMargin += winner === 'W' ? Number(match.w || 0) - Number(match.z || 0) : Number(match.z || 0) - Number(match.w || 0);
        }));

        const rounds = Array.isArray(match.rounds) ? match.rounds : [];
        const takWins = { W:{}, Z:{} };
        rounds.forEach((round, idx) => {
          totalRounds += 1;
          const roundWinner = Number(round.fw || 0) === Number(round.fz || 0) ? '' : (Number(round.fw || 0) > Number(round.fz || 0) ? 'W' : 'Z');
          if (roundWinner && round.tak) takWins[roundWinner][round.tak] = true;
          const late = idx >= 12;
          const early = idx < 4;
          seats.forEach((name, seatIndex) => {
            const side = teamForSeat(seatIndex);
            const profile = ensurePlayer(players, name);
            profile.roundsPlayed += 1;
            if (roundWinner) {
              if (side === roundWinner) profile.roundsWon += 1; else profile.roundsLost += 1;
            }
            profile.roemFor += side === 'W' ? Number(round.rw || 0) : Number(round.rz || 0);
            profile.roemAgainst += side === 'W' ? Number(round.rz || 0) : Number(round.rw || 0);
            profile.corrections += Number(round.correction_count || round.undo_count || 0);
            const marginRound = side === 'W' ? Number(round.fw || 0) - Number(round.fz || 0) : Number(round.fz || 0) - Number(round.fw || 0);
            if (early) profile.earlyMargins.push(marginRound);
            if (late) profile.lateMargins.push(marginRound);
            if (round.team === side) {
              profile.contractsCalled += 1;
              profile.bids.push(Number(round.bid || 0));
              addMapCount(profile.favoriteSuit, round.suit || '');
              if (roundWinner === side) {
                profile.contractsMade += 1;
                addMapCount(profile.successfulSuit, round.suit || '');
              }
            }
            if (round.natBy && round.natBy === side) profile.natSuffered += 1;
            if (round.natBy && round.natBy !== side) profile.natForced += 1;
            if (round.specialType === 'pit' && round.specialTeam === side) profile.pitFor += 1;
          });
        });

        ['W','Z'].forEach((side) => {
          totalTakken += Object.keys(takWins[side]).length;
          const members = side === 'W' ? teamW : teamZ;
          Object.keys(takWins[side]).forEach(() => members.forEach((name) => { ensurePlayer(players, name).taksWon += 1; }));
        });

        teamW.forEach((name) => {
          const p = ensurePlayer(players, name);
          addMapCount(p.partners, teamW.find((x) => x !== name));
          teamZ.forEach((r) => addMapCount(p.rivals, r));
        });
        teamZ.forEach((name) => {
          const p = ensurePlayer(players, name);
          addMapCount(p.partners, teamZ.find((x) => x !== name));
          teamW.forEach((r) => addMapCount(p.rivals, r));
        });
      });

      const profiles = Object.values(players).map((p) => {
        const avgBid = avg(p.bids);
        const marginAvg = avg(p.margins);
        const volatility = stddev(p.margins);
        const early = avg(p.earlyMargins);
        const late = avg(p.lateMargins);
        const tags = [];
        if (avgBid >= 110) tags.push('agressieve bieder');
        if (p.contractsCalled >= 8 && avgBid < 95) tags.push('conservatieve bieder');
        if (volatility >= 35) tags.push('high-variance');
        if (late > early + 8) tags.push('clutch finisher');
        if (early > late + 8) tags.push('snelle starter');
        if ((p.roemFor / Math.max(1, p.roundsPlayed)) >= 6) tags.push('roem magneet');
        if (p.natForced > p.natSuffered + 1) tags.push('defensive wall');
        if (p.natSuffered >= 2 && p.natSuffered >= p.natForced) tags.push('nat magneet');
        return {
          ...p,
          winRate: pct(p.wins, p.matches),
          roundRate: pct(p.roundsWon, p.roundsPlayed),
          avgFor: avg([p.pointsFor / Math.max(1, p.matches)]),
          avgAgainst: avg([p.pointsAgainst / Math.max(1, p.matches)]),
          avgBid: avgBid || 0,
          contractRate: pct(p.contractsMade, p.contractsCalled),
          netRoem: p.roemFor - p.roemAgainst,
          favoriteSuitLabel: mapTop(p.favoriteSuit),
          successSuitLabel: mapTop(p.successfulSuit),
          consistency: Math.max(0, 100 - Math.min(100, volatility * 1.4)),
          clutchIndex: late - early,
          carryIndex: marginAvg + (p.wins - p.losses) * 2,
          tags
        };
      }).sort((a, b) => b.wins - a.wins || b.roundsWon - a.roundsWon || a.name.localeCompare(b.name, 'nl'));

      const partnerRows = Object.values(partnerships).map((row) => ({
        ...row,
        winRate: pct(row.wins, row.matches),
        avgMargin: ((row.points - row.against) / Math.max(1, row.matches)).toFixed(1)
      })).sort((a, b) => b.wins - a.wins || b.matches - a.matches);

      const rivalryRows = Object.values(rivalries).map((row) => ({
        ...row,
        avgMargin: (row.winMargin / Math.max(1, row.meetings)).toFixed(1)
      })).sort((a, b) => b.meetings - a.meetings);

      return { profiles, partnerRows, rivalryRows, totals: { matches: history.length, rounds: totalRounds, takken: totalTakken } };
    }

    function overviewCards(data) {
      const leader = data.profiles[0];
      return `
        <div class="hero-grid">
          <div class="card"><div class="stat-label">Opgeslagen matches</div><div class="stat-val">${data.totals.matches}</div><div class="muted">Round-based history in local storage</div></div>
          <div class="card"><div class="stat-label">Totaal rondes</div><div class="stat-val">${data.totals.rounds}</div><div class="muted">Alle uitgewerkte rondes samen</div></div>
          <div class="card"><div class="stat-label">Totaal takken</div><div class="stat-val">${data.totals.takken}</div><div class="muted">Gewonnen takken die uit history afleidbaar zijn</div></div>
          <div class="card"><div class="stat-label">Huidige leider</div><div class="stat-val" style="font-size:22px;">${leader ? escapeHtml(leader.name) : '-'}</div><div class="muted">Meeste matchwins in vault</div></div>
        </div>`;
    }

    function profileTable(rows) {
      if (!rows.length) return '<div class="empty">Nog geen match history in <span class="mono">vault_history</span> gevonden.</div>';
      return `
        <table>
          <thead><tr><th>Speler</th><th class="num">Matchwin%</th><th class="num">Rondewin%</th><th class="num">Avg voor</th><th class="num">Avg tegen</th><th class="num">Roem netto</th><th class="num">Contract%</th><th>Troef</th></tr></thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td><strong>${escapeHtml(row.name)}</strong><div class="tags" style="margin-top:6px;">${row.tags.slice(0,3).map((tag) => `<span class="tag gold">${escapeHtml(tag)}</span>`).join('')}</div></td>
                <td class="num">${row.winRate}</td>
                <td class="num">${row.roundRate}</td>
                <td class="num">${Number(row.avgFor || 0).toFixed(1)}</td>
                <td class="num">${Number(row.avgAgainst || 0).toFixed(1)}</td>
                <td class="num">${row.netRoem}</td>
                <td class="num">${row.contractRate}</td>
                <td>${escapeHtml(row.successSuitLabel || row.favoriteSuitLabel || '-')}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function styleTable(rows) {
      if (!rows.length) return '<div class="empty">Nog geen profieldata.</div>';
      return `
        <table>
          <thead><tr><th>Speler</th><th class="num">Avg bod</th><th class="num">Consistency</th><th class="num">Clutch</th><th class="num">Carry</th><th class="num">Nat geforceerd</th><th class="num">Nat geleden</th></tr></thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td><strong>${escapeHtml(row.name)}</strong><div class="muted">${escapeHtml(row.favoriteSuitLabel || '-')} favoriet · ${escapeHtml(row.successSuitLabel || '-')} beste suit</div></td>
                <td class="num">${row.avgBid.toFixed(1)}</td>
                <td class="num">${row.consistency.toFixed(0)}</td>
                <td class="num">${row.clutchIndex.toFixed(1)}</td>
                <td class="num">${row.carryIndex.toFixed(1)}</td>
                <td class="num">${row.natForced}</td>
                <td class="num">${row.natSuffered}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function partnerTable(rows) {
      if (!rows.length) return '<div class="empty">Nog geen partnerchemie berekend.</div>';
      return `
        <table>
          <thead><tr><th>Pair</th><th class="num">Matches</th><th class="num">Win%</th><th class="num">Avg marge</th></tr></thead>
          <tbody>
            ${rows.slice(0,12).map((row) => `<tr><td><strong>${escapeHtml(row.pair)}</strong></td><td class="num">${row.matches}</td><td class="num">${row.winRate}</td><td class="num">${row.avgMargin}</td></tr>`).join('')}
          </tbody>
        </table>`;
    }

    function rivalryTable(rows) {
      if (!rows.length) return '<div class="empty">Nog geen rivalries berekend.</div>';
      return `
        <table>
          <thead><tr><th>Rivalry</th><th class="num">Meetings</th><th class="num">Gem. marge</th></tr></thead>
          <tbody>
            ${rows.slice(0,12).map((row) => `<tr><td><strong>${escapeHtml(row.pair)}</strong></td><td class="num">${row.meetings}</td><td class="num">${row.avgMargin}</td></tr>`).join('')}
          </tbody>
        </table>`;
    }

    function quirkCloud(rows) {
      const tags = rows.flatMap((row) => row.tags.map((tag) => `${row.name}: ${tag}`));
      if (!tags.length) return '<div class="empty">Nog niet genoeg history voor quirk-badges.</div>';
      return `<div class="tags">${tags.slice(0,40).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>`;
    }

    function renderVault() {
      const history = readHistory();
      const root = document.getElementById('vaultContent');
      if (!history.length) {
        root.innerHTML = '<div class="empty">Er staat nog geen bruikbare match history in <span class="mono">vault_history</span>. Zodra daar matches in zitten, laat deze vault meteen profiel-, partner-, roem-, contract- en stijlstats zien.</div>';
        return;
      }
      const data = analyseHistory(history);
      root.innerHTML = `
        ${overviewCards(data)}
        <div class="grid">
          <div class="card"><h2>Player profiles</h2><p class="intro">Matches, rondes, punten, roem, contracten en favoriete troefsoorten.</p>${profileTable(data.profiles)}</div>
          <div class="card"><h2>Speelstijl & efficiëntie</h2><p class="intro">Aggressie, consistency, clutch, carry en nat/pit-profiel uit de beschikbare rounds.</p>${styleTable(data.profiles)}</div>
          <div class="card"><h2>Partner chemistry</h2><p class="intro">Wie pakt samen de meeste winst en marge?</p>${partnerTable(data.partnerRows)}</div>
          <div class="card"><h2>Rivalries</h2><p class="intro">Meest voorkomende onderlinge matchups uit de bewaarde history.</p>${rivalryTable(data.rivalryRows)}</div>
          <div class="card" style="grid-column:1/-1;"><h2>Quirk badges</h2><p class="intro">Eerste golf aan stijl-tags: agressieve bieder, conservatief, high-variance, clutch finisher, snelle starter, roem magneet en defensive wall.</p>${quirkCloud(data.profiles)}</div>
        </div>`;
    }

    (async () => {
      if (await ensureAdminGate()) renderVault();
    })();
  </script>
  <div class="site-credit-watermark">v73 · Made by Bruis</div>
</body>
