    .metric .value{font-size:1.22rem;font-weight:900;line-height:1;margin-top:auto}
    .metric .meta{display:none}
    .geo-copy{display:grid;gap:4px;font-size:.88rem;color:var(--muted)}

    @media (max-width:700px){

      .drink-btn{min-height:88px;padding:15px 12px}
      .stats-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .metric{padding:9px 10px}
      .metric .value{font-size:.96rem}
    }

  <script>
  (function(){
    const cfg=window.GEJAST_CONFIG||{};
    const scopeCtx = window.GEJAST_SCOPE_CONTEXT || { getPlayerSessionToken: ()=>((window.GEJAST_CONFIG&&window.GEJAST_CONFIG.getPlayerSessionToken&&window.GEJAST_CONFIG.getPlayerSessionToken())||''), getScope: ()=>((window.GEJAST_SCOPE_UTILS&&window.GEJAST_SCOPE_UTILS.getScope&&window.GEJAST_SCOPE_UTILS.getScope())||'friends'), pagePath: ()=>((location.pathname||'').split('/').pop()||'index.html') };
    const SUPABASE_URL=cfg.SUPABASE_URL||'';
    const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';
    let latestData=null; let lastPosition=null;
    const statusLine=document.getElementById('statusLine');
    const AUTO_GEO_KEY='gejast_auto_geo_prompt_v1';
    const DRINK_LAYOUT_ORDER=['bier','2bakken','liter_bier','shot','ice','wijnfles'];
    function token(){ return scopeCtx.getPlayerSessionToken(); }
    function headers(){ return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}; }

    const verifyGeoCard=document.getElementById('verifyGeoCard');
    if(verifyGeoCard){
      const goVerify=()=>{ window.location.href='./drinks.html#verifyPanel'; };
      verifyGeoCard.addEventListener('click', goVerify);
      verifyGeoCard.addEventListener('keydown',(ev)=>{ if(ev.key==='Enter' || ev.key===' '){ ev.preventDefault(); goVerify(); } });
    }

    document.querySelectorAll('.panel[data-route]').forEach((panel)=>{
      const go=()=>{ window.location.href = panel.getAttribute('data-route') || './drinks_pending.html'; };
      panel.addEventListener('click',(ev)=>{ if(ev.target && ev.target.closest('a,button,input,label,select,textarea')) return; go(); });
      panel.addEventListener('keydown',(ev)=>{ if(ev.key==='Enter' || ev.key===' '){ ev.preventDefault(); go(); } });
    });
    async function parse(res){ const t=await res.text(); let d=null; try{ d=t?JSON.parse(t):null; }catch{ throw new Error(t||`HTTP ${res.status}`); } if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d; }
    function setStatus(msg='',tone=''){ statusLine.textContent=msg; statusLine.className=`status ${tone}`.trim(); }
    function humanizeError(err){
      const msg=String(err?.message||err||'Onbekende fout');
      if(/record "new" has no field/i.test(msg)) return 'De drankpagina kon niet volledig laden door backend-versiedrift.';
      if(/getPlayerSessionToken/i.test(msg) && /CTX is undefined/i.test(msg)) return 'De sessiehelper ontbrak tijdelijk.';
      return msg;
    }
    const FALLBACK_DRINK_TYPES=[
      { key:'bier', label:'1 Bak', unit_value:1 },
      { key:'shot', label:'Shot', unit_value:1 },
      { key:'2bakken', label:'2 Bakken', unit_value:2 },
      { key:'ice', label:'Ice', unit_value:3 },
      { key:'liter_bier', label:'Liter Bier', unit_value:3 },
      { key:'wijnfles', label:'Fles Wijn', unit_value:9 }
    ];
    async function loadPageDataLegacy(payload){
      const [pageState, verifyState, mineState, recentState] = await Promise.allSettled([
        fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drinks_page_public`,{method:'POST',headers:headers(),body:JSON.stringify(payload)}).then(parse),
        fetch(`${SUPABASE_URL}/rest/v1/rpc/get_all_pending_drink_event_verifications_public`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token()})}).then(parse),
        fetch(`${SUPABASE_URL}/rest/v1/rpc/get_my_pending_drink_requests_public`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token()})}).then(parse),
        fetch(`${SUPABASE_URL}/rest/v1/rpc/get_verified_drinks_history_public`,{method:'POST',headers:headers(),body:JSON.stringify({limit_count:8})}).then(parse)
      ]);
      const pageRaw = pageState.status==='fulfilled' ? pageState.value : {};
      const page = pageRaw?.get_drinks_page_public || pageRaw || {};
      const verifyRaw = verifyState.status==='fulfilled' ? verifyState.value : [];
      const mineRaw = mineState.status==='fulfilled' ? mineState.value : [];
      const recentRaw = recentState.status==='fulfilled' ? recentState.value : [];
      const verifyQueue = Array.isArray(verifyRaw) ? verifyRaw : (verifyRaw?.items || verifyRaw?.verify_queue || []);
      const myPendingEvents = Array.isArray(mineRaw) ? mineRaw : (mineRaw?.items || mineRaw?.my_pending_events || []);
      const recentVerified = Array.isArray(recentRaw) ? recentRaw : (recentRaw?.items || recentRaw?.recent_verified || []);
      const anyData = !!(verifyQueue.length || myPendingEvents.length || recentVerified.length || Object.keys(page).length);
      if(!anyData) throw new Error('Kon de drankdata niet laden.');
      return { page, eventTypes: page.event_types || FALLBACK_DRINK_TYPES, verifyQueue, myPendingEvents, recentVerified };
    }
    function normalizeAddBundle(combined){
      const page = Object.assign({}, combined?.page || {});
      const eventTypes = Array.isArray(combined?.eventTypes) && combined.eventTypes.length ? combined.eventTypes : (page.event_types || FALLBACK_DRINK_TYPES);
      const verifyQueue = Array.isArray(combined?.verifyQueue) ? combined.verifyQueue : (page.all_pending_verifications || page.verify_queue || []);
      const myPendingEvents = Array.isArray(combined?.myPendingEvents) ? combined.myPendingEvents : (page.my_pending_events || []);
      const recentVerified = Array.isArray(combined?.recentVerified) ? combined.recentVerified : (page.recent_verified || []);
      return Object.assign(page, {
        event_types: eventTypes,
        all_pending_verifications: verifyQueue,
        verify_queue: verifyQueue,
        my_pending_events: myPendingEvents,
        recent_verified: recentVerified
      });
    }
    function setGeoButtonState(ready){ try{ window.GEJAST_GEO && window.GEJAST_GEO.setButtonState && window.GEJAST_GEO.setButtonState(!!ready); }catch(_){} }
    async function getPosition(forceFresh=false,userInitiated=false){ const geo = window.GEJAST_GEO; if(!geo) throw new Error('Geolocatie helper ontbreekt.'); const pos = await geo.ensure(forceFresh,{silent:!userInitiated&&!forceFresh}); if(pos) geo.startWatch(); return pos; }
    async function updateGeoInfo(pos){
      const metaEl=document.getElementById('geoMetaLine');
      const addrEl=document.getElementById('geoAddressLine');
      const geo=window.GEJAST_GEO;
      if(!pos){
        setGeoButtonState(false);
        metaEl.textContent='Locatie niet actief.';
        addrEl.textContent='Verifiëren en afstandschecks werken pas met locatie. Open aanvragen kun je wel annuleren zodra ze geladen zijn.';
        return;
      }
      setGeoButtonState(true);
      metaEl.textContent=`Locatie actief · ${geo && geo.formatCoords ? geo.formatCoords(pos) : `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`}`;
      addrEl.textContent='Adres laden...';
      const address=geo && geo.reverseGeocode ? await geo.reverseGeocode(pos.coords.latitude,pos.coords.longitude) : '';
      addrEl.textContent=address ? address : 'Adres onbekend';
    }
    function drinkCopy(key){ const map={bier:'1 Bak', '2bakken':'2 Bakken', shot:'Shot', wijnfles:'Fles Wijn', ice:'Ice', liter_bier:'Liter Bier'}; return map[key]||key; }
    function isSecretKingLike(item){ const raw=String(item?.event_type_key||item?.event_type_label||item?.label||item?.request_kind||'').toLowerCase(); return raw.includes('koning')||raw.includes('king')||raw.includes('balzaal')||raw.includes('ballroom'); }
    function locationLabel(r){
      const raw = String(r?.location_label || r?.location_text || '').trim();
      const unusable = !raw || /^locatie onbekend$/i.test(raw) || /^unknown$/i.test(raw);
      return !unusable ? raw : (r?.lat!=null&&r?.lng!=null?`${Number(r.lat).toFixed(3)}, ${Number(r.lng).toFixed(3)}`:'Locatie onbekend');
    }
    function mergePendingData(data){ const mine=(data?.my_pending_events||[]).map(r=>({...r,__kind:'mine'})); const verify=(data?.verify_queue||[]).map(r=>({...r,__kind:'verify'})); const seen=new Set(); const out=[]; [...mine,...verify].forEach(r=>{ const key=`${r.__kind}:${r.id}`; if(!seen.has(key)){ seen.add(key); out.push(r); } }); return out; }
    async function backfillPendingLocations(rows){
      let changed=false;
      try{
        const geo=window.GEJAST_GEO; if(!geo||!rows||!rows.length) return false;
        for(const row of rows){
          const hasRealLabel = !!String(row.location_label||row.location_text||'').trim() && !/^locatie onbekend$/i.test(String(row.location_label||row.location_text||'').trim());
          if(hasRealLabel || row.lat==null || row.lng==null) continue;
          const address=await geo.reverseGeocode(row.lat,row.lng);
          const label=address || `${Number(row.lat).toFixed(3)}, ${Number(row.lng).toFixed(3)}`;
          if(!label) continue;
          await fetch(`${SUPABASE_URL}/rest/v1/rpc/set_drink_event_location_label`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:Number(row.id),location_label_input:label})}).then(parse).catch(()=>null);
          row.location_label = label;
          changed = true;
        }
      }catch(_){}
      return changed;
    }
    function maybeCelebrateVerified(data){
      try{
        const mine=(data?.my_pending_events||[]).map(r=>Number(r.id)).filter(Boolean);
        const recent=(data?.recent_verified||[]).filter(r=>Number(r.id));
        const trackerKey='gejast_verified_party_seen_v1';
        const seen=JSON.parse(localStorage.getItem(trackerKey)||'[]');
        const lastPending=JSON.parse(sessionStorage.getItem('gejast_last_pending_ids_v1')||'[]');
        const fresh=recent.find(r=>!seen.includes(Number(r.id)) && (lastPending.includes(Number(r.id)) || mine.includes(Number(r.id))===false));
        sessionStorage.setItem('gejast_last_pending_ids_v1', JSON.stringify(mine.slice(0,20)));
        if(!fresh) return;
        seen.push(Number(fresh.id));
        localStorage.setItem(trackerKey, JSON.stringify(seen.slice(-100)));
        const box=document.createElement('div');
        box.style.cssText='position:fixed;inset:0;z-index:10030;display:grid;place-items:center;pointer-events:none;';
        box.innerHTML=`<div style="max-width:420px;background:rgba(17,17,17,.92);border:1px solid rgba(212,175,55,.35);color:#fff;border-radius:24px;padding:18px 18px 22px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center">
            <div style="font-size:2.4rem;line-height:1">🍻✨🎉</div>
            <div style="font-weight:900;font-size:1.35rem;margin-top:8px">Je drankverzoek is bevestigd!</div>
            <div style="margin-top:6px;color:rgba(255,255,255,.86)">${fresh.event_type_label||'Drankje'} · ${Number(fresh.total_units||0).toFixed(1)} units</div>
          </div>
          <div id="gPartyBurst" style="position:fixed;inset:0;overflow:hidden"></div>`;
        document.body.appendChild(box);
        const burst=box.querySelector('#gPartyBurst');
        const icons=['🍺','🍻','✨','🎉','🥳','🍾'];
        for(let i=0;i<26;i++){
          const s=document.createElement('div');
          const left=(Math.random()*100).toFixed(1);
          const dur=(1300+Math.random()*1200)|0;
          s.textContent=icons[i%icons.length];
          s.style.cssText=`position:absolute;left:${left}vw;top:${30+Math.random()*40}vh;font-size:${22+Math.random()*18}px;animation:gparty ${dur}ms ease-out forwards;`;
          burst.appendChild(s);
        }
        if(navigator.vibrate){ try{ navigator.vibrate([180,70,220,70,320]); }catch(_){} }
        if(!document.getElementById('gparty-style')){
          const st=document.createElement('style'); st.id='gparty-style'; st.textContent='@keyframes gparty{0%{transform:translateY(0) scale(.7);opacity:0}10%{opacity:1}100%{transform:translateY(-180px) rotate(22deg) scale(1.2);opacity:0}}'; document.head.appendChild(st);
        }
        setTimeout(()=>box.remove(), 2800);
      }catch(_){}
    }
    function renderButtons(types){
      const wrap=document.getElementById('drinkButtons');
      const runtimeTypes = Array.isArray(types) && types.length ? types : FALLBACK_DRINK_TYPES;
      const rows=[...runtimeTypes].sort((a,b)=>{ const ai=DRINK_LAYOUT_ORDER.indexOf(a.key); const bi=DRINK_LAYOUT_ORDER.indexOf(b.key); return (ai===-1?999:ai)-(bi===-1?999:bi) || String(drinkCopy(a.key)||a.label||a.key).localeCompare(String(drinkCopy(b.key)||b.label||b.key),'nl'); });
      wrap.innerHTML=rows.length ? rows.map((t,index)=>`<button class="drink-btn ${(index%2===0)?'gold':'dark'}" data-drink-type="${t.key}"><strong>+ ${drinkCopy(t.key)||t.label||t.key}</strong><small>${Number(t.unit_value||0).toFixed(1)} units per stuk</small></button>`).join('') : '<div class="muted">Geen drinktypes gevonden.</div>';
      wrap.querySelectorAll('[data-drink-type]').forEach(btn=>btn.addEventListener('click',()=>submitDrink(btn.getAttribute('data-drink-type'))));
    }
    function renderSession(data){
      const totals=data.totals||{};
      const pending=(data.my_pending_events||[]).length;
      document.getElementById('sessionGrid').innerHTML=`
        <div class="metric"><div class="label">Vandaag</div><div class="value">${Number(totals.today_units||0).toFixed(1)}</div></div>
        <div class="metric"><div class="label">Open aanvragen</div><div class="value">${pending}</div></div>
        <div class="metric"><div class="label">Totaal</div><div class="value">${Number(totals.all_units||0).toFixed(1)}</div></div>`;
    }
    function renderPending(rows){ const wrap=document.getElementById('pendingList'); wrap.innerHTML=(rows||[]).length ? (rows||[]).map(r=>`<div class="row"><div class="row-top"><div><strong>${r.player_name ? `${r.player_name} · ` : ''}${r.event_type_label||r.event_type_key||'Drankje'}</strong><div class="meta">${new Date(r.created_at||Date.now()).toLocaleString('nl-NL')} · ${Number(r.total_units||0).toFixed(1)} units</div><div class="meta">${locationLabel(r)}</div>${r.__kind!=='verify' ? `<div class="meta">Voor: ${(r.approver_names||[]).join(', ')||'—'} · Tegen: ${(r.rejector_names||[]).join(', ')||'—'}</div>` : ''}</div><span class="pill">${r.__kind==='verify'?'check':(r.status||'pending')}</span></div><div class="row-actions">${r.__kind==='verify' ? `${!r.viewer_vote_state ? (canVoteNearbyVerify(r) ? `<button class="action-btn verify" data-verify-id="${r.id}">Bevestigen</button><button class="action-btn cancel" data-reject-id="${r.id}">Afkeuren</button>` : `<span class="meta">Te ver weg om te stemmen.</span>`) : `<span class="meta">Jij stemde al: ${r.viewer_vote_state==='approved'?'voor':'tegen'}</span>`}` : `<button class="action-btn cancel" data-cancel-id="${r.id}">Annuleren</button>`}</div></div>`).join('') : '<div class="muted">Nog geen open aanvragen of checks.</div>'; wrap.querySelectorAll('[data-cancel-id]').forEach(btn=>btn.addEventListener('click',()=>cancelDrink(btn.getAttribute('data-cancel-id')))); wrap.querySelectorAll('[data-verify-id]').forEach(btn=>btn.addEventListener('click',()=>verifyDrink(btn.getAttribute('data-verify-id'), true))); wrap.querySelectorAll('[data-reject-id]').forEach(btn=>btn.addEventListener('click',()=>verifyDrink(btn.getAttribute('data-reject-id'), false))); }
    function renderVerify(rows){ const wrap=document.getElementById('verifyQueue'); wrap.innerHTML=(rows||[]).length ? (rows||[]).map(r=>`<div class="verify-card"><div class="row-top"><div><strong>${r.player_name} · ${r.event_type_label}</strong><div class="verify-distance">${Number(r.total_units||0).toFixed(1)} units${isSecretKingLike(r)?'':(r.distance_m!=null ? ` · ${Math.round(r.distance_m)}m afstand` : '')}</div><div class="meta">${locationLabel(r)}</div><div class="meta">Voor: ${(r.approver_names||[]).join(', ')||'—'} · Tegen: ${(r.rejector_names||[]).join(', ')||'—'}</div></div><span class="pill">check</span></div><div class="row-actions">${!r.viewer_vote_state ? (canVoteNearbyVerify(r) ? `<button class="action-btn verify" data-verify-id="${r.id}">Bevestigen</button><button class="action-btn cancel" data-reject-id="${r.id}">Afkeuren</button>` : `<span class="meta">Te ver weg om te stemmen.</span>`) : `<span class="meta">Jij stemde al: ${r.viewer_vote_state==='approved'?'voor':'tegen'}</span>`}</div></div>`).join('') : '<div class="muted">Nog geen verificaties in de buurt.</div>'; wrap.querySelectorAll('[data-verify-id]').forEach(btn=>btn.addEventListener('click',()=>verifyDrink(btn.getAttribute('data-verify-id'), true))); wrap.querySelectorAll('[data-reject-id]').forEach(btn=>btn.addEventListener('click',()=>verifyDrink(btn.getAttribute('data-reject-id'), false))); }
    function renderRecent(rows){ const wrap=document.getElementById('recentList'); const items=(rows||[]).slice(0,5); wrap.innerHTML=items.length ? items.map(r=>`<a class="row clean" href="./drinks_history.html"><div class="row-top"><div><strong>${r.player_name} · ${r.event_type_label}</strong><div class="meta">${new Date(r.verified_at||r.created_at).toLocaleString('nl-NL')} · ${Number(r.total_units||0).toFixed(1)} units</div><div class="meta">${locationLabel(r)}</div><div class="meta">Bevestigd door ${r.verifier_names?.join(', ')||'—'}</div></div><span class="pill">ok</span></div></a>`).join('') : '<div class="muted">Nog geen bevestigde drankjes.</div>'; }
    async function loadPage(forceFresh=false,userInitiated=false){ try{ if(window.GEJAST_CONFIG && !window.GEJAST_CONFIG.ensurePlayerSessionOrRedirect('drinks_add')) return; const pos=(forceFresh||!lastPosition)?await getPosition(forceFresh,userInitiated):lastPosition; if(pos) lastPosition=pos; await updateGeoInfo(lastPosition||pos||null); const usePos=lastPosition||pos; const payload={session_token:token(),viewer_lat:usePos?usePos.coords.latitude:null,viewer_lng:usePos?usePos.coords.longitude:null};
        const combined = await loadPageDataLegacy(payload);
        const data = normalizeAddBundle(combined);
        latestData=data;
        renderButtons(data.event_types||combined?.eventTypes||[]);
        renderSession(data);
        await backfillPendingLocations(data.my_pending_events||[]);
        const mergedPending=mergePendingData({...data,verify_queue:data.all_pending_verifications||data.verify_queue||[]});
        renderPending(mergedPending);
        renderVerify(data.all_pending_verifications||data.verify_queue||[]);
        renderRecent(data.recent_verified||[]);
        maybeCelebrateVerified(data);
        setStatus('');
      }catch(err){ setStatus(humanizeError(err),'bad'); if(!lastPosition) setGeoButtonState(false); } }
    async function submitDrink(typeKey){
      try{
        const pos=await getPosition(true,true);
        if(pos) lastPosition=pos;
        await updateGeoInfo(lastPosition||pos||null);
        const usePos=lastPosition||pos;
        if(!usePos) throw new Error('Geolocatie is nodig om een drankje in te dienen.');
        const geo=window.GEJAST_GEO;
        let address='';
        try{ address=geo&&geo.reverseGeocode ? await geo.reverseGeocode(usePos.coords.latitude,usePos.coords.longitude) : ''; }catch(_){}
        const fallbackLabel = `${Number(usePos.coords.latitude).toFixed(3)}, ${Number(usePos.coords.longitude).toFixed(3)}`;
        const wantedLabel = address || fallbackLabel;
        const created=await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_drink_event`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),event_type_key:typeKey,quantity:1,lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy})}).then(parse);
        const eventId = Number(created?.drink_event_id || created?.event_id || created?.id || 0) || null;
        if(wantedLabel){
          const saveById = async()=> fetch(`${SUPABASE_URL}/rest/v1/rpc/set_drink_event_location_label`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:eventId,location_label_input:wantedLabel})}).then(parse).catch(()=>null);
          const saveLatest = async()=> fetch(`${SUPABASE_URL}/rest/v1/rpc/set_latest_drink_event_location_label`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),event_type_key:typeKey,location_label_input:wantedLabel})}).then(parse).catch(()=>null);
          if(eventId) await saveById();
          else await saveLatest();
          setTimeout(()=>{ if(eventId) saveById(); else saveLatest(); }, 220);
          setTimeout(()=>{ if(eventId) saveById(); else saveLatest(); }, 900);
          }
          setStatus(`${drinkCopy(typeKey)} wacht op bevestiging.`, 'ok');
          await loadPage(false,false);
        }catch(err){ setStatus(humanizeError(err),'bad'); }
      }
    async function verifyDrink(id, approve=true){ try{ const pool=((latestData&&((latestData.all_pending_verifications||latestData.verify_queue)||[]))||[]); const row=pool.find(r=>String(r.id)===String(id))||{}; if(row.viewer_vote_state) throw new Error('Je hebt al gestemd op deze aanvraag.'); const locationSensitive=!isSecretKingLike(row); let usePos=null; if(locationSensitive){ const pos=await getPosition(true,true); if(pos) lastPosition=pos; await updateGeoInfo(lastPosition||pos||null); usePos=lastPosition||pos; if(!usePos) throw new Error('Geolocatie is nodig om een drankje te bevestigen.'); } await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_drink_event`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:Number(id),lat:usePos?usePos.coords.latitude:null,lng:usePos?usePos.coords.longitude:null,accuracy:usePos?usePos.coords.accuracy:null,approve:!!approve})}).then(parse); setStatus(approve?'Drankje bevestigd.':'Drankje afgekeurd.', 'ok'); await loadPage(false,false); }catch(err){ setStatus(humanizeError(err),'bad'); } }
    async function cancelDrink(id){ try{ await fetch(`${SUPABASE_URL}/rest/v1/rpc/cancel_my_pending_drink_event`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:Number(id)})}).then(parse); setStatus('Aanvraag geannuleerd.', 'ok'); await loadPage(false,false); }catch(err){ setStatus(humanizeError(err),'bad'); } }
    async function tryAutoPrompt(){
      try{
        const geo=window.GEJAST_GEO;
        if(!geo) return;
        if(lastPosition || geo.cached()) return;
        if(sessionStorage.getItem(AUTO_GEO_KEY)==='1') return;
        sessionStorage.setItem(AUTO_GEO_KEY,'1');
        const pos=await geo.request(true);
        if(pos){ lastPosition=pos; geo.startWatch(); await updateGeoInfo(pos); await loadPage(false,false); }
      }catch(_){
        setGeoButtonState(false);
      }
    }
    setGeoButtonState(false);
    loadPage(false,false);
    tryAutoPrompt();
  })();
  </script>
