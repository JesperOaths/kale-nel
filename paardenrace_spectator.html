<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <title>Paardenrace spectator</title>
  <script>window.GEJAST_PAGE_VERSION='v707';</script>
  <script src="./gejast-config.js?v707"></script><script src="./gejast-game-group-b-bridge.js?v707"></script><script src="./gejast-home-gate.js?v707"></script>
  <script src="./gejast-paardenrace.js?v707"></script>
  <style>
    :root{--paper:#fbf6ef;--line:rgba(0,0,0,.08);--muted:#6b6257;--ink:#201b16;--gold:#9a8241;--shadow:0 18px 44px rgba(0,0,0,.08)}
    *{box-sizing:border-box} body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(240,235,226,.94),rgba(240,235,226,.96)),url('./site-bg-desktop.webp') center/cover fixed;color:var(--ink)} .wrap{max-width:1440px;margin:0 auto}.card{background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:18px;box-shadow:var(--shadow)} .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)} .muted{color:var(--muted)} .meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.box span{display:block;font-size:11px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}.box strong{display:block;margin-top:6px;font-size:18px} .board{background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px}.board .pr-live-stage{aspect-ratio:1536/1024;border-radius:18px;overflow:hidden;background:#ede2d1;border:1px solid rgba(0,0,0,.06);position:relative}.board .pr-live-arena{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover;z-index:1}.board .pr-overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}@media(max-width:900px){.meta{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
<script src="./gejast-paardenrace-input-guard.js?v707"></script></head>
<body>
<div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:8px;flex-wrap:wrap"><span style="display:inline-flex;padding:6px 10px;border-radius:999px;background:#efe7cf;color:#6b5220;font-size:12px;font-weight:800;text-transform:uppercase">Paardenrace spectator</span></div><h1 style="margin:12px 0 6px">Paardenrace</h1><div id="status" class="muted">Wachten op room...</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn alt" href="./index.html">Home</a><a class="btn alt" id="playLink" href="./paardenrace.html">Spelen</a></div></div><div class="meta"><div class="box"><span>Room</span><strong id="roomCode">—</strong></div><div class="box"><span>Stage</span><strong id="stageValue">—</strong></div><div class="box"><span>Spelers</span><strong id="playersValue">—</strong></div><div class="box"><span>Laatste kaart</span><strong id="drawValue">—</strong></div></div><div class="board"><div id="boardWrap" class="muted">Bord laden...</div></div></div></div>
<div class="site-credit-watermark" data-version-watermark></div>
<script>
(function(){
  const api = window.GEJAST_PAARDENRACE || {};
  const $ = (id)=>document.getElementById(id);
  function qRoom(){ const p = new URLSearchParams(location.search); return (p.get('room') || p.get('live') || (api.getStoredRoomCode && api.getStoredRoomCode()) || '').trim().toUpperCase(); }
  async function load(){
    const code = qRoom();
    if (!code){ $('status').textContent = 'Geen room in URL of opslag.'; $('boardWrap').textContent = 'Geen room geselecteerd.'; return; }
    $('playLink').href = `./paardenrace_live.html?room=${encodeURIComponent(code)}&live=${encodeURIComponent(code)}`;
    try {
      const state = await api.rpc('get_paardenrace_room_state_safe', { room_code_input: code });
      const room = state?.room || {}; const match = state?.match || {}; const players = Array.isArray(state?.players) ? state.players : [];
      $('status').textContent = `${room.room_code || code} · spectator`; $('roomCode').textContent = room.room_code || code; $('stageValue').textContent = room.stage || '—'; $('playersValue').textContent = players.length ? players.map((p)=>p.player_name || p.name || 'speler').join(' · ') : '—'; $('drawValue').textContent = match.last_draw_card || '—';
      $('boardWrap').innerHTML = api.renderLiveBoard ? api.renderLiveBoard(match) : 'Bordhelper ontbreekt.';
    } catch (err) { $('status').textContent = err?.message || 'Laden mislukt.'; $('boardWrap').textContent = err?.message || 'Laden mislukt.'; }
  }
  load(); setInterval(()=>{ if(!document.hidden) load(); }, 2500);
})();
</script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
<script id="gejast-game-group-b-boot">(function(){function boot(){try{window.GEJAST_GAME_GROUP_B_BRIDGE&&window.GEJAST_GAME_GROUP_B_BRIDGE.bootPanel&&window.GEJAST_GAME_GROUP_B_BRIDGE.bootPanel({game:'paardenrace'});}catch(_){}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();})();</script></body>
</html>
