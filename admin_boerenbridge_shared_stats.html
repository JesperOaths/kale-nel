<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <title>Boerenbridge Shared Stats - Admin</title>
  <script>window.GEJAST_PAGE_VERSION='v705';</script>
  <script src="./gejast-config.js?v705"></script>
  <script src="./admin-session-sync.js?v705"></script>
  <script src="./gejast-shared-stats-config.js?v705"></script>
  <script src="./gejast-boerenbridge-shared-stats.js?v705"></script>
  <style>
    :root{--gold:#9a8241;--paper:#f7f2e8;--card:#fff;--line:rgba(0,0,0,.08);--muted:#665f54;--bad:#8b2d20;--ok:#1f5d45}*{box-sizing:border-box}body{margin:0;padding:22px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(240,236,226,.94),rgba(240,236,226,.94)),url('./site-bg-desktop.webp') center/cover fixed;color:#151515}.shell{max-width:1180px;margin:0 auto;background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:24px;box-shadow:0 18px 44px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}h1{margin:0;font-size:30px;letter-spacing:-.04em}.sub{color:var(--muted);margin:8px 0 0}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;padding:10px 14px;background:#111;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px}.panel h2{margin:0 0 10px;font-size:18px}.status{margin-top:12px;color:var(--muted);min-height:22px}.status.ok{color:var(--ok)}.status.warn{color:var(--bad)}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid rgba(0,0,0,.06);padding:9px 7px;text-align:left;vertical-align:top}.table th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55}.shared-stat-row{display:grid;grid-template-columns:36px 1fr repeat(4,auto);gap:9px;align-items:center;padding:9px;border-bottom:1px solid rgba(0,0,0,.06)}.shared-rank{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-weight:900}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;pointer-events:none}@media(max-width:900px){.grid{grid-template-columns:1fr}.shared-stat-row{grid-template-columns:32px 1fr 1fr}.shared-stat-row span:nth-last-child(-n+3){display:none}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div><h1>Boerenbridge Shared Stats</h1><p class="sub">Phase 11 audit en cache-control voor Boerenbridge metrics in het gedeelde stats-framework.</p></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn alt" href="./admin.html">Admin</a><button class="btn" id="refreshBtn" type="button">Ververs</button><button class="btn alt" id="rebuildBtn" type="button">Rebuild cache</button></div>
    </div>
    <div id="statusBox" class="status">Nog niet geladen.</div>
    <div class="grid">
      <section class="panel"><h2>Leaderboard preview</h2><div id="leaderboardBox" data-boerenbridge-shared-leaderboard data-limit="25"></div></section>
      <section class="panel"><h2>Audit</h2><table class="table"><tbody id="auditBody"><tr><td>Wachten...</td></tr></tbody></table></section>
    </div>
  </main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    const cfg = window.GEJAST_CONFIG || {};
    function adminToken(){ try { return (window.GEJAST_ADMIN_SESSION && window.GEJAST_ADMIN_SESSION.getToken()) || localStorage.getItem('jas_admin_session_v8') || sessionStorage.getItem('jas_admin_session_v8') || ''; } catch(_) { return ''; } }
    function headers(){ return { 'Content-Type':'application/json', apikey: cfg.SUPABASE_PUBLISHABLE_KEY || '', Authorization:`Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY || ''}`, Accept:'application/json' }; }
    async function rpc(name, payload){ const res=await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',mode:'cors',cache:'no-store',headers:headers(),body:JSON.stringify(payload||{})}); const txt=await res.text(); let data=null; try{data=txt?JSON.parse(txt):null;}catch(_){throw new Error(txt||`HTTP ${res.status}`);} if(!res.ok) throw new Error(data?.message||data?.error||data?.hint||txt||`HTTP ${res.status}`); return data&&data[name]!==undefined?data[name]:data; }
    function setStatus(msg,tone){ const el=document.getElementById('statusBox'); el.textContent=msg||''; el.className=`status ${tone||''}`.trim(); }
    function renderAudit(rows){ const body=document.getElementById('auditBody'); const list=Array.isArray(rows)?rows:(Array.isArray(rows?.rows)?rows.rows:[]); if(!list.length){body.innerHTML='<tr><td>Geen auditregels teruggegeven.</td></tr>';return;} body.innerHTML=list.map((r)=>`<tr><th>${r.check_name||r.name||'check'}</th><td>${r.status||r.result||'—'}</td><td>${r.detail||r.message||r.count||''}</td></tr>`).join(''); }
    async function refresh(){ try{ setStatus('Laden...'); await window.GEJAST_BOERENBRIDGE_SHARED_STATS.mountLeaderboard('#leaderboardBox',{limit:25}); renderAudit(await rpc('admin_get_boerenbridge_shared_stats_audit_v643',{admin_session_token:adminToken()})); setStatus('Boerenbridge shared stats geladen.','ok'); }catch(err){ setStatus(String(err.message||err),'warn'); } }
    async function rebuild(){ try{ setStatus('Cache rebuild...'); await rpc('admin_refresh_boerenbridge_shared_stats_v643',{admin_session_token:adminToken()}); await refresh(); }catch(err){ setStatus(String(err.message||err),'warn'); } }
    document.getElementById('refreshBtn').addEventListener('click', refresh); document.getElementById('rebuildBtn').addEventListener('click', rebuild); refresh();
    try{ cfg.applyVersionLabel && cfg.applyVersionLabel(); }catch(_){}
  </script>
</body>
</html>
