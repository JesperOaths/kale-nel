<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none"/><title>Admin Paardenrace</title><script>window.GEJAST_PAGE_VERSION='v705';</script><script src="./gejast-config.js?v705"></script><script src="./gejast-home-gate.js?v705"></script><script src="./admin-session-sync.js?v705"></script><script src="./admin-topnav.js?v705"></script><script src="./gejast-paardenrace.js?v705"></script><style>:root{--line:rgba(0,0,0,.08);--paper:#fffaf3;--muted:#6d6256;--gold:#9a8241}*{box-sizing:border-box}body{margin:0;padding:20px;font-family:Inter,system-ui,sans-serif;background:#efe6d7;color:#17130f}.wrap{max-width:1180px;margin:0 auto}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;border:0;font-weight:900;cursor:pointer}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.row{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.muted{color:var(--muted)}.list{display:grid;gap:10px}@media(max-width:820px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="muted">Admin · Paardenrace</div><h1>Admin Paardenrace</h1><p class="muted">Live rooms, wagerstatus, finished races en noodknoppen.</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn alt" href="./admin.html">Admin</a><a class="btn alt" href="./paardenrace.html">Lobby</a><a class="btn alt" href="./paardenrace_stats.html">Stats</a><button class="btn" id="refreshBtn">Ververs</button></div></div><section class="panel"><div id="overview" class="grid"></div></section><section class="panel"><h2>Rooms</h2><div id="rooms" class="list"></div></section></main><div class="site-credit-watermark" data-version-watermark>v683 · Made by Bruis</div><script>(()=>{const api=window.GEJAST_PAARDENRACE,$=id=>document.getElementById(id);function card(k,v,m=''){return `<div class="card"><div class="muted">${k}</div><div style="font-size:2rem;font-weight:900">${v}</div>${m?`<div class="muted">${m}</div>`:''}</div>`}async function load(){try{const data=await api.rpc('admin_get_paardenrace_overview_v683',{}); const o=data.overview||{}; $('overview').innerHTML=[card('Open rooms',o.open_rooms||0),card('Live',o.live_rooms||0),card('Finished',o.finished_rooms||0),card('Totaal Bakken',o.total_bakken||0)].join(''); const rows=Array.isArray(data.rooms)?data.rooms:[]; $('rooms').innerHTML=rows.map(r=>`<div class="row"><strong>${r.room_code}</strong><div class="muted">${r.stage} · host ${r.host_name||'—'} · ${r.player_count||0} spelers · pot ${r.total_wager_bakken||0}</div><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><a class="btn alt" href="./paardenrace_live.html?room=${encodeURIComponent(r.room_code)}&live=${encodeURIComponent(r.room_code)}">Live</a><button class="btn alt" data-close="${r.room_code}">Sluit</button></div></div>`).join('')||'<div class="muted">Geen rooms.</div>'; document.querySelectorAll('[data-close]').forEach(btn=>btn.onclick=async()=>{if(!confirm('Room sluiten?'))return; await api.rpc('admin_close_paardenrace_room_v683',{room_code_input:btn.dataset.close}); load();});}catch(e){$('rooms').innerHTML=`<div class="muted">${e.message||e}</div>`}}$('refreshBtn').onclick=load;load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',sync,{once:true});else sync();})();</script></body></html>
