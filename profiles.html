<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spelersprofielen</title>
  <script>window.GEJAST_PAGE_VERSION='v503';</script>
  <script src="./gejast-config.js?v503"></script>
  <script src="./gejast-clickable-cards.js?v503"></script>
  <script src="./gejast-scope-context.js?v503"></script>
  <script src="./gejast-family-rollout.js?v503"></script>
  <script src="./gejast-scope.js?v503"></script>
  <script src="./gejast-home-gate.js?v503"></script>
  <script src="./gejast-badges.js?v503"></script>
  <script src="./gejast-badge-progress.js?v503"></script>
  <script src="./gejast-rpc-contract.js?v503"></script>
  <script src="./gejast-profile-source.js?v503"></script>
  <style>
    :root{--gold:#d4af37;--ink:#1b1711;--paper:rgba(255,250,243,.92);--line:#e0d6c6;--muted:#6f665e;--soft:#fbf7ef}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.84),rgba(247,244,238,.84)),url('./wordtergejast.png') center/cover fixed}
    .page{width:min(1180px,100%);margin:0 auto;padding:20px 14px calc(96px + env(safe-area-inset-bottom,0px))}
    .sheet{background:var(--paper);border:1px solid rgba(17,17,17,.08);border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.09);overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
    .top h1{margin:0;font-size:clamp(28px,5vw,40px)}
    .top p{margin:4px 0 0;color:var(--muted)}
    .back{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:none;cursor:pointer}
    .status{padding:0 20px 18px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px;padding:18px;align-items:stretch}
    .card{background:#fff;border:1px solid rgba(17,17,17,.07);border-radius:22px;padding:18px;display:grid;gap:14px;box-shadow:0 10px 20px rgba(0,0,0,.05);text-decoration:none;color:inherit;grid-template-rows:auto auto auto auto;min-height:100%}
    .head{display:grid;grid-template-columns:72px minmax(0,1fr);gap:14px;align-items:center}
    .avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;background:#efe7d7;border:2px solid rgba(212,175,55,.45);overflow:hidden;display:block}
    .initials{display:grid;place-items:center;font-weight:900;font-size:24px;color:#5d4820}
    .name{font-size:23px;font-weight:900;line-height:1.05;word-break:break-word}
    .meta,.submeta{color:var(--muted);font-size:13px;line-height:1.45;word-break:break-word}
    .submeta strong{color:#3d3429}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .stat{background:var(--soft);border:1px solid rgba(17,17,17,.06);border-radius:16px;padding:10px;text-align:center;min-width:0}
    .stat strong{display:block;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .bio{font-size:14px;line-height:1.45;color:#3d3429}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none;max-width:min(calc(100vw - 24px),560px);text-align:center}
    @media (max-width:760px){.page{padding:14px 12px calc(104px + env(safe-area-inset-bottom,0px))}.top{flex-direction:column;align-items:stretch}.back{width:100%}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.head{grid-template-columns:64px minmax(0,1fr)}.avatar{width:64px;height:64px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <div class="top">
        <div>
          <h1>Spelers</h1>
          <p>Alle actieve spelers uit de huidige scope.</p>
        </div>
        <button class="back" type="button" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</button>
      </div>
      <div id="status" class="status">Laden…</div>
      <div id="grid" class="grid"></div>
    </section>
  </main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      const cfg = window.GEJAST_CONFIG || {};
      const scope = (window.GEJAST_SCOPE_UTILS && window.GEJAST_SCOPE_UTILS.getScope && window.GEJAST_SCOPE_UTILS.getScope()) || 'friends';
      const statusNode = document.getElementById('status');
      const gridNode = document.getElementById('grid');

      function headers(){
        return {
          apikey: cfg.SUPABASE_PUBLISHABLE_KEY || '',
          Authorization: `Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY || ''}`,
          'Content-Type': 'application/json',
          Accept: 'application/json'
        };
      }
      async function parseResponse(res){
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (_) { throw new Error(text || `HTTP ${res.status}`); }
        if (!res.ok) throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
        return data;
      }
      async function callRpc(name, payload){
        const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/${name}`, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: headers(),
          body: JSON.stringify(Object.assign({}, payload || {}))
        });
        const raw = await parseResponse(res);
        return raw && raw[name] !== undefined ? raw[name] : raw;
      }
      function normalizeName(value){ return String(value || '').trim().toLowerCase(); }
      function displayName(player){
        return player.nickname || player.chosen_username || player.public_display_name || player.display_name || player.player_name || 'Speler';
      }
      function originalName(player){
        return player.player_name || player.display_name || player.original_name || '';
      }
      function initials(name){
        return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map((value) => value[0]).join('').toUpperCase() || '?';
      }
      function avatarHtml(player){
        const helper = (window.GEJAST_PROFILE_SOURCE && typeof window.GEJAST_PROFILE_SOURCE.profileImageUrl === 'function'
          ? window.GEJAST_PROFILE_SOURCE.profileImageUrl
          : (window.GEJAST_CONFIG && typeof window.GEJAST_CONFIG.normalizeProfileImageUrl === 'function'
            ? window.GEJAST_CONFIG.normalizeProfileImageUrl
            : (value) => String(value || '').trim()));
        const src = helper(player.profile_picture_url || player.avatar_url || player.photo_url || '');
        const label = displayName(player);
        return src
          ? `<img class="avatar" src="${src}" alt="${label}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='&lt;div class=&quot;avatar initials&quot;&gt;${initials(label)}&lt;/div&gt;'">`
          : `<div class="avatar initials">${initials(label)}</div>`;
      }
      function winPct(player){
        const matches = Number(player.total_matches || 0);
        if (!matches) return 0;
        return Math.round((Number(player.total_wins || 0) / matches) * 100);
      }
      function mergePlayers(...sets){
        const map = new Map();
        sets.flat().forEach((player) => {
          const key = normalizeName(
            player?.player_name ||
            player?.display_name ||
            player?.public_display_name ||
            player?.nickname ||
            player?.chosen_username
          );
          if (!key) return;
          map.set(key, Object.assign({}, map.get(key) || {}, player));
        });
        return Array.from(map.values()).filter((player) => String(displayName(player)).trim());
      }
      async function fetchActivatedPlayers(){
        const rows = [];
        try {
          const url = `${cfg.SUPABASE_URL}/rest/v1/allowed_usernames?select=display_name,status,site_scope&order=display_name.asc`;
          const res = await fetch(url, { method:'GET', mode:'cors', cache:'no-store', headers: headers() });
          const data = await parseResponse(res);
          (Array.isArray(data) ? data : []).forEach((row) => {
            const name = String(row.display_name || '').trim();
            const rawScope = String(row.site_scope || '').toLowerCase();
            if (!name) return;
            if (rawScope && rawScope !== scope) return;
            rows.push({
              player_name: name,
              display_name: name,
              public_display_name: name,
              total_matches: 0,
              total_wins: 0,
              best_rating: 1000,
              badge_count: 0
            });
          });
        } catch (_) {}
        return rows;
      }
      async function fetchLoginNamesPlayers(){
        const rows = [];
        try {
          const data = await callRpc('get_login_names_scoped', { site_scope_input: scope });
          const source = Array.isArray(data) ? data : (Array.isArray(data?.names) ? data.names : (Array.isArray(data?.data) ? data.data : []));
          source.forEach((row) => {
            const name = typeof row === 'string'
              ? row
              : (row?.display_name || row?.name || row?.desired_name || row?.slug || row?.player_name || '');
            if (!name) return;
            rows.push({
              player_name: name,
              display_name: name,
              public_display_name: name,
              total_matches: 0,
              total_wins: 0,
              best_rating: 1000,
              badge_count: 0
            });
          });
        } catch (_) {}
        try {
          if (window.GEJAST_CONFIG && typeof window.GEJAST_CONFIG.fetchScopedActivePlayerNames === 'function') {
            const names = await window.GEJAST_CONFIG.fetchScopedActivePlayerNames(scope);
            (Array.isArray(names) ? names : []).forEach((name) => {
              rows.push({
                player_name: name,
                display_name: name,
                public_display_name: name,
                total_matches: 0,
                total_wins: 0,
                best_rating: 1000,
                badge_count: 0
              });
            });
          }
        } catch (_) {}
        return rows;
      }
      function renderPlayers(players){
        const rows = (Array.isArray(players) ? players.slice() : []).sort((a,b)=>{
          const matchDiff = Number(b.total_matches || 0) - Number(a.total_matches || 0);
          if (matchDiff) return matchDiff;
          return displayName(a).localeCompare(displayName(b), 'nl');
        });
        if (!rows.length) {
          gridNode.innerHTML = '<article class="card"><div class="bio">Nog geen actieve spelers gevonden voor deze scope.</div></article>';
          return;
        }
        gridNode.innerHTML = rows.map((player) => {
          const shown = displayName(player);
          const original = originalName(player);
          const profileTarget = original || shown;
          return `<a class="card" href="./player.html?player=${encodeURIComponent(profileTarget)}&scope=${encodeURIComponent(scope)}">
            <div class="head">
              ${avatarHtml(player)}
              <div>
                <div class="name">${shown}</div>
                <div class="meta">${original && original !== shown ? `Originele naam: "${original}"` : 'Geen alternatieve naam ingesteld.'}</div>
                <div class="submeta"><strong>Scope:</strong> ${scope === 'family' ? 'familie' : 'vrienden'}</div>
              </div>
            </div>
            <div class="stats">
              <div class="stat"><strong>${player.total_matches || 0}</strong><span>Potjes</span></div>
              <div class="stat"><strong>${winPct(player)}%</strong><span>Win%</span></div>
              <div class="stat"><strong>${Math.round(Number(player.best_rating || 1000))}</strong><span>Beste ELO</span></div>
              <div class="stat"><strong>${player.badge_count || 0}</strong><span>Badges</span></div>
            </div>
            <div class="bio">${player.bio ? player.bio : `${player.total_matches || 0} geregistreerde potjes, ${player.total_wins || 0} overwinningen.`}</div>
          </a>`;
        }).join('');
      }

      async function boot(){
        try {
          const profileSource = window.GEJAST_PROFILE_SOURCE || null;
          const [bundleRaw, allPlayersRaw, activatedRaw, loginNameRaw] = await Promise.allSettled([
            profileSource && typeof profileSource.loadProfilesPageBundle === 'function'
              ? profileSource.loadProfilesPageBundle()
              : callRpc('get_profiles_page_bundle_scoped', { site_scope_input: scope }),
            profileSource && typeof profileSource.loadProfilesList === 'function'
              ? profileSource.loadProfilesList()
              : callRpc('get_all_site_players_public_scoped', { site_scope_input: scope }),
            fetchActivatedPlayers(),
            fetchLoginNamesPlayers()
          ]);
          const bundle = bundleRaw.status === 'fulfilled' ? bundleRaw.value : {};
          const allPlayers = allPlayersRaw.status === 'fulfilled' ? ((allPlayersRaw.value && allPlayersRaw.value.players) || []) : [];
          const activatedPlayers = activatedRaw.status === 'fulfilled' ? activatedRaw.value : [];
          const loginNamePlayers = loginNameRaw.status === 'fulfilled' ? loginNameRaw.value : [];
          const players = mergePlayers(bundle.players || [], allPlayers, activatedPlayers, loginNamePlayers);
          renderPlayers(players);
          statusNode.textContent = `${players.length} actieve of geactiveerde speler(s) zichtbaar in de ${scope === 'family' ? 'familie' : 'vrienden'}-scope.`;
        } catch (err) {
          statusNode.textContent = err.message || 'Profielen laden mislukt.';
          gridNode.innerHTML = '<article class="card"><div class="bio">Profielen laden mislukt.</div></article>';
        }
      }

      boot();
    })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
