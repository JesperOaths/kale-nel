<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelersprofielen</title>
  <script>window.GEJAST_PAGE_VERSION='v638';</script>
  <script src="./gejast-config.js?v638"></script>
  <script src="./gejast-home-gate.js?v638"></script>
  <script defer src="./gejast-clickable-cards.js?v638"></script>
  <script defer src="./gejast-scope-context.js?v638"></script><script defer src="./gejast-family-rollout.js?v638"></script>
  <style>
    :root{--gold:#d4af37;--ink:#1b1711;--paper:rgba(255,250,243,.92);--line:#e0d6c6;--muted:#6f665e;--soft:#fbf7ef}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.84),rgba(247,244,238,.84)),url('./wordtergejast.png') center/cover scroll}
    .page{width:min(1180px,100%);margin:0 auto;padding:20px 14px 90px}
    .sheet{background:var(--paper);border:1px solid rgba(17,17,17,.08);border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.09);overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
    .top h1{margin:0;font-size:clamp(28px,5vw,40px)}
    .top p{margin:4px 0 0;color:var(--muted)}
    .back{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:none;cursor:pointer}
    .status{padding:0 20px 18px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px;padding:18px;align-items:stretch}
    .card{background:#fff;border:1px solid rgba(17,17,17,.07);border-radius:22px;padding:18px;display:grid;gap:14px;box-shadow:0 10px 20px rgba(0,0,0,.05);text-decoration:none;color:inherit;grid-template-rows:auto auto auto auto;min-height:100%}
    .head{display:grid;grid-template-columns:72px minmax(0,1fr);gap:14px;align-items:center}
    .avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;background:#efe7d7;border:2px solid rgba(212,175,55,.45);overflow:hidden;display:block}
    .initials{display:grid;place-items:center;font-weight:900;font-size:24px;color:#5d4820}
    .name{font-size:23px;font-weight:900;line-height:1.05;word-break:break-word}
    .meta,.submeta{color:var(--muted);font-size:13px;line-height:1.45;word-break:break-word}
    .submeta strong{color:#3d3429}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .stat{background:var(--soft);border:1px solid rgba(17,17,17,.06);border-radius:16px;padding:10px;text-align:center;min-width:0}
    .stat strong{display:block;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .badge-strip{display:grid;gap:8px}
    .badge-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}
    .badge-note{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .badge-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#111;color:#fff;font-size:12px;font-weight:800;max-width:100%}
    .badge-pill img{width:22px;height:22px;object-fit:contain;border-radius:8px;background:#fff6de;padding:2px}
    .badge-mini-row{display:flex;flex-wrap:wrap;gap:8px}
    .mini-chip{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:14px;background:#fff7e4;border:1px solid rgba(17,17,17,.08);padding:4px;box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .mini-chip img{width:100%;height:100%;object-fit:contain}
    .bio{font-size:14px;line-height:1.45;color:#3d3429}
    .gallery-sheet{margin-top:16px}
    .badge-gallery-wrap{padding:18px;display:grid;gap:16px}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}
    .card.skeleton{pointer-events:none}
    .skeleton .avatar,.skeleton .line,.skeleton .stat strong,.skeleton .mini-chip{background:linear-gradient(90deg,#f0eadf 25%,#faf6ef 50%,#f0eadf 75%);background-size:200% 100%;animation:profilePulse 1.2s ease-in-out infinite}
    .skeleton .line{height:12px;border-radius:999px}
    .skeleton .line.big{height:20px;width:70%}
    .skeleton .line.small{width:50%}
    .skeleton .bio{height:44px;border-radius:16px;background:linear-gradient(90deg,#f0eadf 25%,#faf6ef 50%,#f0eadf 75%);background-size:200% 100%;animation:profilePulse 1.2s ease-in-out infinite;color:transparent}
    .skeleton .stat{background:#fbf7ef}
    .skeleton .stat strong{height:22px;border-radius:10px;color:transparent}
    .skeleton .badge-pill{background:#f3ecdd;color:transparent}
    .skeleton .mini-chip{border:none}
    .badges-section{display:grid;gap:8px}
    .badge-accordion{border:1px solid rgba(17,17,17,.08);border-radius:16px;padding:10px 12px;background:#fbf7ef}
    .badge-accordion summary{cursor:pointer;font-weight:800}
    .badge-accordion[open]{background:#fff}
    .badge-accordion-list{display:grid;gap:8px;margin-top:10px}
    .badge-accordion-item{display:grid;grid-template-columns:36px minmax(0,1fr);gap:10px;align-items:start}
    .badge-accordion-item img{width:36px;height:36px;object-fit:contain;border-radius:10px;background:#fff7e4;border:1px solid rgba(17,17,17,.08);padding:4px}
    .badge-gallery-accordions{display:grid;gap:12px}
    .badge-gallery-accordion{border:1px solid rgba(17,17,17,.08);border-radius:18px;padding:12px 14px;background:#fffaf1;box-shadow:0 10px 24px rgba(17,17,17,.05)}
    .badge-gallery-accordion summary{cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:800;list-style:none}
    .badge-gallery-accordion summary::-webkit-details-marker{display:none}
    .badge-gallery-accordion small{color:var(--muted);font-weight:700}
    .badge-gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:12px}
    .badge-gallery-card{display:grid;grid-template-rows:minmax(96px,auto) auto;gap:10px;padding:12px;border-radius:16px;background:#fff;border:1px solid rgba(17,17,17,.08);min-height:220px}
    .badge-gallery-image-row{display:flex;align-items:center;justify-content:center;min-height:88px}
    .badge-gallery-image-row img{width:74px;height:74px;object-fit:contain;border-radius:18px;background:#fff7e4;border:1px solid rgba(17,17,17,.08);padding:8px}
    .badge-gallery-text-row{display:grid;gap:6px;align-content:start}
    .badge-gallery-title{font-size:14px;font-weight:900;line-height:1.25}
    .badge-gallery-nickname{font-size:12px;color:var(--muted);font-weight:700}
    .badge-gallery-requirement{font-size:12px;line-height:1.45;color:#3d3429}
    .badge-gallery-description{font-size:12px;line-height:1.45;color:var(--muted)}
    @keyframes profilePulse{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media (max-width:760px){.page{padding:14px 12px 90px}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.head{grid-template-columns:64px minmax(0,1fr)}.avatar{width:64px;height:64px}}
  </style>
  <script defer src="./gejast-scope.js?v638"></script>
  <script defer src="./gejast-badges.js?v638"></script>
  <script defer src="./gejast-badge-progress.js?v638"></script>
  <script defer src="./gejast-heavy-page-runtime.js?v638"></script>
  <script defer src="./gejast-rpc-contract.js?v638"></script>
  <script defer src="./gejast-profile-source.js?v638"></script>
  <script defer src="./gejast-profiles-restore.js?v638"></script>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <div class="top">
        <div>
          <h1>Spelers</h1>
          <p>Alle actieve spelers met profiel, badge-status en kernstats.</p>
        </div>
        <button class="back" type="button" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</button>
      </div>
      <div id="status" class="status">Laden…</div>
      <div id="grid" class="grid"></div>
    </section>
    <section id="badgeGalleryPanel" class="sheet gallery-sheet"></section>
  </main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      const cfg = window.GEJAST_CONFIG || {};
      const scope = (window.GEJAST_SCOPE_UTILS && window.GEJAST_SCOPE_UTILS.getScope && window.GEJAST_SCOPE_UTILS.getScope()) || 'friends';
      const statusNode = document.getElementById('status');
      const gridNode = document.getElementById('grid');
      const galleryNode = document.getElementById('badgeGalleryPanel');
      const cacheKey = `gejast_profiles_cache_v630_${scope}`;
      const cacheTtl = 10 * 60 * 1000;

      function readCache(){
        try {
          const raw = sessionStorage.getItem(cacheKey);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed?.at || (Date.now() - Number(parsed.at)) > cacheTtl) return null;
          return parsed.value || null;
        } catch (_) { return null; }
      }
      function writeCache(value){
        try { sessionStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), value })); } catch (_) {}
        return value;
      }
      function headers(){
        return {
          apikey: cfg.SUPABASE_PUBLISHABLE_KEY || '',
          Authorization: `Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY || ''}`,
          'Content-Type': 'application/json',
          Accept: 'application/json'
        };
      }
      async function parseResponse(res){
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (_) { throw new Error(text || `HTTP ${res.status}`); }
        if (!res.ok) throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
        return data;
      }
      async function callRpc(name, payload){
        const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/${name}`, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: headers(),
          body: JSON.stringify(Object.assign({}, payload || {}))
        });
        const raw = await parseResponse(res);
        return raw && raw[name] !== undefined ? raw[name] : raw;
      }
      function normalizeName(value){ return String(value || '').trim().toLowerCase(); }
      function initials(name){ return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map((value) => value[0]).join('').toUpperCase() || '?'; }
      function displayName(player){ return player.nickname || player.chosen_username || player.public_display_name || player.display_name || player.player_name || 'Speler'; }
      function originalName(player){ return player.player_name || player.display_name || player.original_name || ''; }
      function winPct(player){ const matches = Number(player.total_matches || 0); return matches ? Math.round((Number(player.total_wins || 0) / matches) * 100) : 0; }
      function escapeHtml(value){ return String(value || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
      function avatarHtml(player){
        const helper = (window.GEJAST_PROFILE_SOURCE && typeof window.GEJAST_PROFILE_SOURCE.profileImageUrl === 'function'
          ? window.GEJAST_PROFILE_SOURCE.profileImageUrl
          : (window.GEJAST_CONFIG && typeof window.GEJAST_CONFIG.normalizeProfileImageUrl === 'function'
            ? window.GEJAST_CONFIG.normalizeProfileImageUrl
            : (value) => String(value || '').trim()));
        const src = helper(player.profile_picture_url || player.avatar_url || player.photo_url || '');
        const label = displayName(player);
        return src ? `<img class="avatar" src="${src}" alt="${label}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='&lt;div class=&quot;avatar initials&quot;&gt;${initials(label)}&lt;/div&gt;'">` : `<div class="avatar initials">${initials(label)}</div>`;
      }
      function toMiniBadgeRow(attainedBadges){
        const items = (Array.isArray(attainedBadges) ? attainedBadges : []).slice(0, 8);
        if (!items.length) return '<div class="submeta">Nog geen badges behaald.</div>';
        return `<div class="badge-mini-row">${items.map((badge)=>`<span class="mini-chip" title="${badge.title || badge.name}"><img src="${badge.imageMini48 || badge.image || ''}" alt="${badge.title || badge.name}"></span>`).join('')}</div>`;
      }
      function mergePlayers(bundlePlayers, fallbackPlayers){
        const map = new Map();
        (Array.isArray(fallbackPlayers) ? fallbackPlayers : []).forEach((player) => {
          const key = normalizeName(player.player_name || player.display_name || player.public_display_name || player.nickname);
          if (key) map.set(key, Object.assign({}, player));
        });
        (Array.isArray(bundlePlayers) ? bundlePlayers : []).forEach((player) => {
          const key = normalizeName(player.player_name || player.display_name || player.public_display_name || player.nickname);
          if (!key) return;
          map.set(key, Object.assign({}, map.get(key) || {}, player));
        });
        return Array.from(map.values()).filter((player) => String(player.player_name || player.display_name || '').trim());
      }
      function normalizedAttained(player){
        if (Array.isArray(player.attained_badges) && player.attained_badges.length) {
          return window.GEJAST_BADGE_PROGRESS.sortBadgesDescAlpha(player.attained_badges.map((badge) => Object.assign({}, badge, { title: badge.title || badge.name, name: badge.title || badge.name })));
        }
        const snapshot = {
          total_matches: Number(player.total_matches || 0),
          total_wins: Number(player.total_wins || 0),
          best_rating: Number(player.best_rating || 1000),
          klaverjas_matches: Number(player.klaverjas_matches || 0),
          boerenbridge_matches: Number(player.boerenbridge_matches || 0),
          beerpong_matches: Number(player.beerpong_matches || 0),
          drink_units: Number(player.drink_units || player.total_drink_units || 0),
          speed_best_seconds: Number(player.speed_best_seconds || 0),
          pussycup_pct: Number(player.pussycup_pct || 0)
        };
        return window.GEJAST_BADGES ? window.GEJAST_BADGES.getAttained(snapshot).map((badge) => ({
          key: badge.key,
          title: badge.title,
          name: badge.title,
          nickname: badge.nickname,
          imageMini48: badge.imageMini48,
          image: badge.imageFull,
          rarityRank: badge.rarityRank,
          rarityLabel: badge.rarityLabel,
          requirementsText: badge.requirementsText,
          description: badge.description
        })) : [];
      }
      function buildBadgeAccordion(attained){
        const earned = Array.isArray(attained) ? attained : [];
        const earnedHtml = earned.length ? earned.map((badge) => `
          <div class="badge-accordion-item">
            ${badge.imageMini48 || badge.image ? `<img src="${badge.imageMini48 || badge.image}" alt="${escapeHtml(badge.title || badge.name || 'Badge')}">` : '<div></div>'}
            <div><strong>${escapeHtml(badge.title || badge.name || 'Badge')}</strong>${badge.description ? `<div class="submeta">${escapeHtml(badge.description)}</div>` : ''}</div>
          </div>`).join('') : '<div class="submeta">Nog geen badges behaald.</div>';
        return `<div class="badges-section"><details class="badge-accordion"><summary>Behaalde badges (${earned.length})</summary><div class="badge-accordion-list">${earnedHtml}</div></details></div>`;
      }
      function renderSkeletons(count=6){
        const emptyAccordion = buildBadgeAccordion([]);
        gridNode.innerHTML = Array.from({ length: count }).map(() => `
          <article class="card skeleton">
            <div class="head">
              <div class="avatar"></div>
              <div>
                <div class="line big"></div>
                <div class="line small" style="margin-top:8px"></div>
                <div class="line" style="margin-top:8px;width:80%"></div>
              </div>
            </div>
            <div class="stats">
              <div class="stat"><strong>&nbsp;</strong><span>Potjes</span></div>
              <div class="stat"><strong>&nbsp;</strong><span>Win%</span></div>
              <div class="stat"><strong>&nbsp;</strong><span>Beste ELO</span></div>
              <div class="stat"><strong>&nbsp;</strong><span>Badges</span></div>
            </div>
            <div class="badge-strip">
              <div class="badge-kicker">Badge-overzicht</div>
              <div class="badge-note"><span class="badge-pill">Placeholder</span></div>
              <div class="badge-mini-row"><span class="mini-chip"></span><span class="mini-chip"></span><span class="mini-chip"></span></div>
            </div>
            ${emptyAccordion}
            <div class="bio">placeholder</div>
          </article>`).join('');
      }
      function renderPlayerCard(player){
        const shown = displayName(player);
        const original = originalName(player);
        const attained = normalizedAttained(player);
        const rarest = attained[0] || player.primary_badge || null;
        const rarestTitle = rarest ? (rarest.title || rarest.name || 'Nog geen badge') : 'Nog geen badge';
        const rarestNick = rarest && rarest.nickname ? rarest.nickname : '';
        const profileTarget = original || shown;
        return `<a class="card" href="./player.html?player=${encodeURIComponent(profileTarget)}&scope=${encodeURIComponent(scope)}">
          <div class="head">
            ${avatarHtml(player)}
            <div>
              <div class="name">${shown}</div>
              <div class="meta">${original && original !== shown ? `Originele naam: "${original}"` : 'Geen alternatieve naam ingesteld.'}</div>
              <div class="submeta"><strong>Meest zeldzame badge:</strong> ${rarestTitle}${rarestNick ? ` · ${rarestNick}` : ''}</div>
            </div>
          </div>
          <div class="stats">
            <div class="stat"><strong>${player.total_matches || 0}</strong><span>Potjes</span></div>
            <div class="stat"><strong>${winPct(player)}%</strong><span>Win%</span></div>
            <div class="stat"><strong>${Math.round(Number(player.best_rating || 1000))}</strong><span>Beste ELO</span></div>
            <div class="stat"><strong>${player.badge_count || attained.length || 0}</strong><span>Badges</span></div>
          </div>
          <div class="badge-strip">
            <div class="badge-kicker">Badge-overzicht</div>
            <div class="badge-note">${rarest ? `<span class="badge-pill">${rarest.imageMini48 || rarest.image ? `<img src="${rarest.imageMini48 || rarest.image}" alt="${rarestTitle}">` : ''}<span>${rarestTitle}</span></span>` : '<span class="submeta">Nog geen behaalde badges.</span>'}</div>
            ${toMiniBadgeRow(attained)}
          </div>
          ${buildBadgeAccordion(attained)}
          <div class="bio">${player.favorite_game ? `Favoriete spelvorm: ${player.favorite_game}. ` : ''}${player.bio ? player.bio : `${player.total_matches || 0} geregistreerde potjes, ${player.total_wins || 0} overwinningen en ${player.badge_count || attained.length || 0} badge(s).`}</div>
        </a>`;
      }
      function renderPlayers(players){
        const rows = (Array.isArray(players) ? players.slice() : []).sort((a,b)=>{
          const matchDiff = Number(b.total_matches || 0) - Number(a.total_matches || 0);
          if (matchDiff) return matchDiff;
          return displayName(a).localeCompare(displayName(b), 'nl');
        });
        if (!rows.length) {
          gridNode.innerHTML = '<article class="card"><div class="bio">Nog geen actieve spelers gevonden voor deze scope.</div></article>';
          return;
        }
        gridNode.innerHTML = rows.map(renderPlayerCard).join('');
      }
      function renderBadgeGallery(){
        const groups = window.GEJAST_BADGE_PROGRESS.groupRegistryByRarityAsc ? window.GEJAST_BADGE_PROGRESS.groupRegistryByRarityAsc() : window.GEJAST_BADGE_PROGRESS.groupRegistryByRarity().slice().reverse();
        galleryNode.innerHTML = `<div class="badge-gallery-wrap">
          <div>
            <h2 style="margin:0 0 8px">Badgegalerij</h2>
            <p style="margin:0;color:var(--muted)">Onderaan de pagina staan de badge-accordeonboxen. Elke badgekaart gebruikt precies twee rijen: bovenaan alleen het beeld, daaronder titel, bijnaam, vereisten en toelichting.</p>
          </div>
          <div class="badge-gallery-accordions">
            ${groups.map((group) => `
              <details class="badge-gallery-accordion">
                <summary>
                  <span>${group.label}</span>
                  <small>${group.items.length} badge(s)</small>
                </summary>
                <div class="badge-gallery-grid">
                  ${group.items.map((badge) => `
                    <article class="badge-gallery-card">
                      <div class="badge-gallery-image-row">
                        <img src="${badge.image}" alt="${badge.title}">
                      </div>
                      <div class="badge-gallery-text-row">
                        <div class="badge-gallery-title">${badge.title}</div>
                        ${badge.nickname ? `<div class="badge-gallery-nickname">${badge.nickname}</div>` : ''}
                        <div class="badge-gallery-requirement"><strong>Te behalen door:</strong> ${badge.requirementsText || 'Zie badge-omschrijving.'}</div>
                        ${badge.description ? `<div class="badge-gallery-description">${badge.description}</div>` : ''}
                      </div>
                    </article>`).join('')}
                </div>
              </details>`).join('')}
          </div>
        </div>`;
      }
      async function boot(){
        const cached = readCache();
        renderSkeletons();
        if (cached && Array.isArray(cached.players) && cached.players.length) {
          renderPlayers(cached.players);
          statusNode.textContent = `${cached.players.length} actieve speler(s) direct uit cache geladen.`;
        }
        try {
          const profileSource = window.GEJAST_PROFILE_SOURCE || null;
          const [bundleRaw, allPlayersRaw, activatedRaw, loginNamesRaw] = await Promise.allSettled([
            profileSource && typeof profileSource.loadProfilesPageBundle === 'function'
              ? profileSource.loadProfilesPageBundle()
              : callRpc('get_profiles_page_bundle_scoped', { site_scope_input: scope }),
            profileSource && typeof profileSource.loadProfilesList === 'function'
              ? profileSource.loadProfilesList()
              : callRpc('get_all_site_players_public_scoped', { site_scope_input: scope }),
            profileSource && typeof profileSource.fetchActivatedPlayers === 'function'
              ? profileSource.fetchActivatedPlayers(scope)
              : Promise.resolve([]),
            profileSource && typeof profileSource.fetchLoginNamesPlayers === 'function'
              ? profileSource.fetchLoginNamesPlayers(scope)
              : Promise.resolve([])
          ]);
          const bundle = bundleRaw.status === 'fulfilled' ? bundleRaw.value : {};
          const allPlayers = allPlayersRaw.status === 'fulfilled' ? ((allPlayersRaw.value && allPlayersRaw.value.players) || []) : [];
          const activatedPlayers = activatedRaw.status === 'fulfilled' ? activatedRaw.value : [];
          const loginNamePlayers = loginNamesRaw.status === 'fulfilled' ? loginNamesRaw.value : [];
          const players = profileSource && typeof profileSource.mergeProfilePlayers === 'function'
            ? profileSource.mergeProfilePlayers(bundle.players || [], allPlayers, activatedPlayers, loginNamePlayers)
            : mergePlayers(bundle.players || [], [].concat(allPlayers, activatedPlayers, loginNamePlayers));
          if (window.GEJAST_HEAVY_PAGE_RUNTIME && typeof window.GEJAST_HEAVY_PAGE_RUNTIME.renderChunked === 'function') {
            gridNode.innerHTML = '';
            await window.GEJAST_HEAVY_PAGE_RUNTIME.renderChunked(players, (player) => {
              const tmp = document.createElement('div');
              tmp.innerHTML = renderPlayerCard(player);
              return tmp.firstElementChild;
            }, { container: gridNode, chunkSize: 12 });
          } else {
            renderPlayers(players);
          }
          writeCache({ players });
          if ('requestIdleCallback' in window) requestIdleCallback(() => renderBadgeGallery(), { timeout: 1500 });
          else setTimeout(renderBadgeGallery, 300);
          statusNode.textContent = `${players.length} actieve speler(s) zichtbaar in de ${scope === 'family' ? 'familie' : 'vrienden'}-scope.`;
        } catch (err) {
          statusNode.textContent = err.message || 'Profielen laden mislukt.';
          gridNode.innerHTML = '<article class="card"><div class="bio">Profielen laden mislukt.</div></article>';
          renderBadgeGallery();
        }
      }
      if (window.GEJAST_BADGES && window.GEJAST_BADGES.injectStyles) window.GEJAST_BADGES.injectStyles();
      boot();
    })();
