<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelersprofielen</title>
  <script>window.GEJAST_PAGE_VERSION='v360-fixpack';</script>
  <script src="./gejast-config.js?v360-fixpack"></script>
  <script src="./gejast-scope.js?v360-fixpack"></script>
  <script src="./gejast-public-page-gate.js?v360-fixpack"></script>
  <script src="./gejast-clickable-cards.js?v360-fixpack"></script>
  <script src="./badge-registry.js?v360-fixpack"></script>
  <script src="./gejast-badge-source.js?v360-fixpack"></script>
  <script src="./gejast-scoped-rpc.js?v360-fixpack"></script>
  <script src="./gejast-combined-readers.js?v360-fixpack"></script>
  <script src="./gejast-heavy-page-runtime.js?v360-fixpack"></script>
  <style>
    :root{
      --gold:#d4af37;
      --ink:#1b1711;
      --paper:rgba(255,250,243,.93);
      --line:#e0d6c6;
      --muted:#6f665e;
      --card:#fff;
      --chip:#fbf7ef;
      --shadow:0 20px 40px rgba(0,0,0,.09);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      color:var(--ink);
      background:linear-gradient(rgba(247,244,238,.84),rgba(247,244,238,.84)),url('./wordtergejast.png') center/cover fixed;
    }
    .page{width:min(1160px,100%);margin:0 auto;padding:20px 14px 90px}
    .sheet{
      background:var(--paper);
      border:1px solid rgba(17,17,17,.08);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 20px;
      border-bottom:1px solid var(--line);
    }
    .top-copy h1{margin:0;font-size:clamp(28px,5vw,40px)}
    .top-copy p{margin:6px 0 0;color:var(--muted)}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .back,.home{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      font-weight:800;
      border:1px solid rgba(17,17,17,.08);
      background:#fff;
      color:#111;
      cursor:pointer;
    }
    .home.dark{background:#111;color:#fff}
    .status{
      padding:14px 20px 0;
      color:var(--muted);
      font-weight:700;
      min-height:22px;
    }
    .status.bad{color:#8b2f2f}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:16px;
      padding:18px;
    }
    .card{
      display:grid;
      gap:14px;
      padding:16px;
      border-radius:22px;
      background:var(--card);
      border:1px solid rgba(17,17,17,.07);
      box-shadow:0 10px 20px rgba(0,0,0,.05);
      color:inherit;
      text-decoration:none;
    }
    .card:hover{transform:translateY(-1px);box-shadow:0 14px 26px rgba(0,0,0,.07)}
    .head{
      display:grid;
      grid-template-columns:64px 1fr;
      gap:12px;
      align-items:center;
      min-width:0;
    }
    .avatar{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      background:#efe7d7;
      border:2px solid rgba(212,175,55,.45);
      display:grid;
      place-items:center;
      overflow:hidden;
      font-weight:900;
      font-size:24px;
      color:#5d4820;
    }
    .name-block{min-width:0}
    .name{font-size:22px;font-weight:900;line-height:1.05;word-break:break-word}
    .meta{color:var(--muted);font-size:13px;line-height:1.45;margin-top:4px}
    .nickname{font-weight:800;color:#5f4d24}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .stat{
      background:var(--chip);
      border:1px solid rgba(17,17,17,.06);
      border-radius:16px;
      padding:10px;
      text-align:center;
    }
    .stat strong{display:block;font-size:21px}
    .stat span{display:block;margin-top:4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .badge-label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800}
    .badge-mini-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .badge-mini{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:14px;background:#fff7e4;border:1px solid rgba(17,17,17,.08);padding:4px;box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .badge-mini img{width:100%;height:100%;object-fit:contain}
    .badge-fallback{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      background:#f4efe4;
      color:#3d3429;
      border:1px solid rgba(17,17,17,.08);
      font-size:12px;
      font-weight:800;
    }
    .summary{font-size:14px;line-height:1.45;color:#4b433a}
    .site-credit-watermark{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:14px;
      z-index:9999;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(17,17,17,.88);
      border:1px solid rgba(212,175,55,.35);
      color:#f3e3a6;
      font:700 13px/1.2 Inter,sans-serif;
      letter-spacing:.03em;
      pointer-events:none;
      user-select:none;
      box-shadow:0 12px 24px rgba(0,0,0,.18);
    }
    @media (max-width:720px){
      .top{align-items:flex-start;flex-direction:column}
      .top-actions{width:100%}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <div class="top">
        <div class="top-copy">
          <h1>Spelers</h1>
          <p>Profielen van alle spelers op de site, zonder dubbele renderpasses of losse badge-overschrijvingen.</p>
        </div>
        <div class="top-actions">
          <button class="back" id="backLink" type="button" data-back-link>Terug</button>
          <a class="home dark" id="homeLink" href="./index.html">Home</a>
        </div>
      </div>
      <div id="status" class="status">Spelers laden…</div>
      <div id="grid" class="grid"></div>
    </section>
  </main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      const cfg = window.GEJAST_CONFIG || {};
      const readers = window.GEJAST_COMBINED_READERS || {};
      const runtime = window.GEJAST_HEAVY_PAGE_RUNTIME || {};
      const badgeSource = window.GEJAST_BADGE_SOURCE || {};
      const scopedRpc = window.GEJAST_SCOPED_RPC || {};
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('grid');

      function currentScope(){
        return (window.GEJAST_SCOPE_UTILS && window.GEJAST_SCOPE_UTILS.getScope && window.GEJAST_SCOPE_UTILS.getScope()) || 'friends';
      }

      function homeHref(){
        return currentScope() === 'family' ? './familie/index.html' : './index.html';
      }

      function fallbackBackHref(){
        return homeHref();
      }

      function rpcHeaders(){
        return {
          apikey: cfg.SUPABASE_PUBLISHABLE_KEY || '',
          Authorization: `Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY || ''}`,
          'Content-Type': 'application/json',
          Accept: 'application/json'
        };
      }

      async function parseResponse(res){
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (_) { throw new Error(text || `HTTP ${res.status}`); }
        if (!res.ok) throw new Error(data?.message || data?.error || text || `HTTP ${res.status}`);
        return data;
      }

      async function rpc(name, payload){
        const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/${name}`, {
          method:'POST',
          mode:'cors',
          cache:'no-store',
          headers:rpcHeaders(),
          body:JSON.stringify(payload || {})
        });
        return parseResponse(res);
      }

      function esc(value){
        return String(value == null ? '' : value).replace(/[&<>"']/g, (m)=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m] || m));
      }

      function initials(name){
        return String(name || '').split(/\s+/).filter(Boolean).slice(0,2).map((part)=>part[0]).join('').toUpperCase() || '?';
      }

      function publicName(player, card){
        return (card && (card.display_name || card.player_name)) ||
          player.chosen_username || player.public_display_name || player.nickname || player.display_name || player.player_name || 'Speler';
      }

      function originalName(player, card){
        return (card && (card.original_name || card.player_name)) || player.player_name || player.real_name || player.given_name || '';
      }

      function avatarMarkup(player, card){
        const src = (card && (card.avatar_url || card.profile_picture_url)) || player.avatar_url || player.profile_picture_url || '';
        if (src) return `<div class="avatar"><img src="${esc(src)}" alt="${esc(publicName(player, card))}" style="width:100%;height:100%;object-fit:cover"></div>`;
        return `<div class="avatar">${esc(initials(publicName(player, card)))}</div>`;
      }

      function statNumber(value){
        const numeric = Number(value || 0);
        return Number.isFinite(numeric) ? Math.round(numeric) : 0;
      }

      function badgeRowHtml(card){
        const badges = Array.isArray(card?.mini_badges_48) ? card.mini_badges_48 : (Array.isArray(card?.mini_badges) ? card.mini_badges : []);
        const html = badgeSource.renderMiniBadgeRow ? badgeSource.renderMiniBadgeRow(badges, '48') : '';
        return html || `<span class="badge-fallback">${esc(card?.primary_badge?.title || card?.primary_nickname || 'Nog geen badges')}</span>`;
      }

      function buildBadgeMap(cards){
        const map = new Map();
        (Array.isArray(cards) ? cards : []).forEach((card) => {
          const keys = [
            String(card?.original_name || '').trim().toLowerCase(),
            String(card?.player_name || '').trim().toLowerCase(),
            String(card?.display_name || '').trim().toLowerCase()
          ].filter(Boolean);
          keys.forEach((key) => { if (!map.has(key)) map.set(key, card); });
        });
        return map;
      }

      function playerHref(name){
        return `./player.html?player=${encodeURIComponent(name || '')}&scope=${encodeURIComponent(currentScope())}`;
      }

      function cardModel(player, badgeMap){
        const card = badgeMap.get(String(player.player_name || '').trim().toLowerCase()) ||
          badgeMap.get(String(player.display_name || '').trim().toLowerCase()) ||
          badgeMap.get(String(player.nickname || '').trim().toLowerCase()) ||
          null;
        const shown = publicName(player, card);
        const original = originalName(player, card);
        const nickname = card?.primary_nickname || card?.primary_badge?.title || player.best_badge || '';
        return {
          shown,
          original,
          nickname,
          badgeCount: Number(card?.badge_count || 0),
          badgesHtml: badgeRowHtml(card),
          href: playerHref(original || shown),
          avatarHtml: avatarMarkup(player, card),
          totalMatches: statNumber(player.total_matches),
          totalWins: statNumber(player.total_wins),
          bestRating: statNumber(player.best_rating || player.elo_rating || 1000),
          klaverjasMatches: statNumber(player.klaverjas_matches),
          boerenbridgeMatches: statNumber(player.boerenbridge_matches),
          beerpongMatches: statNumber(player.beerpong_matches)
        };
      }

      function renderCard(model){
        const originalLine = model.original && model.original !== model.shown ? `Oorspronkelijke naam: "${esc(model.original)}"` : '';
        const metaBits = [originalLine, model.nickname ? `<span class="nickname">${esc(model.nickname)}</span>` : ''].filter(Boolean);
        return `
          <a class="card" href="${esc(model.href)}">
            <div class="head">
              ${model.avatarHtml}
              <div class="name-block">
                <div class="name">${esc(model.shown)}</div>
                <div class="meta">${metaBits.join(' · ') || 'Profieloverzicht'}</div>
              </div>
            </div>
            <div class="stats">
              <div class="stat"><strong>${model.totalMatches}</strong><span>Potjes</span></div>
              <div class="stat"><strong>${model.totalWins}</strong><span>Winst</span></div>
              <div class="stat"><strong>${model.bestRating}</strong><span>Beste ELO</span></div>
              <div class="stat"><strong>${model.klaverjasMatches}</strong><span>Klaverjas</span></div>
              <div class="stat"><strong>${model.boerenbridgeMatches}</strong><span>Boerenbridge</span></div>
              <div class="stat"><strong>${model.beerpongMatches}</strong><span>Beerpong</span></div>
            </div>
            <div>
              <div class="badge-label">Badges</div>
              <div class="badge-mini-row">${model.badgesHtml}</div>
            </div>
            <div class="summary">
              ${model.totalMatches ? `Sitebreed ${model.totalMatches} wedstrijd(en) geregistreerd.` : 'Nog geen geregistreerde speldata voor deze speler.'}
              ${model.badgeCount ? ` ${model.badgeCount} badge(s) behaald.` : ''}
            </div>
          </a>
        `;
      }

      async function loadBundle(){
        if (readers.loadProfilesPageBundle) return readers.loadProfilesPageBundle();
        const rawPlayers = await rpc('get_all_site_players_public_scoped', { site_scope_input: currentScope() });
        const rawCards = await rpc('get_site_player_badge_cards_scoped', { site_scope_input: currentScope() }).catch(() => ({ cards: [] }));
        return {
          players: rawPlayers?.players || rawPlayers || [],
          badge_cards: rawCards?.cards || rawCards || []
        };
      }

      async function renderModels(models){
        if (runtime.renderChunked && models.length > 24) {
          await runtime.renderChunked(models, renderCard, {
            batchSize: runtime.preferLiteMode && runtime.preferLiteMode() ? 12 : 24,
            afterChunk: (html) => { gridEl.innerHTML = html; }
          });
          return;
        }
        gridEl.innerHTML = models.map(renderCard).join('');
      }

      async function boot(){
        try{
          const bundle = await loadBundle();
          const players = Array.isArray(bundle.players?.players) ? bundle.players.players : (Array.isArray(bundle.players) ? bundle.players : []);
          let badgeCards = Array.isArray(bundle.badge_cards?.cards) ? bundle.badge_cards.cards : (Array.isArray(bundle.badge_cards) ? bundle.badge_cards : []);
          if (!badgeCards.length && badgeSource.loadSiteBadgeCards) {
            badgeCards = await badgeSource.loadSiteBadgeCards({ siteScope: currentScope() }).catch(() => []);
          }
          const badgeMap = buildBadgeMap(badgeCards);
          const models = players.map((player) => cardModel(player, badgeMap));
          await renderModels(models);
          statusEl.textContent = `${models.length} spelers geladen.`;
          statusEl.className = 'status';
        }catch(err){
          gridEl.innerHTML = '';
          statusEl.textContent = err.message || 'Profielen laden mislukt.';
          statusEl.className = 'status bad';
        }
      }

      document.getElementById('homeLink').setAttribute('href', homeHref());
      document.getElementById('backLink').setAttribute('data-fallback', fallbackBackHref());

      if (window.GEJAST_CLICKABLE_CARDS) {
        window.GEJAST_CLICKABLE_CARDS.bind(document);
        window.GEJAST_CLICKABLE_CARDS.bindBackLinks(document);
        window.GEJAST_CLICKABLE_CARDS.upgradeJavascriptVoidLinks(document);
      }

      boot();
    })();
  </script>
  <script src="./site-analytics.js"></script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
