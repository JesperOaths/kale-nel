<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelersprofielen</title>
  <script>window.GEJAST_PAGE_VERSION='v236';</script><script src="./gejast-config.js?v236"></script>
  <style>
    :root{--gold:#d4af37;--ink:#1b1711;--paper:rgba(255,250,243,.92);--line:#e0d6c6;--muted:#6f665e;}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.84),rgba(247,244,238,.84)),url('./wordtergejast.png') center/cover fixed}
    .page{width:min(1240px,100%);margin:0 auto;padding:20px 14px 90px}.sheet{background:var(--paper);border:1px solid rgba(17,17,17,.08);border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.09);overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)} .top h1{margin:0;font-size:clamp(28px,5vw,40px)} .top p{margin:4px 0 0;color:var(--muted)}
    .back{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid var(--line)}
    .toolbar input,.toolbar select{padding:10px 12px;border-radius:14px;border:1px solid rgba(17,17,17,.12);font:inherit;background:#fff}
    .status{padding:0 20px 14px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:18px}
    .card{background:#fff;border:1px solid rgba(17,17,17,.07);border-radius:22px;padding:16px;display:grid;gap:12px;box-shadow:0 10px 20px rgba(0,0,0,.05);text-decoration:none;color:inherit}
    .head{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center}.avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;background:#efe7d7;border:2px solid rgba(212,175,55,.45);display:grid;place-items:center;font-weight:900;font-size:24px;color:#5d4820}
    .name{font-size:22px;font-weight:900;line-height:1}.meta{color:var(--muted);font-size:13px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#fbf7ef;border:1px solid rgba(17,17,17,.06);border-radius:16px;padding:10px;text-align:center}.stat strong{display:block;font-size:22px}.stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.badges{display:flex;flex-wrap:wrap;gap:8px}.badge{padding:7px 10px;border-radius:999px;background:#111;color:#fff;font-size:12px;font-weight:800}.badge.gold{background:#b88f14}.badge.soft{background:#f4efe4;color:#3d3429;border:1px solid rgba(17,17,17,.08)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}
  </style>
</head>
<body>
  <main class="page"><section class="sheet"><div class="top"><div><h1>Spelers</h1><p>Zoek, sorteer en open alle profielen op één plek.</p></div><a class="back" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</a></div><div class="toolbar"><input id="searchInput" type="search" placeholder="Zoek op naam"><select id="sortSelect"><option value="matches">Meeste potjes</option><option value="wins">Meeste winst</option><option value="rating">Beste ELO</option><option value="name">Naam A-Z</option></select></div><div id="status" class="status"></div><div id="grid" class="grid"></div></section></main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    const SUPABASE_URL=(window.GEJAST_CONFIG||{}).SUPABASE_URL; const SUPABASE_PUBLISHABLE_KEY=(window.GEJAST_CONFIG||{}).SUPABASE_PUBLISHABLE_KEY;
    const state={players:[],renderToken:0};
    function rpcHeaders(){return {apikey:SUPABASE_PUBLISHABLE_KEY,Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}`,'Content-Type':'application/json',Accept:'application/json'}}
    async function parseResponse(res){const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch{throw new Error(text||`HTTP ${res.status}`)} if(!res.ok) throw new Error(data?.message||data?.error||`HTTP ${res.status}`); return data}
    function initials(name){return String(name||'').split(/\s+/).filter(Boolean).slice(0,2).map(v=>v[0]).join('').toUpperCase()||'?'}
    function badgeClass(label){return /legend|diamond|gold/i.test(label||'') ? 'gold' : 'soft'}
    function filtered(){ const q=String(document.getElementById('searchInput').value||'').trim().toLowerCase(); const mode=document.getElementById('sortSelect').value; let rows=(state.players||[]).filter((p)=>!q || String(p.player_name||'').toLowerCase().includes(q)); const score={matches:(p)=>Number(p.total_matches||0),wins:(p)=>Number(p.total_wins||0),rating:(p)=>Number(p.best_rating||1000),name:(p)=>String(p.player_name||'')}; rows.sort((a,b)=> mode==='name' ? score.name(a).localeCompare(score.name(b),'nl') : score[mode](b)-score[mode](a) || String(a.player_name||'').localeCompare(String(b.player_name||''),'nl')); return rows; }
    function cardMarkup(p){ return `<a class="card" href="./player.html?player=${encodeURIComponent(p.player_name||'')}"><div class="head"><div class="avatar">${initials(p.player_name)}</div><div><div class="name">${p.player_name}</div><div class="meta">${p.favorite_game||'Nog geen speldata'}</div></div></div><div class="stats"><div class="stat"><strong>${p.total_matches||0}</strong><span>Potjes</span></div><div class="stat"><strong>${p.total_wins||0}</strong><span>Winst</span></div><div class="stat"><strong>${Math.round(Number(p.best_rating||1000))}</strong><span>Beste ELO</span></div><div class="stat"><strong>${p.klaverjas_matches||0}</strong><span>Klaverjas</span></div><div class="stat"><strong>${p.boerenbridge_matches||0}</strong><span>Boerenbridge</span></div><div class="stat"><strong>${p.beerpong_matches||0}</strong><span>Beerpong</span></div></div><div class="badges"><span class="badge ${badgeClass(p.best_badge)}">${p.best_badge||'Starter'}</span></div></a>`; }
    async function render(){ const rows=filtered(); const grid=document.getElementById('grid'); const current=++state.renderToken; grid.innerHTML=''; document.getElementById('status').textContent=`${rows.length} speler(s) zichtbaar.`; if(!rows.length){ grid.innerHTML='<div class="muted">Geen spelers gevonden.</div>'; return; } const chunk=24; for(let i=0;i<rows.length;i+=chunk){ if(current!==state.renderToken) return; const slice=rows.slice(i,i+chunk); const frag=document.createDocumentFragment(); const wrap=document.createElement('div'); wrap.innerHTML=slice.map(cardMarkup).join(''); while(wrap.firstChild) frag.appendChild(wrap.firstChild); grid.appendChild(frag); await new Promise((resolve)=>requestAnimationFrame(resolve)); } }
    async function boot(){ try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_all_site_players_public`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:'{}'}); const raw=await parseResponse(res); const data=(raw&&raw.get_all_site_players_public)?raw.get_all_site_players_public:(Array.isArray(raw)&&raw[0]&&raw[0].get_all_site_players_public)?raw[0].get_all_site_players_public:raw; state.players=data?.players||data||[]; render();}catch(err){document.getElementById('status').textContent=err.message||'Profielen laden mislukt.';}}
    let searchTimer=0; document.getElementById('searchInput').addEventListener('input', ()=>{ clearTimeout(searchTimer); searchTimer=setTimeout(render,120); }); document.getElementById('sortSelect').addEventListener('change', render); boot();
  </script>
  <script src="./site-analytics.js"></script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();window.GEJAST_CONFIG&&window.GEJAST_CONFIG.hideBlankAuthCorners&&window.GEJAST_CONFIG.hideBlankAuthCorners();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
<script src="./drinks-verify-float.js?v236"></script></body></html>
