<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelersprofielen</title>
  <script>window.GEJAST_PAGE_VERSION='v698';</script>
  <script src="./gejast-config.js?v698"></script>
  <script src="./gejast-scope.js?v698"></script>
  <script src="./gejast-home-gate.js?v698"></script>
  <script defer src="./gejast-badges.js?v698"></script>
  <script defer src="./gejast-badge-progress.js?v698"></script>
  <style>
    :root{--gold:#d4af37;--ink:#1b1711;--paper:rgba(255,250,243,.94);--line:#e0d6c6;--muted:#6f665e;--soft:#fbf7ef}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.84),rgba(247,244,238,.84)),url('./wordtergejast.png') center/cover fixed}.page{width:min(1180px,100%);margin:0 auto;padding:20px 14px 90px}.sheet{background:var(--paper);border:1px solid rgba(17,17,17,.08);border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.09);overflow:hidden;margin-bottom:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:clamp(30px,5vw,44px)}.top p{margin:5px 0 0;color:var(--muted)}.back{padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:900;border:0}.status{padding:14px 20px;color:var(--muted);font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;padding:18px}.card{background:#fff;border:1px solid rgba(17,17,17,.07);border-radius:22px;padding:16px;display:grid;gap:12px;text-decoration:none;color:inherit;box-shadow:0 10px 20px rgba(0,0,0,.04)}.head{display:flex;gap:12px;align-items:center}.avatar{width:58px;height:58px;border-radius:50%;border:2px solid rgba(212,175,55,.45);background:#fff6df;display:grid;place-items:center;font-size:23px;font-weight:900;color:#5d4820}.name{font-size:22px;font-weight:950}.meta{font-size:13px;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:var(--soft);border:1px solid rgba(17,17,17,.06);border-radius:14px;padding:9px;text-align:center}.stat strong{display:block;font-size:19px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:800}.badge-gallery-wrap{padding:18px;display:grid;gap:12px}.badge-gallery-accordion{border:1px solid rgba(17,17,17,.08);border-radius:16px;padding:0;background:#fffaf1;overflow:hidden}.badge-gallery-accordion summary{cursor:pointer;display:flex;justify-content:space-between;gap:12px;font-weight:900;padding:14px 16px}.badge-list{display:grid;grid-template-columns:1fr;gap:10px;padding:0 14px 14px}.badge-row{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid rgba(17,17,17,.08);border-radius:16px;padding:12px}.badge-icon{width:54px;height:54px;border-radius:14px;background:#fbf7ef;border:1px solid rgba(212,175,55,.24);object-fit:contain}.badge-title{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:950}.badge-pill{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6d5521;border:1px solid rgba(154,130,65,.24);background:#fff6dd;border-radius:999px;padding:4px 8px;white-space:nowrap}.badge-desc{margin-top:4px;color:var(--muted);font-size:13px}.badge-req{margin-top:7px;font-size:13px;font-weight:800;color:#241d14}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;pointer-events:none}
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet"><div class="top"><div><h1>Spelers</h1><p>Alle actieve spelers met profiel, badge-status en kernstats.</p></div><button class="back" type="button" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</button></div><div id="status" class="status">Actieve spelers laden...</div><div id="grid" class="grid"></div></section>
    <section id="badgeGalleryPanel" class="sheet"></section>
  </main><div class="site-credit-watermark" data-version-watermark></div>
  <script>
  (function(){
    const cfg=window.GEJAST_CONFIG||{}; const scope=(window.GEJAST_SCOPE_UTILS&&window.GEJAST_SCOPE_UTILS.getScope&&window.GEJAST_SCOPE_UTILS.getScope())||'friends';
    const status=document.getElementById('status'), grid=document.getElementById('grid'), gallery=document.getElementById('badgeGalleryPanel');
    const cacheKey='gejast_profiles_fast_v689_'+scope;
    function h(){return{apikey:cfg.SUPABASE_PUBLISHABLE_KEY||'',Authorization:'Bearer '+(cfg.SUPABASE_PUBLISHABLE_KEY||''),'Content-Type':'application/json',Accept:'application/json'}}
    async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch(_){throw new Error(t||('HTTP '+res.status))}if(!res.ok)throw new Error((d&&(d.message||d.error||d.hint))||t||('HTTP '+res.status));return d}
    async function rpc(name,payload,ms){const c=new AbortController();const tm=setTimeout(()=>c.abort(),ms||1800);try{const r=await fetch(cfg.SUPABASE_URL+'/rest/v1/rpc/'+name,{method:'POST',mode:'cors',cache:'no-store',headers:h(),body:JSON.stringify(payload||{}),signal:c.signal});const d=await parse(r);return d&&d[name]!==undefined?d[name]:d}catch(e){if(e.name==='AbortError')throw new Error('timeout');throw e}finally{clearTimeout(tm)}}
    function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function initials(n){return String(n||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
    function nameOf(p){return p.public_display_name||p.display_name||p.player_name||p.name||''}
    function rowCard(p){const n=nameOf(p);return `<a class="card" href="./player.html?player=${encodeURIComponent(n)}&scope=${encodeURIComponent(scope)}"><div class="head"><div class="avatar">${esc(initials(n))}</div><div><div class="name">${esc(n)}</div><div class="meta">${esc(scope==='family'?'Familie':'Vrienden')} · actieve speler</div></div></div><div class="stats"><div class="stat"><strong>${Number(p.total_matches||0)}</strong><span>Potjes</span></div><div class="stat"><strong>${Number(p.total_wins||0)}</strong><span>Wins</span></div><div class="stat"><strong>${Math.round(Number(p.best_rating||1000))}</strong><span>ELO</span></div></div></a>`}
    function render(players, label){const rows=(players||[]).filter(p=>nameOf(p)).sort((a,b)=>nameOf(a).localeCompare(nameOf(b),'nl')); status.textContent=label||`${rows.length} actieve speler(s) zichtbaar in de ${scope==='family'?'familie':'vrienden'}-scope.`; grid.innerHTML=rows.length?rows.map(rowCard).join(''):'<article class="card"><div class="meta">Geen actieve spelers gevonden voor deze scope. Controleer active/pin/scope in admin_account_runtime.</div></article>';}
    function readCache(){try{const x=JSON.parse(sessionStorage.getItem(cacheKey)||'null');if(x&&Date.now()-x.at<300000&&Array.isArray(x.players))return x.players}catch(_){ }return []}
    function writeCache(players){try{sessionStorage.setItem(cacheKey,JSON.stringify({at:Date.now(),players}))}catch(_){}}
    function namesToPlayers(names){return (names||[]).map(n=>({player_name:n,display_name:n,public_display_name:n,total_matches:0,total_wins:0,best_rating:1000}))}
    function renderGallery(){try{const api=window.GEJAST_BADGE_PROGRESS;if(!api)return;const groupFn=api.groupRegistryByRarityAsc||api.groupRegistryByRarity;const rawGroups=groupFn?groupFn():[];const rarityOrder={common:1,uncommon:2,rare:3,epic:4,legendary:5,mythic:6};const groups=rawGroups.slice().sort((a,b)=>(rarityOrder[String(a.key||a.label||'').toLowerCase()]||99)-(rarityOrder[String(b.key||b.label||'').toLowerCase()]||99)).map(g=>Object.assign({},g,{items:(g.items||[]).slice().sort((a,b)=>(Number(a.rank||a.requiredCount||a.threshold||0)-Number(b.rank||b.requiredCount||b.threshold||0))||String(a.title||a.name||a.key).localeCompare(String(b.title||b.name||b.key),'nl'))}));gallery.innerHTML='<div class="badge-gallery-wrap"><h2 style="margin:0">Badgegalerij</h2>'+groups.map((g,i)=>`<details class="badge-gallery-accordion" ${i===0?'open':''}><summary><span>${esc(g.label)}</span><small>${g.items.length} badge(s)</small></summary><div class="badge-list">${(g.items||[]).map(b=>`<article class="badge-row">${b.imageMini64||b.imageMini48||b.imageFull?`<img class="badge-icon" src="${esc(b.imageMini64||b.imageMini48||b.imageFull)}" alt="">`:'<div class="badge-icon"></div>'}<div><div class="badge-title"><span>${esc(b.title||b.name||b.key)}</span><span class="badge-pill">${esc(b.rarityLabel||g.label||'Badge')}</span></div>${b.description?`<div class="badge-desc">${esc(b.description)}</div>`:''}<div class="badge-req">${esc(b.requirementsText||'Vereiste wordt nog uit de badge-registry geladen.')}</div></div></article>`).join('')}</div></details>`).join('')+'</div>'}catch(_){gallery.innerHTML=''}}
    async function load(){
      setTimeout(renderGallery,80);
      const cached=readCache();
      if(cached.length) render(cached, cached.length+' actieve speler(s) direct uit cache geladen.');
      let players=[]; const errors=[];
      try{
        const data=await rpc('get_profiles_fast_v687',{site_scope_input:scope,limit_input:200},5200);
        players=Array.isArray(data&&data.players)?data.players:(Array.isArray(data)?data:[]);
      }catch(e){ errors.push('profiles: '+(e.message||e)); }
      if(!players.length){
        try{
          const names=await rpc('get_login_active_names_v687',{site_scope_input:scope},3600);
          players=namesToPlayers(Array.isArray(names)?names:(names&&names.names)||[]);
        }catch(e){ errors.push('login names: '+(e.message||e)); }
      }
      if(!players.length){
        try{
          const names=await rpc('get_game_player_names_fast_v687',{site_scope_input:scope,limit_input:200},3600);
          players=namesToPlayers((names&&names.names)||[]);
        }catch(e){ errors.push('game names: '+(e.message||e)); }
      }
      if(!players.length&&cfg.fetchScopedActivePlayerNames){
        try{players=namesToPlayers(await Promise.race([cfg.fetchScopedActivePlayerNames(scope),new Promise(r=>setTimeout(()=>r([]),2200))]));}
        catch(e){errors.push('config names: '+(e.message||e));}
      }
      if(players.length){writeCache(players);render(players);}
      else if(!cached.length){render([], 'Profielen konden niet laden: '+(errors[0]||'geen actieve spelers gevonden'));}
      setTimeout(renderGallery,150);
    }
    load();
  })();
  </script><script defer src="./site-analytics.js?v698"></script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body></html>
