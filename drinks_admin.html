<!doctype html>
<html lang="nl">
<head>
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drankcontrole</title><script>window.GEJAST_PAGE_VERSION='v655';</script>
  <script src="./gejast-config.js?v655"></script>
  <script src="./gejast-home-gate.js?v655"></script><script src="./gejast-scope-context.js?v655"></script><script src="./gejast-family-rollout.js?v655"></script>
  <script src="./admin-session-sync.js?v655"></script>
  <style>
    :root{--bg:#ece7dc;--card:#f8f2e7;--line:#d7c7a7;--ink:#1d1a17;--muted:#736758;--good:#dfead7;--bad:#f1dfd7}
    *{box-sizing:border-box} body{margin:0;padding:18px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(236,231,220,.94),rgba(236,231,220,.97)),url('./site-bg-mobile.webp') center/cover no-repeat scroll;color:var(--ink)}
    .wrap{max-width:1280px;margin:0 auto;display:grid;gap:16px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:800}.btn.alt{background:#fff;color:var(--ink)}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;display:grid;gap:12px}.toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap}.action{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;cursor:pointer}.action.good{background:var(--good)}.action.bad{background:var(--bad)}
    table{width:100%;border-collapse:collapse;font-size:.95rem} th,td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left} th{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)} tbody tr:hover{background:rgba(255,255,255,.45)}
    .small{color:var(--muted);font-size:.9rem}.status{min-height:20px;color:var(--muted);font-weight:700}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1 style="margin:0">Drankcontrole</h1><div class="small">Selecteer meerdere regels tegelijk en keur ze goed, af of verwijder ze in één keer.</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn alt" href="./admin.html">Terug</a><a class="btn" href="./drinks_pending.html">Verificatiepagina</a></div></div>
  <div id="status" class="status"></div>
  <section class="panel">
    <div class="toolbar"><div><strong>Recente drankjes</strong> <span id="eventCount" class="small"></span></div><div class="actions"><button class="action" id="selectAllEvents">Alles selecteren</button><button class="action good" id="bulkApproveEvents">Geselecteerd bevestigen</button><button class="action bad" id="bulkRejectEvents">Geselecteerd afkeuren</button><button class="action bad" id="bulkDeleteEvents">Geselecteerd verwijderen</button></div></div>
    <div style="overflow:auto"><table><thead><tr><th></th><th>Speler</th><th>Drank</th><th>Status</th><th>Tijd</th><th>Acties</th></tr></thead><tbody id="eventsBody"></tbody></table></div>
  </section>
  <section class="panel">
    <div class="toolbar"><div><strong>Recente snelheidsrecords</strong> <span id="speedCount" class="small"></span></div><div class="actions"><button class="action" id="selectAllSpeed">Alles selecteren</button><button class="action good" id="bulkApproveSpeed">Geselecteerd bevestigen</button><button class="action bad" id="bulkRejectSpeed">Geselecteerd afkeuren</button><button class="action bad" id="bulkDeleteSpeed">Geselecteerd verwijderen</button></div></div>
    <div style="overflow:auto"><table><thead><tr><th></th><th>Speler</th><th>Type</th><th>Tijd</th><th>Status</th><th>Acties</th></tr></thead><tbody id="speedBody"></tbody></table></div>
  </section>
</div>
<script>
const {SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY}=window.GEJAST_CONFIG||{};
const headers=()=>({'Content-Type':'application/json','apikey':SUPABASE_PUBLISHABLE_KEY,'Authorization':`Bearer ${SUPABASE_PUBLISHABLE_KEY}`});
const adminToken=()=>localStorage.getItem('gejast_admin_session_token')||localStorage.getItem('admin_session_token')||'';
function setStatus(msg,bad){const el=document.getElementById('status'); el.textContent=msg||''; el.style.color=bad?'#8b2f2f':'#6b6257';}
async function parse(res){const txt=await res.text(); let data={}; try{data=txt?JSON.parse(txt):{};}catch{data={raw:txt};} if(!res.ok) throw new Error(data?.message||data?.error||txt||`HTTP ${res.status}`); return data;}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function fmtDate(v){if(!v) return '—'; try{return new Date(v).toLocaleString('nl-NL');}catch{return '—';}}
let consoleData={};
async function call(name,payload){return fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',headers:headers(),body:JSON.stringify(payload)}).then(parse)}
function selectedIds(name){return [...document.querySelectorAll(`input[data-kind="${name}"]:checked`)].map(i=>Number(i.value)).filter(Boolean)}
function bindBulk(kind, approveFn, rejectFn, deleteFn){
  document.getElementById(`selectAll${kind==='events'?'Events':'Speed'}`).onclick=()=>document.querySelectorAll(`input[data-kind="${kind}"]`).forEach(i=>i.checked=true);
  document.getElementById(`bulkApprove${kind==='events'?'Events':'Speed'}`).onclick=async()=>bulkAction(kind, selectedIds(kind), approveFn,'bevestigd');
  document.getElementById(`bulkReject${kind==='events'?'Events':'Speed'}`).onclick=async()=>bulkAction(kind, selectedIds(kind), rejectFn,'afgekeurd');
  document.getElementById(`bulkDelete${kind==='events'?'Events':'Speed'}`).onclick=async()=>bulkAction(kind, selectedIds(kind), deleteFn,'verwijderd');
}
async function bulkAction(kind, ids, fn, label){ if(!ids.length){ setStatus('Selecteer eerst één of meer regels.', true); return; } try{ for(const id of ids){ await fn(id); } setStatus(`${ids.length} ${kind==='events'?'drankjes':'records'} ${label}.`); await load(); }catch(err){ setStatus(err.message||String(err), true); }}
async function updateEvent(id,status){ return call('admin_update_drink_event_entry',{admin_session_token:adminToken(),drink_event_id:Number(id),next_status:status}); }
async function deleteEvent(id){ return call('admin_delete_drink_event_entry',{admin_session_token:adminToken(),drink_event_id:Number(id)}); }
async function updateSpeed(id,status){ return call('admin_update_drink_speed_attempt_entry',{admin_session_token:adminToken(),attempt_id:Number(id),next_status:status}); }
async function deleteSpeed(id){ return call('admin_delete_drink_speed_attempt_entry',{admin_session_token:adminToken(),attempt_id:Number(id)}); }
function render(){
  const events=(consoleData.recent_drink_events||consoleData.drink_events||[]); const speeds=(consoleData.recent_speed_attempts||consoleData.speed_attempts||[]);
  document.getElementById('eventCount').textContent=`(${events.length})`; document.getElementById('speedCount').textContent=`(${speeds.length})`;
  document.getElementById('eventsBody').innerHTML=events.map(r=>`<tr><td><input type="checkbox" data-kind="events" value="${Number(r.id||0)}"></td><td>${esc(r.player_name||'—')}</td><td>${esc(r.event_type_label||r.event_type_key||'Drankje')}</td><td>${esc(r.status||'—')}</td><td>${fmtDate(r.created_at)}</td><td><div class="actions"><button class="action good" data-event-approve="${r.id}">Bevestigen</button><button class="action bad" data-event-reject="${r.id}">Afkeuren</button><button class="action bad" data-event-delete="${r.id}">Verwijderen</button></div></td></tr>`).join('')||'<tr><td colspan="6" class="small">Nog geen drankjes.</td></tr>';
  document.getElementById('speedBody').innerHTML=speeds.map(r=>`<tr><td><input type="checkbox" data-kind="speed" value="${Number(r.id||0)}"></td><td>${esc(r.player_name||'—')}</td><td>${esc(r.speed_type_label||r.speed_type_key||'Record')}</td><td>${Number(r.duration_seconds||0).toFixed(1)}s</td><td>${esc(r.status||'—')}</td><td><div class="actions"><button class="action good" data-speed-approve="${r.id}">Bevestigen</button><button class="action bad" data-speed-reject="${r.id}">Afkeuren</button><button class="action bad" data-speed-delete="${r.id}">Verwijderen</button></div></td></tr>`).join('')||'<tr><td colspan="6" class="small">Nog geen records.</td></tr>';
  document.querySelectorAll('[data-event-approve]').forEach(b=>b.onclick=async()=>{try{await updateEvent(b.dataset.eventApprove,'verified'); await load();}catch(err){setStatus(err.message||String(err),true);}});
  document.querySelectorAll('[data-event-reject]').forEach(b=>b.onclick=async()=>{try{await updateEvent(b.dataset.eventReject,'rejected'); await load();}catch(err){setStatus(err.message||String(err),true);}});
  document.querySelectorAll('[data-event-delete]').forEach(b=>b.onclick=async()=>{try{await deleteEvent(b.dataset.eventDelete); await load();}catch(err){setStatus(err.message||String(err),true);}});
  document.querySelectorAll('[data-speed-approve]').forEach(b=>b.onclick=async()=>{try{await updateSpeed(b.dataset.speedApprove,'verified'); await load();}catch(err){setStatus(err.message||String(err),true);}});
  document.querySelectorAll('[data-speed-reject]').forEach(b=>b.onclick=async()=>{try{await updateSpeed(b.dataset.speedReject,'rejected'); await load();}catch(err){setStatus(err.message||String(err),true);}});
  document.querySelectorAll('[data-speed-delete]').forEach(b=>b.onclick=async()=>{try{await deleteSpeed(b.dataset.speedDelete); await load();}catch(err){setStatus(err.message||String(err),true);}});
}
async function load(){ try{ setStatus('Laden…'); let data; try{ data=await call('get_drinks_admin_console_light',{admin_session_token:adminToken(), limit_rows:60}); }catch(_){ data=await call('get_drinks_admin_console',{admin_session_token:adminToken()}); } consoleData=data?.get_drinks_admin_console_light||data?.get_drinks_admin_console||data||{}; render(); setStatus('Gegevens geladen.'); }catch(err){ setStatus(err.message||String(err), true); } }
bindBulk('events', id=>updateEvent(id,'verified'), id=>updateEvent(id,'rejected'), deleteEvent); bindBulk('speed', id=>updateSpeed(id,'verified'), id=>updateSpeed(id,'rejected'), deleteSpeed); load();
</script>
<div class="site-credit-watermark" data-version-watermark style="position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)"></div>
</body>
</html>
