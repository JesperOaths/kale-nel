<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks audit</title>
  <script>window.GEJAST_PAGE_VERSION='v209';</script><script src="./gejast-config.js?v209"></script>
  <script src="./admin-session-sync.js?v173"></script>
  <style>
    :root{--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}
    *{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover fixed;color:#201b16}
    .wrap{max-width:1380px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0;cursor:pointer}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.btn.gold{background:var(--gold);color:#111}.logo{width:64px;height:64px}
    .grid{display:grid;gap:18px}.split{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.panel h2{margin:0 0 12px}.list{display:grid;gap:10px}.row{display:grid;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.row-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.muted{color:var(--muted)}
    .edit-grid{display:grid;grid-template-columns:1.1fr .9fr .8fr auto;gap:8px;align-items:end}.edit-grid.speed{grid-template-columns:1.2fr 1fr .8fr auto}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:6px}.field input,.field select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}
    @media(max-width:1100px){.split,.three{grid-template-columns:1fr}.edit-grid,.edit-grid.speed{grid-template-columns:1fr 1fr}.edit-grid .btn,.edit-grid.speed .btn{width:100%}}
    @media(max-width:700px){body{padding:12px}.card{padding:16px}.edit-grid,.edit-grid.speed{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap"><div class="card">
  <div class="top">
    <div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="./admin.html">Adminhub</a><a class="btn alt" href="./drinks.html">Drinks</a></div>
      <h1 style="margin:0 0 8px;font-size:42px">Drinks audit</h1>
      <div class="muted">Admin-only fraudechecks, flags, moderatie en bewerken van drinks- en snelheidsinvoer.</div>
      <div id="statusLine" class="muted" style="margin-top:10px"></div>
    </div>
    <a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a>
  </div>
  <div class="grid split" style="margin-top:18px">
    <section class="panel"><h2>Flags</h2><div id="flags" class="list"></div></section>
    <section class="panel"><h2>Verdachte pairs</h2><div id="pairs" class="list"></div></section>
  </div>
  <div class="grid split" style="margin-top:18px">
    <section class="panel"><h2>Drinks invoer bewerken</h2><div id="events" class="list"></div></section>
    <section class="panel"><h2>Snelheid invoer bewerken</h2><div id="speedAttempts" class="list"></div></section>
  </div>
</div></div>
<div class="site-credit-watermark" data-version-watermark></div>
<script>
(()=>{
  const cfg=window.GEJAST_CONFIG||{}; const SUPABASE_URL=cfg.SUPABASE_URL||''; const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||''; const ADMIN_KEYS=['jas_admin_session_v8'];
  let cache={ event_types:[], speed_types:[] };
  function adminToken(){ for(const k of ADMIN_KEYS){ const v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v) return v; } return ''; }
  function h(){ return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}; }
  async function p(res){ const t=await res.text(); let d=null; try{ d=t?JSON.parse(t):null; }catch{ throw new Error(t||`HTTP ${res.status}`); } if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d; }
  function setStatus(msg='',tone=''){ const el=document.getElementById('statusLine'); el.textContent=msg; el.style.color=tone==='bad'?'#b53a30':tone==='ok'?'#1f8f52':'#6b6257'; }
  function optionHtml(rows, selected, labelKey='label', valueKey='key'){ return (rows||[]).map(r=>`<option value="${r[valueKey]||''}" ${String(r[valueKey]||'')===String(selected||'')?'selected':''}>${r[labelKey]||r[valueKey]||''}</option>`).join(''); }
  async function requireAdmin(){ const token=adminToken(); if(!token){ location.href='./admin.html?return_to='+encodeURIComponent('./drinks_admin.html'); throw new Error('Adminlogin nodig'); } const data = window.GEJAST_ADMIN_SESSION ? await window.GEJAST_ADMIN_SESSION.validate() : await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_check_session`, {method:'POST',headers:h(),body:JSON.stringify({admin_session_token:token})}).then(p); if(data?.admin_session_token && window.GEJAST_ADMIN_SESSION && window.GEJAST_ADMIN_SESSION.setToken){ window.GEJAST_ADMIN_SESSION.setToken(data.admin_session_token); } return data; }
  async function callRpc(name, body){ const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',headers:h(),body:JSON.stringify(body)}); return p(res); }
  function renderSimple(id, rows, fmt, empty='Nog geen data.'){ document.getElementById(id).innerHTML=(rows&&rows.length)?rows.map(fmt).join(''):`<div class="muted">${empty}</div>`; }
  function renderEvents(rows){ document.getElementById('events').innerHTML=(rows&&rows.length)?rows.map(r=>`<div class="row"><div class="row-head"><div><strong>${r.player_name||'Onbekend'} · ${r.event_type_label||r.event_type_key||'Drankje'}</strong><div class="muted">${new Date(r.created_at).toLocaleString('nl-NL')} · ${Number(r.total_units||0).toFixed(1)} units</div></div><div class="muted">#${r.id}</div></div><div class="edit-grid"><div class="field"><label>Type</label><select data-event-type="${r.id}">${optionHtml(cache.event_types,r.event_type_key||r.type_key||r.event_type_label,'label','key')}</select></div><div class="field"><label>Aantal</label><input data-event-qty="${r.id}" type="number" min="0" step="1" value="${r.quantity==null?1:r.quantity}"></div><div class="field"><label>Status</label><select data-event-status="${r.id}"><option value="pending" ${r.status==='pending'?'selected':''}>pending</option><option value="verified" ${r.status==='verified'?'selected':''}>verified</option><option value="rejected" ${r.status==='rejected'?'selected':''}>rejected</option><option value="expired" ${r.status==='expired'?'selected':''}>expired</option></select></div><button class="btn gold" data-save-event="${r.id}">Opslaan</button></div></div>`).join(''):'<div class="muted">Nog geen drink-events.</div>'; document.querySelectorAll('[data-save-event]').forEach(btn=>btn.onclick=()=>saveEvent(btn.dataset.saveEvent)); }
  function renderSpeed(rows){ document.getElementById('speedAttempts').innerHTML=(rows&&rows.length)?rows.map(r=>`<div class="row"><div class="row-head"><div><strong>${r.player_name||'Onbekend'} · ${r.speed_type_label||r.speed_type_key||'Snelheid'}</strong><div class="muted">${new Date(r.created_at).toLocaleString('nl-NL')} · ${Number(r.duration_seconds||0).toFixed(1)}s</div></div><div class="muted">#${r.id}</div></div><div class="edit-grid speed"><div class="field"><label>Type</label><select data-speed-type="${r.id}">${optionHtml(cache.speed_types,r.speed_type_key||r.type_key||r.speed_type_label,'label','key')}</select></div><div class="field"><label>Seconden</label><input data-speed-seconds="${r.id}" type="number" min="0" step="0.1" value="${r.duration_seconds==null?'':r.duration_seconds}"></div><div class="field"><label>Status</label><select data-speed-status="${r.id}"><option value="pending" ${r.status==='pending'?'selected':''}>pending</option><option value="verified" ${r.status==='verified'?'selected':''}>verified</option><option value="rejected" ${r.status==='rejected'?'selected':''}>rejected</option><option value="expired" ${r.status==='expired'?'selected':''}>expired</option></select></div><button class="btn gold" data-save-speed="${r.id}">Opslaan</button></div></div>`).join(''):'<div class="muted">Nog geen snelheidspogingen.</div>'; document.querySelectorAll('[data-save-speed]').forEach(btn=>btn.onclick=()=>saveSpeed(btn.dataset.saveSpeed)); }
  async function saveEvent(id){ try{ await callRpc('admin_update_drink_event_entry',{admin_session_token:adminToken(),drink_event_id_input:Number(id),event_type_key_input:document.querySelector(`[data-event-type="${id}"]`).value,quantity_input:Number(document.querySelector(`[data-event-qty="${id}"]`).value||1),new_status_input:document.querySelector(`[data-event-status="${id}"]`).value}); setStatus('Drink-event opgeslagen.','ok'); await load(); }catch(err){ setStatus(err.message||String(err),'bad'); } }
  async function saveSpeed(id){ try{ await callRpc('admin_update_drink_speed_attempt_entry',{admin_session_token:adminToken(),attempt_id_input:Number(id),speed_type_key_input:document.querySelector(`[data-speed-type="${id}"]`).value,duration_seconds_input:Number(document.querySelector(`[data-speed-seconds="${id}"]`).value||0),new_status_input:document.querySelector(`[data-speed-status="${id}"]`).value}); setStatus('Snelheidspoging opgeslagen.','ok'); await load(); }catch(err){ setStatus(err.message||String(err),'bad'); } }
  async function load(){ try{ await requireAdmin(); const raw=await callRpc('get_drinks_admin_console',{admin_session_token:adminToken()}); const data=raw?.get_drinks_admin_console||raw||{}; cache.event_types=data.event_types||[]; cache.speed_types=data.speed_types||[]; renderSimple('flags',data.flags,(r)=>`<div class="row"><div><strong>${r.flag_type}</strong><div class="muted">${r.details_text||'—'}</div></div><div class="muted">${new Date(r.created_at).toLocaleString('nl-NL')}</div></div>`); renderSimple('pairs',data.suspicious_pairs,(r)=>`<div class="row"><div><strong>${r.submitter} ⇄ ${r.verifier}</strong><div class="muted">${r.count} keer</div></div></div>`); renderEvents(data.recent_events||[]); renderSpeed(data.recent_speed_attempts||[]); setStatus(''); }catch(err){ setStatus(err.message||String(err),'bad'); } }
  load();
})();
</script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body></html>
