<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks audit</title>
  <script>window.GEJAST_PAGE_VERSION='v312';</script>
  <script src="./gejast-config.js?v312"></script>
  <style>
    :root{--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#9a8241}
    *{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover fixed;color:#201b16}.wrap{max-width:1340px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:none;cursor:pointer}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.btn.gold{background:var(--gold);color:#111}.logo{width:64px;height:64px}.grid{display:grid;gap:18px}.split{grid-template-columns:1fr 1fr;margin-top:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff;align-items:flex-start}.row-main{display:grid;gap:4px}.actions{display:flex;gap:8px;flex-wrap:wrap}.muted{color:var(--muted)} select,input{padding:10px;border-radius:12px;border:1px solid var(--line);font:inherit}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:900px){.split{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap"><div class="card">
    <div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="./admin.html">Adminhub</a><a class="btn" href="./drinks.html">Drinks</a></div><h1 style="margin:0 0 8px;font-size:42px">Drinks audit</h1><div class="muted">Admin-paneel voor flags, events, snelheidspogingen en moderatie. Alleen bereikbaar via de adminhub.</div><div id="adminStatus" class="muted" style="margin-top:8px"></div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div>
    <div class="grid split">
      <section class="panel"><h2 style="margin:0 0 12px">Flags</h2><div id="flags" class="list"></div></section>
      <section class="panel"><h2 style="margin:0 0 12px">Verdachte pairs</h2><div id="pairs" class="list"></div></section>
    </div>
    <div class="grid split">
      <section class="panel"><h2 style="margin:0 0 12px">Recente drinks-events</h2><div id="events" class="list"></div></section>
      <section class="panel"><h2 style="margin:0 0 12px">Recente snelheidspogingen</h2><div id="speed" class="list"></div></section>
    </div>
  </div></div>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
  (()=>{
    const cfg=window.GEJAST_CONFIG||{}; const SUPABASE_URL=cfg.SUPABASE_URL||''; const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';
    const ADMIN_KEYS=['jas_admin_session_v8'];
    function adminToken(){ for(const k of ADMIN_KEYS){ const v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v) return v; } return ''; }
    function h(){ return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}; }
    async function p(res){ const t=await res.text(); let d=null; try{ d=t?JSON.parse(t):null; }catch{ throw new Error(t||`HTTP ${res.status}`); } if(!res.ok) throw new Error(d?.message||d?.error||d?.hint||`HTTP ${res.status}`); return d; }
    function setStatus(msg=''){ document.getElementById('adminStatus').textContent=msg; }
    function redirectLogin(){ location.href = './admin.html?return_to=drinks_admin.html'; }
    function list(el,rows,fmt,empty='Nog geen data.') { el.innerHTML=(rows||[]).length ? rows.map(fmt).join('') : `<div class="muted">${empty}</div>`; }
    async function load(){
      try{
        if(!adminToken()){ redirectLogin(); return; }
        const raw = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drinks_admin_console`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken()})}).then(p);
        const data = raw?.get_drinks_admin_console || raw || {};
        list(document.getElementById('flags'), data.flags, (r)=>`<div class="row"><div class="row-main"><strong>${r.flag_type||'Flag'}</strong><div class="muted">${r.details_text||r.reason||'—'}</div></div><div class="muted">${r.created_at?new Date(r.created_at).toLocaleString('nl-NL'):''}</div></div>`);
        list(document.getElementById('pairs'), data.suspicious_pairs, (r)=>`<div class="row"><div class="row-main"><strong>${r.submitter||r.player_name||'?'} ⇄ ${r.verifier||r.other_player||'?'}</strong><div class="muted">${r.count||r.times||0} keer</div></div></div>`);
        list(document.getElementById('events'), data.recent_events, (r)=>`<div class="row"><div class="row-main"><strong>${r.player_name} · ${r.event_type_label||r.event_type_key}</strong><div class="muted">${r.status||'pending'} · ${r.quantity||1} × ${Number(r.total_units||0).toFixed(1)} units · ${r.created_at?new Date(r.created_at).toLocaleString('nl-NL'):''}</div></div><div class="actions"><button class="btn alt" data-event-status="${r.id}:verified">Verify</button><button class="btn alt" data-event-status="${r.id}:rejected">Reject</button><button class="btn gold" data-event-delete="${r.id}">Delete</button></div></div>`,'Nog geen drinks-events.');
        list(document.getElementById('speed'), data.recent_speed_attempts, (r)=>`<div class="row"><div class="row-main"><strong>${r.player_name} · ${r.speed_type_label||r.speed_type_key}</strong><div class="muted">${Number(r.duration_seconds||0).toFixed(1)}s · ${r.status||'pending'} · ${r.created_at?new Date(r.created_at).toLocaleString('nl-NL'):''}</div></div><div class="actions"><button class="btn alt" data-speed-status="${r.id}:verified">Verify</button><button class="btn alt" data-speed-status="${r.id}:rejected">Reject</button><button class="btn gold" data-speed-delete="${r.id}">Delete</button></div></div>`,'Nog geen snelheidspogingen.');
        document.querySelectorAll('[data-event-status]').forEach((btn)=>btn.onclick=()=>updateEvent(btn.dataset.eventStatus));
        document.querySelectorAll('[data-speed-status]').forEach((btn)=>btn.onclick=()=>updateSpeed(btn.dataset.speedStatus));
        document.querySelectorAll('[data-event-delete]').forEach((btn)=>btn.onclick=()=>deleteEvent(btn.dataset.eventDelete));
        document.querySelectorAll('[data-speed-delete]').forEach((btn)=>btn.onclick=()=>deleteSpeed(btn.dataset.speedDelete));
        setStatus('');
      }catch(err){
        if(/niet ingelogd|admin|session|token/i.test(err.message||'')){ redirectLogin(); return; }
        setStatus(err.message||String(err));
      }
    }
    async function updateEvent(raw){ const [id,status] = String(raw).split(':'); await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_update_drink_event_entry`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken(),drink_event_id_input:Number(id),new_status_input:status})}).then(p); await load(); }
    async function updateSpeed(raw){ const [id,status] = String(raw).split(':'); await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_update_drink_speed_attempt_entry`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken(),attempt_id_input:Number(id),new_status_input:status})}).then(p); await load(); }
    async function deleteEvent(id){ if(!confirm('Drinks-event definitief verwijderen?')) return; await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_delete_drink_event_entry`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken(),drink_event_id_input:Number(id)})}).then(p); await load(); }
    async function deleteSpeed(id){ if(!confirm('Snelheidspoging definitief verwijderen?')) return; await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_delete_drink_speed_attempt_entry`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken(),attempt_id_input:Number(id)})}).then(p); await load(); }
    load();
  })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
