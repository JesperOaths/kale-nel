<style>:root{--line:rgba(0,0,0,.09);--line-strong:rgba(0,0,0,.14);--paper:rgba(255,251,245,.84);--panel:#fffdf9;--gold:#9a8241;--gold-soft:#e8d8ad;--ink:#16120e;--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:10px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.92),rgba(244,240,232,.94)),url('./site-bg-mobile.webp') center/cover fixed;color:var(--ink)}.wrap{max-width:1000px;margin:0 auto}.card{background:var(--paper);border:1px solid rgba(255,255,255,.72);border-radius:26px;padding:14px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.08);font:800 1rem/1 Inter,system-ui,sans-serif;text-decoration:none;cursor:pointer;background:#f3efe6;color:#111}.logo{width:52px;height:52px;object-fit:contain}.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}.panel{background:#f9f5ee;border:1px solid var(--line);border-radius:18px;padding:13px 14px}.panel h2{margin:0 0 10px}.big-card{grid-column:1/-1}.select{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line-strong);font:inherit;background:#fff}.stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.mini{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px}.mini .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:8px}.mini .value{font-size:1.15rem;font-weight:900}.list{display:grid;gap:10px}.row{background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px 12px}.row-top{display:flex;justify-content:space-between;gap:10px}.meta{color:var(--muted);font-size:.92rem}.rank-grid{display:grid;grid-template-columns:r </head><body><div class="wrap"><div class="card"><div class="topbar"><div class="top-actions"><a class="btn" href="./drinks.html">Overzicht</a><a class="btn" href="./drinks_speed.html">Snelheidspoging</a></div><div class="top-actions"><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo" /></a></div></div><div class="grid"><section class="panel big-card"><h2>Snelheid per speler</h2><select id="playerSelect" class="select"></select><div class="stats-grid" id="playerSummary"></div><div class="rank-grid" id="playerTypeBoxes" style="margin-top:12px"></div></section><section class="panel"><h2>Recente pogingen</h2><div id="recentAttempts" class="list"></div></section><section class="panel"><h2>Extra</h2><div id="extraBoxes" class="list"></div></section><section class="panel big-card"><h2>Top 5 per dranktype</h2><div id="rankingsByType" class="rank-grid"></div></section></div></div></div><div class="site-credit-watermark" data-version-watermark>v321 · Made by Bruis</div><script>
(function(){const CONFIG=window.GEJAST_CONFIG||{}; const SUPABASE_URL=CONFIG.SUPABASE_URL||''; const SUPABASE_KEY=CONFIG.SUPABASE_PUBLISHABLE_KEY||''; let selected=''; let latest=null; function headers(){return {'Content-Type':'application/json',apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,Accept:'application/json'};} async function parse(res){const t=await res.text(); let d=null; try{d=t?JSON.parse(t):null;}catch(_){throw new Error(t||`HTTP ${res.status}`);} if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d;} function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));} function fmt(n){const v=Number(n||0); return Number.isFinite(v)?v.toFixed(1):'0.0';}
function render(){ if(!latest) return; const players=latest.players||[]; const sel=document.getElementById('playerSelect'); if(!selected && players.length) selected=players[0]; sel.innerHTML=players.map(name=>`<option value="${esc(name)}" ${name===selected?'selected':''}>${esc(name)}</option>`).join(''); sel.onchange=()=>{selected=sel.value; load();}; const ps=latest.player_summary||{}; document.getElementById('playerSummary').innerHTML=`<div class="mini"><div class="label">Speler</div><div class="value">${esc(selected||'—')}</div></div><div class="mini"><div class="label">Verified pogingen</div><div class="value">${Number(ps.verified_attempt_count||0)}</div></div><div class="mini"><div class="label">Beste overall</div><div class="value">${ps.best_overall_seconds!=null?fmt(ps.best_overall_seconds)+'s':'—'}</div></div>`; const types=latest.player_type_top5||[]; document.getElementById('playerTypeBoxes').innerHTML=types.length?types.map(group=>`<div class="panel"><h2>${esc(group.label||group.key||'Drank')}</h2><div class="list">${(group.rows||[]).length?(group.rows||[]).map((r,i)=>`<div class="row"><div class="row-top"><strong>${i+1}. ${fmt(r.duration_seconds)}s</strong><span>${esc(r.verified_at_label||'')}</span></div></div>`).join(''):'<div class="meta">Nog geen verified pogingen.</div>'}</div></div>`).join(''):'<div class="meta">Nog geen spelerdata.</div>'; document.getElementById('recentAttempts').innerHTML=(latest.recent_attempts||[]).length?(latest.recent_attempts||[]).map(r=>`<div class="row"><div class="row-top"><div><strong>${esc(r.player_name)} · ${esc(r.speed_type_label||r.speed_type_key||'Drank')}</strong><div class="meta">${esc(r.verified_at_label||'')}</div></div><div><strong>${fmt(r.duration_seconds)}s</strong></div></div></div>`).join(''):'<div class="meta">Nog geen recente verified pogingen.</div>'; document.getElementById('rankingsByType').innerHTML=(latest.rankings_by_type||[]).map(group=>`<div class="panel"><h2>${esc(group.label||group.key||'Drank')}</h2><div class="list">${(group.rows||[]).length?(group.rows||[]).map((r,i)=>`<div class="row"><div class="row-top"><div><strong>${i+1}. ${esc(r.player_name)}</strong><div class="meta">Beste tijd</div></div><div><strong>${fmt(r.duration_seconds)}s</strong></div></div></div>`).join(''):'<div class="meta">Nog geen tijden.</div>'}</div></div>`).join(''); const extras=latest.extra_boxes||[]; document.getElementById('extraBoxes').innerHTML=extras.length?extras.map(box=>`<div class="row"><div class="row-top"><div><strong>${esc(box.label)}</strong><div class="meta">${esc(box.meta||'')}</div></div><div><strong>${esc(String(box.value??'—'))}</strong></div></div></div>`).join(''):'<div class="meta">Nog geen extra stats.</div>'; }
async function load(){ if(CONFIG.ensurePlayerSessionOrRedirect && !CONFIG.ensurePlayerSessionOrRedirect('drinks_speed_stats')) return; const body={session_token:CONFIG.getPlayerSessionToken?CONFIG.getPlayerSessionToken():'',target_player_name:selected||null}; const raw=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drink_speed_stats_public`,{method:'POST',headers:headers(),body:JSON.stringify(body)}).then(parse); latest=raw?.get_drink_speed_stats_public||raw||{}; render(); }
load();})();</script><script src="./gejast-session-corner.js?v338"></script></body></html>
