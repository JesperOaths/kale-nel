<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Mijn profiel</title><script>window.GEJAST_PAGE_VERSION='v615';</script><script src="./gejast-config.js?v615"></script><script src="./gejast-home-gate.js?v615"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.92),rgba(232,228,217,.95)),url('./wordtergejast.png') center/cover scroll;color:#201b16}.wrap{max-width:860px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.back,.ghost{display:inline-flex;padding:12px 16px;border-radius:999px;text-decoration:none;font-weight:800}.back{background:#111;color:#fff}.ghost{background:#fff;color:#201b16;border:1px solid var(--line)}.brand img{width:64px;height:64px;object-fit:contain}.row{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:center;margin-top:18px}.avatar{width:120px;height:120px;border-radius:50%;border:2px solid rgba(212,175,55,.7);background:#fff;display:grid;place-items:center;font-size:42px;font-weight:900;color:#5d4820;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.field{display:flex;flex-direction:column;gap:8px}.field label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#8a7a55;font-weight:800}input[type=text],input[type=file]{padding:14px;border-radius:16px;border:1px solid var(--line);font:inherit;background:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{display:inline-flex;padding:12px 16px;border:none;border-radius:16px;font:800 15px/1 Inter,sans-serif;cursor:pointer}.primary{background:#d4af37;color:#111}.muted{color:var(--muted)}.status{margin-top:14px;min-height:20px}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}@media(max-width:720px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><h1>Mijn profiel</h1><p class="muted">Pas je zichtbare naam en profielfoto aan.</p></div><div style="display:flex;gap:10px;align-items:center"><a class="ghost" href="./profiles.html">Spelers</a><a class="back" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</a><a class="brand" href="./index.html"><img src="./logo.png" alt="Logo"/></a></div></div><div class="row"><div class="avatar" id="avatarPreview">?</div><div class="field"><label>Zichtbare naam</label><input id="displayNameInput" type="text" maxlength="40" placeholder="Jouw zichtbare naam"/><div class="muted">Je login-identiteit blijft gelijk. Alleen de zichtbare naam verandert.</div></div></div><div class="field" style="margin-top:18px"><label>Profielfoto uploaden</label><input id="avatarInput" type="file" accept="image/png,image/jpeg,image/webp"/><div class="muted">De afbeelding wordt klein opgeslagen en gebruikt op ranglijsten en profielen.</div></div><div class="actions"><button class="btn primary" id="saveBtn">Opslaan</button><button class="btn ghost" id="resetBtn">Foto verwijderen</button></div><div class="status muted" id="status"></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const SESSION_KEYS=['jas_session_token_v11','jas_session_token_v10'];let currentAvatar='';let currentName='';function token(){for(const k of SESSION_KEYS){const v=localStorage.getItem(k)||sessionStorage.getItem(k);if(v)return v;}return '';}function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function setStatus(v){document.getElementById('status').textContent=v||''}function preview(src,name){const box=document.getElementById('avatarPreview');const helper=(window.GEJAST_CONFIG&&typeof window.GEJAST_CONFIG.normalizeProfileImageUrl==='function')?window.GEJAST_CONFIG.normalizeProfileImageUrl:(v)=>String(v||'').trim();const normalized=helper(src);box.innerHTML=normalized?`<img src="${normalized}" alt="${name||'Avatar'}" referrerpolicy="no-referrer"/>`:String(name||'?').slice(0,1).toUpperCase();}async function load(){if(!token()){setStatus('Log eerst in als speler.');return;}const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_my_profile_settings`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token()})});const raw=await parse(res);const data=raw?.get_my_profile_settings||raw;currentName=data.display_name||data.player_name||'';document.getElementById('displayNameInput').value=currentName;currentAvatar=data.profile_picture_url||data.avatar_url||'';preview(currentAvatar,currentName);}function resizeToDataUrl(file){return new Promise((resolve,reject)=>{const fr=new FileReader();fr.onerror=()=>reject(new Error('Bestand lezen mislukt.'));fr.onload=()=>{const img=new Image();img.onerror=()=>reject(new Error('Afbeelding laden mislukt.'));img.onload=()=>{const size=256;const c=document.createElement('canvas');c.width=size;c.height=size;const ctx=c.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,size,size);const ratio=Math.max(size/img.width,size/img.height);const w=img.width*ratio,h=img.height*ratio;ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);resolve(c.toDataURL('image/webp',0.86));};img.src=String(fr.result||'');};fr.readAsDataURL(file);});}document.getElementById('avatarInput').addEventListener('change',async(e)=>{const file=e.target.files&&e.target.files[0];if(!file)return;setStatus('Afbeelding verwerken...');try{currentAvatar=await resizeToDataUrl(file);preview(currentAvatar,document.getElementById('displayNameInput').value||currentName);setStatus('Afbeelding klaar om op te slaan.');}catch(err){setStatus(err.message||String(err));}});document.getElementById('displayNameInput').addEventListener('input',()=>preview(currentAvatar,document.getElementById('displayNameInput').value||currentName));document.getElementById('resetBtn').addEventListener('click',()=>{currentAvatar='';preview('',document.getElementById('displayNameInput').value||currentName);setStatus('Foto wordt verwijderd na opslaan.');});document.getElementById('saveBtn').addEventListener('click',async()=>{try{setStatus('Opslaan...');const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/update_my_profile_settings`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),display_name_input:document.getElementById('displayNameInput').value,avatar_url_input:currentAvatar})});await parse(res);setStatus('Profiel opgeslagen.');currentName=document.getElementById('displayNameInput').value||currentName;}catch(err){setStatus(err.message||String(err));}});load().catch(err=>setStatus(err.message||String(err)));})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script><script src="./gejast-geo.js?v615"></script><script src="./drinks-verify-float.js?v615"></script></body></html>
