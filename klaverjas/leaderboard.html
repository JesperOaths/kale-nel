<!DOCTYPE html>
<html>
<head><script>window.GEJAST_PAGE_VERSION='v636';</script>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

<script>
let players = [
  {name:"Jan", wins:10, games:15},
  {name:"Piet", wins:8, games:15}
];

document.getElementById("leaderboard").innerHTML =
  players.map(p => `
    <div>
      ${p.name} - ${Math.round((p.wins/p.games)*100)}%
    </div>
  `).join("");
</script>

<div class="site-credit-watermark" data-version-watermark style="position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)"></div>
</body>
