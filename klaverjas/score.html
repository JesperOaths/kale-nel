<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Klaverjas Score</title><script>window.GEJAST_PAGE_VERSION='v637';</script>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header>
    <h1>Klaverjas</h1>
    <div id="scoreboard">
      <div>WIJ <span id="score-wij">0</span></div>
      <div>ZIJ <span id="score-zij">0</span></div>
    </div>
  </header>

  <section id="players">
    <h3>Select 4 players</h3>
    <div id="player-select"></div>
    <button onclick="startGame()">Start Game</button>
  </section>

  <section id="game" class="hidden">
    <div id="contract"></div>

    <div class="input-row">
      <input id="points-input" type="number" placeholder="Points (one team)" />
    </div>

    <div class="buttons">
      <button onclick="addRoem(20)">+20</button>
      <button onclick="addRoem(50)">+50</button>
      <button onclick="setNat()">NAT</button>
      <button onclick="setPit()">PIT</button>
    </div>

    <button onclick="submitRound()">Add Round</button>

    <div id="history"></div>
  </section>
</div>

<script src="score.js"></script>
<div class="site-credit-watermark" data-version-watermark style="position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)"></div>
</body>
</html>
