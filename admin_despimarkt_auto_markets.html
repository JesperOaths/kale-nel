<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <title>Despimarkt Auto Markten</title>
  <script>window.GEJAST_PAGE_VERSION='v707';</script>
  <script src="./gejast-config.js?v707"></script>
  <script src="./gejast-despimarkt-auto-markets.js?v707"></script>
  <style>
    :root{--gold:#9a8241;--paper:#fbf7ef;--line:rgba(0,0,0,.08);--ink:#161616;--muted:#6b6257;--ok:#1f6b43;--bad:#8b2d20}
    *{box-sizing:border-box}body{margin:0;padding:22px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(241,237,228,.94),rgba(241,237,228,.96)),url('./site-bg-desktop.webp') center/cover fixed;color:var(--ink)}
    main{max-width:1120px;margin:0 auto;background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:24px;box-shadow:0 18px 42px rgba(0,0,0,.08)}
    h1{margin:0;font-size:32px;letter-spacing:-.04em}.sub{color:var(--muted);margin:8px 0 18px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:999px;background:#111;color:#fff;padding:11px 15px;font-weight:900;cursor:pointer;text-decoration:none}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}
    select,input{padding:11px 13px;border-radius:14px;border:1px solid var(--line);background:#fff;font:inherit}.status{min-height:22px;margin:14px 0;color:var(--muted)}.status.ok{color:var(--ok)}.status.warn{color:var(--bad)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}.dm-auto-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 8px 18px rgba(0,0,0,.035)}.dm-auto-card-head{display:flex;justify-content:space-between;gap:10px}.dm-auto-card-head span{font-size:12px;font-weight:900;color:#8a7a55;text-transform:uppercase}.dm-auto-meta,.dm-auto-odds{margin-top:8px;color:var(--muted);font-size:13px}.dm-auto-empty{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;color:var(--muted)}
    pre{white-space:pre-wrap;background:#111;color:#f3e3a6;border-radius:18px;padding:14px;overflow:auto;font-size:12px}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;pointer-events:none}
    @media(max-width:760px){.grid{grid-template-columns:1fr}body{padding:12px}main{padding:18px}}
  </style>
</head>
<body>
<main>
  <div class="row" style="justify-content:space-between">
    <div><h1>Despimarkt Auto Markten</h1><p class="sub">Phase 13 controle voor automatisch aangemaakte match-markten, odds en resolutie.</p></div>
    <a class="btn alt" href="./admin.html">Admin</a>
  </div>
  <div class="row">
    <select id="scopeInput"><option value="friends">Vrienden</option><option value="family">Familie</option></select>
    <select id="statusInput"><option value="open">Open</option><option value="resolved">Resolved</option><option value="cancelled">Cancelled</option><option value="all">Alles</option></select>
    <button class="btn" id="refreshBtn">Ververs</button>
    <button class="btn alt" id="auditBtn">Audit</button>
  </div>
  <div id="statusBox" class="status"></div>
  <section id="marketsBox" class="grid"></section>
  <pre id="auditBox" style="display:none"></pre>
</main>
<div class="site-credit-watermark" data-version-watermark>v646 · Made by Bruis</div>
<script>
(function(){
  const api = window.GEJAST_DESPIMARKT_AUTO_MARKETS;
  const $ = (id)=>document.getElementById(id);
  function setStatus(msg,tone){ const el=$('statusBox'); el.textContent=msg||''; el.className=`status ${tone||''}`.trim(); }
  async function load(){
    try{
      setStatus('Laden...');
      const status = $('statusInput').value === 'all' ? null : $('statusInput').value;
      const data = await api.listMarkets({ site_scope_input:$('scopeInput').value, status_input:status, limit_input:100 });
      api.renderMarkets($('marketsBox'), data.markets || data);
      setStatus('Markten geladen.','ok');
    }catch(err){ setStatus(err.message || 'Laden mislukt.','warn'); }
  }
  async function audit(){
    try{
      setStatus('Audit laden...');
      const data = await api.rpc('admin_get_despimarkt_auto_market_audit_v646', { site_scope_input:$('scopeInput').value });
      $('auditBox').style.display='block'; $('auditBox').textContent=JSON.stringify(data,null,2);
      setStatus('Audit geladen.','ok');
    }catch(err){ setStatus(err.message || 'Audit mislukt.','warn'); }
  }
  $('refreshBtn').addEventListener('click', load); $('auditBtn').addEventListener('click', audit);
  if (window.GEJAST_CONFIG && window.GEJAST_CONFIG.applyVersionLabel) window.GEJAST_CONFIG.applyVersionLabel();
  load();
})();
</script>
</body>
</html>
