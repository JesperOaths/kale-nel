<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <title>Paardenrace Live</title>
  <script>window.GEJAST_PAGE_VERSION='v428';</script>
  <script src="./gejast-config.js?v428"></script>
  <script src="./gejast-paardenrace.js?v428"></script>
  <style>
    :root{--gold:#9a8241;--paper:#fffaf3;--ink:#17130f;--muted:#6d6256;--line:rgba(0,0,0,.10);--bg:#f3ede4;--soft:#f7f1e7;--green:#2f6d3c;--red:#8a1022}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)} .page{max-width:1340px;margin:0 auto;padding:18px}.shell{background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.8);border-radius:28px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.06)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#17130f;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.btn.secondary{background:#fff;color:#17130f}.btn.soft{background:var(--soft);color:#6b5622}.btn:disabled{opacity:.5;cursor:not-allowed}
    .layout{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:16px}.muted{color:var(--muted)} .status{min-height:1.4em;font-weight:700;margin-top:8px}
    .race-scene{display:grid;gap:14px}.gate-row{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}.gate-slot{background:#efe7d7;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:8px;text-align:center}.gate-slot.open{background:#fff}.gate-num{font-size:11px;color:#6d6256;font-weight:800}.gate-card{font-weight:900;font-size:18px}
    .track-board{position:relative}.track-bg{width:100%;border-radius:22px;display:block;border:1px solid rgba(0,0,0,.08)}.track-lane{position:absolute;left:0;right:0;height:18%;}.lane-hearts{top:13.2%}.lane-diamonds{top:29.7%}.lane-clubs{top:46.2%}.lane-spades{top:62.7%}.horse-token{position:absolute;top:18%;transform:translate(-50%,0);transition:left .55s ease}.horse-token-inner{display:grid;place-items:center;width:52px;height:52px;border-radius:999px;color:#fff;font-size:28px;font-weight:900;border:4px solid rgba(255,255,255,.88);box-shadow:0 10px 18px rgba(0,0,0,.18)}
    .recent-cards,.bets-panel,.winner-panel{padding:12px 14px;border-radius:16px;background:#fff;border:1px solid var(--line)} .recent-card{display:inline-flex;padding:6px 10px;border-radius:12px;background:#f6efe1;margin-right:6px;font-weight:800}.bet-row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)}.bet-row:last-child{border-bottom:none}.bet-name{font-weight:800}.bet-meta{color:#5b5346}
    .draw-area{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.player-list{display:grid;gap:10px}.player-card{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px;border-radius:18px;background:#fff;border:1px solid var(--line)}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;background:#f6efe1;font-size:12px;font-weight:800}.badge.good{background:#edf8f0;color:#2f6d3c}
    .deal-overlay{position:fixed;inset:0;pointer-events:none;overflow:hidden}.deal-card{position:absolute;top:70px;left:50%;width:68px;height:98px;border-radius:12px;background:#17130f;color:#f0d17a;display:grid;place-items:center;font-weight:900;transform:translate(-50%,0);opacity:0;animation:deal .9s ease forwards}.winner-burst{position:fixed;inset:0;pointer-events:none;overflow:hidden}.burst-item{position:absolute;top:50%;left:50%;font-size:34px;animation:burst 2.2s ease forwards}
    @keyframes deal{0%{opacity:0;transform:translate(-50%,0) scale(.8)}10%{opacity:1}100%{opacity:1;transform:translate(var(--tx), var(--ty)) scale(1)}}
    @keyframes burst{0%{opacity:1;transform:translate(-50%,-50%) scale(.8)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1.3)}}
    @media(max-width:980px){.layout{grid-template-columns:1fr}.horse-token-inner{width:42px;height:42px;font-size:22px}}
  </style>
</head>
<body>
<div class="page"><div class="shell">
  <div class="top"><div><div class="muted">Paardenrace live</div><h1 style="margin:6px 0 0;font-size:clamp(2rem,4vw,3rem)">Racetrack</h1><div class="muted" id="metaBox">Live raceweergave</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn secondary" href="./paardenrace.html">Terug naar lobby</a></div></div>
  <div class="layout">
    <section class="panel">
      <div class="draw-area"><button class="btn" id="drawBtn" type="button">Deal volgende kaart</button><span class="badge" id="stageBadge">Lobby</span><span class="badge" id="winnerBadge">Nog geen winnaar</span></div>
      <div class="status" id="statusBox"></div>
      <div id="sceneBox" style="margin-top:12px"></div>
    </section>
    <section class="panel">
      <h2 style="margin-top:0">Spelers / inzetten</h2>
      <div class="player-list" id="playersBox"></div>
      <div class="winner-panel" id="winnerPanel" style="margin-top:12px;display:none"></div>
    </section>
  </div>
</div></div>
<div class="site-credit-watermark" data-version-watermark>v428 · Made by Bruis</div>
<div class="deal-overlay" id="dealOverlay"></div>
<div class="winner-burst" id="winnerBurst"></div>
<script>
(()=>{
 const api=window.GEJAST_PAARDENRACE; const $=(id)=>document.getElementById(id); let state=null; let pollHandle=null; let polling=false; let dealtForMatch=''; let burstForWinner='';
 function code(){ return api.getRoomFromQuery() || api.getStoredRoomCode() || ''; }
 function setStatus(msg='',bad=false){ const b=$('statusBox'); b.textContent=msg||''; b.style.color=bad?'#8a1022':'#2f6d3c'; }
 function renderPlayers(players){ $('playersBox').innerHTML = (players||[]).map((p)=>`<div class="player-card"><div><strong>${api.escapeHtml(p.player_name)}</strong><div class="muted">${api.escapeHtml(p.selected_suit_label||api.suitLabel(p.selected_suit))}</div><div><strong>${Number(p.wager_bakken||0)} Bakken</strong></div></div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end"><span class="badge ${p.wager_verified?'good':''}">${p.wager_verified?'Verified':'Nog niet verified'}</span><span class="badge ${p.is_ready?'good':''}">${p.is_ready?'Ready':'Niet ready'}</span>${p.is_host?'<span class="badge">Host</span>':''}</div></div>`).join('') || '<div class="muted">Nog geen spelers.</div>'; }
 function maybeDealAnimation(match){ const ref = String(match?.match_ref||''); if(!ref || dealtForMatch===ref) return; dealtForMatch = ref; const overlay=$('dealOverlay'); overlay.innerHTML=''; for(let i=0;i<10;i++){ const card=document.createElement('div'); card.className='deal-card'; card.textContent='🂠'; card.style.setProperty('--tx', `${-520 + i*115}px`); card.style.setProperty('--ty', `${-200}px`); card.style.animationDelay = `${i*0.06}s`; overlay.appendChild(card); } setTimeout(()=>{ overlay.innerHTML=''; }, 1800); }
 function maybeWinnerBurst(match){ const winner = String(match?.winner_suit||''); const ref = `${match?.match_ref||''}:${winner}`; if(!winner || burstForWinner===ref) return; burstForWinner = ref; const burst=$('winnerBurst'); burst.innerHTML=''; const icon = api.suitIcon(winner); const pieces = Array.from({length:36}, (_,i)=>({dx:`${(Math.random()*900-450).toFixed(0)}px`, dy:`${(Math.random()*700-350).toFixed(0)}px`, rot:`${(Math.random()*560-280).toFixed(0)}deg`})); pieces.forEach((spec, i)=>{ const node=document.createElement('div'); node.className='burst-item'; node.textContent = i % 3 === 0 ? '🐎' : icon; node.style.color = api.suitColor(winner); node.style.setProperty('--dx', spec.dx); node.style.setProperty('--dy', spec.dy); node.style.setProperty('--rot', spec.rot); node.style.animationDelay = `${i*0.02}s`; burst.appendChild(node); }); setTimeout(()=>{ burst.innerHTML=''; }, 2500); }
 function applyState(next){ state=next||null; const room=state?.room||null; const match=state?.match||null; const players=Array.isArray(state?.players)?state.players:[]; const me=state?.viewer||{}; if(!room){ setStatus('Room niet gevonden.', true); return; } api.setStoredRoomCode(room.room_code||''); $('metaBox').textContent = `${room.room_code||'—'} · fase: ${room.stage_label||room.stage||'lobby'} · host: ${room.host_name||'—'}`; $('stageBadge').textContent = room.stage_label||room.stage||'Lobby'; $('winnerBadge').textContent = match?.winner_suit ? `Winnaar: ${api.suitLabel(match.winner_suit)}` : 'Nog geen winnaar'; $('drawBtn').style.display = (me.is_host && room.stage==='race') ? '' : 'none'; $('drawBtn').disabled = !(me.is_host && room.stage==='race'); renderPlayers(players); if(room.stage==='lobby'){ $('sceneBox').innerHTML='<div class="muted">De race is nog niet gestart. Wacht in de lobby tot de host start.</div>'; $('winnerPanel').style.display='none'; return; }
 $('sceneBox').innerHTML = api.renderTrack(match, players); if(room.stage==='race'){ maybeDealAnimation(match); }
 if(match?.winner_suit){ maybeWinnerBurst(match); $('winnerPanel').style.display=''; $('winnerPanel').innerHTML = `<strong>${api.escapeHtml(api.suitLabel(match.winner_suit))} wint deze race.</strong><div class="muted" style="margin-top:6px">Volgens de regel telt de eerste finish pas mee als er ook echt op dat paard is ingezet.</div>`; } else { $('winnerPanel').style.display='none'; }
 }
 async function load(){ try{ applyState(await api.rpc('get_paardenrace_room_state_safe', { room_code_input: code() })); setStatus(`Live sync · ${new Date().toLocaleTimeString('nl-NL')}`); }catch(err){ setStatus(err.message||'Laden mislukt.', true); } }
 async function poll(){ if(polling) return; polling=true; try{ await load(); }finally{ polling=false; } }
 $('drawBtn').addEventListener('click', async()=>{ try{ setStatus('Kaart delen...'); applyState(await api.rpc('draw_next_paardenrace_card_safe', { room_code_input: code() })); setStatus('Kaart getrokken.'); }catch(err){ setStatus(err.message||'Trekken mislukt.', true); } });
 if(!code()){ setStatus('Geen roomcode meegegeven.', true); } else { poll(); pollHandle=setInterval(poll, api.POLL_MS); }
 window.addEventListener('beforeunload', ()=>{ if(pollHandle) clearInterval(pollHandle); });
})();
</script>
</body>
</html>
