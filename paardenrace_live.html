<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" /><title>Paardenrace Live</title><script>window.GEJAST_PAGE_VERSION='v439';</script><script src="./gejast-config.js?v439"></script><script src="./gejast-paardenrace.js?v439"></script><style>:root{--gold:#9a8241;--paper:#fffaf3;--ink:#17130f;--muted:#6d6256;--line:rgba(0,0,0,.08);--bg:#f3ede4}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}.page{max-width:1240px;margin:0 auto;padding:22px 16px 44px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.btn,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.btn.secondary,a.btn.secondary{background:#fff;color:#111}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px}.status{min-height:1.4em;font-weight:700;color:#6d1021}.small{font-size:12px;color:var(--muted)}.summary{display:grid;gap:10px}.player-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 12px;border-radius:16px;border:1px solid var(--line);background:#fff}.chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(154,130,65,.12);font-size:12px;font-weight:800}.log{display:grid;gap:8px;max-height:360px;overflow:auto}.log-item{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff}.alloc-row{display:grid;grid-template-columns:1fr 110px;gap:10px;align-items:center;padding:10px 0}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}.pr-track-shell{display:grid;gap:12px}.pr-track-stage{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;padding:10px}.pr-track-image{display:block;width:100%;height:auto;border-radius:12px}.pr-gate-marker,.pr-horse-marker{position:absolute;transform:translate(-50%,-50%)}.pr-gate-marker{min-width:30px;height:30px;padding:0 8px;border-radius:999px;display:grid;place-items:center;background:#111;color:#f3e3a6;font-size:12px;font-weight:900;border:1px solid rgba(243,227,166,.4);box-shadow:0 4px 14px rgba(0,0,0,.16)}.pr-gate-marker.is-open{background:#fff;color:#111;border-color:rgba(0,0,0,.18)}.pr-horse-marker{width:38px;height:38px;border-radius:999px;background:#fff;border:2px solid rgba(23,19,15,.25);box-shadow:0 6px 18px rgba(0,0,0,.18);display:grid;place-items:center;font-size:20px;font-weight:900}.pr-horse-marker.hearts{color:#a11f35}.pr-horse-marker.diamonds{color:#b76b00}.pr-horse-marker.clubs{color:#245b2a}.pr-horse-marker.spades{color:#1c2f5c}.pr-track-meta{display:grid;gap:10px}.pr-card-row,.pr-gate-grid,.pr-horse-grid{display:flex;flex-wrap:wrap;gap:8px}.pr-card-chip,.pr-gate-chip,.pr-horse-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:800}.pr-gate-chip span,.pr-horse-chip span{font-weight:700;color:var(--muted)}.pr-gate-chip.is-open{background:rgba(154,130,65,.12)}input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line)}@media(max-width:980px){.grid{grid-template-columns:1fr}.pr-horse-marker{width:30px;height:30px;font-size:16px}.pr-gate-marker{min-width:24px;height:24px;font-size:10px}}</style></head><body><div class="page"><div class="top"><div><div class="small">Server-authoritative race</div><h1 style="margin:8px 0 0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em">Paardenrace live</h1></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn secondary" href="./paardenrace.html">Lobby</a><button class="btn secondary" id="refreshBtn" type="button">Refresh</button></div></div><div class="grid"><section class="panel"><div id="boardBox"></div><div class="status" id="statusBox"></div><div class="small" id="metaBox"></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button class="btn" id="drawBtn" type="button">Trek volgende kaart</button><button class="btn secondary" id="tickBtn" type="button">Tick countdown</button><button class="btn secondary" id="resetBtn" type="button">Nieuwe ronde resetten</button></div><div class="summary" id="playersBox" style="margin-top:14px"></div></section><section class="panel"><h2 style="margin-top:0">Race / nominaties</h2><div id="phaseBox" class="log"></div><div id="nomBox" style="margin-top:14px;display:none"><h3 style="margin:0 0 8px">Verdeel jouw nominaties</h3><div class="small">Je moet exact je volledige budget verdelen over andere spelers. Niet over jezelf.</div><div id="allocRows" style="margin-top:10px"></div><div class="status" id="nomStatus"></div><button class="btn" id="submitNomBtn" type="button" style="margin-top:10px">Nominaties opslaan</button></div></section></div></div><div class="site-credit-watermark" data-version-watermark>v439 · Made by Bruis</div><script>(()=>{ const api = window.GEJAST_PAARDENRACE; const $=(id)=>document.getElementById(id); function qRoom(){ return new URLSearchParams(location.search).get('room') || api.getStoredRoomCode() || ''; } function setStatus(msg=''){ $('statusBox').textContent = msg; } function apply(state){ const room=state?.room||{}; const match=state?.match||null; const viewer=state?.viewer||{}; const players=Array.isArray(state?.players)?state.players:[]; if(room.room_code) api.setStoredRoomCode(room.room_code); $('metaBox').textContent = `${room.room_code || '—'} · Fase: ${room.stage_label || room.stage || 'lobby'}${room.countdown_remaining_seconds?` · Countdown ${room.countdown_remaining_seconds}s`:''}`; $('boardBox').innerHTML = match ? api.renderBoard(match) : '<div class="small">Nog geen actieve race.</div>'; $('drawBtn').disabled = !(room.can_draw && room.stage==='race'); $('tickBtn').disabled = room.stage !== 'countdown'; $('resetBtn').disabled = !(room.stage==='finished' && viewer.is_host); $('playersBox').innerHTML = players.map((p)=>`<div class="player-row"><div><strong>${p.player_name}</strong><div class="small">${api.suitLabel(p.selected_suit)} · inzet ${p.wager_bakken||0} · totaal ${p.total_bakken_owed||0}</div></div><div>${p.is_host?'<span class="chip">Host</span>':''}${p.is_winner?'<span class="chip">Winner</span>':''}</div></div>`).join('') || '<div class="small">Nog geen spelers.</div>'; const phase=[]; if(match){ phase.push(`<div class="log-item">Laatste trek: <strong>${match.last_draw_card || '—'}</strong></div>`); if(Array.isArray(match.revealed_draw_cards) && match.revealed_draw_cards.length) phase.push(`<div class="log-item">Getrokken kaarten: ${match.revealed_draw_cards.join(', ')}</div>`); if(Array.isArray(match.gate_events) && match.gate_events.length) phase.push(...match.gate_events.map((e)=>`<div class="log-item">Gate ${e.gate_no}: ${api.suitLabel(e.suit)} ging -1</div>`)); if(match.first_finish_suit) phase.push(`<div class="log-item">Eerste crossing ooit: ${api.suitLabel(match.first_finish_suit)}</div>`); if(match.winner_suit) phase.push(`<div class="log-item">Winnende suit: <strong>${api.suitLabel(match.winner_suit)}</strong></div>`); } if(room.stage==='finished' && state.result_summary){ const rows = Array.isArray(state.result_summary.per_player) ? state.result_summary.per_player : []; phase.push(`<div class="log-item"><strong>Eindstand</strong><br>${rows.map((r)=>`${r.player_name}: ${r.total_bakken_owed} Bakken`).join('<br>')}</div>`); } $('phaseBox').innerHTML = phase.join('') || '<div class="small">Wacht op countdown of race.</div>'; const myBudget = Number(viewer.nomination_budget_bakken || 0); const canNom = room.stage==='nominations' && viewer.can_nominate; $('nomBox').style.display = canNom ? '' : 'none'; if(canNom){ const others = players.filter((p)=>String(p.player_name||'').toLowerCase() !== String(viewer.player_name||'').toLowerCase()); $('allocRows').innerHTML = `<div class="small">Jouw budget: ${myBudget} Bakken</div>` + others.map((p)=>`<div class="alloc-row"><div>${p.player_name}</div><input type="number" min="0" step="1" value="0" data-target="${encodeURIComponent(p.player_name)}"></div>`).join(''); $('nomStatus').textContent=''; } } async function load(){ const code=qRoom(); if(!code) return setStatus('Geen roomcode gevonden.'); try{ apply(await api.rpc('tick_paardenrace_room_safe',{ room_code_input: code })); }catch(err){ setStatus(err.message || 'Kon state niet laden.'); } } $('refreshBtn').addEventListener('click', load); $('tickBtn').addEventListener('click', async()=>{ try{ apply(await api.rpc('tick_paardenrace_room_safe',{ room_code_input: qRoom() })); setStatus('Countdown/state geüpdatet.'); }catch(err){ setStatus(err.message || 'Tick mislukt.'); }}); $('drawBtn').addEventListener('click', async()=>{ try{ apply(await api.rpc('draw_paardenrace_card_safe',{ room_code_input: qRoom() })); setStatus('Kaart getrokken.'); }catch(err){ setStatus(err.message || 'Trekken mislukt.'); }}); $('resetBtn').addEventListener('click', async()=>{ try{ apply(await api.rpc('reset_paardenrace_room_safe',{ room_code_input: qRoom() })); setStatus('Room is gereset voor een nieuwe ronde.'); }catch(err){ setStatus(err.message || 'Reset mislukt.'); }}); $('submitNomBtn').addEventListener('click', async()=>{ try{ const allocations = Array.from(document.querySelectorAll('#allocRows input[data-target]')).map((node)=>({ target_player_name: decodeURIComponent(node.dataset.target||''), bakken: Number(node.value||0) })).filter((row)=>row.bakken>0); apply(await api.rpc('submit_paardenrace_nominations_safe',{ room_code_input: qRoom(), allocations_input: allocations })); $('nomStatus').textContent='Nominaties opgeslagen.'; }catch(err){ $('nomStatus').textContent = err.message || 'Nomineren mislukt.'; } }); load(); setInterval(load, 2500); })();</script></body></html>
