<!DOCTYPE html>
<html lang="nl">
<head>
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
<meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boerenbridge live</title>
  <script>window.GEJAST_PAGE_VERSION='v330';</script>
  <script src="./gejast-config.js?v330"></script>
  <style>
    :root{--paper:#fbf6ef;--line:rgba(0,0,0,.08);--muted:#6b6257;--ink:#201b16}
    *{box-sizing:border-box}
    body{margin:0;padding:18px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(240,235,226,.94),rgba(240,235,226,.96)),url('./site-bg-desktop.webp') center/cover fixed;color:var(--ink)}
    .wrap{max-width:1020px;margin:0 auto}.card{background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:22px;box-shadow:0 20px 40px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}
    .muted{color:var(--muted)}.panel{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}.totals{display:grid;gap:10px}.row{display:grid;grid-template-columns:minmax(0,1fr) repeat(3,auto);gap:12px;align-items:center;padding:12px;border-radius:16px;background:#fbfaf6;border:1px solid rgba(0,0,0,.06)}.round{padding:12px 0;border-top:1px solid rgba(0,0,0,.06)}.round:first-child{border-top:none}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}
    @media(max-width:720px){body{padding:12px}.row{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <a class="btn" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</a>
          <h1 style="margin:16px 0 6px">Boerenbridge live</h1>
          <div id="meta" class="muted">Live scoreblad wordt geladen…</div>
        </div>
        <a class="btn" href="./index.html">Home</a>
      </div>
      <div class="panel"><h2 style="margin:0 0 8px">Samenvatting</h2><div id="recap" class="muted">Nog geen tekst.</div></div>
      <div class="panel"><h2 style="margin:0 0 8px">Totaalstand</h2><div id="totals" class="totals">Nog geen spelers.</div></div>
      <div class="panel"><h2 style="margin:0 0 8px">Rondes</h2><div id="rounds" class="muted">Nog geen rondes geregistreerd.</div></div>
    </div>
  </div>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
  (()=>{
    const cfg=window.GEJAST_CONFIG||{};
    const url=cfg.SUPABASE_URL||'';
    const key=cfg.SUPABASE_PUBLISHABLE_KEY||'';
    const matchRef=new URLSearchParams(location.search).get('match_ref')||'';
    function headers(){return{apikey:key,Authorization:`Bearer ${key}`,'Content-Type':'application/json',Accept:'application/json'}}
    async function parse(res){const t=await res.text(); let d=null; try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)} if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d}
    function esc(v){return String(v??'').replace(/[&<>"]/g,(m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function render(data){
      const item=data?.item||data||{};
      const summary=item.summary||item.summary_payload||{};
      const rounds=Array.isArray(summary.rounds)?summary.rounds:[];
      const totals=Array.isArray(summary.totals)?summary.totals:[];
      document.getElementById('meta').textContent=item.finished_at?`Afgerond op ${new Date(item.finished_at).toLocaleString('nl-NL')}`:`Live bijgewerkt om ${new Date(item.updated_at||Date.now()).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
      document.getElementById('recap').textContent=summary.recap_text||'Nog geen samenvatting.';
      document.getElementById('totals').innerHTML=totals.length?totals.map((r)=>`<div class="row"><strong>${esc(r.name)}</strong><span>${Number(r.final_total_points||0)} ptn</span><span>${Number(r.total_slagen||0)} slagen</span><span>${Number(r.exact_bid_count||0)} exact</span></div>`).join(''):'Nog geen spelers.';
      document.getElementById('rounds').innerHTML=rounds.length?rounds.map((r,idx)=>`<div class="round"><strong>Ronde ${esc(r.round_no||r.round||idx+1)}</strong><div class="muted">${Array.isArray(r.players)?r.players.map((p)=>`${esc(p.name)} ${Number(p.running_total||0)} totaal`).join(' · '):''}</div></div>`).join(''):'Nog geen rondes geregistreerd.';
    }
    async function load(){
      if(!matchRef){ document.getElementById('meta').textContent='Geen match_ref meegegeven.'; return; }
      try{
        const res=await fetch(`${url}/rest/v1/rpc/get_live_match_summary_public`,{method:'POST',headers:headers(),body:JSON.stringify({game_type_input:'boerenbridge',match_ref_input:matchRef})});
        render(await parse(res));
      }catch(err){ document.getElementById('meta').textContent=err.message||'Laden mislukt.'; }
    }
    load();
    setInterval(load,5000);
  })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
