<!DOCTYPE html><html lang='nl'><head><meta charset='UTF-8'/><meta name='robots' content='noindex,nofollow'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>Boerenbridge LIVE</title><script>window.GEJAST_PAGE_VERSION='v322';</script><script src='./gejast-config.js?v322'></script><script defer src='./gejast-home-gate.js'></script><style>
    :root{--paper:rgba(255,255,255,.95);--ink:#17130f;--muted:#6d665b;--line:rgba(0,0,0,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.86),rgba(247,244,238,.86)),url('./wordtergejast.png') center/cover fixed no-repeat;}
    .page{max-width:1200px;margin:0 auto;padding:18px 14px 90px}.shell{background:rgba(255,251,245,.9);border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.10)}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;text-decoration:none;border:1px solid rgba(0,0,0,.08);background:#fff;color:#111;padding:10px 14px;font-weight:800}
    .live-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.08em;border:1px solid rgba(216,44,44,.28);background:rgba(255,236,236,.95);color:#7e1111}.live-pill::before{content:'';width:9px;height:9px;border-radius:50%;background:#d82c2c;animation:livePulse 1.2s infinite}
    @keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(216,44,44,.35)}70%{box-shadow:0 0 0 10px rgba(216,44,44,0)}100%{box-shadow:0 0 0 0 rgba(216,44,44,0)}}
    .hero h1{margin:0;font-size:clamp(1.8rem,4vw,2.8rem);letter-spacing:-.04em}.muted{color:var(--muted)}
    .grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.05)} .card h3{margin:0 0 8px;font-size:18px}.meta{font-size:13px;color:var(--muted);line-height:1.5}
    .score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px}.score-box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.score-box .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}.score-box .value{margin-top:6px;font-size:28px;font-weight:900}
    .table-wrap{overflow:auto;background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:10px} table{width:100%;border-collapse:collapse;min-width:980px} th,td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.06);text-align:left;vertical-align:top} th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)} tr:last-child td{border-bottom:0} .list-link{display:block;margin-top:12px;color:inherit;text-decoration:none;font-weight:800}
</style></head><body><main class='page'><section class='shell hero'><div class='topbar'><div class='nav'><a class='pill' id='backHome' href='./index.html'>← Home</a><a class='pill' href='./boerenbridge.html'>Boerenbridge invoeren</a></div><div class='live-pill'>LIVE</div></div><h1>Boerenbridge LIVE</h1><p class='muted'>Volg lopende boerenbridgepotjes live mee, zonder invoervelden of bewerkknoppen.</p><div id='status' class='meta' style='margin-top:10px'></div></section><section class='shell' style='margin-top:14px'><div id='content' class='grid'></div></section></main><div class='site-credit-watermark' data-version-watermark></div><script>(function(){const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const qs=new URLSearchParams(location.search);const scope=qs.get('scope')==='family'||(location.pathname||'').includes('/familie/')?'family':'friends';const clientMatchId=qs.get('client_match_id')||'';const statusEl=document.getElementById('status');const content=document.getElementById('content');if(scope==='family')document.getElementById('backHome').href='./index.html?scope=family';function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}function token(){return cfg.getPlayerSessionToken?cfg.getPlayerSessionToken():''}function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function norm(v){return String(v||'').trim().toLowerCase()}function currentPlayerName(){return String((document.getElementById('playerSessionCornerName')||{}).textContent||'').trim()}async function parseResponse(res){const txt=await res.text();let data=null;try{data=txt?JSON.parse(txt):null}catch(_){throw new Error(txt||`HTTP ${res.status}`)}if(!res.ok)throw new Error(data?.message||data?.error||`HTTP ${res.status}`);return data}async function loadMatches(){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_live_match_summaries_scoped`,{method:'POST',mode:'cors',cache:'no-store',headers:headers(),body:JSON.stringify({session_token:token(),game_type_input:'boerenbridge',site_scope_input:scope,client_match_id_input:clientMatchId||null})});const raw=await parseResponse(res);const payload=raw?.get_live_match_summaries_scoped||raw||{};return { viewer_name:String(payload?.viewer_name||''), matches:Array.isArray(payload?.matches)?payload.matches:(Array.isArray(payload)?payload:[]) }}function participantNames(match){const p=match?.participants||match?.summary_payload?.participants||[];return Array.isArray(p)?p.map(x=>String(x||'').trim()).filter(Boolean):[]}function hostName(match){return String(match?.summary_payload?.submitter_meta?.submitted_by_name||'').trim()}function buildMatchLink(id){const u=new URL('./boerenbridge_live.html',location.href);u.searchParams.set('client_match_id',id);if(scope==='family')u.searchParams.set('scope','family');return u.pathname.split('/').pop()+u.search}function renderList(matches){if(!matches.length){content.innerHTML='<div class="card"><h3>Geen live boerenbridgepotjes</h3><div class="meta">Zodra een lopend scoreformulier betekenisvolle data heeft, verschijnt het hier automatisch.</div></div>';return}content.innerHTML=`<div class="grid cards">${matches.map(match=>`<article class="card"><h3>${esc((participantNames(match).join(' · '))||'Lopend potje')}</h3><div class="meta">Match: ${esc(match.client_match_id||'—')}<br>Host: ${esc(hostName(match)||'onbekend')}<br>Laatst bijgewerkt: ${esc(match.updated_at||match.created_at||'—')}</div><a class="list-link" href="${buildMatchLink(match.client_match_id)}">Bekijk live scoreformulier →</a></article>`).join('')}</div>`}function renderMatch(match){const payload=match?.summary_payload||{};const live=payload.live_state||payload.raw_payload||{};const participants=participantNames(match);const rounds=Array.isArray(live.rounds)?live.rounds:(Array.isArray(payload.rounds)?payload.rounds:[]);const totals=Array.isArray(payload.totals)?payload.totals:[];const totalCards=(totals.length?totals:participants.map(name=>({name,final_total_points:'—',exact_bid_count:'—',total_slagen:'—'})));const cols=participants.map(name=>`<th>${esc(name)}</th>`).join('');const bodyRows=rounds.length?rounds.map(round=>`<tr><td>${esc(round.label||'—')}</td>${participants.map(name=>{const p=(Array.isArray(round.players)?round.players:[]).find(row=>String(row.name||'')===name)||{};return `<td><div><strong>Bod:</strong> ${esc(p.bid??'—')}</div><div><strong>Gewonnen:</strong> ${esc(p.won??'—')}</div><div><strong>Punten:</strong> ${esc(p.points??'—')}</div><div><strong>Totaal:</strong> ${esc(p.running_total??'—')}</div></td>`}).join('')}</tr>`).join(''):'<tr><td colspan="99">Nog geen gespeelde rondes.</td></tr>';content.innerHTML=`<div class="card"><h3>${esc(participants.join(' · ')||'Boerenbridge LIVE')}</h3><div class="meta">Match: ${esc(match.client_match_id||'—')} · Host: ${esc(hostName(match)||'onbekend')} · Laatste update: ${esc(match.updated_at||match.created_at||'—')}</div><div class="score-grid">${totalCards.map(row=>`<div class="score-box"><div class="label">${esc(row.name||'Speler')}</div><div class="value">${esc(row.final_total_points??'—')}</div><div class="meta">${esc(row.exact_bid_count??'—')} exact · ${esc(row.total_slagen??'—')} slagen</div></div>`).join('')}</div></div><div class="table-wrap"><table><thead><tr><th>Ronde</th>${cols}</tr></thead><tbody>${bodyRows}</tbody></table></div>`}async function load(){try{const payload=await loadMatches();const matches=payload.matches||[];const myName=String(payload.viewer_name||'').trim()||currentPlayerName();if(!clientMatchId&&myName){const mine=matches.find(match=>participantNames(match).map(norm).includes(norm(myName))&&norm(hostName(match))!==norm(myName));if(mine?.client_match_id){location.replace(buildMatchLink(mine.client_match_id));return}}statusEl.textContent=`${matches.length} live boerenbridgepot${matches.length===1?'':'jes'} gevonden.`;if(clientMatchId){const match=matches.find(m=>String(m.client_match_id||'')===clientMatchId);if(match||matches[0])renderMatch(match||matches[0]);else content.innerHTML='<div class="card"><h3>Potje niet gevonden</h3><div class="meta">Dit live scoreformulier is niet meer actief.</div></div>'}else renderList(matches)}catch(err){statusEl.textContent=err.message||'Kon live scoreformulier niet laden.';content.innerHTML='<div class="card"><h3>Live laden mislukt</h3><div class="meta">Probeer het zo nog eens.</div></div>'}}load();setInterval(load,6000)})();</script><script id='gejast-version-sync-inline'>(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel()}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true})}else{sync()}})();</script></body></html>
