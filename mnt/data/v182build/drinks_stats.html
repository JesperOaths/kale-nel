<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><title>Drink statistieken</title><script>window.GEJAST_PAGE_VERSION='v638';</script><script src="./gejast-config.js?v638"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover fixed;color:#201b16}.wrap{max-width:1280px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.logo{width:64px;height:64px}.grid{display:grid;gap:18px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.metric,.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:8px}.metric .value{font-size:1.7rem;font-weight:900}.split{grid-template-columns:1fr 1fr;margin-top:18px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.muted{color:var(--muted)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:900px){.metrics,.split{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./drinks.html';}">Terug</a><a class="btn" href="./drinks.html">Drinks</a><a class="btn alt" href="./drinks_speed.html">Speed</a></div><h1 style="margin:0 0 8px;font-size:42px">Drink statistieken</h1><div class="muted">Ladders, types, grootste avonden en verificatiegedrag.</div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div><div class="grid metrics" id="metrics"></div><div class="grid split"><section class="panel"><h2 style="margin:0 0 12px">Top op units</h2><div id="topUnits" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Top op aantal</h2><div id="topCount" class="list"></div></section></div><div class="grid split"><section class="panel"><h2 style="margin:0 0 12px">Per dranktype</h2><div id="byType" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Grootste avonden</h2><div id="bigNights" class="list"></div></section></div><div class="grid split"><section class="panel"><h2 style="margin:0 0 12px">Top verifiers</h2><div id="topVerifiers" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Fairness</h2><div id="fairness" class="list"></div></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';function h(){return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}}async function p(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function list(el,rows,fmt){el.innerHTML=(rows||[]).length?rows.map(fmt).join(''):'<div class="muted">Nog geen data.</div>'}async function load(){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drinks_stats_public`,{method:'POST',headers:h(),body:'{}'});const raw=await p(res);const data=raw?.get_drinks_stats_public||raw||{};document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">All-time drankjes</div><div class="value">${data.totals?.all_events||0}</div></div><div class="metric"><div class="label">All-time units</div><div class="value">${Number(data.totals?.all_units||0).toFixed(1)}</div></div><div class="metric"><div class="label">Deze maand</div><div class="value">${data.totals?.month_events||0}</div></div><div class="metric"><div class="label">Open verificaties</div><div class="value">${data.totals?.pending_events||0}</div></div>`;list(document.getElementById('topUnits'),data.top_units,(r,i)=>`<div class="row"><div><strong><a href="./drinks_player.html?player=${encodeURIComponent(r.player_name||'')}" style="text-decoration:none;color:#111">${r.player_name}</a></strong><div class="muted">${r.events} drankjes</div></div><div><strong>${Number(r.units||0).toFixed(1)}</strong></div></div>`);list(document.getElementById('topCount'),data.top_count,(r,i)=>`<div class="row"><div><strong><a href="./drinks_player.html?player=${encodeURIComponent(r.player_name||'')}" style="text-decoration:none;color:#111">${r.player_name}</a></strong><div class="muted">${Number(r.units||0).toFixed(1)} units</div></div><div><strong>${r.events}</strong></div></div>`);list(document.getElementById('byType'),data.by_type,(r)=>`<div class="row"><div><strong>${r.label}</strong><div class="muted">${r.events} drankjes</div></div><div><strong>${Number(r.units||0).toFixed(1)}</strong></div></div>`);list(document.getElementById('bigNights'),data.big_nights,(r)=>`<div class="row"><div><strong><a href="./drinks_player.html?player=${encodeURIComponent(r.player_name||'')}" style="text-decoration:none;color:#111">${r.player_name}</a></strong><div class="muted">${new Date(r.night_at).toLocaleDateString('nl-NL')}</div></div><div><strong>${Number(r.units||0).toFixed(1)}</strong></div></div>`);list(document.getElementById('topVerifiers'),data.top_verifiers,(r)=>`<div class="row"><div><strong>${r.player_name}</strong></div><div><strong>${r.verifications}</strong></div></div>`);list(document.getElementById('fairness'),data.fairness,(r)=>`<div class="row"><div><strong>${r.label}</strong></div><div><strong>${r.value}</strong></div></div>`)}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
