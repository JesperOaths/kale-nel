<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Drinks audit</title><script>window.GEJAST_PAGE_VERSION='v353';</script><script src="./gejast-config.js?v353"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover fixed;color:#201b16}.wrap{max-width:1280px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.logo{width:64px;height:64px}.grid{display:grid;gap:18px}.split{grid-template-columns:1fr 1fr;margin-top:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.muted{color:var(--muted)}@media(max-width:900px){.split{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="./admin.html">Adminhub</a><a class="btn" href="./drinks.html">Drinks</a></div><h1 style="margin:0 0 8px;font-size:42px">Drinks audit</h1><div class="muted">Flags, verdachte patronen en moderatie.</div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div><div class="grid split"><section class="panel"><h2 style="margin:0 0 12px">Flags</h2><div id="flags" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Verdachte pairs</h2><div id="pairs" class="list"></div></section></div><div class="grid split"><section class="panel"><h2 style="margin:0 0 12px">Recente events</h2><div id="events" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Moderatie</h2><div id="moderation" class="list"><div class="muted">Gebruik de knoppen in de eventlijst.</div></div></section></div></div></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const ADMIN_KEYS=['jas_admin_session_v8'];function adminToken(){for(const k of ADMIN_KEYS){const v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v) return v;} return '';}function h(){return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}}async function p(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function list(el,rows,fmt){el.innerHTML=(rows||[]).length?rows.map(fmt).join(''):'<div class="muted">Nog geen data.</div>'}async function setStatus(id,status){await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_update_drink_event_status`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken(),drink_event_id:Number(id),new_status:status})});await load();}async function load(){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drinks_admin_audit`,{method:'POST',headers:h(),body:JSON.stringify({admin_session_token:adminToken()})});const raw=await p(res);const data=raw?.get_drinks_admin_audit||raw||{};list(document.getElementById('flags'),data.flags,(r)=>`<div class="row"><div><strong>${r.flag_type}</strong><div class="muted">${r.details_text||'—'}</div></div><div class="muted">${new Date(r.created_at).toLocaleString('nl-NL')}</div></div>`);list(document.getElementById('pairs'),data.suspicious_pairs,(r)=>`<div class="row"><div><strong>${r.submitter} ⇄ ${r.verifier}</strong><div class="muted">${r.count} keer</div></div></div>`);list(document.getElementById('events'),data.recent_events,(r)=>`<div class="row"><div><strong>${r.player_name} · ${r.event_type_label}</strong><div class="muted">${r.status} · ${new Date(r.created_at).toLocaleString('nl-NL')}</div></div><div style="display:flex;gap:8px"><button class="btn alt" onclick="(${setStatus.toString()})(${r.id},'verified')">Force verify</button><button class="btn alt" onclick="(${setStatus.toString()})(${r.id},'rejected')">Reject</button></div></div>`)}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
