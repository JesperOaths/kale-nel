<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Drinks speed</title><script src="./gejast-config.js?v182"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover fixed;color:#201b16}.wrap{max-width:1240px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:none;cursor:pointer}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.logo{width:64px;height:64px}.grid{display:grid;gap:18px}.types{grid-template-columns:repeat(2,minmax(0,1fr));margin-top:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.muted{color:var(--muted)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:900px){.types{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./drinks.html';}">Terug</a><a class="btn" href="./drinks.html">Drinks</a></div><h1 style="margin:0 0 8px;font-size:42px">Speed</h1><div class="muted">Adje- en literrecords met IRL verificatie.</div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div><div class="grid types"><section class="panel"><h2 style="margin:0 0 12px">Nieuwe poging</h2><div style="display:grid;gap:10px"><select id="speedType" style="padding:12px;border-radius:14px;border:1px solid var(--line);font:inherit"><option value="adje">Adje</option><option value="liter_bier">Liter bier</option></select><input id="speedSeconds" type="number" step="0.1" min="0.1" placeholder="Tijd in seconden" style="padding:12px;border-radius:14px;border:1px solid var(--line);font:inherit"><button id="submitSpeed" class="btn" type="button">Poging loggen</button><div id="speedStatus" class="muted"></div></div></section><section class="panel"><h2 style="margin:0 0 12px">Verifieer in de buurt</h2><div id="speedVerifyQueue" class="list"><div class="muted">Nog geen speed-verificaties.</div></div></section></div><div class="grid types"><section class="panel"><h2 style="margin:0 0 12px">Snelste all-time</h2><div id="speedTop" class="list"></div></section><section class="panel"><h2 style="margin:0 0 12px">Mijn recente pogingen</h2><div id="speedMine" class="list"></div></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const SESSION_KEYS=['jas_session_token_v11','jas_session_token_v10'];let lastPos=null;function token(){for(const k of SESSION_KEYS){const v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v) return v;} return '';}function h(){return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}}async function p(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function pos(){return new Promise((resolve,reject)=>{if(!navigator.geolocation){reject(new Error('Geolocatie niet beschikbaar.'));return;}navigator.geolocation.getCurrentPosition(r=>resolve(r),()=>reject(new Error('Geolocatie nodig voor speed.')),{enableHighAccuracy:true,timeout:10000,maximumAge:60000});});}function list(el,rows,fmt){el.innerHTML=(rows||[]).length?rows.map(fmt).join(''):'<div class="muted">Nog geen data.</div>'}async function load(){const pp=await pos();lastPos=pp;const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drink_speed_page_public`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),viewer_lat:pp.coords.latitude,viewer_lng:pp.coords.longitude})});const raw=await p(res);const data=raw?.get_drink_speed_page_public||raw||{};list(document.getElementById('speedTop'),data.top_attempts,(r)=>`<div class="row"><div><strong>${r.player_name} · ${r.speed_type_label}</strong></div><div><strong>${Number(r.duration_seconds).toFixed(1)}s</strong></div></div>`);list(document.getElementById('speedMine'),data.my_attempts,(r)=>`<div class="row"><div><strong>${r.speed_type_label}</strong><div class="muted">${r.status}</div></div><div><strong>${Number(r.duration_seconds).toFixed(1)}s</strong></div></div>`);list(document.getElementById('speedVerifyQueue'),data.verify_queue,(r)=>`<div class="row"><div><strong>${r.player_name} · ${r.speed_type_label}</strong><div class="muted">${Number(r.duration_seconds).toFixed(1)}s · ${Math.round(r.distance_m||0)}m</div></div><div><button class="btn" data-speed-verify="${r.id}">Bevestigen</button></div></div>`);document.querySelectorAll('[data-speed-verify]').forEach(btn=>btn.addEventListener('click',()=>verify(btn.getAttribute('data-speed-verify'))));}
async function submit(){try{const pp=lastPos||await pos();const type=document.getElementById('speedType').value;const seconds=Number(document.getElementById('speedSeconds').value||0);if(!(seconds>0)) throw new Error('Vul een geldige tijd in');const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_drink_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),speed_type_key:type,duration_seconds:seconds,lat:pp.coords.latitude,lng:pp.coords.longitude,accuracy:pp.coords.accuracy})});await p(res);document.getElementById('speedStatus').textContent='Poging opgeslagen en wacht op verificatie.';await load();}catch(err){document.getElementById('speedStatus').textContent=err.message||String(err);}}
async function verify(id){try{const pp=lastPos||await pos();const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_drink_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),attempt_id:Number(id),lat:pp.coords.latitude,lng:pp.coords.longitude,accuracy:pp.coords.accuracy})});await p(res);await load();}catch(err){document.getElementById('speedStatus').textContent=err.message||String(err);}}
document.getElementById('submitSpeed').addEventListener('click',submit);load();setInterval(load,30000);})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
