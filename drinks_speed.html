<!DOCTYPE html>
<html lang="nl">
<head>
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snelheid</title>
  <script>window.GEJAST_PAGE_VERSION='v365';</script>
  <script src="./gejast-config.js?v365"></script><script src="./gejast-clickable-cards.js?v365"></script><script src="./gejast-scope-context.js?v365"></script>
  <style>
    :root{
      --line:rgba(0,0,0,.09);
      --line-strong:rgba(0,0,0,.14);
      --muted:#6b6257;
      --paper:rgba(255,251,245,.84);
      --panel:#fffdf9;
      --gold:#9a8241;
      --gold-soft:#e8d8ad;
      --gold-border:#b39147;
      --ink:#16120e;
      --ink-soft:#2b241d;
      --good:#587d4d;
      --good-bg:#d5ddd2;
      --bad:#8a665e;
      --bad-bg:#ded2cb;
      --pending-bg:#f1e4bb;
      --pending-border:#b39147;
      --pending-text:#5f4615;
      --verify-bg:#d9e5d4;
      --verify-border:#6f8a63;
      --verify-text:#33482d;
      --recent-bg:#dbe4eb;
      --recent-border:#6b8293;
      --recent-text:#314351;
      --pending-item-bg:#6f4f14;
      --pending-item-border:#b39147;
      --pending-item-text:#fff7df;
      --verify-item-bg:#476047;
      --verify-item-border:#7fa06e;
      --verify-item-text:#f4fbef;
      --recent-item-bg:#455b68;
      --recent-item-border:#8ba3b5;
      --recent-item-text:#f6fbff;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:10px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.92),rgba(244,240,232,.94)),url('./site-bg-mobile.webp') center/cover fixed;color:var(--ink)}
    .wrap{max-width:760px;margin:0 auto}
    .card{background:var(--paper);border:1px solid rgba(255,255,255,.72);border-radius:26px;padding:14px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:nowrap}.topbar .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}.topbar .top-actions:first-child{flex:1 1 auto;min-width:0}.topbar .top-actions.right{margin-left:0}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .top-actions.right{margin-left:auto;gap:10px}
    .btn,.geo-btn,.speed-btn,.action-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font:800 1rem/1 Inter,system-ui,sans-serif;text-decoration:none;cursor:pointer}
    .btn{min-height:44px;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.08);background:#111;color:#fff}
    .btn.alt{background:#f3efe6;color:#111}
    .btn.gold{background:var(--gold);color:#111}
    .logo{width:52px;height:52px;object-fit:contain;flex:0 0 auto}
    .geo-btn{min-width:68px;min-height:68px;padding:0;border-radius:999px;border:1px solid rgba(138,102,94,.22);background:var(--bad-bg);color:var(--bad);box-shadow:0 10px 22px rgba(0,0,0,.07);margin-right:18px;transition:background .18s ease,color .18s ease,border-color .18s ease,transform .1s ease,box-shadow .18s ease}
    .geo-btn svg{width:42px;height:42px;display:block;stroke:currentColor;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    .geo-btn.is-ready{background:var(--good-bg);color:var(--good);border-color:rgba(88,112,79,.24)}
    .geo-btn:active,.speed-btn:active,.action-btn:active{transform:translateY(1px)}
    .speed-types{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(3,auto);grid-auto-flow:column;gap:10px;margin-bottom:12px}
    .speed-btn{display:grid;gap:4px;padding:16px 14px;border-radius:22px;border:1px solid var(--line-strong);min-height:92px;text-align:left;align-content:center;box-shadow:0 8px 20px rgba(0,0,0,.05);background:#fff}
    .speed-btn strong{font-size:1.05rem;line-height:1.15}
    .speed-btn small{font-size:.9rem;opacity:.92}
    .speed-btn.gold{background:var(--gold-soft);border-color:var(--gold-border);color:#17120d}
    .speed-btn.dark{background:var(--ink-soft);border-color:#241c15;color:#fff}
    .speed-btn.active{outline:3px solid rgba(154,130,65,.24)}
    .entry-card,.panel,.stats-card,.geo-card{border-radius:20px;padding:14px 14px 12px;border:1px solid var(--line-strong);box-shadow:0 10px 24px rgba(0,0,0,.04)}
    .entry-card{background:#f9f5ee;margin-bottom:12px}
    .entry-card h2,.panel h2{margin:0 0 10px;font-size:1.05rem;line-height:1.15}
    .entry-grid{display:grid;gap:10px}
    .entry-grid input{width:100%;padding:14px 15px;border-radius:16px;border:1px solid var(--line);font:inherit;background:#fff}
    .status{min-height:20px;margin:2px 2px 0;font-weight:800;font-size:.95rem}
    .status.bad{color:var(--bad)}
    .status.ok{color:var(--good)}
    .stack{display:grid;gap:12px}
    .panel.pending{background:var(--pending-bg);border-color:var(--pending-border);color:var(--pending-text)}
    .panel.verify{background:var(--verify-bg);border-color:var(--verify-border);color:var(--verify-text)}
    .panel.recent{background:var(--recent-bg);border-color:var(--recent-border);color:var(--recent-text)}
    .panel .muted,.panel .meta{color:inherit;opacity:.9}
    .list{display:grid;gap:10px}
    .row{border-radius:18px;padding:12px 13px}
    .panel.pending .row{background:var(--pending-item-bg);border:1px solid var(--pending-item-border);color:var(--pending-item-text)}
    .panel.verify .row{background:var(--verify-item-bg);border:1px solid var(--verify-item-border);color:var(--verify-item-text)}
    .panel.recent .row{background:var(--recent-item-bg);border:1px solid var(--recent-item-border);color:var(--recent-item-text)}
    .row-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .action-btn{padding:10px 12px;border-radius:14px;border:0}
    .action-btn.cancel{background:#fff2d4;color:#24180d}
    .action-btn.verify{background:#eef8e7;color:#22351d}
    .pill{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:inherit}
    .bottom-block{display:grid;gap:12px;margin-top:14px}
    .stats-card,.geo-card{background:#f9f5ee;border-color:var(--line)}
    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .metric{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px 11px;min-height:84px;display:flex;flex-direction:column;justify-content:space-between}
    .metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:10px}
    .metric .value{font-size:1.12rem;font-weight:900;line-height:1;margin-top:auto}
    .geo-copy{display:grid;gap:4px;font-size:.88rem;color:var(--muted)}
    .geo-copy strong{color:var(--ink)}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;z-index:9999;padding:7px 12px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 12px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}
    @media (max-width:700px){body{padding:8px}.card{padding:12px}.topbar{gap:8px}.topbar .top-actions{gap:6px}.btn{min-height:42px;padding:10px 12px;font-size:.92rem;min-width:0}.geo-btn{min-width:64px;min-height:64px;padding:0}.stats-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.metric .value{font-size:.96rem}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div class="top-actions">
          <a class="btn alt" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./drinks.html';}">Terug</a>
          <a class="btn alt" href="./drinks.html">Overzicht</a>
        </div>
        <div class="top-actions right gejast-corner-tools">
          <a href="./index.html" class="gejast-logo-chip"><img class="logo" src="./logo.png" alt="Logo" /></a>
        </div>
      </div>

      <div class="speed-types" id="speedTypeButtons"></div>

      <section class="entry-card">
        <h2>Nieuwe snelheidspoging</h2>
        <div class="entry-grid">
          <input id="speedSeconds" type="number" step="0.1" min="0.1" placeholder="Tijd in seconden" />
          <button id="submitSpeed" class="btn gold" type="button">Snelheidspoging indienen</button>
          <div class="status" id="speedFormStatus"></div>
        </div>
      </section>

      <div class="status" id="speedStatus"></div>

      <div class="stack">
        <section class="panel pending"><h2>Mijn pending / recente pogingen</h2><div id="speedMine" class="list"></div></section>
        <section class="panel verify" data-route="./drinks_pending.html" role="link" tabindex="0" aria-label="Ga naar verificaties" style="cursor:pointer"><h2>Alle user requests</h2><div id="speedVerifyQueue" class="list"></div></section>
        <section class="panel recent" data-route="./drinks_pending.html" role="link" tabindex="0" aria-label="Ga naar verificaties" style="cursor:pointer"><h2>Snelste all-time</h2><div id="speedTop" class="list"></div></section>
      </div>

      <div class="bottom-block">
        <section class="stats-card"><div class="stats-grid" id="sessionGrid"></div></section>
        <section class="geo-card"><div class="geo-copy"><strong>Locatie en verificatie</strong><div id="geoMetaLine">Locatie niet actief.</div><div id="geoAddressLine">Verifiëren en afstandschecks werken pas met locatie. Invoeren blijft mogelijk met een verse locatielezing.</div></div></section>
      </div>
    </div>
  </div>
  <div class="site-credit-watermark" data-version-watermark>v365 · Made by Bruis</div>
  <script src="./gejast-geo.js?v365"></script><script src="./drinks-verify-float.js?v365"></script><script src="./gejast-drinks-workflow.js?v365"></script>
  <script>
  if(window.GEJAST_CONFIG && !window.GEJAST_CONFIG.requireMatchEntrySession('drinks_speed')){}
  (function(){
    const cfg=window.GEJAST_CONFIG||{};
    const scopeCtx = window.GEJAST_SCOPE_CONTEXT || { getPlayerSessionToken: ()=>((window.GEJAST_CONFIG&&window.GEJAST_CONFIG.getPlayerSessionToken&&window.GEJAST_CONFIG.getPlayerSessionToken())||''), getScope: ()=>((window.GEJAST_SCOPE_UTILS&&window.GEJAST_SCOPE_UTILS.getScope&&window.GEJAST_SCOPE_UTILS.getScope())||'friends'), pagePath: ()=>((location.pathname||'').split('/').pop()||'index.html') };
    const SUPABASE_URL=cfg.SUPABASE_URL||'';
    const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';
    let lastPos=null;
    let currentType='bier';
    let latestSpeedCombined=null;
    const FALLBACK_TYPES=(window.GEJAST_DRINKS_WORKFLOW&&window.GEJAST_DRINKS_WORKFLOW.CANONICAL_SPEED_TYPES)||[
      {key:'bier',label:'1 Bak'},{key:'2bakken',label:'2 Bakken'},{key:'liter_bier',label:'Liter Bier'},{key:'ice',label:'Ice'},{key:'wijnfles',label:'Fles Wijn'}
    ];
    const ORDER=['bier','2bakken','liter_bier','ice','wijnfles'];
    function token(){ return scopeCtx.getPlayerSessionToken(); }
    function h(){ return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}; }
    async function p(res){ const t=await res.text(); let d=null; try{ d=t?JSON.parse(t):null; }catch{ throw new Error(t||`HTTP ${res.status}`);} if(!res.ok) throw new Error(d?.message||d?.error||d?.hint||`HTTP ${res.status}`); return d; }
    function setStatus(msg='',tone=''){ const el=document.getElementById('speedStatus'); el.textContent=msg; el.className=`status ${tone}`.trim(); }
    function setFormStatus(msg='',tone=''){ const el=document.getElementById('speedFormStatus'); el.textContent=msg; el.className=`status ${tone}`.trim(); }
    function setGeoButtonState(ready){ try{ window.GEJAST_GEO && window.GEJAST_GEO.setButtonState && window.GEJAST_GEO.setButtonState(!!ready); }catch(_){} }
    async function getPosition(forceFresh=false,userInitiated=false){ const geo=window.GEJAST_GEO; if(!geo) throw new Error('Geolocatie helper ontbreekt.'); const pos=await geo.ensure(forceFresh,{silent:!userInitiated&&!forceFresh}); if(pos) geo.startWatch(); return pos||lastPos||geo.cached(60*60*1000); }
    async function updateGeoInfo(pos){ const geo=window.GEJAST_GEO; const meta=document.getElementById('geoMetaLine'); const addr=document.getElementById('geoAddressLine'); if(!pos){ setGeoButtonState(false); meta.textContent='Locatie niet actief.'; addr.textContent='Verifiëren en afstandschecks werken pas met locatie. Invoeren blijft mogelijk met een verse locatielezing.'; return; } setGeoButtonState(true); meta.textContent=`Locatie actief · ${geo && geo.formatCoords ? geo.formatCoords(pos) : `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`}`; const address=geo && geo.reverseGeocode ? await geo.reverseGeocode(pos.coords.latitude,pos.coords.longitude) : ''; addr.textContent=address || 'Adres onbekend'; }
    function fillButtons(rows){ const host=document.getElementById('speedTypeButtons'); const types=((rows||[]).filter((row)=>String(row.key||'').toLowerCase()!=='shot').length ? rows.filter((row)=>String(row.key||'').toLowerCase()!=='shot') : FALLBACK_TYPES).sort((a,b)=>{ const ai=ORDER.indexOf(a.key); const bi=ORDER.indexOf(b.key); return (ai===-1?999:ai)-(bi===-1?999:bi); }); if(!currentType || !types.find((row)=>row.key===currentType)) currentType=(types[0]&&types[0].key)||'bier'; host.innerHTML=types.map((row,idx)=>`<button type="button" class="speed-btn ${(idx%2===0)?'gold':'dark'} ${row.key===currentType?'active':''}" data-speed-type="${row.key}"><strong>${row.label||row.key}</strong><small>Beste tijd per eenheid</small></button>`).join(''); host.querySelectorAll('[data-speed-type]').forEach((btn)=>btn.addEventListener('click',()=>{ currentType=btn.getAttribute('data-speed-type'); fillButtons(types); if(latestSpeedCombined){ renderSpeedData(latestSpeedCombined); } })); }
    function renderList(el,rows,fmt,empty='Nog geen data.'){ el.innerHTML=(rows||[]).length ? rows.map(fmt).join('') : `<div class="muted">${empty}</div>`; }
    function renderSession(data){ const top=(data.top_attempts||[]); const mine=(data.my_attempts||[]); const verify=(data.verify_queue||[]); document.getElementById('sessionGrid').innerHTML=`<div class="metric"><div class="label">Top tijden</div><div class="value">${top.length}</div></div><div class="metric"><div class="label">Open checks</div><div class="value">${verify.length}</div></div><div class="metric"><div class="label">Mijn pogingen</div><div class="value">${mine.length}</div></div>`; }
    function renderSpeedData(combined){
      latestSpeedCombined = combined || latestSpeedCombined || {};
      const data=Object.assign({}, latestSpeedCombined?.speed_page||{});
      if(Array.isArray(latestSpeedCombined?.speed_leaderboards)){ const active=(latestSpeedCombined.speed_leaderboards||[]).find((g)=>String(g.key||g.speed_type_key||'')===String(currentType||'')); if(active){ data.top_attempts = Array.isArray(active.rows) ? active.rows : []; } }
      renderSession(data);
      renderList(document.getElementById('speedTop'), data.top_attempts, (r)=>`<div class="row"><div class="row-top"><div><strong>${r.player_name} · ${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${Number(r.duration_seconds||0).toFixed(1)}s</div></div><span class="pill">top</span></div></div>`, 'Nog geen snelheden.');
      renderList(document.getElementById('speedMine'), data.my_attempts, (r)=>`<div class="row"><div class="row-top"><div><strong>${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${(r.status||'pending')} · ${new Date(r.created_at||Date.now()).toLocaleString('nl-NL')}</div></div><span class="pill">${Number(r.duration_seconds||0).toFixed(1)}s</span></div><div class="row-actions">${(r.status||'')==='pending' ? `<button class="action-btn cancel" data-cancel-speed="${r.id}">Annuleren</button>` : ''}</div></div>`, 'Nog geen eigen pogingen.');
      document.querySelectorAll('[data-cancel-speed]').forEach((btn)=>btn.addEventListener('click',()=>cancelMine(btn.getAttribute('data-cancel-speed'))));
      renderList(document.getElementById('speedVerifyQueue'), data.verify_queue, (r)=>`<div class="row"><div class="row-top"><div><strong>${r.player_name} · ${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${Number(r.duration_seconds||0).toFixed(1)}s${r.distance_m!=null?` · ${Math.round(r.distance_m)}m afstand`:''}</div></div><span class="pill">check</span></div><div class="row-actions"><button class="action-btn verify" data-speed-verify="${r.id}">Bevestigen</button></div></div>`, 'Nog geen speed-verificaties.');
      document.querySelectorAll('[data-speed-verify]').forEach((btn)=>btn.addEventListener('click',()=>verify(btn.getAttribute('data-speed-verify'))));
    }

    async function load(forceFresh=false,userInitiated=false){ try{ if(window.GEJAST_CONFIG && !window.GEJAST_CONFIG.ensurePlayerSessionOrRedirect('drinks_speed')) return; const pos=(forceFresh||!lastPos)?await getPosition(forceFresh,userInitiated):lastPos; if(pos) lastPos=pos; await updateGeoInfo(lastPos||pos||null); const payload={session_token:token(),viewer_lat:lastPos?lastPos.coords.latitude:null,viewer_lng:lastPos?lastPos.coords.longitude:null}; const workflow = window.GEJAST_DRINKS_WORKFLOW; const combined = workflow ? await workflow.forSpeed(Object.assign({ history_limit: 20 }, payload)) : null; const eventTypes=combined?.eventTypes||[]; fillButtons(eventTypes); renderSpeedData({ speed_page: combined?.speedPage||{}, speed_leaderboards: combined?.speedLeaderboards||[] }); document.querySelectorAll('[data-route]').forEach(el=>{el.onclick=(ev)=>{if(ev.target.closest('button,a,input,select,textarea')) return; window.location.href=el.getAttribute('data-route');}; el.onkeydown=(ev)=>{ if(ev.target.closest('button,a,input,select,textarea')) return; if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); window.location.href=el.getAttribute('data-route'); } };}); setStatus(''); }catch(err){ setStatus(err.message||String(err),'bad'); if(!lastPos) setGeoButtonState(false); } }
    async function submit(){ try{ const pos=await getPosition(true,true); if(pos) lastPos=pos; await updateGeoInfo(lastPos||pos||null); const usePos=lastPos||pos; if(!usePos) throw new Error('Geolocatie is nodig voor snelheid.'); const seconds=Number(document.getElementById('speedSeconds').value||0); if(!(seconds>0)) throw new Error('Vul een geldige tijd in.'); const workflow=window.GEJAST_DRINKS_WORKFLOW; if(workflow && workflow.createSpeedAttempt){ await workflow.createSpeedAttempt({ session_token:token(), event_type_key:currentType, quantity:1, duration_seconds:seconds, lat:usePos.coords.latitude, lng:usePos.coords.longitude, accuracy:usePos.coords.accuracy }); } else { await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_combined_drink_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),event_type_key:currentType,quantity:1,duration_seconds:seconds,lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy})}).then(p); } document.getElementById('speedSeconds').value=''; setFormStatus('Snelheidspoging opgeslagen.','ok'); await load(false,false); }catch(err){ setFormStatus(err.message||String(err),'bad'); } }
    async function verify(id){ try{ const pos=await getPosition(true,true); if(pos) lastPos=pos; const usePos=lastPos||pos; if(!usePos) throw new Error('Geolocatie is nodig om te bevestigen.'); const workflow=window.GEJAST_DRINKS_WORKFLOW; if(workflow && workflow.verifySpeedAttempt){ await workflow.verifySpeedAttempt({ session_token:token(), attempt_id:Number(id), lat:usePos.coords.latitude, lng:usePos.coords.longitude, accuracy:usePos.coords.accuracy, approve:true }); } else { await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_drink_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),attempt_id:Number(id),lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy})}).then(p); } setStatus('Snelheidspoging bevestigd.','ok'); await load(false,false); }catch(err){ setStatus(err.message||String(err),'bad'); } }
    async function cancelMine(id){ try{ const workflow=window.GEJAST_DRINKS_WORKFLOW; if(workflow && workflow.cancelSpeedAttempt){ await workflow.cancelSpeedAttempt({ session_token:token(), attempt_id:Number(id) }); } else { await fetch(`${SUPABASE_URL}/rest/v1/rpc/cancel_my_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),attempt_id:Number(id)})}).then(p); } setStatus('Snelheidspoging geannuleerd.','ok'); await load(false,false); }catch(err){ setStatus(err.message||String(err),'bad'); } }
    document.getElementById('submitSpeed').addEventListener('click',submit);
    setGeoButtonState(false);
    load(false,false);
  })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
