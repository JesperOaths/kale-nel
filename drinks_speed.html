    .metric{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px 11px;min-height:84px;display:flex;flex-direction:column;justify-content:space-between}

    @media (max-width:700px){body{padding:8px}.card{padding:12px}.topbar{gap:8px}.topbar .top-actions{gap:6px}.btn{min-height:42px;padding:10px 12px;font-size:.92rem;min-width:0}.geo-btn{min-width:64px;min-height:64px;padding:0}.stats-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.metric .value{font-size:.96rem}}

  <script>
  if(window.GEJAST_CONFIG && !window.GEJAST_CONFIG.requireMatchEntrySession('drinks_speed')){}
  (function(){
    const cfg=window.GEJAST_CONFIG||{};
    const scopeCtx = window.GEJAST_SCOPE_CONTEXT || { getPlayerSessionToken: ()=>((window.GEJAST_CONFIG&&window.GEJAST_CONFIG.getPlayerSessionToken&&window.GEJAST_CONFIG.getPlayerSessionToken())||''), getScope: ()=>((window.GEJAST_SCOPE_UTILS&&window.GEJAST_SCOPE_UTILS.getScope&&window.GEJAST_SCOPE_UTILS.getScope())||'friends'), pagePath: ()=>((location.pathname||'').split('/').pop()||'index.html') };
    const SUPABASE_URL=cfg.SUPABASE_URL||'';
    const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';
    let lastPos=null; let submittingSpeed=false;
    let currentType='';
    let latestSpeedCombined=null;
    const FALLBACK_TYPES=[
      {key:'bier',label:'1 Bak'},{key:'2bakken',label:'2 Bakken'},{key:'liter_bier',label:'Liter Bier'},{key:'ice',label:'Ice'},{key:'wijnfles',label:'Fles Wijn'}
    ];
    const ORDER=['bier','2bakken','liter_bier','ice','wijnfles'];
    function token(){ return scopeCtx.getPlayerSessionToken(); }
    function h(){ return {'Content-Type':'application/json',apikey:KEY,Authorization:`Bearer ${KEY}`,Accept:'application/json'}; }
    async function p(res){ const t=await res.text(); let d=null; try{ d=t?JSON.parse(t):null; }catch{ throw new Error(t||`HTTP ${res.status}`);} if(!res.ok) throw new Error(d?.message||d?.error||d?.hint||`HTTP ${res.status}`); return d; }
    async function rpcWithTimeout(name, body, timeoutMs=1600){
      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      const timer = controller ? setTimeout(()=>controller.abort(), timeoutMs) : null;
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{
          method:'POST',
          headers:h(),
          body:JSON.stringify(body || {}),
          signal:controller ? controller.signal : undefined
        });
        return await p(res);
      }finally{
        if(timer) clearTimeout(timer);
      }
    }
    const esc=(s)=>String(s??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    function setStatus(msg='',tone=''){ const el=document.getElementById('speedStatus'); el.textContent=msg; el.className=`status ${tone}`.trim(); }
    function setFormStatus(msg='',tone=''){ const el=document.getElementById('speedFormStatus'); el.textContent=msg; el.className=`status ${tone}`.trim(); }
    function humanizeError(err){
      const msg=String(err?.message||err||'Onbekende fout');
      if(/record "new" has no field/i.test(msg)) return '';
      if(/could not choose the best candidate function/i.test(msg)) return 'Snelheidspoging botst nog met dubbele backend-functies.';
      if(/getPlayerSessionToken/i.test(msg) && /CTX is undefined/i.test(msg)) return 'De sessiehelper ontbrak tijdelijk.';
      return msg;
    }
    async function loadSpeedDataLegacy(payload){
      const speedState = await rpcWithTimeout('get_drink_speed_page_public', payload, 1100).then((value)=>({ok:true,value})).catch((error)=>({ok:false,error}));
      const speedRaw = speedState.ok ? speedState.value : {};
      const speedPage = speedRaw?.get_drink_speed_page_public || speedRaw || {};
      return {
        eventTypes: FALLBACK_TYPES,
        speedPage,
        speedLeaderboards: Array.isArray(speedPage.speed_leaderboards) ? speedPage.speed_leaderboards : []
      };
    }
    function currentTypeLabel(){
      const match = FALLBACK_TYPES.find((row)=>String(row.key||'')===String(currentType||''));
      return match?.label || currentType || 'dranktype';
    }
    function refreshSubmitState(){
      const input=document.getElementById('speedSeconds');
      const button=document.getElementById('submitSpeed');
      const seconds=Number(input?.value||0);
      const ready=!!currentType && seconds>0;
      if(button){
        button.disabled=!ready;
        button.setAttribute('aria-disabled', ready ? 'false' : 'true');
      }
      if(!currentType) setFormStatus('Kies eerst een drankje.');
      else if(!(seconds>0)) setFormStatus('Vul daarna een tijd in seconden in.');
      else setFormStatus(`Klaar om ${currentTypeLabel()} in te dienen.`, 'ok');
    }
    function setGeoButtonState(ready){ try{ window.GEJAST_GEO && window.GEJAST_GEO.setButtonState && window.GEJAST_GEO.setButtonState(!!ready); }catch(_){} }
    async function getPosition(forceFresh=false,userInitiated=false){ const geo=window.GEJAST_GEO; if(!geo) throw new Error('Geolocatie helper ontbreekt.'); const pos=await geo.ensure(forceFresh,{silent:!userInitiated&&!forceFresh}); if(pos) geo.startWatch(); return pos||lastPos||geo.cached(60*60*1000); }
    async function updateGeoInfo(pos){ const geo=window.GEJAST_GEO; const meta=document.getElementById('geoMetaLine'); const addr=document.getElementById('geoAddressLine'); if(!pos){ setGeoButtonState(false); meta.textContent='Locatie niet actief.'; addr.textContent='Verifiëren en afstandschecks werken pas met locatie. Invoeren blijft mogelijk met een verse locatielezing.'; return; } setGeoButtonState(true); meta.textContent=`Locatie actief · ${geo && geo.formatCoords ? geo.formatCoords(pos) : `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`}`; const address=geo && geo.reverseGeocode ? await geo.reverseGeocode(pos.coords.latitude,pos.coords.longitude) : ''; addr.textContent=address || 'Adres onbekend'; }
    function fillButtons(rows){ const host=document.getElementById('speedTypeButtons'); const allowed=(rows||[]).filter((row)=>{ const key=String(row.key||'').toLowerCase(); return key && !['shot','drydock','dry_dock'].includes(key); }); const types=(allowed.length ? allowed : FALLBACK_TYPES).sort((a,b)=>{ const ai=ORDER.indexOf(a.key); const bi=ORDER.indexOf(b.key); return (ai===-1?999:ai)-(bi===-1?999:bi); }); if(currentType && !types.find((row)=>row.key===currentType)) currentType=''; host.innerHTML=types.map((row,idx)=>`<button type="button" class="speed-btn ${(idx%2===0)?'gold':'dark'} ${row.key===currentType?'active':''}" data-speed-type="${row.key}" aria-pressed="${row.key===currentType?'true':'false'}"><strong>${row.label||row.key}</strong><small>${row.key===currentType?'Geselecteerd voor je poging':'Beste tijd per eenheid'}</small></button>`).join(''); host.querySelectorAll('[data-speed-type]').forEach((btn)=>btn.addEventListener('click',()=>{ currentType=btn.getAttribute('data-speed-type'); fillButtons(types); if(latestSpeedCombined){ renderSpeedData(latestSpeedCombined); } refreshSubmitState(); })); refreshSubmitState(); }
    function renderList(el,rows,fmt,empty='Nog geen data.'){ el.innerHTML=(rows||[]).length ? rows.map(fmt).join('') : `<div class="muted">${empty}</div>`; }

    function getLandingState(){ const q=new URLSearchParams(location.search||''); return { requestId:String(q.get('request_id')||'').trim(), requestKind:String(q.get('request_kind')||'').trim(), actionStatus:String(q.get('action_status')||'').trim(), traceId:String(q.get('trace_id')||'').trim(), actionReason:String(q.get('action_reason')||'').trim() }; }
    function applyLandingState(){ const state=getLandingState(); const el=document.getElementById('landingStatus'); if(!el||!state.requestId) return; let msg=''; if(state.actionStatus==='verified') msg='Verificatie is via de melding verwerkt.'; else if(state.actionStatus==='rejected') msg='Afkeuring is via de melding verwerkt.'; else if(state.actionStatus==='failed') msg=`Directe actie lukte niet${state.actionReason?` (${state.actionReason})`:''}. Rond het handmatig af als het verzoek nog open staat.`; else msg='Geopend vanuit een melding.'; if(state.traceId) msg += ` Trace: ${state.traceId}.`; el.textContent=msg; const row=document.querySelector(`[data-request-id="${CSS.escape(state.requestId)}"]`); if(row){ row.style.outline='3px solid rgba(183,155,86,.85)'; row.style.outlineOffset='2px'; row.scrollIntoView({behavior:'smooth', block:'center'}); } }
    function renderSession(data){ const top=(data.top_attempts||[]); const mine=(data.my_attempts||[]); const verify=(data.verify_queue||[]); document.getElementById('sessionGrid').innerHTML=`<div class="metric"><div class="label">Top tijden</div><div class="value">${top.length}</div></div><div class="metric"><div class="label">Open checks</div><div class="value">${verify.length}</div></div><div class="metric"><div class="label">Mijn pogingen</div><div class="value">${mine.length}</div></div>`; }
    function renderSpeedData(combined){
      latestSpeedCombined = combined || latestSpeedCombined || {};
      const data=Object.assign({}, latestSpeedCombined?.speed_page||{});
      if(Array.isArray(latestSpeedCombined?.speed_leaderboards)){ const active=(latestSpeedCombined.speed_leaderboards||[]).find((g)=>String(g.key||g.speed_type_key||'')===String(currentType||'')); if(active){ const rows=Array.isArray(active.rows) ? active.rows : []; data.top_attempts = rows.filter((r)=>{ const status=String(r?.status||'').toLowerCase(); return status==='verified' || !!r?.verified_at || !!r?.verified_by; }); } }
      renderSession(data);
      renderList(document.getElementById('speedTop'), data.top_attempts, (r)=>`<div class="row" data-request-id="${esc(r.id)}"><div class="row-top"><div><strong>${r.player_name} · ${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${Number(r.duration_seconds||0).toFixed(1)}s</div></div><span class="pill">top</span></div></div>`, 'Nog geen snelheden.');
      renderList(document.getElementById('speedMine'), data.my_attempts, (r)=>`<div class="row"><div class="row-top"><div><strong>${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${(r.status||'pending')} · ${new Date(r.created_at||Date.now()).toLocaleString('nl-NL')}</div></div><span class="pill">${Number(r.duration_seconds||0).toFixed(1)}s</span></div><div class="row-actions">${(r.status||'')==='pending' ? `<button class="action-btn cancel" data-cancel-speed="${r.id}">Annuleren</button>` : ''}</div></div>`, 'Nog geen eigen pogingen.');
      document.querySelectorAll('[data-cancel-speed]').forEach((btn)=>btn.addEventListener('click',()=>cancelMine(btn.getAttribute('data-cancel-speed'))));
      renderList(document.getElementById('speedVerifyQueue'), data.verify_queue, (r)=>`<div class="row" data-request-id="${esc(r.id)}"><div class="row-top"><div><strong>${r.player_name} · ${r.speed_type_label||r.speed_type_key}</strong><div class="meta">${Number(r.duration_seconds||0).toFixed(1)}s${r.distance_m!=null?` · ${Math.round(r.distance_m)}m afstand`:''}</div></div><span class="pill">check</span></div><div class="row-actions"><button class="action-btn verify" data-speed-verify="${r.id}">Bevestigen</button></div></div>`, 'Nog geen speed-verificaties.');
      document.querySelectorAll('[data-speed-verify]').forEach((btn)=>btn.addEventListener('click',()=>verify(btn.getAttribute('data-speed-verify'))));
    }

    async function load(forceFresh=false,userInitiated=false){ try{ if(window.GEJAST_CONFIG && !window.GEJAST_CONFIG.ensurePlayerSessionOrRedirect('drinks_speed')) return; const pos=(forceFresh||!lastPos)?await getPosition(forceFresh,userInitiated).catch(()=>lastPos):lastPos; if(pos) lastPos=pos; await updateGeoInfo(lastPos||pos||null); const payload={session_token:token(),viewer_lat:lastPos?lastPos.coords.latitude:null,viewer_lng:lastPos?lastPos.coords.longitude:null}; let combined; if(window.GEJAST_DRINKS_WORKFLOW && typeof window.GEJAST_DRINKS_WORKFLOW.forSpeed==='function'){ try{ combined = await window.GEJAST_DRINKS_WORKFLOW.forSpeed(payload); }catch(_){ combined = await loadSpeedDataLegacy(payload); } } else { combined = await loadSpeedDataLegacy(payload); } const eventTypes=(combined?.eventTypes||[]); fillButtons(eventTypes.length?eventTypes:FALLBACK_TYPES); renderSpeedData({ speed_page: combined?.speedPage||combined?.speed_page||{}, speed_leaderboards: combined?.speedLeaderboards||combined?.speed_leaderboards||[] }); document.querySelectorAll('[data-route]').forEach(el=>{el.onclick=(ev)=>{if(ev.target.closest('button,a,input,select,textarea')) return; window.location.href=el.getAttribute('data-route');}; el.onkeydown=(ev)=>{ if(ev.target.closest('button,a,input,select,textarea')) return; if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); window.location.href=el.getAttribute('data-route'); } };}); setStatus(''); applyLandingState(); }catch(err){ try{ fillButtons(FALLBACK_TYPES); renderSpeedData({speed_page:{top_attempts:[],my_attempts:[],verify_queue:[]}, speed_leaderboards:[]}); }catch(_){} setStatus(''); if(!lastPos) setGeoButtonState(false); } }
    async function submit(){ try{ if(submittingSpeed) return; submittingSpeed=true; setFormStatus('Snelheidspoging wordt toegevoegd...'); const pos=lastPos || await getPosition(false,true); if(pos) lastPos=pos; updateGeoInfo(lastPos||pos||null).catch(()=>{}); const usePos=lastPos||pos; if(!usePos) throw new Error('Geolocatie is nodig voor snelheid.'); const seconds=Number(document.getElementById('speedSeconds').value||0); if(!currentType) throw new Error('Kies eerst een drankje.'); if(!(seconds>0)) throw new Error('Vul een geldige tijd in.'); if(window.GEJAST_DRINKS_WORKFLOW && typeof window.GEJAST_DRINKS_WORKFLOW.createSpeedAttempt==='function'){ await window.GEJAST_DRINKS_WORKFLOW.createSpeedAttempt({session_token:token(),event_type_key:currentType,quantity:1,duration_seconds:seconds,lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy}); } else { await rpcWithTimeout('create_combined_drink_speed_attempt',{session_token:token(),event_type_key:currentType,quantity:1,duration_seconds:seconds,lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy},8000); } document.getElementById('speedSeconds').value=''; currentType=''; fillButtons(FALLBACK_TYPES); document.getElementById('submitSpeed').disabled=true; setFormStatus('Snelheidspoging opgeslagen.','ok'); setTimeout(()=>{ load(false,false).catch(()=>{}); }, 40); }catch(err){ setFormStatus(humanizeError(err) || String(err?.message||err||'Snelheidspoging mislukt.'),'bad'); } finally{ submittingSpeed=false; } }
    async function verify(id){ try{ const pos=await getPosition(true,true); if(pos) lastPos=pos; const usePos=lastPos||pos; if(!usePos) throw new Error('Geolocatie is nodig om te bevestigen.'); await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_drink_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),attempt_id:Number(id),lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy})}).then(p); setStatus('Snelheidspoging bevestigd.','ok'); await load(false,false); }catch(err){ setStatus(humanizeError(err),'bad'); } }
    async function cancelMine(id){ try{ await fetch(`${SUPABASE_URL}/rest/v1/rpc/cancel_my_speed_attempt`,{method:'POST',headers:h(),body:JSON.stringify({session_token:token(),attempt_id:Number(id)})}).then(p); setStatus('Snelheidspoging geannuleerd.','ok'); await load(false,false); }catch(err){ setStatus(humanizeError(err),'bad'); } }
    document.getElementById('submitSpeed').addEventListener('click',submit);
    document.getElementById('speedSeconds').addEventListener('input',refreshSubmitState);
    setGeoButtonState(false);
    refreshSubmitState();
    load(false,false);
  })();
  </script>
