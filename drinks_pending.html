  <style>

    *{box-sizing:border-box} body{margin:0;padding:10px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.92),rgba(244,240,232,.94)),url('./site-bg-mobile.webp') center/cover fixed;color:var(--ink)} .wrap{max-width:760px;margin:0 auto}.card{background:var(--paper);border:1px solid rgba(255,255,255,.72);border-radius:26px;padding:14px;box-shadow:0 20px 50px rgba(0,0,0,.08)} .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.top-actions{display:flex;gap:8px;align-items:center}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.08);font:800 1rem/1 Inter,system-ui,sans-serif;text-decoration:none;cursor:pointer;background:#f3efe6;color:#111}.logo{width:52px;height:52px;object-fit:contain}.stack{display:grid;gap:12px}.panel{border-radius:20px;padding:14px 14px 12px;border:1px solid var(--line-strong);box-shadow:0 10px 24px rgba(0,0,0,.04)}.panel.pending{background:var(--pending-bg);border-color:var(--pending-border);color:var(--pending-text)}.panel.verify{background:var(--verify-bg);border-color:var(--verify-border);color:var(--verify-text)}.list{display:grid;gap:10px}.row,.verify-card{border-radius:18px;padding:12px 13px}.panel.pending .row{background:var(--pending-item-bg);border:1px solid var(--pending-item-border);color:var(--pending-item-text)}.panel.verify .verify-card{background:var(--verify-item-bg);border:1px solid var(--verify-item-border);color:var(--verify-item-text)}.row-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.action-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 12px;border-radius:14px;border:0;font:800 .95rem/1 Inter,system-ui,sans-serif;cursor:pointer}.action-btn.cancel{background:#201915;color:#fff}.action-btn.verify{background:#eef8e7;color:#22351d}.pill{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:inherit}.status{min-height:20px;margin:2px 2px 0;font-weight:800;font-size:.95rem}.status.bad{color:#8d5f54}.status.ok{color:#587d4d}.meta{opacity:.92}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;z-index:9999;padding:7px 12px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 12px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}

<div class="wrap"><div class="card">

  <div class="status" id="statusLine"></div>
  <div class="stack"><section class="panel verify"><h2>Pending verificaties in de buurt</h2><div id="verifyQueue" class="list"></div></section><section class="panel pending"><h2>Mijn pending aanvragen</h2><div id="pendingList" class="list"></div></section></div>
</div></div>

<script src="./gejast-geo.js?v321"></script>
<script>
(function(){
 const CONFIG=window.GEJAST_CONFIG||{}; const SUPABASE_URL=CONFIG.SUPABASE_URL||''; const SUPABASE_KEY=CONFIG.SUPABASE_PUBLISHABLE_KEY||''; let lastPosition=null; function token(){return CONFIG.getPlayerSessionToken?CONFIG.getPlayerSessionToken():'';} function headers(){return {'Content-Type':'application/json',apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,Accept:'application/json'};} async function parse(res){const t=await res.text(); let d=null; try{d=t?JSON.parse(t):null;}catch(_){throw new Error(t||`HTTP ${res.status}`);} if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d;} function setStatus(msg='',tone=''){const el=document.getElementById('statusLine'); el.textContent=msg; el.className=`status ${tone}`.trim();}
 function renderList(el, rows, make, empty){el.innerHTML=(rows||[]).length?(rows||[]).map(make).join(''):`<div class="meta">${empty}</div>`;}
 async function load(){try{ if(CONFIG.ensurePlayerSessionOrRedirect && !CONFIG.ensurePlayerSessionOrRedirect('drinks_pending')) return; const geo=window.GEJAST_GEO; const pos=geo&&geo.cached?geo.cached():null; if(pos) lastPosition=pos; const payload={session_token:token(),viewer_lat:lastPosition?lastPosition.coords.latitude:null,viewer_lng:lastPosition?lastPosition.coords.longitude:null}; const [verifyRaw,mineRaw]=await Promise.all([fetch(`${SUPABASE_URL}/rest/v1/rpc/get_all_pending_drink_event_verifications_public`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token()})}).then(parse),fetch(`${SUPABASE_URL}/rest/v1/rpc/get_my_pending_drink_requests_public`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token()})}).then(parse)]); const verify=verifyRaw?.get_all_pending_drink_event_verifications_public||verifyRaw||[]; const mine=mineRaw?.get_my_pending_drink_requests_public||mineRaw||[]; renderList(document.getElementById('verifyQueue'),verify,(r)=>`<div class="verify-card"><div class="row-top"><div><strong>${r.player_name||'Onbekend'} · ${r.event_type_label||r.event_type_key||'Drankje'}</strong><div class="meta">${Number(r.total_units||0).toFixed(1)} units${r.distance_m!=null?` · ${Math.round(r.distance_m)}m afstand`:''}</div></div><span class="pill">check</span></div><div class="row-actions">${!r.viewer_vote_state?`<button class="action-btn verify" data-verify-id="${r.id}">Bevestigen</button><button class="action-btn cancel" data-reject-id="${r.id}">Afkeuren</button>`:`<span class="meta">Jij stemde al: ${r.viewer_vote_state==='approved'?'voor':'tegen'}</span>`}</div></div>`,'Nog geen verificaties in de buurt.'); renderList(document.getElementById('pendingList'),mine,(r)=>`<div class="row"><div class="row-top"><div><strong>${r.event_type_label||r.event_type_key||'Drankje'}</strong><div class="meta">${new Date(r.created_at||Date.now()).toLocaleString('nl-NL')} · ${Number(r.total_units||0).toFixed(1)} units</div></div><span class="pill">${r.status||'pending'}</span></div><div class="row-actions"><button class="action-btn cancel" data-cancel-id="${r.id}">Annuleren</button></div></div>`,'Nog geen pending aanvragen.'); document.querySelectorAll('[data-cancel-id]').forEach(btn=>btn.onclick=()=>cancelMine(btn.getAttribute('data-cancel-id'))); document.querySelectorAll('[data-verify-id]').forEach(btn=>btn.onclick=()=>verify(btn.getAttribute('data-verify-id'),true)); document.querySelectorAll('[data-reject-id]').forEach(btn=>btn.onclick=()=>verify(btn.getAttribute('data-reject-id'),false)); setStatus(''); }catch(err){setStatus(err.message||String(err),'bad');}}
 async function verify(id,approve){try{ const geo=window.GEJAST_GEO; const pos=geo?await geo.request(true):null; if(pos) lastPosition=pos; const usePos=lastPosition||pos; if(!usePos) throw new Error('Geolocatie is nodig om te bevestigen.'); await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_drink_event`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:Number(id),lat:usePos.coords.latitude,lng:usePos.coords.longitude,accuracy:usePos.coords.accuracy,approve:!!approve})}).then(parse); setStatus(approve?'Drankje bevestigd.':'Drankje afgekeurd.','ok'); await load(); }catch(err){setStatus(err.message||String(err),'bad');}}
 async function cancelMine(id){try{ await fetch(`${SUPABASE_URL}/rest/v1/rpc/cancel_my_pending_drink_event`,{method:'POST',headers:headers(),body:JSON.stringify({session_token:token(),drink_event_id:Number(id)})}).then(parse); setStatus('Aanvraag geannuleerd.','ok'); await load(); }catch(err){setStatus(err.message||String(err),'bad');}}
 load();
})();
</script>
