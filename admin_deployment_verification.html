<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Deployment Verification - GEJAST</title>
  <script>window.GEJAST_PAGE_VERSION='v705';</script>
  <script src="./gejast-config.js?v705"></script>
  <script src="./admin-session-sync.js?v705"></script>
  <script src="./gejast-deployment-verification.js?v705"></script>
  <style>
    :root{--gold:#9a8241;--card:#fffdf8;--line:rgba(0,0,0,.08);--muted:#6b6257;--ok:#1f6d43;--warn:#8b3a30;--ink:#191714}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(rgba(245,239,230,.94),rgba(245,239,230,.96)),url('./site-bg-desktop.webp') center/cover fixed;font-family:Inter,system-ui,sans-serif;color:var(--ink);padding:22px}
    .wrap{max-width:1100px;margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:0 18px 44px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.logo{width:48px;height:auto}h1{margin:0;font-size:32px;letter-spacing:-.04em}.sub{margin:8px 0 0;color:var(--muted);max-width:72ch;line-height:1.45}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:999px;background:#111;color:#fff;font-weight:900;padding:11px 15px;cursor:pointer;text-decoration:none}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}.btn.gold{background:var(--gold);color:#111}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.panel h2{margin:0 0 10px;font-size:18px}.status{min-height:22px;margin-top:10px;color:var(--muted)}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid rgba(0,0,0,.06)}.row:first-child{border-top:0}.tag{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.tag.ok{background:rgba(31,109,67,.12);color:var(--ok)}.tag.warn{background:rgba(139,58,48,.12);color:var(--warn)}.tag.wait{background:rgba(0,0,0,.06);color:var(--muted)}pre{white-space:pre-wrap;background:#111;color:#f8efd8;border-radius:16px;padding:14px;overflow:auto;max-height:360px}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}
    @media(max-width:820px){.grid{grid-template-columns:1fr}body{padding:12px}.card{padding:18px}}
  </style>
</head>
<body>
  <main class="wrap card">
    <div class="top"><div><h1>Deployment Verification</h1><p class="sub">v650 control surface for post-upload checks. It does not change gameplay. It records SQL/upload/runtime evidence so later phases do not rely on memory.</p></div><a href="./admin.html"><img class="logo" src="./logo.png" alt="GEJAST" /></a></div>
    <div class="actions"><button class="btn gold" id="runChecksBtn">Run browser checks</button><button class="btn" id="loadServerBtn">Load server audit</button><a class="btn alt" href="./admin_release_readiness.html">Release readiness</a><a class="btn alt" href="./admin.html">Admin hub</a></div>
    <div id="statusBox" class="status">Ready.</div>
    <section class="grid"><div class="panel"><h2>Browser checks</h2><div id="browserChecks"></div></div><div class="panel"><h2>Server audit</h2><div id="serverChecks"></div></div></section>
    <section class="panel" style="margin-top:14px"><h2>Raw output</h2><pre id="rawOutput">No checks run yet.</pre></section>
  </main>
  <div class="site-credit-watermark" data-version-watermark>v650 · Made by Bruis</div>
</body>
</html>
