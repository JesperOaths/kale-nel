<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ranglijst</title><script src="./gejast-config.js?v168"></script>
<style>
:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}
*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}
.wrap{max-width:1280px;margin:0 auto}.card{position:relative;background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}
h1{margin:18px 0 8px;font-size:42px}.muted{color:var(--muted)}.hero{position:relative;min-height:96px;padding-right:92px}.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}.hero-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}.hero-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}.back-btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.brand-link{display:inline-flex;align-items:center;justify-content:center}.brand-link img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.08));cursor:pointer}.live-pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(255,236,236,.95);color:#7e1111;border:1px solid rgba(216,44,44,.28);font-weight:800;gap:8px;align-items:center}.live-pill:before{content:'';width:9px;height:9px;border-radius:50%;background:#d82c2c;animation:pulse 1.2s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,44,44,.65)}70%{box-shadow:0 0 0 8px rgba(216,44,44,0)}100%{box-shadow:0 0 0 0 rgba(216,44,44,0)}}
.nav-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.layout{display:grid;grid-template-columns:1.1fr .95fr;gap:16px;margin-top:16px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line)}.table-title{display:flex;justify-content:space-between;align-items:center;margin:0 0 12px}.table-title h2{margin:0;font-size:1.1rem}table{width:100%;border-collapse:collapse}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55}.rank{width:56px;font-weight:900}.player-link{font-weight:800;color:#201b16;text-decoration:none}.player-link:hover{text-decoration:none}.badge{display:inline-flex;padding:4px 8px;border-radius:999px;background:rgba(212,175,55,.18);font-size:11px;font-weight:800}.empty{padding:18px;border-radius:18px;background:rgba(255,255,255,.72);border:1px dashed var(--line);text-align:center;color:var(--muted)}.stack{display:grid;gap:16px}
.accordion{border:1px solid var(--line);border-radius:18px;background:#fff}.accordion summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:800;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.accordion summary::-webkit-details-marker{display:none}.accordion .detail{padding:0 16px 16px}.meta{color:var(--muted);font-size:.95rem}.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:10px}.mini{background:#fbfaf6;border:1px solid var(--line);border-radius:14px;padding:10px}.mini strong{display:block;font-size:.92rem}.mini span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px}
.graph-shell{display:grid;gap:12px}.graph-legend{display:flex;flex-wrap:wrap;gap:8px}.legend-item{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:#fbfaf6;border:1px solid var(--line);font-size:12px;font-weight:800}.swatch{width:12px;height:12px;border-radius:999px;display:inline-block}.player-toggle{width:18px;height:18px}.chart-box{position:relative;border:1px solid var(--line);border-radius:24px;background:rgba(253,252,248,.96);padding:16px;overflow:auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}.chart-box:before{content:"";position:absolute;inset:0;background:url("./wordtergejast.png") center/52% no-repeat;opacity:.06;pointer-events:none}.chart-svg{position:relative;display:block;width:100%;min-width:780px;height:420px}.axis{stroke:#cfc5b2;stroke-width:1.2}.series-line{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.series-dot{stroke:#fff;stroke-width:2.5}
.insight-grid{display:grid;gap:10px}.insight-row{display:grid;grid-template-columns:1.2fr .7fr .7fr .7fr;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}.insight-row:last-child{border-bottom:none}.insight-head{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800}
.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
@media(max-width:940px){.layout{grid-template-columns:1fr}body{padding:16px}.hero-row{flex-direction:column;align-items:stretch}.hero-right{justify-content:space-between}}
</style></head><body><div class="wrap"><div class="card"><div class="hero"><div class="hero-row"><div class="hero-left"><a class="back-btn" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</a></div><div class="hero-right"><div class="nav-row"><a class="btn" href="./ladder.html?game=klaverjas">Klaverjassen</a><a class="btn" href="./ladder.html?game=boerenbridge">Boerenbridge</a><a class="btn" href="./ladder.html?game=beerpong">Beerpong</a></div><a class="brand-link" href="./index.html" aria-label="Home via logo"><img src="./logo.png" alt="Logo"/></a></div></div></div><h1 id="title">Ranglijst</h1><div class="muted" id="subtitle">Volledige ladder, badges en wedstrijdinzichten.</div><div class="layout"><section class="panel"><div class="table-title"><h2>Ladder</h2><span class="muted" id="countCopy"></span></div><div id="ladderWrap" class="empty">Laden…</div></section><section class="stack"><section class="panel"><h2 style="margin:0 0 12px">ELO-ontwikkeling</h2><div id="graphWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Wedstrijdgeschiedenis</h2><div id="matchesWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px" id="pairsTitle">Eindklassering</h2><div id="pairsWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px" id="matchupsTitle">Biedprecisie</h2><div id="matchupsWrap" class="empty">Laden…</div></section></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div>
<script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const game=(new URLSearchParams(location.search).get('game')||'klaverjas').toLowerCase();const titleMap={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong'};document.getElementById('title').textContent=titleMap[game]||'Ranglijst';
function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_ladder_page)return payload.get_public_ladder_page;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_ladder_page)return payload[0].get_public_ladder_page;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}function pct(v){return `${Number(v||0).toFixed(0)}%`}function nameLink(name){return `<a class="player-link" href="./player.html?player=${encodeURIComponent(name||'')}&game=${encodeURIComponent(game)}">${name||'Onbekend'}</a>`}function nameList(names){return (Array.isArray(names)?names:[]).map((n)=>nameLink(n)).join(' · ')||'—'}function matrixTable(players, rows, type){const names=[...players];const map=new Map();(rows||[]).forEach((r)=>{map.set(`${String(r.player_a).toLowerCase()}|${String(r.player_b).toLowerCase()}`,r);map.set(`${String(r.player_b).toLowerCase()}|${String(r.player_a).toLowerCase()}`,r);});return `<div style="overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff"><table style="min-width:560px"><thead><tr><th></th>${names.map(n=>`<th>${nameLink(n)}</th>`).join('')}</tr></thead><tbody>${names.map(a=>`<tr><th>${nameLink(a)}</th>${names.map(b=>{if(a===b)return '<td style="background:#f2eee4">—</td>'; const r=map.get(`${String(a).toLowerCase()}|${String(b).toLowerCase()}`); if(!r)return '<td>—</td>'; let p=0, sub=''; if(type==='pair'){ if(String(a).toLowerCase()<String(b).toLowerCase()){ p=Number(r.win_pct||0); sub=`${r.wins||0}/${r.games||0}`; } else { p=Number(100-(r.win_pct||0)); sub=`${(r.games||0)-(r.wins||0)}/${r.games||0}`; } } else { if(String(a).toLowerCase()===String(r.player_a).toLowerCase()){ p=Number(r.games? (Number(r.wins_a||0)/Number(r.games))*100 : 0); sub=`${r.wins_a||0}-${r.wins_b||0}`; } else { p=Number(r.games? (Number(r.wins_b||0)/Number(r.games))*100 : 0); sub=`${r.wins_b||0}-${r.wins_a||0}`; } } return `<td><strong>${p.toFixed(0)}%</strong><div class="meta" style="font-size:12px">${sub}</div></td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;}function detailCards(match){const details=(Array.isArray(match.details)?match.details:[]).filter(Boolean); if(!details.length) return '<div class="meta">Geen extra details.</div>'; return `<div class="detail-grid">${details.map(d=>`<div class="mini"><strong>${nameLink(d.player_name||'')}</strong><span>${d.result_label||d.result||''}</span>${d.points!==undefined?`<span>Punten: ${d.points}</span>`:''}${d.rank!==undefined?`<span>Plek: ${d.rank}</span>`:''}${d.team?`<span>Team: ${d.team}</span>`:''}${d.cups_hit!==undefined?`<span>Raak: ${d.cups_hit}</span>`:''}</div>`).join('')}</div>`;}function makeSmoothPath(points,xFn,yFn,xEnd){if(!points.length)return '';const pts=points.map((p,i)=>[xFn(i),yFn(p.y)]);if(points.length===1)return `M ${pts[0][0]} ${pts[0][1]} L ${xEnd} ${pts[0][1]}`;let d=`M ${pts[0][0]} ${pts[0][1]}`;for(let i=0;i<pts.length-1;i++){const [x0,y0]=pts[i];const [x1,y1]=pts[i+1];const midX=(x0+x1)/2;d+=` C ${midX} ${y0}, ${midX} ${y1}, ${x1} ${y1}`;}const [lx,ly]=pts[pts.length-1];if(lx<xEnd)d+=` L ${xEnd} ${ly}`;return d;}async function load(){const ladderWrap=document.getElementById('ladderWrap');const matchesWrap=document.getElementById('matchesWrap');const pairsWrap=document.getElementById('pairsWrap');const matchupsWrap=document.getElementById('matchupsWrap');const graphWrap=document.getElementById('graphWrap');try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_ladder_page`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:game})});const data=unwrap(await parse(res));const ladder=Array.isArray(data.ladder)?data.ladder:[];const matches=Array.isArray(data.recent_matches)?data.recent_matches:[];const pairs=Array.isArray(data.pair_stats)?data.pair_stats:[];const matchups=Array.isArray(data.matchup_stats)?data.matchup_stats:[];const historySeries=Array.isArray(data.history_series)?data.history_series:[];const players=ladder.map(r=>r.player_name).filter(Boolean);document.getElementById('countCopy').textContent=`${ladder.length} spelers`;ladderWrap.className='';ladderWrap.innerHTML=ladder.length?`<table><thead><tr><th class="rank">#</th><th>Grafiek</th><th>Speler</th><th>Badge</th><th>ELO</th><th>Gespeeld</th><th>Win%</th></tr></thead><tbody>${ladder.map((r,i)=>`<tr><td class="rank">${i+1}</td><td><input class="player-toggle" type="checkbox" data-player-toggle="${encodeURIComponent(r.player_name||'')}" ${i<10?'checked':''}></td><td>${nameLink(r.player_name||'')}</td><td><span class="badge">${r.badge||'Starter'}</span></td><td>${Math.round(Number(r.elo_rating||1000))}</td><td>${r.games_played||r.matches_played||0}</td><td>${pct(r.win_pct)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen ladderdata.</div>';
function renderGraph(){const palette=['#e53935','#1e88e5','#43a047','#8e24aa','#fb8c00','#00897b','#3949ab','#d81b60','#7cb342','#6d4c41'];const selected=[...document.querySelectorAll('[data-player-toggle]:checked')].map(el=>decodeURIComponent(el.getAttribute('data-player-toggle'))).slice(0,10);const grouped={};(historySeries||[]).forEach(pt=>{if(!grouped[pt.player_name])grouped[pt.player_name]=[];grouped[pt.player_name].push({x:new Date(pt.created_at).getTime(),y:Number(pt.rating_after||1000)});});const series=selected.map((name,idx)=>({name,color:palette[idx%palette.length],points:(grouped[name]||[]).sort((a,b)=>a.x-b.x)})).filter(s=>s.points.length);if(!series.length){graphWrap.className='empty';graphWrap.textContent='Nog geen grafiekdata.';return;}const allTimes=[...new Set(series.flatMap(s=>s.points.map(p=>p.x)))].sort((a,b)=>a-b);const maxSteps=Math.max(allTimes.length,1);const pointsByName={};series.forEach(s=>{const map=new Map(s.points.map(p=>[p.x,p.y]));let last=map.get(allTimes[0]) ?? s.points[0].y;pointsByName[s.name]=allTimes.map((ts)=>{if(map.has(ts)) last=map.get(ts);return {x:ts,y:last};});});const W=1000,H=400,L=70,R=22,T=20,B=46;const allY=Object.values(pointsByName).flatMap(arr=>arr.map(p=>p.y));const rawMin=Math.min(...allY), rawMax=Math.max(...allY);let step=10;const span=Math.max(20,rawMax-rawMin);if(span>80) step=20; else if(span>40) step=15;const low=Math.floor((rawMin-8)/step)*step;const high=Math.ceil((rawMax+8)/step)*step;const xFn=(i)=>L+((W-L-R)*(maxSteps===1?0:i/(maxSteps-1)));const xEnd=W-R;const yFn=(v)=>T+((H-T-B)*(1-((v-low)/Math.max(step,(high-low)))));const ticks=[];for(let val=low;val<=high;val+=step){const yy=yFn(val);ticks.push(`<text x="18" y="${yy+4}" font-size="13" font-weight="700" fill="#6b6257">${val}</text>`);}const monthFmt=(ts)=>{const d=new Date(ts);return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'});};const xTicks=allTimes.map((ts,i)=>`<text x="${xFn(i)}" y="${H-12}" text-anchor="middle" font-size="12" font-weight="700" fill="#6b6257">${monthFmt(ts)}</text>`).join('');const lines=series.map(s=>{const padded=pointsByName[s.name];const d=makeSmoothPath(padded,xFn,yFn,xEnd);const dots=s.points.map((p)=>{const i=allTimes.indexOf(p.x);return `<circle class="series-dot" cx="${xFn(i)}" cy="${yFn(p.y)}" r="4.8" fill="${s.color}"></circle>`;}).join('');return `<path class="series-line" stroke="${s.color}" d="${d}"></path>${dots}`;}).join('');graphWrap.className='';graphWrap.innerHTML=`<div class="graph-shell"><div class="graph-legend">${series.map(s=>`<span class="legend-item"><span class="swatch" style="background:${s.color}"></span>${nameLink(s.name)}</span>`).join('')}</div><div class="chart-box"><svg class="chart-svg" viewBox="0 0 ${W} ${H}">${ticks.join('')}<line class="axis" x1="${L}" y1="${H-B}" x2="${xEnd}" y2="${H-B}"></line><line class="axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line>${xTicks}<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="16" font-weight="800" fill="#574c3d">Speelmomenten</text><text x="20" y="20" font-size="16" font-weight="800" fill="#574c3d">ELO</text>${lines}</svg></div></div>`;}setTimeout(()=>{document.querySelectorAll('[data-player-toggle]').forEach(el=>el.addEventListener('change',renderGraph));renderGraph();},0);
matchesWrap.className='';matchesWrap.innerHTML=matches.length?matches.map((m)=>`<details class="accordion"><summary><span>Winnaars: ${nameList(m.winner_names||[])}${m.scoreline?` · ${m.scoreline}`:''}</span><span class="meta" style="font-size:12px">${dateFmt(m.finished_at)}</span></summary><div class="detail"><div class="meta">Deelnemers: ${nameList(m.participants||[])}</div>${m.recap_text?`<div class="meta" style="margin-top:6px">${m.recap_text}</div>`:''}${detailCards(m)}</div></details>`).join(''):'<div class="empty">Nog geen wedstrijdhistorie.</div>';
if(game==='boerenbridge'){pairsWrap.className='';pairsWrap.innerHTML=ladder.length?`<div class="insight-grid"><div class="insight-row insight-head"><div>Speler</div><div>Gem. plek</div><div>Podiums</div><div>#1</div></div>${ladder.map(r=>`<div class="insight-row"><div>${nameLink(r.player_name||'')}</div><div>${Number(r.average_finish||0).toFixed(2)}</div><div>${r.podium_finishes||0}</div><div>${r.first_place_finishes||0}</div></div>`).join('')}</div>`:'<div class="empty">Nog geen plekdata.</div>';matchupsWrap.className='';matchupsWrap.innerHTML=ladder.length?`<div class="insight-grid"><div class="insight-row insight-head"><div>Speler</div><div>Gem. punten</div><div>Exact</div><div>Slagen</div></div>${ladder.map(r=>`<div class="insight-row"><div>${nameLink(r.player_name||'')}</div><div>${Number(r.average_points||0).toFixed(1)}</div><div>${r.exact_bid_count||0}</div><div>${r.total_slagen||0}</div></div>`).join('')}</div>`:'<div class="empty">Nog geen bieddata.</div>';}
else {pairsWrap.className='';pairsWrap.innerHTML=(pairs.length&&players.length>1)?matrixTable(players,pairs,'pair'):'<div class="empty">Nog geen teamdata.</div>';matchupsWrap.className='';matchupsWrap.innerHTML=(matchups.length&&players.length>1)?matrixTable(players,matchups,'matchup'):'<div class="empty">Nog geen rivaliteitsdata.</div>';}
}catch(err){for(const id of ['ladderWrap','matchesWrap','pairsWrap','matchupsWrap']){const el=document.getElementById(id);el.className='empty';el.textContent=err.message||String(err);} graphWrap.className='empty'; graphWrap.textContent='Laden mislukt.';}}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
