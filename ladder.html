<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ranglijst</title><script src="./gejast-config.js?v157"></script>
<style>
:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37;--bg:#fff}
*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}
.wrap{max-width:1250px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:42px}.muted{color:var(--muted)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(255,236,236,.95);color:#7e1111;border:1px solid rgba(216,44,44,.28);font-weight:800;gap:8px;align-items:center}.pill:before{content:'';width:9px;height:9px;border-radius:50%;background:#d82c2c;animation:pulse 1.2s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,44,44,.65)}70%{box-shadow:0 0 0 8px rgba(216,44,44,0)}100%{box-shadow:0 0 0 0 rgba(216,44,44,0)}}
.layout{display:grid;grid-template-columns:1.2fr .9fr;gap:16px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line)}
.table-title{display:flex;justify-content:space-between;align-items:center;margin:0 0 12px}.table-title h2{margin:0;font-size:1.1rem}table{width:100%;border-collapse:collapse}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55}.rank{width:56px;font-weight:900}.player-link{font-weight:800;color:#201b16;text-decoration:none}.player-link:hover{text-decoration:underline}.badge{display:inline-flex;padding:4px 8px;border-radius:999px;background:rgba(212,175,55,.18);font-size:11px;font-weight:800}.empty{padding:18px;border-radius:18px;background:rgba(255,255,255,.72);border:1px dashed var(--line);text-align:center;color:var(--muted)}
.stack{display:grid;gap:16px}.accordion{border:1px solid var(--line);border-radius:18px;background:#fff}.accordion summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:800;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.accordion summary::-webkit-details-marker{display:none}.accordion .detail{padding:0 16px 16px}.meta{color:var(--muted);font-size:.95rem}.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:10px}.mini{background:#fbfaf6;border:1px solid var(--line);border-radius:14px;padding:10px}.mini strong{display:block;font-size:.92rem}.mini span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px}
.matrix-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}.matrix{border-collapse:separate;border-spacing:0;min-width:560px}.matrix th,.matrix td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:10px 12px;text-align:center}.matrix thead th{position:sticky;top:0;background:#fbfaf6;z-index:1}.matrix tbody th{position:sticky;left:0;background:#fbfaf6;text-align:left;z-index:1}.matrix .diag{background:#f2eee4}.matrix .pct{font-weight:900}.matrix .sub{display:block;font-size:.75rem;color:var(--muted);font-weight:700}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
@media(max-width:940px){.layout{grid-template-columns:1fr}body{padding:16px}}
</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div class="pill">Live</div><h1 id="title">Ranglijst</h1><div class="muted" id="subtitle">Volledige ladder, badges en wedstrijdinzichten.</div></div><a class="btn" href="./index.html">Home</a></div><div class="layout"><section class="panel"><div class="table-title"><h2>Ladder</h2><span class="muted" id="countCopy"></span></div><div id="ladderWrap" class="empty">Laden…</div></section><section class="stack"><section class="panel"><h2 style="margin:0 0 12px">Wedstrijdgeschiedenis</h2><div id="matchesWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Samenwerking</h2><div id="pairsWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Onderlinge duels</h2><div id="matchupsWrap" class="empty">Laden…</div></section></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div>
<script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const game=(new URLSearchParams(location.search).get('game')||'klaverjas').toLowerCase();const titleMap={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong'};document.getElementById('title').textContent=titleMap[game]||'Ranglijst';function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_ladder_page)return payload.get_public_ladder_page;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_ladder_page)return payload[0].get_public_ladder_page;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}function pct(v){return `${Number(v||0).toFixed(0)}%`}function nameLink(name){return `<a class="player-link" href="./player.html?player=${encodeURIComponent(name||'')}&game=${encodeURIComponent(game)}">${name||'Onbekend'}</a>`}function nameList(names){return (Array.isArray(names)?names:[]).map((n)=>nameLink(n)).join(' · ')||'—'}function matrixTable(players, rows, type){const names=[...players];const map=new Map();(rows||[]).forEach((r)=>{map.set(`${String(r.player_a).toLowerCase()}|${String(r.player_b).toLowerCase()}`,r);map.set(`${String(r.player_b).toLowerCase()}|${String(r.player_a).toLowerCase()}`,r);});return `<div class="matrix-wrap"><table class="matrix"><thead><tr><th></th>${names.map(n=>`<th>${nameLink(n)}</th>`).join('')}</tr></thead><tbody>${names.map(a=>`<tr><th>${nameLink(a)}</th>${names.map(b=>{if(a===b)return '<td class="diag">—</td>'; const r=map.get(`${String(a).toLowerCase()}|${String(b).toLowerCase()}`); if(!r)return '<td>—</td>'; let p=0, sub=''; if(type==='pair'){ if(String(a).toLowerCase()<String(b).toLowerCase()){ p=Number(r.win_pct||0); sub=`${r.wins||0}/${r.games||0}`; } else { p=Number(100-(r.win_pct||0)); sub=`${(r.games||0)-(r.wins||0)}/${r.games||0}`; } } else { if(String(a).toLowerCase()===String(r.player_a).toLowerCase()){ p=Number(r.games? (Number(r.wins_a||0)/Number(r.games))*100 : 0); sub=`${r.wins_a||0}-${r.wins_b||0}`; } else { p=Number(r.games? (Number(r.wins_b||0)/Number(r.games))*100 : 0); sub=`${r.wins_b||0}-${r.wins_a||0}`; } } return `<td><span class="pct">${p.toFixed(0)}%</span><span class="sub">${sub}</span></td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;}function detailCards(match){const details=(Array.isArray(match.details)?match.details:[]).filter(Boolean); if(!details.length) return '<div class="meta">Geen extra details.</div>'; return `<div class="detail-grid">${details.map(d=>`<div class="mini"><strong>${nameLink(d.player_name||'')}</strong><span>${d.result_label||d.result||''}</span>${d.points!==undefined?`<span>Punten: ${d.points}</span>`:''}${d.rank!==undefined?`<span>Plek: ${d.rank}</span>`:''}${d.team?`<span>Team: ${d.team}</span>`:''}${d.cups_hit!==undefined?`<span>Raak: ${d.cups_hit}</span>`:''}</div>`).join('')}</div>`;}async function load(){const ladderWrap=document.getElementById('ladderWrap');const matchesWrap=document.getElementById('matchesWrap');const pairsWrap=document.getElementById('pairsWrap');const matchupsWrap=document.getElementById('matchupsWrap');try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_ladder_page`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:game})});const data=unwrap(await parse(res));const ladder=Array.isArray(data.ladder)?data.ladder:[];const matches=Array.isArray(data.recent_matches)?data.recent_matches:[];const pairs=Array.isArray(data.pair_stats)?data.pair_stats:[];const matchups=Array.isArray(data.matchup_stats)?data.matchup_stats:[];const players=ladder.map(r=>r.player_name).filter(Boolean);document.getElementById('countCopy').textContent=`${ladder.length} spelers`;ladderWrap.className='';ladderWrap.innerHTML=ladder.length?`<table><thead><tr><th class="rank">#</th><th>Speler</th><th>Badge</th><th>ELO</th><th>Gespeeld</th><th>Win%</th></tr></thead><tbody>${ladder.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${nameLink(r.player_name||'')}</td><td><span class="badge">${r.badge||'Starter'}</span></td><td>${Math.round(Number(r.elo_rating||1000))}</td><td>${r.games_played||r.matches_played||0}</td><td>${pct(r.win_pct)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen ladderdata.</div>';matchesWrap.className='';matchesWrap.innerHTML=matches.length?matches.map((m,idx)=>`<details class="accordion" ${idx<3?'open':''}><summary><span>${nameList(m.participants||[])}</span><span class="meta">${dateFmt(m.finished_at)}</span></summary><div class="detail"><div class="meta">Winnaars: ${nameList(m.winner_names||[])}${m.scoreline?` · ${m.scoreline}`:''}</div>${m.recap_text?`<div class="meta" style="margin-top:6px">${m.recap_text}</div>`:''}${detailCards(m)}</div></details>`).join(''):'<div class="empty">Nog geen wedstrijdhistorie.</div>';pairsWrap.className='';pairsWrap.innerHTML=(pairs.length&&players.length>1)?matrixTable(players,pairs,'pair'):'<div class="empty">Nog geen duo-data.</div>';matchupsWrap.className='';matchupsWrap.innerHTML=(matchups.length&&players.length>1)?matrixTable(players,matchups,'matchup'):'<div class="empty">Nog geen duel-data.</div>';}catch(err){for(const id of ['ladderWrap','matchesWrap','pairsWrap','matchupsWrap']){const el=document.getElementById(id);el.className='empty';el.textContent=err.message||String(err);}}}load();})();</script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
