<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelranglijst</title>
  <link rel="stylesheet" href="./site-shell.css" />
  <script src="./gejast-config.js"></script>
  <style>
    :root{--ink:#161616;--muted:#6e665a;--line:rgba(17,17,17,.08);--card:#fffdf9;--bg:rgba(249,247,242,.96)}*{box-sizing:border-box}
    body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./site-bg-desktop.webp') center/cover fixed}
    .wrap{max-width:1400px;margin:0 auto}.shell{background:var(--bg);border-radius:28px;padding:28px;border:1px solid rgba(255,255,255,.7);box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}.nav a{font-weight:800;color:#554e43;text-decoration:none;margin-left:14px}
    h1{margin:0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em}.sub{margin-top:8px;color:var(--muted);max-width:840px}.status{margin-top:10px;color:#735d1c}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0}.stat,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 10px 24px rgba(0,0,0,.03)}
    .stat small{display:block;font-size:.75rem;text-transform:uppercase;color:#908670;font-weight:800;letter-spacing:.06em}.stat strong{display:block;margin-top:4px;font-size:1.6rem}
    .grid{display:grid;grid-template-columns:1.3fr .9fr;gap:16px}.board{display:grid;gap:10px}.row{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px;text-decoration:none;color:inherit}.rank{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-weight:900}.name{font-weight:900}.meta{font-size:.92rem;color:var(--muted);margin-top:2px}.value{text-align:right;font-weight:900}
    .chart{height:320px;border-radius:18px;background:#f7f3eb;border:1px solid rgba(17,17,17,.06);padding:12px}.chart svg{width:100%;height:100%}.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;color:#5c5549;font-size:.9rem}.legend span{display:inline-flex;align-items:center;gap:8px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
    .recent{display:grid;gap:10px}.recent article{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px}.recent strong{display:block}.empty{color:var(--muted)}
    @media(max-width:960px){.grid,.stats{grid-template-columns:1fr}.nav a{margin-left:0;margin-right:12px}}
  </style>
</head>
<body>
  <div class="wrap"><main class="shell">
    <div class="top"><div><h1 id="pageTitle">Ranglijst</h1><div id="pageSub" class="sub"></div><div id="statusBox" class="status"></div></div><div class="nav"><a href="./index.html">Home</a><a href="./profiles.html">Spelers</a><a id="playerLink" href="./player.html">Spelerprofiel</a></div></div>
    <section class="stats"><div class="stat"><small>Spelers</small><strong id="sumPlayers">0</strong></div><div class="stat"><small>Potjes</small><strong id="sumMatches">0</strong></div><div class="stat"><small>Koploper</small><strong id="sumLeader">-</strong></div><div class="stat"><small>Gem. ELO</small><strong id="sumAvg">0</strong></div></section>
    <section class="grid"><section class="card"><h2>Volledige ladder</h2><div id="board" class="board"></div></section><section class="card"><h2>ELO-verloop top 10</h2><div id="chart" class="chart"></div><div id="legend" class="legend"></div></section></section>
    <section class="card" style="margin-top:16px"><h2>Recente potjes</h2><div id="recent" class="recent"></div></section>
  </main></div>
  <div class="site-credit-watermark">v125 · Made by Bruis</div>
<script>
const CFG=window.GEJAST_CONFIG||{}; const SUPABASE_URL=CFG.SUPABASE_URL; const SUPABASE_PUBLISHABLE_KEY=CFG.SUPABASE_PUBLISHABLE_KEY;
const GAME_META={klaverjas:{title:'Klaverjas ELO-ladder',sub:'Teamspel met ELO per speler. Winnen tilt je mee omhoog, verlies drukt je terug.'},boerenbridge:{title:'Boerenbridge ELO-ladder',sub:'Vrije-voor-allen ladder. Naast winst telt ook je plaatsing in het veld mee zodat meer dan alleen de winnaar betekenis krijgt.'},beerpong:{title:'Beerpong ELO-ladder',sub:'De openbare ELO-ranglijst met alle actieve spelers, trendlijnen en recente uitslagen.'}};
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function rpcHeaders(){return {apikey:SUPABASE_PUBLISHABLE_KEY,'Content-Type':'application/json',Accept:'application/json'}}
async function parseResponse(res){const t=await res.text(); let d=null; try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)} if(!res.ok) throw new Error(d?.message||d?.error||d?.details||d?.hint||`HTTP ${res.status}`); return d}
async function callRpc(name,payload={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify(payload)}); return parseResponse(res)}
const params=new URLSearchParams(location.search); const game=(params.get('game')||'klaverjas').toLowerCase(); const meta=GAME_META[game]||GAME_META.klaverjas;
document.getElementById('pageTitle').textContent=meta.title; document.getElementById('pageSub').textContent=meta.sub;
function renderBoard(rows){const root=document.getElementById('board'); if(!rows?.length){root.innerHTML='<div class="empty">Nog geen ladderdata.</div>';return;} root.innerHTML=rows.map((p,i)=>`<a class="row" href="./player.html?game=${encodeURIComponent(game)}&player=${encodeURIComponent(p.player_name)}"><div class="rank">${i+1}</div><div><div class="name">${esc(p.player_name)}</div><div class="meta">${p.games_played||0} potjes · ${p.wins||0} winst · ${(p.winrate ?? 0)}% winrate</div></div><div class="value">${Math.round(Number(p.rating||1000))}<div class="meta">ELO</div></div></a>`).join('')}
function renderRecent(rows){const root=document.getElementById('recent'); if(!rows?.length){root.innerHTML='<div class="empty">Nog geen potjes.</div>';return;} root.innerHTML=rows.map((m)=>`<article><strong>${esc(m.title||'Potje')}</strong><div class="meta">${esc(m.played_at||'')}</div><div class="meta">Winnaar(s): ${Array.isArray(m.winner_names)?m.winner_names.map(esc).join(', '):esc(m.winner_names||'-')}</div></article>`).join('')}
function applySummary(s){document.getElementById('sumPlayers').textContent=s?.players??0;document.getElementById('sumMatches').textContent=s?.matches??0;document.getElementById('sumLeader').textContent=s?.leader??'-';document.getElementById('sumAvg').textContent=s?.avg_rating??0}
function drawLines(seriesList){const root=document.getElementById('chart'); const legend=document.getElementById('legend'); if(!seriesList?.length){root.innerHTML='<div class="empty">Nog geen grafiekdata.</div>'; legend.innerHTML=''; return;} const colors=['#d4af37','#1f4b99','#8a2d1f','#2f7a46','#7b4bb7','#d95f02','#008b8b','#c2185b','#6d4c41','#455a64']; const width=960,height=280,pad=28; const pts=[]; seriesList.forEach(s=>(s.series||[]).forEach(p=>pts.push(Number(p.rating||0)))); const min=Math.min(...pts,950), max=Math.max(...pts,1050), range=(max-min)||1; const paths=[]; const legs=[]; seriesList.forEach((s,idx)=>{const list=s.series||[]; if(!list.length) return; const color=colors[idx%colors.length]; const d=list.map((p,i)=>{const x=pad+((width-pad*2)*(list.length===1?0.5:i/(list.length-1||1))); const y=height-pad-(((Number(p.rating||0)-min)/range)*(height-pad*2)); return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`}).join(' '); paths.push(`<path d="${d}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>`); list.forEach((p,i)=>{const x=pad+((width-pad*2)*(list.length===1?0.5:i/(list.length-1||1))); const y=height-pad-(((Number(p.rating||0)-min)/range)*(height-pad*2)); paths.push(`<circle cx="${x}" cy="${y}" r="3" fill="${color}"><title>${esc(s.player_name)} · ${esc(p.label||'')} · ${p.rating}</title></circle>`)}); legs.push(`<span><i class="dot" style="background:${color}"></i>${esc(s.player_name)}</span>`); }); const grid=[0,.25,.5,.75,1].map(fr=>{const y=height-pad-(fr*(height-pad*2)); const val=(min+fr*range).toFixed(0); return `<line x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}" stroke="rgba(0,0,0,.08)" /><text x="4" y="${y+4}" font-size="11" fill="#8b826f">${val}</text>`}).join(''); root.innerHTML=`<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${grid}${paths.join('')}</svg>`; legend.innerHTML=legs.join('')}
(async()=>{try{const data=await callRpc('get_game_ladder_page',{p_game_key:game,limit_count:250}); renderBoard(data.leaderboard||[]); renderRecent(data.recent_matches||[]); applySummary(data.summary||{}); drawLines(data.histories||[]);}catch(e){document.getElementById('statusBox').textContent=e.message||'Kon ladder niet laden.'}})();
</script>
</body>
</html>
