<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Ranglijst</title><script src="./gejast-config.js"></script><style>:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}.wrap{max-width:980px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}h1{margin:0 0 8px;font-size:42px}.muted{color:var(--muted)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(255,236,236,.95);color:#7e1111;border:1px solid rgba(216,44,44,.28);font-weight:800;gap:8px;align-items:center}.pill:before{content:'';width:9px;height:9px;border-radius:50%;background:#d82c2c;animation:pulse 1.2s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,44,44,.65)}70%{box-shadow:0 0 0 8px rgba(216,44,44,0)}100%{box-shadow:0 0 0 0 rgba(216,44,44,0)}}table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55}.rank{width:56px;font-weight:900}.empty{padding:18px;border-radius:18px;background:rgba(255,255,255,.72);border:1px dashed var(--line);text-align:center;color:var(--muted)}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div class="pill">Live</div><h1 id="title">Ranglijst</h1><div class="muted">Publieke ladderpagina. Uitgebreide stats volgen hierna.</div></div><a class="btn" href="./index.html">Home</a></div><div id="tableWrap" class="empty">Laden…</div></div></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const game=(new URLSearchParams(location.search).get('game')||'klaverjas').toLowerCase();const titleMap={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong'};document.getElementById('title').textContent=titleMap[game]||'Ranglijst';function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_homepage_ladders_public)return payload.get_homepage_ladders_public;if(Array.isArray(payload)&&payload[0]&&payload[0].get_homepage_ladders_public)return payload[0].get_homepage_ladders_public;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}async function load(){const wrap=document.getElementById('tableWrap');try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_homepage_ladders_public`,{method:'POST',headers:headers(),body:JSON.stringify({})});const data=unwrap(await parse(res));const rows=Array.isArray(data?.[game])?data[game]:[];if(!rows.length){wrap.className='empty';wrap.textContent='Nog geen ladderdata.';return;}wrap.className='';wrap.innerHTML=`<table><thead><tr><th class="rank">#</th><th>Speler</th><th>ELO</th><th>Gespeeld</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${r.player_name||'Onbekend'}</td><td>${Math.round(Number(r.elo_rating||1000))}</td><td>${r.games_played||r.matches_played||0}</td></tr>`).join('')}</tbody></table>`;}catch(err){wrap.className='empty';wrap.textContent=err.message||String(err);}}load();})();</script></body></html>
