<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Ranglijst</title><script src="./gejast-config.js"></script><style>:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}.wrap{max-width:1080px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}h1{margin:0 0 8px;font-size:42px}.muted{color:var(--muted)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(255,236,236,.95);color:#7e1111;border:1px solid rgba(216,44,44,.28);font-weight:800;gap:8px;align-items:center}.pill:before{content:'';width:9px;height:9px;border-radius:50%;background:#d82c2c;animation:pulse 1.2s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,44,44,.65)}70%{box-shadow:0 0 0 8px rgba(216,44,44,0)}100%{box-shadow:0 0 0 0 rgba(216,44,44,0)}}.grid{display:grid;grid-template-columns:1.35fr .95fr;gap:16px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55}.rank{width:56px;font-weight:900}.empty{padding:18px;border-radius:18px;background:rgba(255,255,255,.72);border:1px dashed var(--line);text-align:center;color:var(--muted)}.match{padding:12px 0;border-bottom:1px solid var(--line)}.match:last-child{border-bottom:none}.match strong{display:block}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:860px){.grid{grid-template-columns:1fr}body{padding:16px}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div class="pill">Live</div><h1 id="title">Ranglijst</h1><div class="muted" id="subtitle">Volledige ladder en recente wedstrijden.</div></div><a class="btn" href="./index.html">Home</a></div><div class="grid"><section class="panel"><h2 style="margin:0 0 12px">Ladder</h2><div id="ladderWrap" class="empty">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Recente wedstrijden</h2><div id="matchesWrap" class="empty">Laden…</div></section></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const game=(new URLSearchParams(location.search).get('game')||'klaverjas').toLowerCase();const titleMap={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong'};document.getElementById('title').textContent=titleMap[game]||'Ranglijst';function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_ladder_page)return payload.get_public_ladder_page;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_ladder_page)return payload[0].get_public_ladder_page;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}async function load(){const ladderWrap=document.getElementById('ladderWrap');const matchesWrap=document.getElementById('matchesWrap');try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_ladder_page`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:game})});const data=unwrap(await parse(res));const ladder=Array.isArray(data.ladder)?data.ladder:[];const matches=Array.isArray(data.recent_matches)?data.recent_matches:[];ladderWrap.className='';ladderWrap.innerHTML=ladder.length?`<table><thead><tr><th class="rank">#</th><th>Speler</th><th>ELO</th><th>Gespeeld</th><th>W</th><th>V</th></tr></thead><tbody>${ladder.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${r.player_name||'Onbekend'}</td><td>${Math.round(Number(r.elo_rating||1000))}</td><td>${r.games_played||r.matches_played||0}</td><td>${r.wins||0}</td><td>${r.losses||0}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nog geen ladderdata.</div>';matchesWrap.className='';matchesWrap.innerHTML=matches.length?matches.map(m=>`<div class="match"><strong>${(m.participants||[]).join(' · ')}</strong><div class="muted">Winnaars: ${(m.winner_names||[]).join(', ')||'—'}</div><div class="muted">${dateFmt(m.finished_at)}</div><div class="muted">${m.recap_text||''}</div></div>`).join(''):'<div class="empty">Nog geen wedstrijdhistorie.</div>';}catch(err){ladderWrap.className='empty';matchesWrap.className='empty';ladderWrap.textContent=err.message||String(err);matchesWrap.textContent='Ladderdata laden mislukt.';}}load();})();</script></body></html>
