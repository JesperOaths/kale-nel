<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Uitnodigen</title><script>window.GEJAST_PAGE_VERSION='v615';</script><script src="./gejast-config.js?v615"></script>
<style>:root{--gold:#d4af37;--ink:#1b1711;--paper:rgba(255,250,243,.93);--line:#e0d6c6;--muted:#6f665e}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(247,244,238,.85),rgba(247,244,238,.85)),url('./wordtergejast.png') center/cover scroll}.page{width:min(760px,100%);margin:0 auto;padding:20px 14px 90px}.sheet{background:var(--paper);border:1px solid rgba(17,17,17,.08);border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.09);padding:20px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.back{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}.field{display:grid;gap:6px;margin-top:12px}.field label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}input,textarea{width:100%;padding:12px 14px;border-radius:16px;border:1px solid rgba(17,17,17,.12);font:inherit}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:16px;padding:12px 16px;font:inherit;font-weight:800;cursor:pointer}.btn.dark{background:#111;color:#fff}.btn.gold{background:var(--gold);color:#111}.muted{color:var(--muted)}.box{background:#fff;border:1px solid rgba(17,17,17,.07);border-radius:20px;padding:14px;margin-top:16px}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}</style></head>
<body><main class="page"><section class="sheet"><div class="top"><div><h1>Uitnodigen</h1><p class="muted">Maak een link of gebruik een ontvangen link.</p></div><a class="back" href="./index.html">Terug</a></div><div id="status" class="muted"></div><div id="inviteInfo" class="box" style="display:none"></div><div id="adminBox" class="box" style="display:none"><h2>Nieuwe link</h2><div class="field"><label>Notitie</label><textarea id="inviteNote" placeholder="Bijvoorbeeld: donderdaggroep"></textarea></div><div class="row"><button class="btn gold" id="createInviteBtn" type="button">Link maken</button><button class="btn dark" id="copyInviteBtn" type="button" style="display:none">Kopieer link</button></div><div class="field"><label>Link</label><input id="inviteOutput" readonly></div></div></section></main><div class="site-credit-watermark" data-version-watermark>v411 · Made by Bruis</div>
<script>
const SUPABASE_URL=(window.GEJAST_CONFIG||{}).SUPABASE_URL; const SUPABASE_PUBLISHABLE_KEY=(window.GEJAST_CONFIG||{}).SUPABASE_PUBLISHABLE_KEY; const ADMIN_SESSION_KEY='jas_admin_session_v8';
function rpcHeaders(){return {apikey:SUPABASE_PUBLISHABLE_KEY,Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}`,'Content-Type':'application/json',Accept:'application/json'}}
async function parseResponse(res){const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch{throw new Error(text||`HTTP ${res.status}`)} if(!res.ok) throw new Error(data?.message||data?.error||`HTTP ${res.status}`); return data}
function getAdminSessionToken(){return sessionStorage.getItem(ADMIN_SESSION_KEY)||localStorage.getItem(ADMIN_SESSION_KEY)||''}
function getToken(){return new URLSearchParams(location.search).get('token')||''}
async function boot(){const status=document.getElementById('status'); const token=getToken(); if(token){ try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/public_get_invite_link_info`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify({token_input:token})}); const data=await parseResponse(res); const box=document.getElementById('inviteInfo'); box.style.display='block'; box.innerHTML=`<h2>Welkom</h2><p>Deze link is geldig tot ${data.expires_at_label||data.expires_at||'later'}.</p><div class="row"><a class="btn gold" href="./request.html?token=${encodeURIComponent(token)}">Ga naar aanvraag</a></div>`; status.textContent='Uitnodigingslink geladen.';}catch(err){status.textContent=err.message||'Link laden mislukt.'}}
const adminToken=getAdminSessionToken(); if(adminToken){ document.getElementById('adminBox').style.display='block'; }
}
document.getElementById('createInviteBtn').addEventListener('click', async()=>{const status=document.getElementById('status'); try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_create_invite_link_action`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify({admin_session_token:getAdminSessionToken(),note_input:document.getElementById('inviteNote').value.trim(),base_url:location.origin+'/invite.html'})}); const data=await parseResponse(res); document.getElementById('inviteOutput').value=data.invite_url||''; document.getElementById('copyInviteBtn').style.display='inline-flex'; status.textContent='Uitnodigingslink gemaakt.';}catch(err){status.textContent=err.message||'Maken mislukt.'}})
document.getElementById('copyInviteBtn').addEventListener('click', async()=>{const val=document.getElementById('inviteOutput').value; if(!val) return; await navigator.clipboard.writeText(val); document.getElementById('status').textContent='Link gekopieerd.';});
boot();
</script><script src="./site-analytics.js?v615"></script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body></html>
