<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naam aanvragen</title>
  <style>

    :root {
      --gold: #d4af37;
      --gold-dark: #b89018;
      --black: #111111;
      --soft: #f3f1ec;
      --soft-2: #ebe7df;
      --card: rgba(255, 255, 255, 0.95);
      --line: rgba(17, 17, 17, 0.08);
      --muted: #6b7280;
      --blue: #2563eb;
      --shadow: 0 28px 70px rgba(17, 17, 17, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 26%),
        radial-gradient(circle at bottom right, rgba(17, 17, 17, 0.07), transparent 24%),
        linear-gradient(135deg, #f2efe8, #f8f7f3 44%, #ece8e0);
      color: var(--black);
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .page-bg,
    .brand-watermark,
    .spinoza-shadow,
    .top-glow,
    .playing-card-accent {
      position: fixed;
      pointer-events: none;
    }

    .page-bg,
    .top-glow {
      inset: 0;
    }

    .page-bg {
      background-image: url('./123zwartkaart.png');
      background-size: 255px;
      background-repeat: repeat;
      background-position: center;
      opacity: 0.13;
      filter: grayscale(100%) contrast(1.12) brightness(0.98);
      mix-blend-mode: multiply;
      z-index: 0;
    }

    .brand-watermark {
      top: 50%;
      left: 50%;
      width: min(46vw, 620px);
      transform: translate(-50%, -50%);
      opacity: 0.19;
      z-index: 0;
      filter: saturate(1.08) brightness(1.02);
    }

    .brand-watermark img,
    .spinoza-shadow img,
    .playing-card-accent img {
      display: block;
      width: 100%;
      height: auto;
    }

    .spinoza-shadow {
      left: -42px;
      bottom: -8px;
      width: min(42vw, 590px);
      opacity: 0.42;
      z-index: 0;
      filter: sepia(0.22) saturate(1.18) contrast(1.08) brightness(1.03);
    }

    .playing-card-accent {
      right: -44px;
      bottom: 4%;
      width: min(30vw, 420px);
      opacity: 0.92;
      z-index: 0;
      filter: saturate(1.38) contrast(1.14) brightness(1.04) drop-shadow(0 20px 38px rgba(40, 18, 12, 0.18));
      transform: rotate(7deg);
      transform-origin: center right;
    }

    .playing-card-accent img {
      border-radius: 24px;
    }

    .top-glow {
      background: linear-gradient(180deg, rgba(255,255,255,0.38), transparent 24%);
      z-index: 0;
    }

    .watermark {
      position: fixed;
      right: 20px;
      bottom: 14px;
      color: rgba(17,17,17,0.28);
      font-size: 14px;
      user-select: none;
      pointer-events: none;
      z-index: 3;
      letter-spacing: 0.02em;
    }

    @media (max-width: 760px) {
      body {
        padding-left: 0;
        padding-right: 0;
      }

      .brand-watermark {
        width: min(88vw, 560px);
        opacity: 0.2;
      }

      .spinoza-shadow {
        left: -34px;
        bottom: -2px;
        width: min(66vw, 390px);
        opacity: 0.56;
        filter: sepia(0.18) saturate(1.12) contrast(1.04) brightness(1.03);
      }

      .playing-card-accent {
        right: -38px;
        bottom: 7%;
        width: min(58vw, 320px);
        opacity: 0.98;
        filter: saturate(1.44) contrast(1.16) brightness(1.05) drop-shadow(0 18px 34px rgba(40, 18, 12, 0.18));
      }
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      padding: 30px 34px 34px;
      border-radius: 28px;
      text-align: center;
      max-width: 760px;
      width: 100%;
      box-shadow: var(--shadow);
      position: relative;
      margin: 20px;
      z-index: 2;
      overflow: hidden;
    }

    .card::before { content:""; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(135deg, rgba(212,175,55,0.085), transparent 34%, rgba(17,17,17,0.05)); pointer-events:none; }
    .logo-corner { position:absolute; top:20px; right:20px; width:84px; height:84px; object-fit:contain; opacity:0.96; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.08)); }
    .back-link { position:absolute; left:18px; top:20px; font-size:14px; text-decoration:none; color:var(--blue); background:rgba(255,255,255,0.7); padding:6px 10px; border-radius:999px; border:1px solid rgba(37,99,235,0.12); backdrop-filter: blur(6px); }
    h1 { margin:24px 0 8px 0; font-size:clamp(2.35rem,4vw,3rem); line-height:1.02; padding:0 88px; letter-spacing:-0.035em; position:relative; z-index:1; }
    p { color:var(--muted); margin-bottom:20px; position:relative; z-index:1; font-size:clamp(1rem,2vw,1.15rem); }
    select, textarea, input { padding:12px 13px; margin:10px 0; width:100%; font-size:15px; border:1px solid rgba(17,17,17,0.1); border-radius:14px; background:rgba(255,255,255,0.9); }
    textarea { min-height:120px; resize:vertical; }
    .meta-row { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; position: relative; z-index: 1; }
    button { padding:12px 20px; margin-top:8px; border:none; border-radius:14px; cursor:pointer; font-size:15px; background:var(--gold); color:var(--black); transition:transform .14s ease, box-shadow .14s ease; }
    button:hover { transform: translateY(-1px); box-shadow:0 10px 18px rgba(17,17,17,.09); }
    #status { color:var(--muted); min-height:22px; margin-top:14px; white-space:pre-wrap; position:relative; z-index:1; }

    @media (max-width: 760px) {
      body { padding: 16px 0; }
      h1 { padding:0; margin-top:78px; font-size:2rem; }
      .meta-row { grid-template-columns: 1fr; gap: 0; }
      .logo-corner { top:12px; right:12px; width:68px; height:68px; }
      .back-link { top:12px; left:12px; }
      .card { padding: 22px 18px; margin: 14px auto; max-width: calc(100vw - 82px); width: calc(100vw - 82px); }
      textarea { min-height: 102px; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
  <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
  <div class="playing-card-accent"><img src="./playingcard-accent-v23.png" alt="" /></div>
  <div class="top-glow"></div>

  <div class="card">
    <a href="./index.html" class="back-link">Terug</a>
    <img src="./logo.png" alt="Logo" class="logo-corner" />
    <h1>Naam aanvragen</h1>
    <p>Kies je naam en leg kort uit waarom die van jou is.</p>

    <select id="requestNameSelect"></select>
    <div class="meta-row">
      <input id="requestEmailInput" type="email" placeholder="E-mail (optioneel)" autocomplete="email" />
      <input id="requestContactInput" type="text" placeholder="Discord / contact (optioneel)" />
    </div>
    <textarea id="requestNoteInput" placeholder="Leg kort uit waarom jij deze naam wilt claimen"></textarea>
    <button id="requestBtn" type="button">Vraag naam aan</button>

    <div id="status"></div>
  </div>

  <div class="watermark">Made by Bruis · v23</div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function rpcHeaders() {
      return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json" };
    }

    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
      return data;
    }

    function fillNameSelect(id, names) {
      const select = document.getElementById(id);
      select.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = true;
      select.appendChild(placeholder);
      (names || []).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    function collectVisitorMeta() {
      return {
        user_agent: navigator.userAgent || "",
        language: navigator.language || "",
        languages: Array.isArray(navigator.languages) ? navigator.languages : [],
        platform: navigator.userAgentData?.platform || navigator.platform || "",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        screen: `${window.screen?.width || 0}x${window.screen?.height || 0}`,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        referrer: document.referrer || "",
        page_url: location.href,
        max_touch_points: navigator.maxTouchPoints || 0,
        color_scheme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
        contact_hint: document.getElementById('requestContactInput').value.trim() || ""
      };
    }

    async function getState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method: "POST", mode: "cors", cache: "no-store", headers: rpcHeaders(), body: JSON.stringify({ session_token: null })
      });
      return await parseResponse(res);
    }

    async function requestClaim() {
      const desiredName = document.getElementById("requestNameSelect").value;
      const requesterNote = document.getElementById("requestNoteInput").value.trim();
      const requesterEmail = document.getElementById("requestEmailInput").value.trim();
      if (!desiredName) throw new Error("Kies eerst een naam");

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/request_claim`, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: rpcHeaders(),
        body: JSON.stringify({
          desired_name: desiredName,
          requester_note: requesterNote,
          requester_email: requesterEmail || null,
          requester_meta: collectVisitorMeta()
        })
      });
      return await parseResponse(res);
    }

    async function load() {
      try {
        const state = await getState();
        fillNameSelect("requestNameSelect", state.all_names || []);
        document.getElementById("status").textContent = "";
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Kon namen niet laden";
        document.getElementById("status").textContent = rawMessage === "Failed to fetch" ? "Netwerk/CORS-fout bij contact met Supabase." : rawMessage;
      }
    }

    document.getElementById("requestBtn").addEventListener("click", async () => {
      try {
        document.getElementById("status").textContent = "Versturen...";
        const result = await requestClaim();
        document.getElementById("requestNoteInput").value = "";
        document.getElementById("requestEmailInput").value = "";
        document.getElementById("requestContactInput").value = "";
        document.getElementById("requestNameSelect").selectedIndex = 0;
        document.getElementById("status").textContent = result?.message || "Aanvraag verstuurd.";
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Er ging iets mis";
        document.getElementById("status").textContent = rawMessage === "Failed to fetch" ? "Netwerk/CORS-fout bij contact met Supabase." : rawMessage;
      }
    });

    load();
  </script>
</body>
</html>
