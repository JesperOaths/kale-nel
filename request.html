    :root { --gold: #9a8241; --black: #111; --bg: #f0ede4; }

    .scene { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .brand-watermark { position: absolute; top: 10%; left: 5%; opacity: 0.05; width: 30vw; }
    .spinoza-shadow { position: absolute; bottom: 0; right: 0; opacity: 0.1; width: 40vw; }

    .primary-btn { flex: 1; background: var(--gold); border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }
    .ghost-link { flex: 1; background: var(--black); color: #fff; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .status { margin-top: 15px; font-size: 13px; min-height: 18px; }
    label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #999; margin: 0 0 6px 4px; text-transform: uppercase; }
  </style>

    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(154,130,65,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}

  </style>

  <script id="force-https">(function(){var h=window.location.hostname||'';if((h==='kalenel.nl'||h.endsWith('.kalenel.nl'))&&window.location.protocol==='http:'){window.location.replace('https://'+window.location.host+window.location.pathname+window.location.search+window.location.hash);}})();</script>
  <script src="./gejast-config.js?v348"></script>
</head>
<body>
  <div class="scene">
    <div class="brand-watermark" data-version-watermark><img src="./dubbeleD-goud.png" width="100%"></div>
    
    <div class="playing-card-accent"><img src="./playingcard-accent1-trimmed.png" width="100%"></div>
  </div>
  <main class="main-card">
    <a href="./index.html" aria-label="Terug naar home"><img src="./logo.png" class="logo-top" /></a>
    <h1>Claim je naam</h1>
    <p class="intro">Kies je naam uit de lijst en vul je e-mailadres in.</p>
    <label>Gewenste naam</label>
    <select id="requestNameSelect"></select>
    <label>E-mailadres</label>
    <input id="requestEmailInput" name="email" type="email" placeholder="jouw@email.com" autocomplete="email" autocapitalize="none" spellcheck="false">
    <label>Notitie</label>
    <textarea id="requestNoteInput" placeholder="Waarom wil je meedoen?" autocomplete="off"></textarea>
    <div class="btn-row">
      <a href="./index.html" class="ghost-link">Terug</a>
      <button id="requestBtn" class="primary-btn">Aanvraag versturen</button>
    </div>
    <div id="status" class="status"></div>
  </main>
  <script>
const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function rpcHeaders() {
      return { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`, "Content-Type": "application/json", Accept: "application/json" };
    }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }
    function setStatus(message = "", tone = "info", html = null) {
      const el = document.getElementById("status");
      if (!message && !html) {
        el.className = "notice";
        el.innerHTML = "";
        return;
      }
      el.className = `notice ${tone} show`;
      el.innerHTML = html ?? escapeHtml(message);
    }

    function normalizeDisplayName(name) {
      return String(name || '').replace(/\s+/g, ' ').trim();
    }
    function uniqueNames(names) {
      const seen = new Set();
      return (names || [])
        .map(normalizeDisplayName)
        .filter((name) => name && !seen.has(name.toLowerCase()) && seen.add(name.toLowerCase()))
        .sort((a, b) => a.localeCompare(b, 'nl'));
    }
    function fillNameSelect(names) {
      const select = document.getElementById("requestNameSelect");
      const items = uniqueNames(names);
      select.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = items.length ? "Kies je naam" : "Nog geen namen beschikbaar";
      placeholder.disabled = true;
      placeholder.selected = true;
      select.appendChild(placeholder);
      items.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }


    function normalizeRequestableNamesPayload(payload) {
      if (Array.isArray(payload)) {
        return payload.map((row) => {
          if (typeof row === 'string') return row;
          return row?.display_name || row?.desired_name || row?.name || row?.slug || '';
        }).filter(Boolean);
      }
      const candidates = [payload?.names, payload?.requestable_names, payload?.items, payload?.rows, payload?.data];
      for (const candidate of candidates) {
        if (Array.isArray(candidate)) return normalizeRequestableNamesPayload(candidate);
      }
      return [];
    }

    function collectVisitorMeta() {
      return {
        user_agent: navigator.userAgent || "",
        language: navigator.language || "",
        languages: Array.isArray(navigator.languages) ? navigator.languages : [],
        platform: navigator.userAgentData?.platform || navigator.platform || "",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        screen: `${window.screen?.width || 0}x${window.screen?.height || 0}`,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        referrer: document.referrer || "",
        page_url: location.href,
        max_touch_points: navigator.maxTouchPoints || 0,
        color_scheme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      };
    }

    function getInviteToken() {
      try {
        return new URLSearchParams(window.location.search).get('token') || '';
      } catch {
        return '';
      }
    }

    async function getRequestableNames() {
      const attempts = [];
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_requestable_names`, {
          method: "POST", mode: "cors", cache: "no-store", headers: rpcHeaders(), body: JSON.stringify({})
        });
        const data = await parseResponse(res);
        const names = uniqueNames(normalizeRequestableNamesPayload(data));
        if (names.length) return names;
        attempts.push('rpc-empty');
      } catch (err) {
        attempts.push(err instanceof Error ? err.message : 'rpc-failed');
      }

      try {
        const url = `${SUPABASE_URL}/rest/v1/allowed_usernames?select=display_name,slug,status&status=eq.available&order=display_name.asc`;
        const res = await fetch(url, { method: 'GET', mode: 'cors', cache: 'no-store', headers: rpcHeaders() });
        const data = await parseResponse(res);
        const names = uniqueNames(normalizeRequestableNamesPayload(data));
        if (names.length) return names;
        attempts.push('rest-empty');
      } catch (err) {
        attempts.push(err instanceof Error ? err.message : 'rest-failed');
      }

      throw new Error(attempts.join(' | ') || 'Kon namen niet laden');
    }

    async function requestClaim() {
      const desiredName = document.getElementById("requestNameSelect").value;
      const requesterNote = document.getElementById("requestNoteInput").value.trim();
      const requesterEmail = document.getElementById("requestEmailInput").value.trim().toLowerCase();

      if (!desiredName) throw new Error("Kies eerst een naam");
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(requesterEmail)) throw new Error("Vul een geldig e-mailadres in");
      
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/request_claim_action`, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: rpcHeaders(),
        body: JSON.stringify({
          desired_name: desiredName,
          requester_note: requesterNote || null,
          requester_email: requesterEmail,
          requester_meta: collectVisitorMeta()
        })
      });
      return await parseResponse(res);
    }

    async function load() {
      try {
        const names = await getRequestableNames();
        fillNameSelect(names);
        if (!names.length) setStatus('Er staan nog geen beheerde namen klaar in de kieslijst.', 'warn');
        else setStatus();
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Kon namen niet laden";
        setStatus(rawMessage === "Failed to fetch" ? "Netwerk/CORS-fout bij contact met Supabase." : rawMessage, "warn");
      }
    }

    document.getElementById("requestBtn").addEventListener("click", async () => {
      try {
        setStatus("Versturen...", "info");
        const result = await requestClaim();
        document.getElementById("requestNoteInput").value = "";
        document.getElementById("requestEmailInput").value = "";
        document.getElementById("requestNameSelect").selectedIndex = 0;
        setStatus(result?.message || "Aanvraag verstuurd.", "ok", `<strong>${escapeHtml(result?.message || 'Aanvraag verstuurd.')}</strong><br>Na goedkeuring ontvang je op dit e-mailadres een persoonlijke activatielink.`);
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Er ging iets mis";
        const friendlyMessage = /claim_requests_unique_pending|Er is al een open aanvraag voor deze naam/i.test(rawMessage)
          ? 'Voor deze naam staat nog een open of nog niet goed vrijgegeven aanvraag in het systeem. Ververs de pagina of laat de beheerder de naam opnieuw claimbaar maken.'
          : rawMessage === "Failed to fetch"
            ? "Netwerk/CORS-fout bij contact met Supabase."
            : rawMessage;
        setStatus(friendlyMessage, "warn");
        try { await load(); } catch {}
      }
    });


    function initParallax() {
      const root = document.documentElement;
      let mx = 0, my = 0, tx = 0, ty = 0, raf = null;
      function step() {
        tx += (mx - tx) * 0.1;
        ty += (my - ty) * 0.1;
        root.style.setProperty('--mouse-x', `${tx.toFixed(2)}px`);
        root.style.setProperty('--mouse-y', `${ty.toFixed(2)}px`);
        if (Math.abs(tx - mx) > 0.2 || Math.abs(ty - my) > 0.2) {
          raf = requestAnimationFrame(step);
        } else {
          raf = null;
        }
      }
      window.addEventListener('mousemove', (event) => {
        const x = event.clientX / window.innerWidth - 0.5;
        const y = event.clientY / window.innerHeight - 0.5;
        mx = x * 30;
        my = y * 24;
        if (!raf) raf = requestAnimationFrame(step);
      }, { passive: true });
    }
    // v40: pre-rendered background, so parallax is disabled for performance.
    load();
  </script>

<style>
  .player-session-corner{position:fixed;top:14px;right:14px;z-index:9999;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.08);border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,.12);padding:8px 10px;min-width:112px;display:none;backdrop-filter:blur(8px)}
  .player-session-corner.is-visible{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .player-session-corner-label{font-size:11px;line-height:1.15;color:#5f5b53;text-align:right}
  .player-session-corner-name{font-size:13px;line-height:1.1;font-weight:800;color:#111;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-session-corner-btn{appearance:none;border:0;border-radius:999px;background:#111;color:#fff;font:inherit;font-weight:800;font-size:11px;line-height:1;padding:7px 10px;cursor:pointer;box-shadow:none}

</style>
<div id="playerSessionCorner" class="player-session-corner" aria-live="polite">
  <div class="player-session-corner-label">Ingelogd als</div>
  <div id="playerSessionCornerName" class="player-session-corner-name"></div>
  <button id="playerSessionCornerLogout" type="button" class="player-session-corner-btn">Log out</button>
</div>
<script>
(function(){
  const CONFIG = window.GEJAST_CONFIG || {};
  const SUPABASE_URL = CONFIG.SUPABASE_URL || '';
  const SUPABASE_KEY = CONFIG.SUPABASE_PUBLISHABLE_KEY || '';
  const SESSION_KEYS = ['jas_session_token_v11','jas_session_token_v10'];
  const box = document.getElementById('playerSessionCorner');
  const nameEl = document.getElementById('playerSessionCornerName');
  const btn = document.getElementById('playerSessionCornerLogout');
  if (!box || !nameEl || !btn) return;
  function getToken(){
    for (const key of SESSION_KEYS){
      const value = localStorage.getItem(key) || sessionStorage.getItem(key);
      if (value) return value;
    }
    return '';
  }
  function clearTokens(){
    for (const key of SESSION_KEYS){
      localStorage.removeItem(key);
      sessionStorage.removeItem(key);
    }
  }
  function rpcHeaders(){
    return { 'Content-Type':'application/json', apikey: SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` };
  }
  async function fetchMyName(token){
    if (!token || !SUPABASE_URL || !SUPABASE_KEY) return '';
    const payload = JSON.stringify({ session_token: token });
    for (const rpc of ['get_public_state','get_gejast_homepage_state','get_jas_app_state']){
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${rpc}`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: payload });
        const data = await res.json().catch(()=>null);
        if (!res.ok) continue;
        const name = data?.my_name || data?.display_name || data?.player_name || '';
        if (name) return name;
      } catch {}
    }
    return '';
  }
  function show(name){ nameEl.textContent = name; box.classList.add('is-visible'); }
  function hide(){ box.classList.remove('is-visible'); nameEl.textContent = ''; }
  btn.addEventListener('click', function(){ clearTokens(); hide(); window.location.reload(); });
  document.addEventListener('DOMContentLoaded', async function(){
    const token = getToken();
    if (!token) return hide();
    const name = await fetchMyName(token);
    if (name) show(name); else hide();
  });
})();
</script>
