<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naam aanvragen</title>
  <style>
    :root {
      --gold: #d4af37;
      --black: #111111;
      --soft: #f3f1ec;
      --soft-2: #ebe7df;
      --card: rgba(255, 255, 255, 0.95);
      --line: rgba(17, 17, 17, 0.08);
      --muted: #6b7280;
      --blue: #2563eb;
      --shadow: 0 28px 70px rgba(17, 17, 17, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 26%),
        radial-gradient(circle at bottom right, rgba(17, 17, 17, 0.07), transparent 24%),
        linear-gradient(135deg, #f2efe8, #f8f7f3 44%, #ece8e0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
      padding: 28px;
      overflow-x: hidden;
      color: var(--black);
    }

    .page-bg,
    .brand-watermark,
    .spinoza-shadow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .page-bg {
      background-image: url('./123zwartkaart.png');
      background-size: 255px;
      background-repeat: repeat;
      background-position: center;
      opacity: 0.13;
      filter: grayscale(100%) contrast(1.12) brightness(0.98);
      mix-blend-mode: multiply;
    }

    .brand-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(50vw, 520px);
      transform: translate(-50%, -50%);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      filter: saturate(0.98) brightness(1.0);
    }

    .brand-watermark img {
      display: block;
      width: 100%;
      height: auto;
    }

    .spinoza-shadow {
      position: fixed;
      left: -18px;
      bottom: 0;
      width: min(33vw, 380px);
      opacity: 0.16;
      pointer-events: none;
      z-index: 0;
      filter: saturate(1.04) contrast(1.02);
    }

    .spinoza-shadow {
      transform: none;
    }

    .spinoza-shadow img {
      display: block;
      width: 100%;
      height: auto;
    }

    .playing-card-accent {
      position: fixed;
      right: -18px;
      bottom: 8%;
      width: min(21vw, 235px);
      opacity: 0.25;
      transform: rotate(10deg);
      pointer-events: none;
      z-index: 0;
      filter: sepia(0.24) saturate(1.28) contrast(1.1) brightness(1.04);
      transform-origin: center right;
    }

    .playing-card-accent img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 22px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      padding: 30px 34px 34px;
      border-radius: 28px;
      text-align: center;
      max-width: 760px;
      width: 100%;
      box-shadow: var(--shadow);
      position: relative;
      margin: 20px;
      z-index: 2;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(212,175,55,0.085), transparent 34%, rgba(17,17,17,0.05));
      pointer-events: none;
    }

    .logo-corner {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 84px;
      height: 84px;
      object-fit: contain;
      opacity: 0.96;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.08));
    }

    .back-link {
      position: absolute;
      left: 18px;
      top: 20px;
      font-size: 14px;
      text-decoration: none;
      color: var(--blue);
      background: rgba(255,255,255,0.7);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 24px 0 8px 0;
      font-size: 2.1rem;
      line-height: 1.02;
      padding: 0 80px;
      letter-spacing: -0.035em;
      position: relative;
      z-index: 1;
    }

    p {
      color: var(--muted);
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    select, textarea {
      padding: 12px 13px;
      margin: 10px 0;
      width: 100%;
      font-size: 15px;
      border: 1px solid rgba(17,17,17,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 12px 20px;
      margin-top: 8px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      background: var(--gold);
      color: var(--black);
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17,17,17,0.09);
    }

    #status {
      color: var(--muted);
      min-height: 22px;
      margin-top: 14px;
      white-space: pre-wrap;
      position: relative;
      z-index: 1;
    }

    .watermark {
      position: fixed;
      right: 20px;
      bottom: 14px;
      color: rgba(17,17,17,0.28);
      font-size: 14px;
      user-select: none;
      pointer-events: none;
      z-index: 3;
      letter-spacing: 0.02em;
    }

    @media (max-width: 760px) {
      body { padding: 18px 18px 16px; }

      h1 {
        padding: 0;
        margin-top: 78px;
      }

      .brand-watermark {
        width: min(70vw, 380px);
      }

      .spinoza-shadow {
        width: min(48vw, 250px);
      }

      .playing-card-accent {
        width: min(38vw, 175px);
        opacity: 0.44;
      }

      .logo-corner {
        top: 12px;
        right: 12px;
        width: 68px;
        height: 68px;
      }

      .back-link {
        top: 12px;
        left: 12px;
      }

      .card {
        padding: 24px 18px;
        margin: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
  <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
  <div class="playing-card-accent"><img src="./playingcard-accent.png" alt="" /></div>

  <div class="card">
    <a href="./index.html" class="back-link">Terug</a>
    <img src="./logo.png" alt="Logo" class="logo-corner" />

    <h1>Naam aanvragen</h1>
    <p>Kies je naam en leg kort uit waarom die van jou is.</p>

    <select id="requestNameSelect"></select>
    <textarea id="requestNoteInput" placeholder="Leg kort uit waarom jij deze naam wilt claimen"></textarea>
    <button id="requestBtn" type="button">Vraag naam aan</button>

    <div id="status"></div>
  </div>

  <div class="watermark">Made by Bruis · v17</div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function rpcHeaders() {
      return {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        "Content-Type": "application/json",
        Accept: "application/json"
      };
    }

    async function parseResponse(res) {
      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        throw new Error(text || `HTTP ${res.status}`);
      }

      if (!res.ok) {
        throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function fillNameSelect(id, names) {
      const select = document.getElementById(id);
      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = true;
      select.appendChild(placeholder);

      (names || []).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    async function getState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: rpcHeaders(),
        body: JSON.stringify({ session_token: null })
      });
      return await parseResponse(res);
    }

    async function requestClaim() {
      const desiredName = document.getElementById("requestNameSelect").value;
      const requesterNote = document.getElementById("requestNoteInput").value.trim();

      if (!desiredName) throw new Error("Kies eerst een naam");

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/request_claim`, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: rpcHeaders(),
        body: JSON.stringify({
          desired_name: desiredName,
          requester_note: requesterNote
        })
      });

      return await parseResponse(res);
    }

    async function load() {
      try {
        const state = await getState();
        fillNameSelect("requestNameSelect", state.all_names || []);
        document.getElementById("status").textContent = "";
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Kon namen niet laden";
        document.getElementById("status").textContent =
          rawMessage === "Failed to fetch"
            ? "Netwerk/CORS-fout bij contact met Supabase."
            : rawMessage;
      }
    }

    document.getElementById("requestBtn").addEventListener("click", async () => {
      try {
        document.getElementById("status").textContent = "Bezig...";
        const data = await requestClaim();
        document.getElementById("requestNoteInput").value = "";
        document.getElementById("status").textContent = data.message || "Aanvraag verstuurd";
      } catch (err) {
        const rawMessage = err instanceof Error ? err.message : "Er ging iets mis";
        document.getElementById("status").textContent =
          rawMessage === "Failed to fetch"
            ? "Netwerk/CORS-fout bij contact met Supabase."
            : rawMessage;
      }
    });

    load();
  </script>
</body>
</html>
