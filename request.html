<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naam aanvragen</title>
  <style>
    :root {
      --gold: #d4af37;
      --black: #111111;
      --soft: #f5f7fb;
      --card: #ffffff;
      --muted: #6b7280;
      --blue: #2563eb;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--soft);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }

    .card {
      background: var(--card);
      padding: 32px;
      border-radius: 18px;
      text-align: center;
      max-width: 760px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      position: relative;
      margin: 24px;
    }

    .logo-corner {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 78px;
      height: 78px;
      object-fit: contain;
      opacity: 0.95;
    }

    .back-link {
      position: absolute;
      left: 16px;
      top: 16px;
      font-size: 14px;
      text-decoration: none;
      color: var(--blue);
    }

    h1 {
      margin: 12px 0 10px 0;
      font-size: 2.1rem;
      line-height: 1.15;
      padding: 0 88px;
    }

    p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    select, textarea {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 12px 16px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      background: var(--blue);
      color: white;
    }

    #status {
      color: var(--muted);
      min-height: 22px;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .watermark {
      position: fixed;
      right: 16px;
      bottom: 12px;
      color: rgba(17,17,17,0.22);
      font-size: 14px;
      user-select: none;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      h1 {
        padding: 0;
        margin-top: 70px;
      }

      .logo-corner {
        top: 12px;
        right: 12px;
        width: 64px;
        height: 64px;
      }

      .back-link {
        top: 14px;
        left: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="./index.html" class="back-link">Terug</a>
    <img src="logo.png" alt="Logo" class="logo-corner" />

    <h1>Naam aanvragen</h1>
    <p>Kies je naam en leg kort uit waarom die van jou is.</p>

    <select id="requestNameSelect"></select>
    <textarea id="requestNoteInput" placeholder="Leg kort uit waarom jij deze naam wilt claimen"></textarea>
    <button id="requestBtn" type="button">Vraag naam aan</button>

    <div id="status"></div>
  </div>

  <div class="watermark">Made by Bruis</div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliadkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function rpcHeaders() {
      return {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
        "Content-Type": "application/json",
        Accept: "application/json"
      };
    }

    async function parseResponse(res) {
      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        throw new Error(text || `HTTP ${res.status}`);
      }

      if (!res.ok) {
        throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function fillNameSelect(id, names) {
      const select = document.getElementById(id);
      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = true;
      select.appendChild(placeholder);

      (names || []).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    async function getState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method: "POST",
        headers: rpcHeaders(),
        body: JSON.stringify({
          session_token: null
        })
      });

      return await parseResponse(res);
    }

    async function requestClaim() {
      const desiredName = document.getElementById("requestNameSelect").value;
      const requesterNote = document.getElementById("requestNoteInput").value.trim();

      if (!desiredName) throw new Error("Kies eerst een naam");

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/request_claim`, {
        method: "POST",
        headers: rpcHeaders(),
        body: JSON.stringify({
          desired_name: desiredName,
          requester_note: requesterNote
        })
      });

      return await parseResponse(res);
    }

    async function load() {
      try {
        const state = await getState();
        fillNameSelect("requestNameSelect", state.all_names || []);
        document.getElementById("status").textContent = "";
      } catch (err) {
        document.getElementById("status").textContent =
          err instanceof Error ? err.message : "Kon namen niet laden";
      }
    }

    document.getElementById("requestBtn").addEventListener("click", async () => {
      try {
        document.getElementById("status").textContent = "Bezig...";
        const data = await requestClaim();
        document.getElementById("requestNoteInput").value = "";
        document.getElementById("status").textContent = data.message || "Aanvraag verstuurd";
      } catch (err) {
        document.getElementById("status").textContent =
          err instanceof Error ? err.message : "Er ging iets mis";
      }
    });

    load();
  </script>
</body>
</html>
