<!DOCTYPE html>
<html lang="nl">
<head>
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
<meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Klaverjas live</title>
  <script>window.GEJAST_PAGE_VERSION='v348';</script>
  <script src="./gejast-config.js?v348"></script>
  <script src="./gejast-live-summary.js?v348"></script>
  <style>
    :root{--paper:#fbf6ef;--line:rgba(0,0,0,.08);--muted:#6b6257;--ink:#201b16;--gold:#9a8241}
    *{box-sizing:border-box}
    body{margin:0;padding:18px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(240,235,226,.94),rgba(240,235,226,.96)),url('./site-bg-desktop.webp') center/cover fixed;color:var(--ink)}
    .wrap{max-width:980px;margin:0 auto}.card{background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:22px;box-shadow:0 20px 40px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}
    .muted{color:var(--muted)}.score{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:20px 0}.scorebox{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}.scorebox span{display:block;font-size:12px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}.scorebox strong{display:block;margin-top:8px;font-size:42px}
    .panel{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}.round{padding:12px 0;border-top:1px solid rgba(0,0,0,.06)}.round:first-child{border-top:none}.teams{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}
    @media(max-width:720px){body{padding:12px}.score,.teams{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <a class="btn" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./index.html';}">Terug</a>
          <h1 style="margin:16px 0 6px">Klaverjas live</h1>
          <div id="meta" class="muted">Live scoreblad wordt geladen…</div>
        </div>
        <a class="btn" href="./index.html">Home</a>
      </div>
      <div class="teams">
        <div class="panel"><div class="muted">Wij</div><strong id="teamWij">—</strong></div>
        <div class="panel"><div class="muted">Zij</div><strong id="teamZij">—</strong></div>
      </div>
      <div class="score">
        <div class="scorebox"><span>Wij</span><strong id="scoreWij">0</strong></div>
        <div class="scorebox"><span>Zij</span><strong id="scoreZij">0</strong></div>
      </div>
      <div class="panel"><h2 style="margin:0 0 8px">Samenvatting</h2><div id="recap" class="muted">Nog geen tekst.</div></div>
      <div class="panel"><h2 style="margin:0 0 8px">Rondes</h2><div id="rounds" class="muted">Nog geen rondes geregistreerd.</div></div>
    </div>
  </div>
  <div class="site-credit-watermark" data-version-watermark></div>
    <script>
  (()=>{
    const live = window.GEJAST_LIVE_SUMMARY || {};
    let pollId = null;
    function esc(v){return String(v??'').replace(/[&<>"]/g,(m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function render(item){
      const summary=(live.summaryFromItem?live.summaryFromItem(item):((item&&item.summary_payload)||{}))||{};
      const teams=summary.teams||{};
      const rounds=Array.isArray(summary.rounds)?summary.rounds:[];
      document.getElementById('meta').textContent=live.metaText?live.metaText(item):'Live scoreblad';
      document.getElementById('teamWij').textContent=(teams.wij||[]).join(' · ')||'—';
      document.getElementById('teamZij').textContent=(teams.zij||[]).join(' · ')||'—';
      document.getElementById('scoreWij').textContent=Number(summary.totals?.wij||0);
      document.getElementById('scoreZij').textContent=Number(summary.totals?.zij||0);
      document.getElementById('recap').textContent=summary.recap_text||'Nog geen samenvatting.';
      document.getElementById('rounds').innerHTML=rounds.length?rounds.map((r,idx)=>`<div class="round"><strong>Ronde ${esc(r.round||idx+1)}</strong><div class="muted">${esc(r.contract?.team||'')} ${esc(r.contract?.bid||'')} ${esc(r.contract?.suit||'')}</div><div>Wij: ${Number(r.fw||0)} · Zij: ${Number(r.fz||0)}</div></div>`).join(''):'Nog geen rondes geregistreerd.';
      if (live.isFinished && live.isFinished(item) && pollId) { clearInterval(pollId); pollId = null; }
    }
    async function load(){
      const identity = live.matchIdentityFromUrl ? live.matchIdentityFromUrl() : { clientMatchId:'', matchRef:'' };
      if(!identity.clientMatchId && !identity.matchRef){ document.getElementById('meta').textContent='Geen client_match_id of match_ref meegegeven.'; return; }
      try{ render(await live.loadPublicSummary('klaverjas', identity)); }catch(err){ document.getElementById('meta').textContent=err.message||'Laden mislukt.'; }
    }
    load();
    pollId = setInterval(load,5000);
  })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
