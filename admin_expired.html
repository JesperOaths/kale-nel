  <script>
    const ADMIN_SESSION_KEY = "jas_admin_session_v8";
    const SUPABASE_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_URL) || 'https://uiqntazgnrxwliaidkmy.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY) || 'sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA';
    const MAKE_WEBHOOK_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.MAKE_WEBHOOK_URL) || 'https://hook.eu1.make.com/h63v9tzv3o1i8hqtx2m5lfugrn5funy6';
    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`, 'Content-Type': 'application/json', Accept: 'application/json' }; }
    async function parseResponse(res) { const text = await res.text(); let data = null; try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); } if (!res.ok) throw new Error(data?.message || data?.error || data?.details || data?.hint || `HTTP ${res.status}`); return data; }
    function getToken(){ return (window.GEJAST_ADMIN_SESSION && window.GEJAST_ADMIN_SESSION.getToken()) || sessionStorage.getItem(ADMIN_SESSION_KEY) || localStorage.getItem(ADMIN_SESSION_KEY); }
    function setStatus(message='', tone='') { const box=document.getElementById('statusBox'); box.className=`status ${tone}`.trim(); box.textContent=message; }
    function extractIdLike(value){ if (typeof value === 'number' && Number.isFinite(value)) return value; const text=String(value||'').trim(); if(!text) return null; const direct=Number(text); if(Number.isFinite(direct)) return direct; const match=text.match(/^\(?\s*(\d+)/); return match ? Number(match[1]) : null; }
    function normalizeExpiredRow(row){ const out={...(row||{})}; out.request_id = extractIdLike(out.request_id ?? out.id ?? out.claim_request_id); out.id = extractIdLike(out.id ?? out.request_id ?? out.claim_request_id); return out; }
    function activationBaseUrl(){ const url = new URL('./activate.html', window.location.href); if (url.protocol === 'http:' && !/^(localhost|127\.0\.0\.1)$/i.test(url.hostname)) url.protocol = 'https:'; return url.toString(); }
    async function ensureGate(){ if(window.GEJAST_ADMIN_SESSION && typeof window.GEJAST_ADMIN_SESSION.requirePage==='function'){ return await window.GEJAST_ADMIN_SESSION.requirePage('admin_expired.html'); } const token=getToken(); if(!token){ window.location.href='./admin.html?return_to=admin_expired.html'; return false; } try { await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_check_session`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: token }) }).then(parseResponse); return true; } catch { window.location.href='./admin.html?return_to=admin_expired.html'; return false; } }
    const DATE_TIME_24H = new Intl.DateTimeFormat('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    function formatDateTime(value){ if(!value) return 'Onbekend'; const date = value instanceof Date ? value : new Date(value); return Number.isNaN(date.getTime()) ? String(value) : DATE_TIME_24H.format(date).replace(',', ''); }
    

function isValidEmail(value){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value||'').trim()); }
function isLikelyHttpUrl(value){ return /^https?:\/\//i.test(String(value||'').trim()); }
function hasUsefulMailContent(value){ return String(value||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().length >= 3; }
function normalizeMakeWebhookPayload(payload = {}, fallback = {}) {
  const raw = (payload && typeof payload === 'object') ? payload : {};
  const nested = (raw.mail_job && typeof raw.mail_job === 'object') ? raw.mail_job : {};
  const payloadData = (raw.payload && typeof raw.payload === 'object') ? raw.payload : {};
  const fallbackData = (fallback && typeof fallback === 'object') ? fallback : {};
  const email = String(raw.to || raw.email || raw.recipient_email || nested.to || nested.email || nested.recipient_email || payloadData.to || payloadData.email || payloadData.recipient_email || payloadData.requester_email || fallbackData.to || fallbackData.email || fallbackData.recipient_email || '').trim().toLowerCase();
  const subject = String(raw.subject || raw.email_subject || nested.subject || nested.email_subject || payloadData.subject || payloadData.email_subject || fallbackData.subject || fallbackData.email_subject || (window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel').trim();
  const activationUrl = String(raw.activation_url || raw.reset_url || raw.url || nested.activation_url || nested.reset_url || nested.url || payloadData.activation_url || payloadData.reset_url || payloadData.url || fallbackData.activation_url || fallbackData.reset_url || fallbackData.url || '').trim();
  const trigger = String(raw.trigger || nested.trigger || fallbackData.trigger || 'activation_email_queued').trim();
  const html = raw.html || nested.html || payloadData.html || fallbackData.html || null;
  const text = raw.text || nested.text || payloadData.text || fallbackData.text || null;
  const body = raw.body || nested.body || payloadData.body || fallbackData.body || null;
  const template = raw.template || nested.template || payloadData.template || fallbackData.template || null;
  const merged = {
    trigger,
    source: raw.source || fallbackData.source || location.pathname.split('/').pop() || 'site',
    ts: raw.ts || fallbackData.ts || new Date().toISOString(),
    job_id: raw.job_id ?? nested.job_id ?? fallbackData.job_id ?? null,
    request_id: raw.request_id ?? nested.request_id ?? payloadData.request_id ?? fallbackData.request_id ?? null,
    player_id: raw.player_id ?? nested.player_id ?? payloadData.player_id ?? fallbackData.player_id ?? null,
    display_name: raw.display_name || nested.display_name || payloadData.display_name || fallbackData.display_name || null,
    to: email || null,
    email: email || null,
    recipient_email: email || null,
    recipient_name: raw.recipient_name || nested.recipient_name || payloadData.recipient_name || fallbackData.recipient_name || null,
    subject,
    email_subject: subject,
    activation_url: activationUrl || null,
    reset_url: activationUrl || null,
    url: activationUrl || null,
    html,
    text,
    body,
    template,
    expires_at: raw.expires_at || nested.expires_at || payloadData.expires_at || fallbackData.expires_at || null,
    created_at: raw.created_at || nested.created_at || payloadData.created_at || fallbackData.created_at || null,
    payload: Object.keys(payloadData).length ? payloadData : undefined,
    mail_job: Object.keys(nested).length ? nested : undefined
  };
  if (merged.ts && !merged.ts_local && typeof formatDateTime === 'function') merged.ts_local = formatDateTime(merged.ts);
  if (merged.expires_at && !merged.expires_at_local && typeof formatDateTime === 'function') merged.expires_at_local = formatDateTime(merged.expires_at);
  if (merged.created_at && !merged.created_at_local && typeof formatDateTime === 'function') merged.created_at_local = formatDateTime(merged.created_at);
  return Object.fromEntries(Object.entries(merged).filter(([, value]) => value !== undefined && value !== null && value !== ''));
}
function validateMakePayloadLocally(meta = {}) {
  const payload = normalizeMakeWebhookPayload(meta);
  const reasons = [];
  const email = String(payload.to || payload.email || payload.recipient_email || '').trim();
  const subject = String(payload.email_subject || payload.subject || '').trim();
  const activationUrl = String(payload.activation_url || payload.reset_url || payload.url || '').trim();
  const trigger = String(payload.trigger || 'activation_email_queued').trim();
  const hasContent = !!(payload.template || hasUsefulMailContent(payload.html) || hasUsefulMailContent(payload.text) || hasUsefulMailContent(payload.body));
  if (!email) reasons.push('missing_email');
  else if (!isValidEmail(email)) reasons.push('invalid_email');
  if (!subject) reasons.push('missing_subject');
  else if (!hasUsefulMailContent(subject)) reasons.push('blank_subject');
  if (!hasContent) reasons.push('missing_template_or_body');
  if (/activation|reset|reactivat/i.test(trigger) || activationUrl) {
    if (!activationUrl) reasons.push('missing_activation_url');
    else if (!isLikelyHttpUrl(activationUrl)) reasons.push('invalid_activation_url');
  }
  return { ok: reasons.length === 0, reasons, payload, message: reasons.length ? `Mailjob niet naar Make gestuurd: ${reasons.join(', ')}` : 'ok' };
}

    function buildMakeWebhookMeta(source, meta = {}) { return normalizeMakeWebhookPayload({ source, ...meta }, { source }); }
    async function fetchOutboundEmailWebhookPayload(jobId, fallbackMeta = {}) { if (!jobId) return normalizeMakeWebhookPayload(fallbackMeta, fallbackMeta); const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_get_outbound_email_job_webhook_payload`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), job_id_input: Number(jobId) }) }); const data = await parseResponse(res); return normalizeMakeWebhookPayload(data?.payload || data?.make_payload || data || {}, fallbackMeta); }

async function validateOutboundEmailJob(jobId, options={}) { if (!jobId) return { ok:false, reasons:['missing_job_id'], message:'Mailjob-id ontbreekt.' }; return await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_validate_outbound_email_job`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), job_id_input: Number(jobId), mark_failed_input: options.markFailed !== false }) }).then(parseResponse); }
    function formatMailPreflight(validation){ const reasons = Array.isArray(validation?.reasons) ? validation.reasons.filter(Boolean) : []; return `Mailjob niet naar Make gestuurd: ${reasons.length ? reasons.join(', ') : (validation?.message || 'onvolledige mailpayload')}`; }
    async function triggerMakeScenario(meta = {}) { if (!MAKE_WEBHOOK_URL) return { ok:false, skipped:true }; const payload = buildMakeWebhookMeta('admin_expired.html', meta);
      const localValidation = validateMakePayloadLocally(payload);
      if (!localValidation.ok) throw new Error(localValidation.message); const res = await fetch(MAKE_WEBHOOK_URL, { method:'POST', mode:'cors', cache:'no-store', keepalive:true, headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body:JSON.stringify(localValidation.payload) }); if (!res.ok) throw new Error(`Make webhook ping mislukte (HTTP ${res.status})`); return { ok:true, via:'fetch-json', status:res.status }; }
    async function listExpired(){ const data = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_get_expired_activation_queue`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken() }) }).then(parseResponse); return Array.isArray(data) ? data : (data?.items || []); }
    async function updateActivationEmailSubject(row) { return await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_set_activation_email_subject_action`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), request_id_input: String(row.request_id), desired_subject: (window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel' }) }).then(parseResponse); }
    async function requeueAndResend(row) { const result = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_requeue_expired_activation_action`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), request_id_input: String(row.request_id), base_url: activationBaseUrl() }) }).then(parseResponse); try { await updateActivationEmailSubject(row); } catch {} const jobId = result?.job_id ?? result?.queue_job_id ?? null; const validation = await validateOutboundEmailJob(jobId, { markFailed:true }); if (!validation?.ok) throw new Error(formatMailPreflight(validation)); const makePayload = await fetchOutboundEmailWebhookPayload(jobId, { request_id: row.request_id, job_id: jobId, player_id: result?.player_id ?? row.player_id ?? null, display_name: result?.display_name ?? row.display_name ?? row.requested_name ?? null, email: result?.requester_email ?? row.requester_email ?? null, activation_url: result?.activation_url ?? null, expires_at: result?.expires_at ?? row.expires_at ?? null, created_at: row.created_at ?? null, subject: result?.subject ?? ((window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel'), email_subject: result?.email_subject ?? result?.subject ?? ((window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel'), reason:'expired_requeue_mail' }); await triggerMakeScenario(makePayload); return result; }
    async function resendOnly(row) { const result = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_resend_expired_activation_action`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), request_id_input: String(row.request_id), base_url: activationBaseUrl() }) }).then(parseResponse); const jobId = result?.job_id ?? result?.queue_job_id ?? null; const validation = await validateOutboundEmailJob(jobId, { markFailed:true }); if (!validation?.ok) throw new Error(formatMailPreflight(validation)); const makePayload = await fetchOutboundEmailWebhookPayload(jobId, { request_id: row.request_id, job_id: jobId, player_id: result?.player_id ?? row.player_id ?? null, display_name: result?.display_name ?? row.display_name ?? row.requested_name ?? null, email: result?.requester_email ?? row.requester_email ?? null, activation_url: result?.activation_url ?? null, expires_at: result?.expires_at ?? row.expires_at ?? null, created_at: row.created_at ?? null, subject: result?.subject ?? ((window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel'), email_subject: result?.email_subject ?? result?.subject ?? ((window.GEJAST_CONFIG && window.GEJAST_CONFIG.EMAIL_SUBJECT) || 'Activeer je account voor de Kale Nel'), reason:'expired_resend_mail' }); await triggerMakeScenario(makePayload); return result; }
    async function removeExpiredUser(row) { return await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_remove_player_action`, { method:'POST', mode:'cors', cache:'no-store', headers:rpcHeaders(), body:JSON.stringify({ admin_session_token: getToken(), request_id_input: String(row.request_id), decision_reason_input: 'Admin delete vanuit expired queue' }) }).then(parseResponse); }
    async function loadExpired(){ try { setStatus('Laden...'); const rows = (await listExpired()).map(normalizeExpiredRow).filter((row) => row.request_id !== null); const root = document.getElementById('listRoot'); root.innerHTML = ''; if (!rows.length) { root.innerHTML = '<div class="empty">Geen verlopen activaties gevonden.</div>'; setStatus('Lijst geladen.', 'ok'); return; } rows.forEach((row) => { const card = document.createElement('article'); card.className = 'item'; card.innerHTML = `<strong>${row.display_name || row.requested_name || 'Onbekende naam'}</strong><div class="meta">${row.requester_email || '-'} · verlopen op ${formatDateTime(row.expires_at)} </div><div class="meta">Laatste status: ${row.status || row.request_status || 'verlopen'}</div><div class="row"><button class="btn primary" data-action="requeue">Opnieuw klaarzetten</button><button class="btn delete-btn" data-action="remove">Gebruiker verwijderen</button></div><div class="meta" style="margin-top:10px; min-height:18px;" id="row-msg-${row.request_id}"></div>`; const msg = card.querySelector(`#row-msg-${row.request_id}`); card.querySelector('[data-action="requeue"]').addEventListener('click', async () => { try { msg.textContent = 'Opnieuw klaarzetten...'; const result = await requeueAndResend(row); const diag = []; if (result?.activation_url) diag.push('activatielink aangemaakt'); if (result?.job_id || result?.queue_job_id) diag.push('mailjob gequeued'); setStatus(result?.message || 'Nieuwe activatielink klaargezet en mail opnieuw verstuurd. Naam staat nu weer bij wacht op activatie.', 'ok'); msg.textContent = (result?.message || 'Opnieuw klaargezet.') + (diag.length ? ' (' + diag.join(', ') + ')' : ''); window.alert('Nieuwe activatielink klaargezet. De naam is uit verlopen gehaald, de mail is opnieuw verstuurd en de naam hoort nu weer onder Wacht op activatie te staan.'); await loadExpired(); } catch (error) { msg.textContent = error?.message || 'Mislukt'; setStatus(error?.message || 'Opnieuw klaarzetten mislukt.', 'warn'); } }); card.querySelector('[data-action="remove"]').addEventListener('click', async () => { if (!confirm('Deze account- en aanvraagdata verwijderen?')) return; try { msg.textContent = 'Account verwijderen...'; const result = await removeExpiredUser(row); setStatus(result?.message || 'Account verwijderd.', 'ok'); window.alert('Account verwijderd en uit de verlopen lijst gehaald.'); await loadExpired(); } catch (error) { msg.textContent = error?.message || 'Mislukt'; setStatus(error?.message || 'Verwijderen mislukt.', 'warn'); } }); root.appendChild(card); }); setStatus('Lijst geladen.', 'ok'); } catch (error) { document.getElementById('listRoot').innerHTML = `<div class="empty"><strong>Verlopen-lijst kon niet geladen worden.</strong><br><br>Draai de v73 SQL-patch opnieuw. Huidige fout:<br><code>${String(error?.message || 'onbekend')}</code></div>`; setStatus(error?.message || 'Laden mislukt.', 'warn'); } }
