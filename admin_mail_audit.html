<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />

  <title>Maildiagnostiek - Wordt er gejast?</title>
  <script>window.GEJAST_PAGE_VERSION='v636';</script><script src="./gejast-config.js?v636"></script>
  <script src="./gejast-home-gate.js?v636"></script><script src="./gejast-scope-context.js?v636"></script><script src="./gejast-family-rollout.js?v636"></script>
  <script src="./admin-session-sync.js?v636"></script>

  <style>
    :root { --gold:#9a8241; --card:#f9f7f2; --line:rgba(0,0,0,0.08); --muted:#6b655b; --ok:#2b5b37; --warn:#8b3a30; }
    *{box-sizing:border-box} body{margin:0;padding:20px;font-family:Inter,sans-serif;background:linear-gradient(rgba(232,228,217,0.92), rgba(232,228,217,0.92)), url('./wordtergejast.png') center/cover no-repeat scroll;min-height:100vh}
    .main{max-width:980px;margin:0 auto;background:var(--card);border-radius:26px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,0.08);position:relative}
    .logo{position:absolute;top:24px;right:24px;width:42px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:12px;padding:12px 14px;font:inherit;font-weight:800;cursor:pointer;text-decoration:none}.ghost{background:#fff;border:1px solid rgba(0,0,0,0.08);color:#222}.primary{background:var(--gold);color:#111}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.card{background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:18px;padding:16px}.muted{color:var(--muted)} code,pre{white-space:pre-wrap;word-break:break-word} .status{min-height:20px;margin:14px 0}.status.ok{color:var(--ok)}.status.warn{color:var(--warn)} table{width:100%;border-collapse:collapse;font-size:14px} th,td{text-align:left;padding:8px;border-bottom:1px solid rgba(0,0,0,0.06)} @media(max-width:800px){.grid{grid-template-columns:1fr}} .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
  </style>
  <script src="./admin-topnav.js?v636"></script>
</head>
<body>
  <main class="main">
    <a href="./admin.html" aria-label="Terug naar admin-overzicht"><img src="./logo.png" class="logo" alt="logo"></a>
    <div class="top"><div><h1>Maildiagnostiek</h1><p class="muted">Controleer welke Make-webhook actief is, welke mail-RPC gebruikt wordt en wat de laatste mailjobstatus is.</p></div><div class="row"><a class="btn ghost" href="./admin.html">Terug naar hub</a><button id="refreshBtn" class="btn primary" type="button">Ververs</button></div></div>
    <div id="statusBox" class="status"></div>
    <div class="grid">
      <section class="card"><h2>Actieve configuratie</h2><table><tr><th>Make-webhook</th><td id="webhookCell"></td></tr><tr><th>Mail-RPC</th><td id="rpcCell"></td></tr><tr><th>Supabase-project</th><td id="supabaseCell"></td></tr></table></section>
      <section class="card"><h2>Laatste diagnose</h2><div id="summaryBox" class="muted">Nog niet geladen.</div></section>
      <section class="card" style="grid-column:1 / -1"><h2>Laatste mailjobs</h2><div id="jobsBox" class="muted">Nog niet geladen.</div></section>
    </div>
  </main>
  <script>
    const ADMIN_SESSION_KEY='jas_admin_session_v8';
    const SUPABASE_URL=(window.GEJAST_CONFIG&&window.GEJAST_CONFIG.SUPABASE_URL)||'https://uiqntazgnrxwliaidkmy.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY=(window.GEJAST_CONFIG&&window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY)||'sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA';
    const MAKE_WEBHOOK_URL=(window.GEJAST_CONFIG&&window.GEJAST_CONFIG.MAKE_WEBHOOK_URL)||'';
    const CLAIM_EMAIL_RPC=(window.GEJAST_CONFIG&&window.GEJAST_CONFIG.CLAIM_EMAIL_RPC)||'claim_email_jobs_http';
    const ADMIN_SOURCE = window.GEJAST_ADMIN_SOURCE || null;
    const DATE_TIME_24H = new Intl.DateTimeFormat('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    function formatDateTime(value){ if(!value) return ''; const date = value instanceof Date ? value : new Date(value); return Number.isNaN(date.getTime()) ? String(value) : DATE_TIME_24H.format(date).replace(',', ''); }
    function rpcHeaders(){return {apikey:SUPABASE_PUBLISHABLE_KEY,Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}`,'Content-Type':'application/json',Accept:'application/json'}}
    async function parseResponse(res){const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch{throw new Error(text||`HTTP ${res.status}`)} if(!res.ok) throw new Error(data?.message||data?.error||data?.details||data?.hint||`HTTP ${res.status}`); return data;}
    function token(){return sessionStorage.getItem(ADMIN_SESSION_KEY)||localStorage.getItem(ADMIN_SESSION_KEY)}
    function setStatus(msg='',tone=''){const el=document.getElementById('statusBox'); el.textContent=msg; el.className=`status ${tone}`.trim();}
    async function ensureGate(){ if(window.GEJAST_ADMIN_RPC && typeof window.GEJAST_ADMIN_RPC.requirePage==='function'){ return await window.GEJAST_ADMIN_RPC.requirePage('admin_mail_audit.html'); } if(window.GEJAST_ADMIN_SESSION && typeof window.GEJAST_ADMIN_SESSION.requirePage==='function'){ return await window.GEJAST_ADMIN_SESSION.requirePage('admin_mail_audit.html'); } if(!token()){ location.href='./admin.html?return_to=admin_mail_audit.html'; return false; } try { await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_check_session`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify({admin_session_token:token()})}).then(parseResponse); return true; } catch(err){ location.href='./admin.html?return_to=admin_mail_audit.html'; return false; } }
    async function loadDiagnostics(){ document.getElementById('webhookCell').textContent = MAKE_WEBHOOK_URL || 'Niet ingesteld'; document.getElementById('rpcCell').textContent = CLAIM_EMAIL_RPC; document.getElementById('supabaseCell').textContent = SUPABASE_URL; const data = ADMIN_SOURCE && typeof ADMIN_SOURCE.loadMailDiagnostics === 'function' ? await ADMIN_SOURCE.loadMailDiagnostics() : await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_get_mail_diagnostics`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify({admin_session_token:token()})}).then(parseResponse); const summary = []; if (data?.queue_table_exists===false) summary.push('Tabel outbound_email_jobs ontbreekt of is niet leesbaar.'); if (data?.queued_count!=null) summary.push(`In wachtrij: ${data.queued_count}`); if (data?.sent_count!=null) summary.push(`Verzonden: ${data.sent_count}`); if (data?.failed_count!=null) summary.push(`Mislukt: ${data.failed_count}`); if (data?.last_status) summary.push(`Laatste status: ${data.last_status}`); document.getElementById('summaryBox').textContent = summary.length ? summary.join(' · ') : 'Geen diagnosegegevens teruggekregen.'; const rows = Array.isArray(data?.jobs) ? data.jobs : []; document.getElementById('jobsBox').innerHTML = rows.length ? `<table><thead><tr><th>ID</th><th>Status</th><th>E-mail</th><th>Onderwerp</th><th>Fout / guard</th><th>Aangemaakt</th></tr></thead><tbody>${rows.map((row)=>`<tr><td>${row.id ?? ''}</td><td>${row.status ?? row.job_status ?? ''}</td><td>${row.recipient_email ?? row.to_email ?? ''}</td><td>${row.subject ?? ''}</td><td>${row.last_error ?? row.failure_reason ?? ''}</td><td>${formatDateTime(row.created_at)}</td></tr>`).join('')}</tbody></table>` : '<div class="muted">Geen recente mailjobs gevonden.</div>'; setStatus('Maildiagnostiek geladen.','ok'); }
    document.getElementById('refreshBtn').addEventListener('click',()=>loadDiagnostics().catch((err)=>setStatus(err?.message||'Laden mislukt.','warn')));
    setInterval(()=>{ if(!document.hidden) loadDiagnostics().catch(()=>{}); },15000);
    document.addEventListener('visibilitychange',()=>{ if(!document.hidden) loadDiagnostics().catch(()=>{}); });
    (async()=>{ if(await ensureGate()) loadDiagnostics().catch((err)=>setStatus(err?.message||'Laden mislukt.','warn')); })();
  </script>
  <div class="site-credit-watermark" data-version-watermark>v636 · Made by Bruis</div>
  <script src="./site-analytics.js?v636"></script>

<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
