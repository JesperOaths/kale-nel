<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Speler</title><script src="./gejast-config.js?v157"></script><style>:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}.wrap{max-width:1100px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}h1{margin:0;font-size:42px}.muted{color:var(--muted)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.game-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.tab{border:none;border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font:800 14px/1 Inter,system-ui,sans-serif;cursor:pointer}.tab.active{background:#201b16;color:#fff}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}.stat{background:#fff;border-radius:18px;border:1px solid var(--line);padding:14px}.stat span{display:block;font-size:12px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}.stat strong{display:block;margin-top:8px;font-size:26px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line);margin-top:16px}.point{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}.point:last-child{border-bottom:none}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:rgba(212,175,55,.18);font-size:12px;font-weight:800}.name-link{color:#201b16;text-decoration:none;font-weight:700}.name-link:hover{text-decoration:underline}.accordion{border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:10px}.accordion summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:800;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.accordion summary::-webkit-details-marker{display:none}.accordion .detail{padding:0 16px 16px}.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:10px}.mini{background:#fbfaf6;border:1px solid var(--line);border-radius:14px;padding:10px}.mini strong{display:block;font-size:.92rem}.mini span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}body{padding:16px}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div class="badge" id="badgeBox">Badge</div><h1 id="title">Speler</h1><div class="muted" id="subtitle">Profiel en wedstrijdgeschiedenis.</div></div><a class="btn" id="backLink" href="./profiles.html">Terug</a></div><div class="game-tabs" id="gameTabs"></div><div class="grid" id="statsGrid"><div class="stat"><span>Laden</span><strong>…</strong></div></div><section class="panel"><h2 style="margin:0 0 12px">Ratinggeschiedenis</h2><div id="historyWrap" class="muted">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Wedstrijden</h2><div id="matchesWrap" class="muted">Laden…</div></section></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const params=new URLSearchParams(location.search);const initialGame=(params.get('game')||'klaverjas').toLowerCase();const player=params.get('player')||'';const titles={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong'};let unified=null;let currentGame=initialGame;function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_player_unified)return payload.get_public_player_unified;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_player_unified)return payload[0].get_public_player_unified;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}function linkName(name, game=currentGame){return `<a class="name-link" href="./player.html?player=${encodeURIComponent(name||'')}&game=${encodeURIComponent(game)}">${name||'Onbekend'}</a>`}function nameList(names, game=currentGame){return (Array.isArray(names)?names:[]).map((n)=>linkName(n, game)).join(' · ')||'—'}function metricValue(v){return Number.isFinite(Number(v))?Math.round(Number(v)):0}function gameData(game){return unified?.games?.[game]||{player_name:player,summary:{},rating_history:[],matches:[],badge:'Starter'}}function renderTabs(){const wrap=document.getElementById('gameTabs');const entries=['klaverjas','boerenbridge','beerpong'];wrap.innerHTML=entries.map((g)=>`<button class="tab ${g===currentGame?'active':''}" data-game="${g}">${titles[g]}</button>`).join('');wrap.querySelectorAll('[data-game]').forEach((btn)=>btn.addEventListener('click',()=>{currentGame=btn.getAttribute('data-game');render();}));}function detailCards(match){const details=(Array.isArray(match.details)?match.details:[]).filter(Boolean); if(!details.length) return '<div class="muted">Geen extra details.</div>'; return `<div class="detail-grid">${details.map(d=>`<div class="mini"><strong>${linkName(d.player_name||'', currentGame)}</strong><span>${d.result_label||d.result||''}</span>${d.points!==undefined?`<span>Punten: ${d.points}</span>`:''}${d.rank!==undefined?`<span>Plek: ${d.rank}</span>`:''}${d.team?`<span>Team: ${d.team}</span>`:''}${d.cups_hit!==undefined?`<span>Raak: ${d.cups_hit}</span>`:''}</div>`).join('')}</div>`;}function render(){const overview=unified?.overview||{};document.getElementById('title').textContent=unified?.player_name||player||'Speler';const gd=gameData(currentGame);document.getElementById('badgeBox').textContent=gd.badge||overview.best_badge||'Starter';document.getElementById('subtitle').textContent=`Profiel en ${titles[currentGame].toLowerCase()}-geschiedenis.`;document.getElementById('backLink').href=params.get('game')?`./ladder.html?game=${encodeURIComponent(params.get('game'))}`:'./profiles.html';renderTabs();const s=gd.summary||{};document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>ELO</span><strong>${metricValue(s.elo_rating||1000)}</strong></div><div class="stat"><span>Gespeeld</span><strong>${metricValue(s.games_played||s.matches_played||0)}</strong></div><div class="stat"><span>Win%</span><strong>${Number(s.win_pct||0).toFixed(0)}%</strong></div><div class="stat"><span>Winst / verlies</span><strong>${metricValue(s.wins||0)} / ${metricValue(s.losses||0)}</strong></div><div class="stat"><span>Totaal site</span><strong>${metricValue(overview.total_matches||0)}</strong></div>`;const hist=Array.isArray(gd.rating_history)?gd.rating_history:[];document.getElementById('historyWrap').innerHTML=hist.length?hist.map(h=>`<div class="point"><span>${dateFmt(h.created_at)}</span><strong>${metricValue(h.rating_after||1000)}</strong></div>`).join(''):'Geen ratinggeschiedenis voor dit spel.';const matches=Array.isArray(gd.matches)?gd.matches:[];document.getElementById('matchesWrap').innerHTML=matches.length?matches.map((m,idx)=>`<details class="accordion" ${idx<2?'open':''}><summary><span>${nameList(m.participants||[], currentGame)}</span><span class="muted">${dateFmt(m.finished_at)}</span></summary><div class="detail"><div class="muted">Winnaars: ${nameList(m.winner_names||[], currentGame)}${m.scoreline?` · ${m.scoreline}`:''}</div>${m.recap_text?`<div class="muted" style="margin-top:6px">${m.recap_text}</div>`:''}${detailCards(m)}</div></details>`).join(''):'Nog geen wedstrijden voor dit spel.';}async function load(){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_player_unified`,{method:'POST',headers:headers(),body:JSON.stringify({player_name:player})});unified=unwrap(await parse(res));render();}catch(err){document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>Fout</span><strong>${err.message||String(err)}</strong></div>`;document.getElementById('historyWrap').textContent='Laden mislukt.';document.getElementById('matchesWrap').textContent='Laden mislukt.';}}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
