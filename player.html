<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speler</title>
  <script>window.GEJAST_PAGE_VERSION='v360-fixpack';</script>
  <script src="./gejast-config.js?v360-fixpack"></script>
  <script src="./gejast-scope.js?v360-fixpack"></script>
  <script src="./gejast-public-page-gate.js?v360-fixpack"></script>
  <script src="./gejast-clickable-cards.js?v360-fixpack"></script>
  <script src="./badge-registry.js?v360-fixpack"></script>
  <script src="./gejast-badge-source.js?v360-fixpack"></script>
  <script src="./gejast-scoped-rpc.js?v360-fixpack"></script>
  <script src="./gejast-combined-readers.js?v360-fixpack"></script>
  <style>
    :root{
      --card:#f8f5ee;
      --line:rgba(0,0,0,.08);
      --muted:#6b6257;
      --gold:#d4af37;
      --paper:#fff;
      --shadow:0 20px 44px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      font-family:Inter,system-ui,sans-serif;
      background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;
      color:#201b16;
    }
    .wrap{max-width:1120px;margin:0 auto}
    .card{
      position:relative;
      background:rgba(248,245,238,.96);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
    }
    .hero{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      margin-bottom:18px;
    }
    .hero-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .back-btn,.home-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      border:1px solid var(--line);
      text-decoration:none;
      background:#fff;
      color:#111;
      cursor:pointer;
    }
    .home-btn.dark{background:#201b16;color:#fff}
    .hero-brand img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.08))}
    .badge-box{
      display:inline-flex;
      align-items:center;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(212,175,55,.18);
      font-size:12px;
      font-weight:800;
      color:#5b481d;
    }
    h1{margin:12px 0 0;font-size:clamp(34px,5vw,46px);line-height:1.04}
    .original-name{margin-top:8px;color:var(--muted);font-size:14px;font-weight:700}
    .nickname-line{margin-top:6px;color:#8a7a55;font-size:15px;font-weight:800}
    .subtitle{margin-top:8px;color:var(--muted)}
    .badge-summary{
      display:grid;
      gap:10px;
      margin-top:14px;
    }
    .badge-mini-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .badge-mini{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:48px;
      height:48px;
      border-radius:14px;
      background:#fff7e4;
      border:1px solid rgba(17,17,17,.08);
      padding:4px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }
    .badge-mini img{width:100%;height:100%;object-fit:contain}
    .badge-mini-fallback{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      background:#f4efe4;
      color:#3d3429;
      border:1px solid rgba(17,17,17,.08);
      font-size:12px;
      font-weight:800;
    }
    .game-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 16px}
    .tab{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:#fff;
      border:1px solid var(--line);
      font:800 14px/1 Inter,system-ui,sans-serif;
      cursor:pointer;
    }
    .tab.active{background:#201b16;color:#fff}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}
    .stat{
      background:#fff;
      border-radius:18px;
      border:1px solid var(--line);
      padding:14px;
    }
    .stat span{display:block;font-size:12px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}
    .stat strong{display:block;margin-top:8px;font-size:26px}
    .panel{
      background:#fff;
      border-radius:22px;
      padding:18px;
      border:1px solid var(--line);
      margin-top:16px;
    }
    .panel h2{margin:0 0 12px}
    .muted{color:var(--muted)}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
    .mini{
      background:#fbfaf6;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }
    .mini strong{display:block;font-size:.92rem}
    .mini span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px}
    .accordion{border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:10px}
    .accordion summary{
      list-style:none;
      cursor:pointer;
      padding:14px 16px;
      font-weight:800;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .accordion summary::-webkit-details-marker{display:none}
    .accordion .detail{padding:0 16px 16px}
    .name-link{color:#201b16;text-decoration:none;font-weight:700}
    .name-link:hover{text-decoration:underline}
    .badge-gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .badge-card{display:grid;gap:12px;padding:16px;border-radius:22px;background:#fff;border:1px solid rgba(17,17,17,.08)}
    .badge-earned{background:linear-gradient(180deg,#fffaf0,#f6edd1);border-color:rgba(154,130,65,.35)}
    .badge-locked{opacity:.82}
    .badge-card-image-wrap{display:flex;align-items:center;justify-content:center;min-height:130px;border-radius:18px;background:#fbfaf6;border:1px solid rgba(17,17,17,.06);padding:10px}
    .badge-card-image{max-width:100%;max-height:120px;object-fit:contain}
    .badge-card-fallback{font-weight:800;color:#8a7a55;text-align:center}
    .badge-card-copy{display:grid;gap:8px}
    .badge-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .badge-card-top strong{font-size:16px}
    .rarity-chip{
      display:inline-flex;
      align-items:center;
      padding:5px 8px;
      border-radius:999px;
      background:rgba(212,175,55,.18);
      font-size:11px;
      font-weight:800;
      color:#5d4820;
      text-transform:uppercase;
      letter-spacing:.05em
    }
    .badge-card-copy p{margin:0;color:#5f574e;font-size:13px;line-height:1.45}
    .badge-requirement{display:grid;gap:3px;font-size:12px;color:#6b6257}
    .badge-requirement strong,.badge-state{font-size:12px;font-weight:800;color:#3d3429}
    .site-credit-watermark{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:14px;
      z-index:9999;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(17,17,17,.88);
      border:1px solid rgba(212,175,55,.35);
      color:#f3e3a6;
      font:700 13px/1.2 Inter,system-ui,sans-serif;
      letter-spacing:.03em;
      pointer-events:none;
      user-select:none;
      box-shadow:0 12px 24px rgba(0,0,0,.18);
    }
    @media(max-width:920px){
      .grid{grid-template-columns:repeat(2,1fr)}
      body{padding:16px}
      .hero{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="hero-copy">
          <div class="badge-box" id="badgeBox">Badge</div>
          <h1 id="title">Speler</h1>
          <div class="original-name" id="originalName"></div>
          <div class="nickname-line" id="nicknameLine"></div>
          <div class="subtitle" id="subtitle">Profiel en wedstrijdgeschiedenis.</div>
          <div class="badge-summary">
            <div class="badge-mini-row" id="badgeMiniRow"></div>
            <div class="muted" id="badgeCountLine"></div>
          </div>
        </div>
        <div class="hero-actions">
          <button class="back-btn" id="backLink" type="button" data-back-link>Terug</button>
          <a class="home-btn dark" id="homeLink" href="./index.html">Home</a>
          <a class="hero-brand" id="brandLink" href="./index.html" aria-label="Home via logo"><img src="./logo.png" alt="Logo" /></a>
        </div>
      </div>

      <div class="game-tabs" id="gameTabs"></div>
      <div class="grid" id="statsGrid"><div class="stat"><span>Laden</span><strong>…</strong></div></div>

      <section class="panel">
        <h2>Extra stats</h2>
        <div id="extraStatsWrap" class="muted">Laden…</div>
      </section>

      <section class="panel">
        <h2>Spelspecifieke inzichten</h2>
        <div id="gameInsightsWrap" class="muted">Laden…</div>
      </section>

      <section class="panel">
        <h2>Drinks stats</h2>
        <div id="drinksStatsWrap" class="muted">Laden…</div>
      </section>

      <section class="panel">
        <h2>Wedstrijden</h2>
        <div id="matchesWrap" class="muted">Laden…</div>
      </section>

      <section class="panel">
        <h2>Alle badges</h2>
        <div id="badgeGalleryWrap" class="muted">Laden…</div>
      </section>
    </div>
  </div>

  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const readers = window.GEJAST_COMBINED_READERS || {};
      const badgeSource = window.GEJAST_BADGE_SOURCE || {};
      const registry = window.GEJAST_BADGE_REGISTRY || {};
      const player = String(params.get('player') || '').trim();
      const titles = {
        klaverjas:'Klaverjassen',
        boerenbridge:'Boerenbridge',
        beerpong:'Beerpong',
        drankstand:'Drankstand'
      };
      const state = {
        player,
        currentGame: (params.get('game') || 'klaverjas').toLowerCase(),
        bundles: new Map()
      };

      function currentScope(){
        return (window.GEJAST_SCOPE_UTILS && window.GEJAST_SCOPE_UTILS.getScope && window.GEJAST_SCOPE_UTILS.getScope()) || 'friends';
      }

      function homeHref(){
        return currentScope() === 'family' ? './familie/index.html' : './index.html';
      }

      function profilesHref(){
        return `./profiles.html?scope=${encodeURIComponent(currentScope())}`;
      }

      function esc(value){
        return String(value == null ? '' : value).replace(/[&<>"']/g, (m)=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m] || m));
      }

      function dateFmt(value){
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? String(value || '–') : date.toLocaleString('nl-NL');
      }

      function metricValue(value){
        const numeric = Number(value);
        return Number.isFinite(numeric) ? Math.round(numeric) : 0;
      }

      function playerLink(name, gameKey){
        return `<a class="name-link" href="./player.html?player=${encodeURIComponent(name || '')}&game=${encodeURIComponent(gameKey || state.currentGame)}&scope=${encodeURIComponent(currentScope())}">${esc(name || 'Onbekend')}</a>`;
      }

      function playerList(names, gameKey){
        return (Array.isArray(names) ? names : []).map((name)=>playerLink(name, gameKey)).join(' · ') || '—';
      }

      function availableGames(){
        return currentScope() === 'family'
          ? ['klaverjas','boerenbridge']
          : ['klaverjas','boerenbridge','beerpong','drankstand'];
      }

      function normalizeBadgeBundle(raw){
        if (badgeSource.normalizeBundle) return badgeSource.normalizeBundle(raw || {});
        return raw || {};
      }

      function currentBundle(){
        return state.bundles.get(state.currentGame) || null;
      }

      async function ensureBundle(gameKey){
        if (state.bundles.has(gameKey)) return state.bundles.get(gameKey);
        const bundle = await readers.loadPlayerPageBundle(state.player, gameKey);
        state.bundles.set(gameKey, bundle || {});
        return bundle || {};
      }

      function renderTabs(){
        const wrap = document.getElementById('gameTabs');
        wrap.innerHTML = availableGames().map((gameKey)=>`<button class="tab ${gameKey===state.currentGame?'active':''}" data-game="${esc(gameKey)}">${esc(titles[gameKey])}</button>`).join('');
        wrap.querySelectorAll('[data-game]').forEach((button)=>{
          button.addEventListener('click', async () => {
            const nextGame = button.getAttribute('data-game');
            if (nextGame === state.currentGame) return;
            state.currentGame = nextGame;
            renderTabs();
            document.getElementById('extraStatsWrap').textContent = 'Laden…';
            document.getElementById('gameInsightsWrap').textContent = 'Laden…';
            document.getElementById('matchesWrap').textContent = 'Laden…';
            try{
              await ensureBundle(nextGame);
              render();
            }catch(err){
              document.getElementById('extraStatsWrap').textContent = err.message || 'Laden mislukt.';
              document.getElementById('gameInsightsWrap').textContent = err.message || 'Laden mislukt.';
              document.getElementById('matchesWrap').textContent = err.message || 'Laden mislukt.';
            }
          });
        });
      }

      function renderHero(bundle){
        const unified = bundle.unified || {};
        const overview = unified.overview || {};
        const badgeBundle = normalizeBadgeBundle(bundle.badges || {});
        const primaryBadge = badgeBundle.primary_badge || null;
        const primaryNickname = badgeBundle.primary_nickname || primaryBadge?.nickname || '';
        const shownName = unified.player_name || state.player || 'Speler';
        const originalName = unified.original_player_name || unified.canonical_player_name || state.player || '';
        document.getElementById('title').textContent = shownName;
        document.getElementById('badgeBox').textContent = primaryBadge?.title || overview.best_badge || 'Profiel';
        document.getElementById('subtitle').textContent = state.currentGame === 'drankstand'
          ? 'Drinks stats, snelheid en geverifieerde drinkhistorie.'
          : `Profiel en ${titles[state.currentGame].toLowerCase()}-geschiedenis.`;
        document.getElementById('originalName').textContent = originalName && originalName !== shownName ? `"${originalName}"` : '';
        document.getElementById('nicknameLine').textContent = primaryNickname || '';
        const miniBadges = Array.isArray(badgeBundle.mini_badges_64) ? badgeBundle.mini_badges_64 : (Array.isArray(badgeBundle.attained_badges) ? badgeBundle.attained_badges : []);
        const miniHtml = badgeSource.renderMiniBadgeRow ? badgeSource.renderMiniBadgeRow(miniBadges, '64') : '';
        document.getElementById('badgeMiniRow').innerHTML = miniHtml || '<span class="badge-mini-fallback">Nog geen badges behaald</span>';
        document.getElementById('badgeCountLine').textContent = badgeBundle.badge_count ? `${badgeBundle.badge_count} badge(s) behaald.` : 'Nog geen badgebundel beschikbaar.';
      }

      function renderStats(bundle){
        const unified = bundle.unified || {};
        const overview = unified.overview || {};
        const drinks = bundle.drinks || {};
        if (state.currentGame === 'drankstand') {
          const summary = drinks.summary || {};
          document.getElementById('statsGrid').innerHTML = `
            <div class="stat"><span>Drankjes</span><strong>${metricValue(summary.events || 0)}</strong></div>
            <div class="stat"><span>Units</span><strong>${Number(summary.units || 0).toFixed(1)}</strong></div>
            <div class="stat"><span>Gem. / nacht</span><strong>${Number(summary.avg_night_units || 0).toFixed(1)}</strong></div>
            <div class="stat"><span>Favoriet</span><strong>${esc(summary.favorite_type || '—')}</strong></div>
            <div class="stat"><span>Snelste tijd</span><strong>${drinks.speed_best_seconds != null ? `${Number(drinks.speed_best_seconds).toFixed(1)}s` : '—'}</strong></div>
          `;
          return;
        }

        const gameData = (unified.games && unified.games[state.currentGame]) || {};
        const summary = gameData.summary || {};
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat"><span>ELO</span><strong>${metricValue(summary.elo_rating || 1000)}</strong></div>
          <div class="stat"><span>Gespeeld</span><strong>${metricValue(summary.games_played || summary.matches_played || 0)}</strong></div>
          <div class="stat"><span>Win%</span><strong>${Number(summary.win_pct || 0).toFixed(0)}%</strong></div>
          <div class="stat"><span>Winst / verlies</span><strong>${metricValue(summary.wins || 0)} / ${metricValue(summary.losses || 0)}</strong></div>
          <div class="stat"><span>Totaal site</span><strong>${metricValue(overview.total_matches || 0)}</strong></div>
        `;
      }

      function renderExtraStats(bundle){
        const shared = bundle.shared_stats || {};
        const drinks = bundle.drinks || {};
        if (state.currentGame === 'drankstand') {
          const topTypes = Array.isArray(drinks.top_types) ? drinks.top_types : [];
          document.getElementById('extraStatsWrap').innerHTML = topTypes.length
            ? `<div class="detail-grid">${topTypes.map((row)=>`<div class="mini"><strong>${esc(row.label || row.key || 'Drankje')}</strong><span>${metricValue(row.events || 0)} drankjes</span><span>${Number(row.units || 0).toFixed(1)} units</span></div>`).join('')}</div>`
            : 'Nog geen dranktype-stats.';
          return;
        }
        document.getElementById('extraStatsWrap').innerHTML = `
          <div class="detail-grid">
            <div class="mini"><strong>Vorm 5</strong><span>${esc(shared.recent_form || '—')}</span></div>
            <div class="mini"><strong>Actief 30d</strong><span>${metricValue(shared.activity_30d || 0)}</span></div>
            <div class="mini"><strong>Grootste stijging</strong><span>${metricValue(shared.biggest_gain || 0)}</span></div>
            <div class="mini"><strong>Grootste daling</strong><span>${metricValue(shared.biggest_drop || 0)}</span></div>
            <div class="mini"><strong>Volatiliteit</strong><span>${metricValue(shared.volatility || 0)}</span></div>
          </div>
        `;
      }

      function renderInsights(bundle){
        const drinks = bundle.drinks || {};
        const insights = bundle.game_insights || {};
        if (state.currentGame === 'drankstand') {
          const speedRecords = Array.isArray(drinks.speed_records) ? drinks.speed_records : [];
          document.getElementById('gameInsightsWrap').innerHTML = speedRecords.length
            ? `<div class="detail-grid">${speedRecords.map((row)=>`<div class="mini"><strong>${esc(row.label || 'Snelheid')}</strong><span>${Number(row.seconds || row.duration_seconds || 0).toFixed(1)}s</span></div>`).join('')}</div>`
            : 'Nog geen snelheidsstats.';
          return;
        }
        const cards = Array.isArray(insights.cards) ? insights.cards : [];
        document.getElementById('gameInsightsWrap').innerHTML = cards.length
          ? `<div class="detail-grid">${cards.map((card)=>`<div class="mini"><strong>${esc(card.label || 'Inzicht')}</strong><span>${esc(card.value || '—')}</span>${card.sub ? `<span>${esc(card.sub)}</span>` : ''}</div>`).join('')}</div>`
          : 'Nog geen spelspecifieke inzichten.';
      }

      function renderDrinks(bundle){
        const drinks = bundle.drinks || {};
        const summary = drinks.summary || {};
        document.getElementById('drinksStatsWrap').innerHTML = `
          <div class="detail-grid">
            <div class="mini"><strong>Drankjes</strong><span>${metricValue(summary.events || 0)}</span></div>
            <div class="mini"><strong>Units</strong><span>${Number(summary.units || 0).toFixed(1)}</span></div>
            <div class="mini"><strong>Gemiddeld / nacht</strong><span>${Number(summary.avg_night_units || 0).toFixed(1)}</span></div>
            <div class="mini"><strong>Favoriet</strong><span>${esc(summary.favorite_type || '—')}</span></div>
          </div>
        `;
      }

      function detailCards(match, gameKey){
        const details = Array.isArray(match.details) ? match.details.filter(Boolean) : [];
        if (!details.length) return '<div class="muted">Geen extra details.</div>';
        return `<div class="detail-grid">${details.map((detail)=>`
          <div class="mini">
            <strong>${playerLink(detail.player_name || '', gameKey)}</strong>
            <span>${esc(detail.result_label || detail.result || '')}</span>
            ${detail.points !== undefined ? `<span>Punten: ${esc(detail.points)}</span>` : ''}
            ${detail.points_against !== undefined ? `<span>Tegen: ${esc(detail.points_against)}</span>` : ''}
            ${detail.rank !== undefined ? `<span>Plek: ${esc(detail.rank)}</span>` : ''}
            ${detail.exact_bids !== undefined ? `<span>Exact: ${esc(detail.exact_bids)}</span>` : ''}
            ${detail.slagen !== undefined ? `<span>Slagen: ${esc(detail.slagen)}</span>` : ''}
            ${detail.team ? `<span>Team: ${esc(detail.team)}</span>` : ''}
          </div>`).join('')}</div>`;
      }

      function renderMatches(bundle){
        const unified = bundle.unified || {};
        const drinks = bundle.drinks || {};
        if (state.currentGame === 'drankstand') {
          const recent = Array.isArray(drinks.recent) ? drinks.recent : [];
          document.getElementById('matchesWrap').innerHTML = recent.length
            ? recent.map((row)=>`
                <details class="accordion">
                  <summary>
                    <span>${esc(row.event_type_label || row.label || 'Drankje')} · ${Number(row.total_units || 0).toFixed(1)} units</span>
                    <span class="muted" style="font-size:12px">${esc(dateFmt(row.verified_at || row.created_at))}</span>
                  </summary>
                  <div class="detail">
                    <div class="muted">${row.verifier_names && row.verifier_names.length ? `Bevestigd door ${esc(row.verifier_names.join(', '))}` : 'Geen verifier-info'}</div>
                  </div>
                </details>`).join('')
            : 'Nog geen drankjes in geschiedenis.';
          return;
        }
        const gameData = (unified.games && unified.games[state.currentGame]) || {};
        const matches = Array.isArray(gameData.matches) ? gameData.matches : [];
        document.getElementById('matchesWrap').innerHTML = matches.length
          ? matches.map((match)=>{
              const delta = Number(match.elo_delta || 0);
              const deltaLabel = `${delta > 0 ? '+' : ''}${Math.round(delta)}`;
              const outcome = match.player_result === 'win' ? 'Winst' : (match.player_result === 'draw' ? 'Gelijk' : 'Verlies');
              return `
                <details class="accordion">
                  <summary>
                    <span>${outcome} · Winnaars: ${playerList(match.winner_names || [], state.currentGame)}${match.scoreline ? ` · ${esc(match.scoreline)}` : ''} · ELO ${esc(deltaLabel)}</span>
                    <span class="muted" style="font-size:12px">${esc(dateFmt(match.finished_at))}</span>
                  </summary>
                  <div class="detail">
                    <div class="muted">Deelnemers: ${playerList(match.participants || [], state.currentGame)}</div>
                    ${match.recap_text ? `<div class="muted" style="margin-top:6px">${esc(match.recap_text)}</div>` : ''}
                    ${detailCards(match, state.currentGame)}
                  </div>
                </details>`;
            }).join('')
          : 'Nog geen wedstrijden voor dit spel.';
      }

      function renderGallery(bundle){
        const badgeBundle = normalizeBadgeBundle(bundle.badges || {});
        const allBadges = Array.isArray(badgeBundle.all_badges) && badgeBundle.all_badges.length
          ? badgeBundle.all_badges
          : (Array.isArray(registry.BADGE_REGISTRY) ? registry.BADGE_REGISTRY : []);
        const attainedKeys = new Set((Array.isArray(badgeBundle.attained_badges) ? badgeBundle.attained_badges : []).map((badge)=>String(badge.key || '').trim()).filter(Boolean));
        document.getElementById('badgeGalleryWrap').innerHTML = allBadges.length
          ? `<div class="badge-gallery">${allBadges.map((badge)=>{
              const key = String(badge.key || '').trim();
              const earned = attainedKeys.has(key);
              const image = badge.imageFull || '';
              return `
                <article class="badge-card ${earned ? 'badge-earned' : 'badge-locked'}">
                  <div class="badge-card-image-wrap">
                    ${image ? `<img class="badge-card-image" src="${esc(image)}" alt="${esc(badge.title || 'Badge')}" loading="lazy" onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<div class=&quot;badge-card-fallback&quot;>${esc(badge.title || 'Badge')}</div>')">` : `<div class="badge-card-fallback">${esc(badge.title || 'Badge')}</div>`}
                  </div>
                  <div class="badge-card-copy">
                    <div class="badge-card-top">
                      <strong>${esc(badge.title || 'Badge')}</strong>
                      <span class="rarity-chip">${esc(badge.rarityLabel || '')}</span>
                    </div>
                    ${badge.nickname ? `<div class="nickname-line">${esc(badge.nickname)}</div>` : ''}
                    <p>${esc(badge.description || '')}</p>
                    <div class="badge-requirement">
                      <strong>Voorwaarde</strong>
                      <span>${esc(badge.requirementsText || '')}</span>
                    </div>
                    <div class="badge-state">${earned ? 'Behaald' : 'Nog niet behaald'}</div>
                  </div>
                </article>`;
            }).join('')}</div>`
          : 'Nog geen badgegegevens beschikbaar.';
      }

      function render(){
        const bundle = currentBundle();
        if (!bundle) return;
        renderHero(bundle);
        renderTabs();
        renderStats(bundle);
        renderExtraStats(bundle);
        renderInsights(bundle);
        renderDrinks(bundle);
        renderMatches(bundle);
        renderGallery(bundle);
      }

      async function boot(){
        if (!state.player) {
          document.getElementById('statsGrid').innerHTML = '<div class="stat"><span>Fout</span><strong>Geen speler gekozen</strong></div>';
          document.getElementById('matchesWrap').textContent = 'Open deze pagina via het spelersoverzicht.';
          return;
        }
        try{
          await ensureBundle(state.currentGame);
          render();
        }catch(err){
          document.getElementById('statsGrid').innerHTML = `<div class="stat"><span>Fout</span><strong>${esc(err.message || 'Laden mislukt')}</strong></div>`;
          document.getElementById('extraStatsWrap').textContent = err.message || 'Laden mislukt.';
          document.getElementById('gameInsightsWrap').textContent = err.message || 'Laden mislukt.';
          document.getElementById('drinksStatsWrap').textContent = err.message || 'Laden mislukt.';
          document.getElementById('matchesWrap').textContent = err.message || 'Laden mislukt.';
          document.getElementById('badgeGalleryWrap').textContent = err.message || 'Laden mislukt.';
        }
      }

      document.getElementById('homeLink').setAttribute('href', homeHref());
      document.getElementById('brandLink').setAttribute('href', homeHref());
      document.getElementById('backLink').setAttribute('data-fallback', profilesHref());

      if (window.GEJAST_CLICKABLE_CARDS) {
        window.GEJAST_CLICKABLE_CARDS.bind(document);
        window.GEJAST_CLICKABLE_CARDS.bindBackLinks(document);
        window.GEJAST_CLICKABLE_CARDS.upgradeJavascriptVoidLinks(document);
      }

      boot();
    })();
  </script>
  <script src="./site-analytics.js"></script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
