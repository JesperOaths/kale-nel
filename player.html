<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Speler</title><script src="./gejast-config.js"></script><style>:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}.wrap{max-width:1080px;margin:0 auto}.card{background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}h1{margin:0;font-size:42px}.muted{color:var(--muted)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.stat{background:#fff;border-radius:18px;border:1px solid var(--line);padding:14px}.stat span{display:block;font-size:12px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}.stat strong{display:block;margin-top:8px;font-size:26px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line);margin-top:16px}.match{padding:12px 0;border-bottom:1px solid var(--line)}.match:last-child{border-bottom:none}.point{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}.point:last-child{border-bottom:none}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:rgba(212,175,55,.18);font-size:12px;font-weight:800}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}body{padding:16px}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div class="badge" id="badgeBox">Badge</div><h1 id="title">Speler</h1><div class="muted" id="subtitle">Profiel en wedstrijdgeschiedenis.</div></div><a class="btn" id="backLink" href="./ladder.html">Terug naar ladder</a></div><div class="grid" id="statsGrid"><div class="stat"><span>Laden</span><strong>…</strong></div></div><section class="panel"><h2 style="margin:0 0 12px">Ratinggeschiedenis</h2><div id="historyWrap" class="muted">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Wedstrijden</h2><div id="matchesWrap" class="muted">Laden…</div></section></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const params=new URLSearchParams(location.search);const game=(params.get('game')||'klaverjas').toLowerCase();const player=params.get('player')||'';document.getElementById('backLink').href=`./ladder.html?game=${game}`;function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_player_page)return payload.get_public_player_page;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_player_page)return payload[0].get_public_player_page;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}async function load(){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_player_page`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:game,player_name:player})});const data=unwrap(await parse(res));document.getElementById('title').textContent=data.player_name||player||'Speler';document.getElementById('badgeBox').textContent=data.badge||'Starter';const s=data.summary||{};document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>ELO</span><strong>${Math.round(Number(s.elo_rating||1000))}</strong></div><div class="stat"><span>Gespeeld</span><strong>${s.games_played||s.matches_played||0}</strong></div><div class="stat"><span>Win%</span><strong>${Number(s.win_pct||0).toFixed(0)}%</strong></div><div class="stat"><span>Winst / verlies</span><strong>${s.wins||0} / ${s.losses||0}</strong></div>`;const hist=Array.isArray(data.rating_history)?data.rating_history:[];document.getElementById('historyWrap').innerHTML=hist.length?hist.map(h=>`<div class="point"><span>${dateFmt(h.created_at)}</span><strong>${Math.round(Number(h.rating_after||1000))}</strong></div>`).join(''):'Geen ratinggeschiedenis.';const matches=Array.isArray(data.matches)?data.matches:[];document.getElementById('matchesWrap').innerHTML=matches.length?matches.map(m=>`<div class="match"><strong>${(m.participants||[]).join(' · ')}</strong><div class="muted">Winnaars: ${(m.winner_names||[]).join(', ')||'—'}</div><div class="muted">${dateFmt(m.finished_at)}</div><div class="muted">${m.recap_text||m.scoreline||''}</div></div>`).join(''):'Nog geen wedstrijden.';}catch(err){document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>Fout</span><strong>${err.message||String(err)}</strong></div>`;document.getElementById('historyWrap').textContent='Laden mislukt.';document.getElementById('matchesWrap').textContent='Laden mislukt.';}}load();})();</script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body></html>
