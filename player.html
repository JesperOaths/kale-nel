<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Speler</title><script>window.GEJAST_PAGE_VERSION='v298';</script><script src="./gejast-config.js?v298"></script><style>:root{--card:#f8f5ee;--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#d4af37}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed;color:#201b16}.wrap{max-width:1100px;margin:0 auto}.card{position:relative;background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}h1{margin:18px 0 0;font-size:42px}.muted{color:var(--muted)}.hero{position:relative;min-height:74px}.back-btn{position:absolute;left:0;top:0;display:inline-flex;padding:10px 14px;border-radius:999px;background:#201b16;color:#fff;text-decoration:none;font-weight:800}.brand-link{position:absolute;right:0;top:0;display:inline-flex;align-items:center;justify-content:center}.brand-link img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.08));cursor:pointer}.game-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.tab{border:none;border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font:800 14px/1 Inter,system-ui,sans-serif;cursor:pointer}.tab.active{background:#201b16;color:#fff}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}.stat{background:#fff;border-radius:18px;border:1px solid var(--line);padding:14px}.stat span{display:block;font-size:12px;color:#8a7a55;text-transform:uppercase;letter-spacing:.08em}.stat strong{display:block;margin-top:8px;font-size:26px}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid var(--line);margin-top:16px}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:rgba(212,175,55,.18);font-size:12px;font-weight:800}.name-link{color:#201b16;text-decoration:none;font-weight:700}.name-link:hover{text-decoration:none}.accordion{border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:10px}.accordion summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:800;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.accordion summary::-webkit-details-marker{display:none}.accordion .detail{padding:0 16px 16px}.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:10px}.mini{background:#fbfaf6;border:1px solid var(--line);border-radius:14px;padding:10px}.mini strong{display:block;font-size:.92rem}.mini span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}body{padding:16px}}</style></head><body><div class="wrap"><div class="card"><div class="hero"><a class="back-btn" id="backLink" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./profiles.html';}">Terug</a><a class="brand-link" href="./index.html" aria-label="Home via logo"><img src="./logo.png" alt="Logo"/></a></div><div><div class="badge" id="badgeBox">Badge</div><h1 id="title">Speler</h1><div class="muted" id="subtitle">Profiel en wedstrijdgeschiedenis.</div></div><div class="game-tabs" id="gameTabs"></div><div class="grid" id="statsGrid"><div class="stat"><span>Laden</span><strong>…</strong></div></div><section class="panel"><h2 style="margin:0 0 12px">Extra stats</h2><div id="extraStatsWrap" class="muted">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Spelspecifieke inzichten</h2><div id="gameInsightsWrap" class="muted">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Drinks stats</h2><div id="drinksStatsWrap" class="muted">Laden…</div></section><section class="panel"><h2 style="margin:0 0 12px">Wedstrijden</h2><div id="matchesWrap" class="muted">Laden…</div></section></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{};const SUPABASE_URL=cfg.SUPABASE_URL||'';const KEY=cfg.SUPABASE_PUBLISHABLE_KEY||'';const params=new URLSearchParams(location.search);const initialGame=(params.get('game')||'klaverjas').toLowerCase();const player=params.get('player')||'';const titles={klaverjas:'Klaverjassen',boerenbridge:'Boerenbridge',beerpong:'Beerpong',drankstand:'Drankstand'};let unified=null;let currentGame=initialGame;let latestDrinkData=null;function headers(){return{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Accept:'application/json'}}async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}function unwrap(payload){if(payload&&payload.get_public_player_unified)return payload.get_public_player_unified;if(Array.isArray(payload)&&payload[0]&&payload[0].get_public_player_unified)return payload[0].get_public_player_unified;if(Array.isArray(payload)&&payload[0])return payload[0];return payload||{}}function dateFmt(v){const d=new Date(v);return isNaN(d)?String(v||'–'):d.toLocaleString('nl-NL')}function linkName(name, game=currentGame){return `<a class="name-link" href="./player.html?player=${encodeURIComponent(name||'')}&game=${encodeURIComponent(game)}">${name||'Onbekend'}</a>`}function nameList(names, game=currentGame){return (Array.isArray(names)?names:[]).map((n)=>linkName(n, game)).join(' · ')||'—'}function metricValue(v){return Number.isFinite(Number(v))?Math.round(Number(v)):0}function gameData(game){return unified?.games?.[game]||{player_name:player,summary:{},matches:[],badge:'Starter'}}async function loadDrinkStats(){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_drink_player_public`,{method:'POST',headers:headers(),body:JSON.stringify({player_name:player})});const raw=await parse(res);const data=raw?.get_drink_player_public||raw||{};latestDrinkData=data;const s=data.summary||{};document.getElementById('drinksStatsWrap').innerHTML=`<div class="detail-grid"><div class="mini"><strong>Drankjes</strong><span>${s.events||0}</span></div><div class="mini"><strong>Units</strong><span>${Number(s.units||0).toFixed(1)}</span></div><div class="mini"><strong>Gemiddeld / nacht</strong><span>${Number(s.avg_night_units||0).toFixed(1)}</span></div><div class="mini"><strong>Favoriet</strong><span>${s.favorite_type||'—'}</span></div></div>`;if(currentGame==='drankstand') render();}catch(_){document.getElementById('drinksStatsWrap').textContent='Nog geen drinks-data.';}}async function loadSharedPlayer(){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_shared_player_stats`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:currentGame,player_name:player})});const raw=await parse(res);return raw?.get_public_shared_player_stats||raw||{};}catch(_){return {};}}async function loadGameInsights(){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_player_game_insights`,{method:'POST',headers:headers(),body:JSON.stringify({game_key:currentGame,player_name:player})});const raw=await parse(res);return raw?.get_public_player_game_insights||raw||{};}catch(_){return {cards:[]};}}function renderTabs(){const wrap=document.getElementById('gameTabs');const entries=['klaverjas','boerenbridge','beerpong','drankstand'];wrap.innerHTML=entries.map((g)=>`<button class="tab ${g===currentGame?'active':''}" data-game="${g}">${titles[g]}</button>`).join('');wrap.querySelectorAll('[data-game]').forEach((btn)=>btn.addEventListener('click',()=>{currentGame=btn.getAttribute('data-game');render();}));}function detailCards(match){const details=(Array.isArray(match.details)?match.details:[]).filter(Boolean); if(!details.length) return '<div class="muted">Geen extra details.</div>'; return `<div class="detail-grid">${details.map(d=>`<div class="mini"><strong>${linkName(d.player_name||'', currentGame)}</strong><span>${d.result_label||d.result||''}</span>${d.points!==undefined?`<span>Punten: ${d.points}</span>`:''}${d.points_against!==undefined?`<span>Tegen: ${d.points_against}</span>`:''}${d.rank!==undefined?`<span>Plek: ${d.rank}</span>`:''}${d.exact_bids!==undefined?`<span>Exact: ${d.exact_bids}</span>`:''}${d.slagen!==undefined?`<span>Slagen: ${d.slagen}</span>`:''}${d.team?`<span>Team: ${d.team}</span>`:''}</div>`).join('')}</div>`;}function render(){const overview=unified?.overview||{};document.getElementById('title').textContent=unified?.player_name||player||'Speler';if(currentGame==='drankstand'){const s=latestDrinkData?.summary||{};document.getElementById('badgeBox').textContent='Drankstand';document.getElementById('subtitle').textContent='Drinks stats, snelheid en favoriete drankjes.';renderTabs();document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>Drankjes</span><strong>${s.events||0}</strong></div><div class="stat"><span>Units</span><strong>${Number(s.units||0).toFixed(1)}</strong></div><div class="stat"><span>Gem. / nacht</span><strong>${Number(s.avg_night_units||0).toFixed(1)}</strong></div><div class="stat"><span>Favoriet</span><strong>${s.favorite_type||'—'}</strong></div><div class="stat"><span>Snelste tijd</span><strong>${latestDrinkData?.speed_best_seconds!=null?Number(latestDrinkData.speed_best_seconds).toFixed(1)+'s':'—'}</strong></div>`;document.getElementById('extraStatsWrap').innerHTML=(latestDrinkData?.top_types||[]).length?`<div class="detail-grid">${latestDrinkData.top_types.map(r=>`<div class="mini"><strong>${r.label||r.key||'Drankje'}</strong><span>${r.events||0} drankjes</span><span>${Number(r.units||0).toFixed(1)} units</span></div>`).join('')}</div>`:'Nog geen dranktype-stats.';document.getElementById('gameInsightsWrap').innerHTML=(latestDrinkData?.speed_records||[]).length?`<div class="detail-grid">${latestDrinkData.speed_records.map(r=>`<div class="mini"><strong>${r.label||'Snelheid'}</strong><span>${Number(r.seconds||0).toFixed(1)}s</span></div>`).join('')}</div>`:'Nog geen snelheidsstats.';document.getElementById('matchesWrap').innerHTML=(latestDrinkData?.recent||[]).length?latestDrinkData.recent.map(r=>`<details class="accordion"><summary><span>${r.event_type_label||r.label||'Drankje'} · ${Number(r.total_units||0).toFixed(1)} units</span><span class="muted" style="font-size:12px">${dateFmt(r.verified_at||r.created_at)}</span></summary><div class="detail"><div class="muted">${r.verifier_names&&r.verifier_names.length?'Bevestigd door '+r.verifier_names.join(', '):'Geen verifier-info'}</div></div></details>`).join(''):'Nog geen drankjes in geschiedenis.';return;}const gd=gameData(currentGame);document.getElementById('badgeBox').textContent=gd.badge||overview.best_badge||'Starter';document.getElementById('subtitle').textContent=`Profiel en ${titles[currentGame].toLowerCase()}-geschiedenis.`;renderTabs();const s=gd.summary||{};document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>ELO</span><strong>${metricValue(s.elo_rating||1000)}</strong></div><div class="stat"><span>Gespeeld</span><strong>${metricValue(s.games_played||s.matches_played||0)}</strong></div><div class="stat"><span>Win%</span><strong>${Number(s.win_pct||0).toFixed(0)}%</strong></div><div class="stat"><span>Winst / verlies</span><strong>${metricValue(s.wins||0)} / ${metricValue(s.losses||0)}</strong></div><div class="stat"><span>Totaal site</span><strong>${metricValue(overview.total_matches||0)}</strong></div>`;const matches=Array.isArray(gd.matches)?gd.matches:[];loadSharedPlayer().then((shared)=>{document.getElementById('extraStatsWrap').innerHTML=`<div class=\"detail-grid\"><div class=\"mini\"><strong>Vorm 5</strong><span>${shared.recent_form||'—'}</span></div><div class=\"mini\"><strong>Actief 30d</strong><span>${shared.activity_30d||0}</span></div><div class=\"mini\"><strong>Grootste stijging</strong><span>${Math.round(Number(shared.biggest_gain||0))}</span></div><div class=\"mini\"><strong>Grootste daling</strong><span>${Math.round(Number(shared.biggest_drop||0))}</span></div><div class=\"mini\"><strong>Volatiliteit</strong><span>${Math.round(Number(shared.volatility||0))}</span></div></div>`;});loadGameInsights().then((ins)=>{document.getElementById('gameInsightsWrap').innerHTML=(ins.cards||[]).length?`<div class=\"detail-grid\">${ins.cards.map(c=>`<div class=\"mini\"><strong>${c.label||'Inzicht'}</strong><span>${c.value||'—'}</span>${c.sub?`<span>${c.sub}</span>`:''}</div>`).join('')}</div>`:'Nog geen spelspecifieke inzichten.';});document.getElementById('matchesWrap').innerHTML=matches.length?matches.map((m)=>{const delta=Number(m.elo_delta||0); const deltaLabel=`${delta>0?'+':''}${Math.round(delta)}`; const outcome=(m.player_result==='win'?'Winst':(m.player_result==='draw'?'Gelijk':'Verlies')); return `<details class="accordion"><summary><span>${outcome} · Winnaars: ${nameList(m.winner_names||[], currentGame)}${m.scoreline?` · ${m.scoreline}`:''} · ELO ${deltaLabel}</span><span class="muted" style="font-size:12px">${dateFmt(m.finished_at)}</span></summary><div class="detail"><div class="muted">Deelnemers: ${nameList(m.participants||[], currentGame)}</div>${m.recap_text?`<div class="muted" style="margin-top:6px">${m.recap_text}</div>`:''}${detailCards(m)}</div></details>`;}).join(''):'Nog geen wedstrijden voor dit spel.';}async function load(){loadDrinkStats();try{const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_player_unified`,{method:'POST',headers:headers(),body:JSON.stringify({player_name:player})});unified=unwrap(await parse(res));render();}catch(err){document.getElementById('statsGrid').innerHTML=`<div class="stat"><span>Fout</span><strong>${err.message||String(err)}</strong></div>`;document.getElementById('matchesWrap').textContent='Laden mislukt.';}}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script><script src="./gejast-geo.js?v298"></script><script src="./drinks-verify-float.js?v298"></script></body></html>
