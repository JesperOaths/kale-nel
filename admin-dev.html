<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dev</title><script>window.GEJAST_PAGE_VERSION='v657';</script>
  <link rel="stylesheet" href="./site-shell.css" />
  <link rel="stylesheet" href="./theme-v45.css" />
  <style>
    body { margin:0; padding:28px; font-family:Inter, ui-sans-serif, system-ui, sans-serif; color:#111; min-height:100vh; }
    .wrap { max-width: 1040px; margin:0 auto; position:relative; z-index:2; }
    .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
    .brand-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .card { border-radius:30px; padding:28px; margin-bottom:20px; }
    .row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    input, button, textarea { font:inherit; }
    input, textarea { width:100%; padding:13px 14px; border:1px solid rgba(17,17,17,0.1); border-radius:16px; background:rgba(255,255,255,0.58); }
    button { padding:13px 16px; border:none; border-radius:16px; cursor:pointer; }
    pre { white-space:pre-wrap; word-break:break-word; }
    .muted { color:#6d5830; }
    .stack { display:grid; gap:12px; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .chip { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:rgba(212,175,55,0.18); border:1px solid rgba(17,17,17,0.08); font-size:12px; font-weight:700; }
    @media (max-width: 780px) { .row { grid-template-columns:1fr; } }
  </style>
  <link rel="stylesheet" href="./premium-v47.css" />
  <link rel="stylesheet" href="./ui-v52.css" />
  <script src="./gejast-config.js?v657"></script>
  <script src="./gejast-home-gate.js?v657"></script><script src="./gejast-scope-context.js?v657"></script>
</head>
<body>
  <div class="site-scene" aria-hidden="true">
    <div class="page-bg"></div>
    <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
        <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
    <div class="playing-card-accent"><img src="./playingcard-accent1-trimmed.png" alt="" /></div>
    <div class="top-glow"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand-row">
        <a href="./admin.html" class="pill-link">Admin</a>
        <a href="./index.html" class="pill-link">Site</a>
      </div>
      <img src="./logo.png" alt="Logo" class="mini-logo" />
    </div>

    <div class="card">
      <h1 style="margin:0 0 8px 0;">Admin-dev</h1>
      
    </div>

    <div class="card stack">
      <div class="diagnostic-box">
        <strong>Dev-login</strong>
        <div class="muted" style="margin-top:8px;">Gebruik dit alleen om te controleren of <code>admin_dev_login</code> en <code>admin_check_session</code> echt werken.</div>
      </div>

      <div class="row">
        <input id="usernameInput" type="text" placeholder="Gebruikersnaam" value="1" />
        <input id="passwordInput" type="password" placeholder="Wachtwoord" value="1" />
        <input id="totpInput" type="text" placeholder="TOTP (6 cijfers)" />
      </div>
      <input id="devKeyInput" type="password" placeholder="Dev key" value="1" />

      <div class="actions">
        <button class="dev-btn" id="realLoginBtn" type="button">admin_login</button>
        <button class="dev-btn" id="devLoginBtn" type="button">admin_dev_login</button>
        <button class="dev-btn" id="checkBtn" type="button">admin_check_session</button>
        <button class="dev-btn" id="pendingBtn" type="button">Openstaand</button>
        <button class="dev-btn" id="historyBtn" type="button">Geschiedenis</button>
        <button class="reject-btn" id="clearBtn" type="button">Wissen</button>
      </div>

      <div class="diagnostic-box">
        <strong>Sessietoken</strong>
        <pre id="tokenOut">(nog geen token)</pre>
      </div>

      <div class="diagnostic-box">
        <strong>Resultaat</strong>
        <pre id="resultOut">Klaar.</pre>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const ADMIN_SESSION_KEY = "jas_admin_session_v8";
    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type":"application/json", Accept:"application/json" }; }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
      return data;
    }
    function getToken() { return sessionStorage.getItem(ADMIN_SESSION_KEY) || localStorage.getItem(ADMIN_SESSION_KEY) || ""; }
    function setToken(token) { sessionStorage.setItem(ADMIN_SESSION_KEY, token); localStorage.removeItem(ADMIN_SESSION_KEY); renderToken(); }
    function clearToken() { sessionStorage.removeItem(ADMIN_SESSION_KEY); localStorage.removeItem(ADMIN_SESSION_KEY); renderToken(); }
    function renderToken() { document.getElementById('tokenOut').textContent = getToken() || "(nog geen token)"; }
    function show(data) { document.getElementById('resultOut').textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2); }
    async function callRpc(name, body) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify(body) });
      return await parseResponse(res);
    }
    document.getElementById('realLoginBtn').addEventListener('click', async () => {
      try {
        const data = await callRpc('admin_login', {
          input_username: document.getElementById('usernameInput').value.trim(),
          input_password: document.getElementById('passwordInput').value,
          input_totp_code: document.getElementById('totpInput').value.trim()
        });
        const token = data.admin_session_token || data.token;
        if (token) setToken(token);
        show({ message: 'admin_login succeeded', data });
      } catch (err) { show(err instanceof Error ? err.message : String(err)); }
    });
    document.getElementById('devLoginBtn').addEventListener('click', async () => {
      try {
        const data = await callRpc('admin_dev_login', {
          input_username: document.getElementById('usernameInput').value.trim(),
          input_password: document.getElementById('passwordInput').value,
          input_dev_key: document.getElementById('devKeyInput').value.trim()
        });
        const token = data.admin_session_token || data.token;
        if (token) setToken(token);
        show({ message: 'admin_dev_login succeeded', data });
      } catch (err) { show(err instanceof Error ? err.message : String(err)); }
    });
    document.getElementById('checkBtn').addEventListener('click', async () => {
      try { show(await callRpc('admin_check_session', { admin_session_token: getToken() })); }
      catch (err) { show(err instanceof Error ? err.message : String(err)); }
    });
    document.getElementById('pendingBtn').addEventListener('click', async () => {
      try { show(await callRpc('admin_get_claim_requests', { admin_session_token: getToken() })); }
      catch (err) { show(err instanceof Error ? err.message : String(err)); }
    });
    document.getElementById('historyBtn').addEventListener('click', async () => {
      try { show(await callRpc('admin_get_claim_history', { admin_session_token: getToken() })); }
      catch (err) { show(err instanceof Error ? err.message : String(err)); }
    });
    document.getElementById('clearBtn').addEventListener('click', () => { clearToken(); show('Sessietoken gewist.'); });
    renderToken();
  </script>
<div class="site-credit-watermark" data-version-watermark style="position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)"></div>
</body>
</html>
