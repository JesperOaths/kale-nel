<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Paardenrace stats</title><script>window.GEJAST_PAGE_VERSION='v449';</script><script src="./gejast-config.js?v449"></script><script src="./gejast-paardenrace.js?v415"></script><style>:root{--line:rgba(0,0,0,.08);--paper:#fffaf3;--bg:#f3ede4}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:#17130f}.page{max-width:1080px;margin:0 auto;padding:22px 16px 40px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}.btn,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.muted{color:#6d6256}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(212,175,55,.35);color:#f3e3a6;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}@media(max-width:860px){.grid{grid-template-columns:1fr}}</style></head><body><div class="page"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div><div class="muted">Publieke samenvatting</div><h1 style="margin:8px 0 0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em">Paardenrace stats</h1></div><a class="btn" href="./paardenrace.html">Terug naar lobby</a></div><section class="panel"><div id="statsBox" class="grid"></div></section><section class="panel"><h2 style="margin-top:0">Recente races</h2><div id="recentBox"></div></section></div><div class="site-credit-watermark" data-version-watermark>v415 · Made by Bruis</div><script>(()=>{ const api = window.GEJAST_PAARDENRACE; async function load(){ const data = await api.rpc('get_paardenrace_stats_public', {}); const overview = data?.overview || {}; document.getElementById('statsBox').innerHTML = [ ['Races', overview.matches_played || 0], ['Totaal Bakken', overview.total_bakken || 0], ['Laatste winnaar', overview.last_winner_suit ? api.suitLabel(overview.last_winner_suit) : '—'] ].map((item)=>`<div class="card"><div class="muted">${item[0]}</div><div style="font-size:2rem;font-weight:900;margin-top:8px">${item[1]}</div></div>`).join(''); const rows = Array.isArray(data?.recent_matches) ? data.recent_matches : []; document.getElementById('recentBox').innerHTML = rows.map((row)=>`<div class="card" style="margin-bottom:10px"><strong>${row.room_code || 'Room'}</strong><div class="muted">Winner: ${row.winner_suit ? api.suitLabel(row.winner_suit) : '—'} · ${row.finished_at || ''}</div><div class="muted">Players: ${(row.player_names||[]).join(', ')}</div></div>`).join('') || '<div class="muted">Nog geen afgeronde paardenraces.</div>'; } load().catch((err)=>{ document.getElementById('recentBox').innerHTML = `<div class="muted">${err.message || 'Stats konden niet laden.'}</div>`; }); })();</script></body></html>
