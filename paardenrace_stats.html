  <style>
    :root{--line:rgba(17,17,17,.08);--muted:#6b6153;--panel:rgba(255,251,245,.84)}*{box-sizing:border-box}body{margin:0;display:flex;justify-content:center;padding:24px 14px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#17120e}.page{width:min(1320px,100%)}.shell{background:var(--panel);border:1px solid rgba(255,255,255,.7);border-radius:32px;padding:28px;box-shadow:0 18px 48px rgba(0,0,0,.08);backdrop-filter:blur(10px)}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:start;margin-bottom:18px}.hero h1{margin:0;font-size:clamp(2.4rem,5vw,3.7rem);line-height:.96;letter-spacing:-.05em}.hero p{margin:10px 0 0;color:var(--muted)}.hero .actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}.hero .actions a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 15px;border-radius:999px;text-decoration:none;border:1px solid rgba(17,17,17,.12);background:#fff;color:#111;font-weight:800}.logo{width:56px;height:auto}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.panel{background:rgba(255,255,255,.58);border:1px solid var(--line);border-radius:28px;padding:18px}.panel h2{margin:0 0 12px;font-size:1.05rem}.pr-stand-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:#fffdf9;border:1px solid var(--line);border-radius:18px;padding:12px 14px}.pr-stand-row + .pr-stand-row{margin-top:10px}.rank{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-weight:900}.name{display:grid;gap:2px}.name a{color:inherit;text-decoration:none;font-weight:900}.name span{color:var(--muted);font-size:.92rem}.elo{text-align:right;font-weight:900}.pr-recent-item{background:#fffdf9;border:1px solid var(--line);border-radius:18px;padding:12px 14px}.pr-recent-item + .pr-recent-item{margin-top:10px}.pr-recent-item summary{display:flex;justify-content:space-between;gap:14px;align-items:center;cursor:pointer;font-weight:800}.pr-recent-body{margin-top:10px;color:var(--muted);display:grid;gap:6px}.pr-empty{color:var(--muted)}.watermark{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:4;background:#221f1a;color:#f4dd95;border:2px solid rgba(154,130,65,.35);padding:8px 16px;border-radius:999px;font-weight:900;letter-spacing:.02em;box-shadow:0 12px 24px rgba(0,0,0,.18)}@media (max-width:980px){.grid{grid-template-columns:1fr}}@media (max-width:720px){body{padding:12px 8px}.shell{padding:14px;border-radius:24px}.hero{grid-template-columns:1fr}.watermark{font-size:.9rem}}
