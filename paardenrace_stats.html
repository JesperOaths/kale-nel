<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none"/><title>Paardenrace stats</title><script>window.GEJAST_PAGE_VERSION='v698';</script><script src="./gejast-config.js?v698"></script><script src="./gejast-home-gate.js?v698"></script><script src="./gejast-paardenrace.js?v698"></script><style>:root{--line:rgba(0,0,0,.08);--paper:#fffaf3;--bg:#f3ede4;--muted:#6d6256}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:#17130f}.page{max-width:1180px;margin:0 auto;padding:22px 16px 40px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}.btn{display:inline-flex;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:900}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.row{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.muted{color:var(--muted)}.list{display:grid;gap:10px}@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><div class="page"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div><div class="muted">Publieke samenvatting</div><h1>Paardenrace stats</h1></div><a class="btn" href="./paardenrace.html">Terug naar lobby</a></div><section class="panel"><div id="statsBox" class="grid"></div></section><section class="panel"><h2>Leaderboards</h2><div id="leaderBox" class="grid"></div></section><section class="panel"><h2>Recente races</h2><div id="recentBox" class="list"></div></section></div><script>(()=>{const api=window.GEJAST_PAARDENRACE;function card(label,value,meta=''){return `<div class="card"><div class="muted">${label}</div><div style="font-size:2rem;font-weight:900;margin-top:8px">${value}</div>${meta?`<div class="muted">${meta}</div>`:''}</div>`}async function load(){const data=await api.rpc('get_paardenrace_stats_public',{});const o=data.overview||{}, rows=Array.isArray(data.recent_matches)?data.recent_matches:[], leaders=Array.isArray(data.leaderboard)?data.leaderboard:[];document.getElementById('statsBox').innerHTML=[card('Races',o.matches_played||0),card('Totaal Bakken',o.total_bakken||0),card('Laatste winnaar',o.last_winner_suit?api.suitLabel(o.last_winner_suit):'—'),card('Unieke spelers',o.unique_players||0)].join('');document.getElementById('leaderBox').innerHTML=leaders.slice(0,8).map(r=>card(r.player_name||'—',r.wins||0,`wins · ${r.total_bakken_owed||0} Bakken owed`)).join('')||'<div class="muted">Nog geen leaderboard.</div>';document.getElementById('recentBox').innerHTML=rows.map(r=>`<div class="row"><strong>${r.room_code||'Room'}</strong><div class="muted">Winnaar: ${r.winner_suit?api.suitLabel(r.winner_suit):'—'} · ${(r.player_names||[]).length} spelers · pot ${r.total_wager_bakken||0}</div><div class="muted">${(r.player_names||[]).join(', ')||'—'}</div></div>`).join('')||'<div class="muted">Nog geen afgeronde paardenraces.</div>';}load().catch(err=>{document.getElementById('recentBox').innerHTML=`<div class="muted">${err.message||'Stats konden niet laden.'}</div>`;});})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',sync,{once:true});else sync();})();</script></body></html>
