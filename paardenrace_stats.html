<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Paardenrace stats</title><script>window.GEJAST_PAGE_VERSION='v638';</script><script src="./gejast-config.js?v638"></script>
  <script src="./gejast-home-gate.js?v638"></script><script src="./gejast-paardenrace.js?v638"></script><style>:root{--line:rgba(0,0,0,.08);--paper:#fffaf3;--bg:#f3ede4;--muted:#6d6256;--gold:#9a8241}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:#17130f}.page{max-width:1180px;margin:0 auto;padding:22px 16px 40px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}.btn,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.muted{color:var(--muted)}.list{display:grid;gap:10px}.row{padding:12px;border-radius:16px;background:#fff;border:1px solid var(--line)}@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><div class="page"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div><div class="muted">Publieke samenvatting</div><h1 style="margin:8px 0 0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em">Paardenrace stats</h1></div><a class="btn" href="./paardenrace.html">Terug naar lobby</a></div><section class="panel"><div id="statsBox" class="grid"></div></section><section class="panel"><h2 style="margin-top:0">Leuker dan alleen totalen</h2><div id="funBox" class="grid"></div></section><section class="panel"><h2 style="margin-top:0">Recente races</h2><div id="recentBox" class="list"></div></section></div><script>(()=>{const api=window.GEJAST_PAARDENRACE; function card(label,value,meta=''){return `<div class="card"><div class="muted">${label}</div><div style="font-size:2rem;font-weight:900;margin-top:8px">${value}</div>${meta?`<div class="muted" style="margin-top:6px">${meta}</div>`:''}</div>`;} async function load(){ const data=await api.rpc('get_paardenrace_stats_public',{}); const o=data?.overview||{}; const rows=Array.isArray(data?.recent_matches)?data.recent_matches:[]; const winners=rows.map(r=>r.winner_suit).filter(Boolean); const counts={}; winners.forEach(w=>counts[w]=(counts[w]||0)+1); const favorite=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]; const avgPlayers=rows.length? (rows.reduce((s,r)=>s+((r.player_names||[]).length),0)/rows.length).toFixed(1):'0'; const uniquePlayers=new Set(rows.flatMap(r=>r.player_names||[])).size; document.getElementById('statsBox').innerHTML=[ card('Races',o.matches_played||rows.length||0), card('Totaal Bakken',o.total_bakken||0), card('Laatste winnaar',o.last_winner_suit?api.suitLabel(o.last_winner_suit):'—'), card('Unieke spelers',uniquePlayers) ].join(''); document.getElementById('funBox').innerHTML=[ card('Gem. spelers per race',avgPlayers), card('Populairste winnaar',favorite?api.suitLabel(favorite[0]):'—', favorite?`${favorite[1]} keer gewonnen`:''), card('Comeback potentie', rows.filter(r=>r.comeback_win||r.comeback).length, 'Onderhonden die alsnog wonnen'), card('Claimed finishes', rows.filter(r=>r.winner_suit).length, 'Races met echte winnaar') ].join(''); document.getElementById('recentBox').innerHTML=rows.map(r=>`<div class="row"><strong>${r.room_code||'Room'}</strong><div class="muted">Winnaar: ${r.winner_suit?api.suitLabel(r.winner_suit):'—'} · ${(r.player_names||[]).length} spelers</div><div class="muted">Spelers: ${(r.player_names||[]).join(', ')||'—'}</div></div>`).join('')||'<div class="muted">Nog geen afgeronde paardenraces.</div>'; } load().catch(err=>{document.getElementById('recentBox').innerHTML=`<div class="muted">${err.message||'Stats konden niet laden.'}</div>`;});})();</script></body></html>
