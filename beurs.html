<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beurs d'Espinoza</title>
  <script>window.GEJAST_PAGE_VERSION='v692';</script>
  <script src="./gejast-config.js?v690"></script>
  <script src="./gejast-home-gate.js?v690"></script>
  <script defer src="./gejast-beurs.js?v690"></script>
  <style>
    :root{--gold:#9a8241;--ink:#17130f;--paper:rgba(255,250,243,.94);--line:rgba(17,17,17,.09);--muted:#665f54}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(244,240,232,.88),rgba(244,240,232,.9)),url('./wordtergejast.png') center/cover fixed}.wrap{width:min(1180px,100%);margin:0 auto;padding:22px 14px 90px}.hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;padding:22px 4px}h1{margin:0;font-size:clamp(38px,6vw,72px);letter-spacing:0}.muted,.meta{color:var(--muted)}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#111;color:#fff;border-radius:999px;padding:11px 14px;text-decoration:none;font-weight:900}.btn.alt{background:#fff;color:#111}.grid{display:grid;gap:14px}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.two{grid-template-columns:1.1fr .9fr}.panel,.stat-card,.notice-card,.meta-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 14px 28px rgba(0,0,0,.05)}.stat-label,.kicker{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:900}.stat-value,.balance{font-size:30px;font-weight:950}.stat-sub{color:var(--muted);font-size:13px}.leader-row,.depth-row{display:grid;gap:8px;padding:12px;border-bottom:1px solid var(--line)}.leader-row{grid-template-columns:42px 1fr auto;align-items:center}.leader-rank{width:34px;height:34px;border-radius:999px;background:#111;color:#fff;display:grid;place-items:center;font-weight:900}.leader-coins{font-weight:950}.chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#fff;font-size:12px}.depth-head{display:flex;justify-content:space-between;font-weight:900}.depth-bar{height:10px;border-radius:999px;background:#eee4d3;overflow:hidden}.depth-fill{height:100%;background:var(--gold)}.status{font-weight:900;color:var(--muted)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;pointer-events:none}
    @media(max-width:820px){.grid.three,.grid.two{grid-template-columns:1fr}.leader-row{grid-template-columns:34px 1fr}.leader-coins{grid-column:2}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <div class="stat-label">Caute Coins</div>
        <h1>Beurs d'Espinoza</h1>
        <p id="beursHeroStatus" class="status">Marktbord laden...</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a class="btn alt" href="./index.html">Terug</a>
        <a class="btn" href="./despimarkt.html">DespiMarket</a>
      </div>
    </section>
    <section id="beursStats" class="grid three"></section>
    <section class="grid two" style="margin-top:14px">
      <div class="grid">
        <section class="panel"><h2>Marktdesk</h2><div id="beursDesk" class="grid"></div></section>
        <section class="panel"><h2>Marktnotities</h2><div id="beursNotes" class="grid"></div></section>
      </div>
      <div class="grid">
        <section class="panel"><h2>Leaderboard</h2><div id="beursLeaderboard"></div></section>
        <section class="panel"><h2>Verdeling</h2><div id="beursDepth"></div></section>
        <section class="panel"><h2>Pulse</h2><div id="beursPulse" class="grid"></div></section>
      </div>
    </section>
  </main>
  <div class="site-credit-watermark" data-version-watermark>v692 · Made by Bruis</div>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',sync,{once:true});else sync();})();</script>
</body>
</html>
