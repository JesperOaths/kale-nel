  <script>window.GEJAST_PAGE_VERSION='v582';</script>
  <script src="./gejast-config.js?v582"></script>
  <style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.96)),url('./site-bg-desktop.webp') center/cover fixed;color:#17130f;display:grid;place-items:center;min-height:100svh;padding:24px}.card{max-width:560px;background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.78);border-radius:28px;padding:24px;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.08)}a{display:inline-flex;margin-top:14px;padding:12px 16px;border-radius:16px;background:#17130f;color:#fff;text-decoration:none;font-weight:800}</style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 8px">Beurs d'Espinoza</h1>
    <div style="color:#6d6256">Je wordt direct doorgestuurd naar de echte Despimarkt-hub.</div>
    <a id="fallbackLink" href="./despimarkt.html">Open Despimarkt</a>
  </div>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      const url = new URL('./despimarkt.html', window.location.href);
      const scope = (new URLSearchParams(window.location.search).get('scope') || '').toLowerCase();
      if (scope === 'family') url.searchParams.set('scope','family');
      document.getElementById('fallbackLink').href = `${url.pathname.split('/').pop()}${url.search}`;
      window.location.replace(url.toString());
    })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
