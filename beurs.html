<!doctype html>
<html lang="nl">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beurs d'Espinoza</title>
  <script>window.GEJAST_PAGE_VERSION='v550';</script>
  <script src="./gejast-config.js?v550"></script>
  <style>
    :root{--bg:#f3ede4;--paper:#fffaf3;--ink:#17130f;--muted:#6d6256;--line:rgba(0,0,0,.10);--gold:#9a8241}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:820px;margin:0 auto;padding:32px 16px}
    .card{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:22px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#17130f;color:#fff;text-decoration:none;font-weight:800}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin:0 0 10px">Beurs d'Espinoza</h1>
      <p class="muted">Je wordt doorgestuurd naar de echte Beurs d'Espinoza-hub.</p>
      <p><a class="btn" id="fallbackLink" href="./despimarkt.html">Ga naar Beurs d'Espinoza</a></p>
    </div>
  </div>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
    (function(){
      var target = new URL('./despimarkt.html', window.location.href);
      var current = new URL(window.location.href);
      current.searchParams.forEach(function(value, key){ target.searchParams.set(key, value); });
      target.hash = current.hash || '';
      var fallback = document.getElementById('fallbackLink');
      if (fallback) fallback.href = target.pathname.split('/').pop() + target.search + target.hash;
      window.location.replace(target.toString());
    })();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
