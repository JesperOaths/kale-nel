<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <title>Beurs d'Espinoza</title>
  <script>window.GEJAST_PAGE_VERSION='v488';</script>
  <link rel="canonical" href="https://kalenel.nl/beurs.html" />
  <script src="./gejast-config.js?v488"></script><script src="./gejast-family-rollout.js?v488"></script><script src="./gejast-scope.js?v488"></script>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.92),rgba(244,240,232,.94)),url('./site-bg-desktop.webp') center/cover no-repeat;color:#161616}
    .card{background:rgba(255,251,245,.88);border:1px solid rgba(17,17,17,.08);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.08);padding:32px;max-width:520px;width:min(92vw,520px);text-align:center}
    h1{margin:0 0 10px;font-size:2rem;letter-spacing:-.04em}.muted{color:#665f54}.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:999px;text-decoration:none;font-weight:800}.primary{background:#9a8241;color:#111}.ghost{background:#111;color:#fff}
  </style>
</head>
<body>
  <main class="card">
    <h1>Beurs d'Espinoza</h1>
    <div class="muted">Je wordt doorgestuurd naar de echte Beurs-pagina.</div>
    <div class="actions">
      <a id="marketLink" class="btn primary" href="./despimarkt.html">Open Beurs</a>
      <a id="homeLink" class="btn ghost" href="./index.html">Terug naar home</a>
    </div>
  </main>
  <script>
    (function(){
      var scope='friends';
      try { if (window.GEJAST_SCOPE_UTILS && typeof window.GEJAST_SCOPE_UTILS.getScope === 'function') scope = window.GEJAST_SCOPE_UTILS.getScope(); }
      catch(_){ }
      var target='./despimarkt.html';
      try {
        var url=new URL(target, window.location.href);
        if(scope==='family') url.searchParams.set('scope','family');
        document.getElementById('marketLink').href=url.pathname.split('/').pop()+url.search+url.hash;
        var home=new URL('./index.html', window.location.href);
        if(scope==='family') home.searchParams.set('scope','family');
        document.getElementById('homeLink').href=home.pathname.split('/').pop()+home.search+home.hash;
        window.location.replace(document.getElementById('marketLink').href);
      } catch(_) {}
    })();
  </script>
  <div class="site-credit-watermark" data-version-watermark>v488 · Made by Bruis</div>
</body>
</html>
