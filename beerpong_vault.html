<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beerpong Kluis</title>
  <link rel="stylesheet" href="./site-shell.css" />
  <style>
    :root{--gold:#d4af37;--ink:#161616;--muted:#6f675b;--line:rgba(17,17,17,.08);--card:#fffdf9;--bg:rgba(249,247,242,.96)}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:linear-gradient(rgba(232,228,217,.9),rgba(232,228,217,.92)),url('./wordtergejast.png') center/cover fixed}
    .wrap{max-width:1380px;margin:0 auto}.shell{background:var(--bg);border-radius:28px;padding:28px;border:1px solid rgba(255,255,255,.7);box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}.nav a{font-weight:800;color:#554e43;text-decoration:none;margin-left:14px}
    h1{margin:0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em}.sub{margin-top:8px;color:var(--muted)}
    .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin:18px 0}.stat,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 10px 24px rgba(0,0,0,.03)} .stat small{display:block;font-size:.75rem;text-transform:uppercase;color:#908670;font-weight:800;letter-spacing:.06em}.stat strong{display:block;margin-top:4px;font-size:1.75rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.leader-list,.recent-list{display:grid;gap:10px}.leader{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px}.rank{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-weight:900}.name{font-weight:900}.meta{font-size:.9rem;color:var(--muted);margin-top:2px}.value{text-align:right;font-weight:900}
    .fun-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.fun{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.fun small{display:block;font-size:.75rem;text-transform:uppercase;color:#8f846e;font-weight:800}.fun strong{display:block;margin-top:4px;font-size:1.08rem}.fun span{display:block;margin-top:6px;color:var(--muted);font-size:.9rem}
    .chart{width:100%;height:260px;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(250,247,238,.98));border:1px solid var(--line);border-radius:18px;padding:10px}.chart svg{width:100%;height:100%;display:block}.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.legend span{font-size:.8rem;color:#6a655b;font-weight:700}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}.empty{border:1px dashed var(--line);border-radius:16px;padding:14px;color:var(--muted);background:#fff}
    @media (max-width:1100px){.stats{grid-template-columns:repeat(3,minmax(0,1fr))}.grid,.fun-grid{grid-template-columns:1fr}} @media (max-width:720px){body{padding:14px}.shell{padding:18px}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
  <script src="./gejast-config.js?v156"></script>
  <script src="./admin-session-sync.js?v156"></script>
  <script src="./admin-gate-v105.js?v156"></script>
  <script src="./admin-topnav.js?v156"></script>
</head>
<body>
<div class="wrap"><main class="shell">
  <div class="top"><div><h1>Beerpong Kluis</h1><div class="sub">Openbare ELO-ranglijst, stijgingen en dalingen, en extra statistieken.</div></div><div class="nav"><a href="./index.html">Home</a><a href="./beerpong.html">Beerpong Scoreformulier</a><a href="./leaderboard.html">Klaverjas Ranglijst</a></div></div>
  <div class="stats"><div class="stat"><small>Spelers</small><strong id="sumPlayers">0</strong></div><div class="stat"><small>Wedstrijden</small><strong id="sumMatches">0</strong></div><div class="stat"><small>Koploper</small><strong id="sumLeader">-</strong></div><div class="stat"><small>Gem. ELO</small><strong id="sumAvg">0</strong></div><div class="stat"><small>Top winrate</small><strong id="sumTopWinrate">0%</strong></div></div>
  <section class="grid"><section class="card"><h2>Top 10 ELO</h2><div id="leaderboard" class="leader-list"></div></section><section class="card"><h2>ELO-verloop top 10</h2><div id="eloChart" class="chart"></div><div id="eloLegend" class="legend"></div></section></section>
  <section class="card" style="margin-top:16px"><h2>Leuke stats</h2><div id="funStats" class="fun-grid"></div></section>
  <section class="card" style="margin-top:16px"><h2>Recente wedstrijden</h2><div id="recentMatches" class="recent-list"></div></section>
</main></div>
<div class="site-credit-watermark" data-version-watermark>v121 · Made by Bruis</div>
<script>
const CFG=window.GEJAST_CONFIG||{}; const SUPABASE_URL=CFG.SUPABASE_URL; const SUPABASE_PUBLISHABLE_KEY=CFG.SUPABASE_PUBLISHABLE_KEY;
function rpcHeaders(){return {apikey:SUPABASE_PUBLISHABLE_KEY,'Content-Type':'application/json',Accept:'application/json'}}
async function parseResponse(res){const t=await res.text(); let d=null; try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)} if(!res.ok) throw new Error(d?.message||d?.error||d?.details||d?.hint||`HTTP ${res.status}`); return d}
async function callRpc(name,payload={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify(payload)}); return parseResponse(res)}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderBoard(rows){const root=document.getElementById('leaderboard'); if(!rows?.length){root.innerHTML='<div class="empty">Nog geen beerpongdata.</div>'; return;} root.innerHTML=rows.map((p,i)=>`<div class="leader"><div class="rank">${i+1}</div><div><div class="name">${esc(p.player_name)}</div><div class="meta">${p.games_played} potjes · ${p.wins} winst · ${p.losses} verlies · ${p.winrate}%</div></div><div class="value">${Math.round(Number(p.rating||1000))}<div class="meta">ELO</div></div></div>`).join('')}
function renderRecent(matches){const root=document.getElementById('recentMatches'); if(!matches?.length){root.innerHTML='<div class="empty">Nog geen recente wedstrijden.</div>'; return;} root.innerHTML=matches.map(m=>`<article class="leader"><div class="rank">${m.winner_team==='a'?'A':'B'}</div><div><div class="name">${esc((m.winner_names||[]).join(' + ')||'Onbekend')}</div><div class="meta">won van ${esc((m.loser_names||[]).join(' + ')||'Onbekend')}</div></div><div class="value">${m.margin ?? 0}<div class="meta">verschil</div></div></article>`).join('')}
function renderFun(fun){const cards=[fun?.biggest_blowout, fun?.grinder, fun?.best_form, fun?.peak_elo].filter(Boolean); const root=document.getElementById('funStats'); if(!cards.length){root.innerHTML='<div class="empty">Nog geen extra statistieken.</div>'; return;} root.innerHTML=cards.map(c=>`<div class="fun"><small>${esc(c.label)}</small><strong>${esc(c.value)}</strong><span>${esc(c.meta)}</span></div>`).join('')}
function drawLineChart(seriesList){const container=document.getElementById('eloChart'); if(!seriesList?.length){container.innerHTML='<div class="empty">Nog geen ELO-grafiekdata.</div>'; return;} const width=980,height=240,pad=24; const palette=['#d4af37','#1f4b99','#8a2d1f','#2f7a46','#7b4bb7','#d95f02','#008b8b','#c2185b','#6d4c41','#455a64']; const all=[]; seriesList.forEach(s=>(s.series||[]).forEach(p=>all.push(Number(p.rating||0)))); const min=Math.min(...all,1000)-5; const max=Math.max(...all,1000)+5; const range=(max-min)||1; const paths=[]; const legend=[]; seriesList.forEach((s,idx)=>{const pts=(s.series||[]).map((p,i)=>{const x=pad+((width-pad*2)*(s.series.length===1?0.5:i/(s.series.length-1||1))); const y=height-pad-(((Number(p.rating||0)-min)/range)*(height-pad*2)); return [x,y,p]}); if(!pts.length) return; const color=palette[idx%palette.length]; const d=pts.map((pt,i)=>`${i===0?'M':'L'}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(' '); paths.push(`<path d="${d}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>`); pts.forEach(pt=>paths.push(`<circle cx="${pt[0]}" cy="${pt[1]}" r="3" fill="${color}"><title>${esc(s.player_name)} · ${esc(pt[2].label||'')} · ${pt[2].rating}</title></circle>`)); legend.push(`<span><i class="dot" style="background:${color}"></i>${esc(s.player_name)}</span>`);}); const grid=[0,.25,.5,.75,1].map(fr=>{const y=height-pad-(fr*(height-pad*2)); const val=(min+fr*range).toFixed(0); return `<line x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}" stroke="rgba(0,0,0,.08)" /><text x="4" y="${y+4}" font-size="11" fill="#8b826f">${val}</text>`}).join(''); container.innerHTML=`<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${grid}${paths.join('')}</svg>`; document.getElementById('eloLegend').innerHTML=legend.join(''); }
function applySummary(summary){document.getElementById('sumPlayers').textContent=summary?.players??0; document.getElementById('sumMatches').textContent=summary?.matches??0; document.getElementById('sumLeader').textContent=summary?.leader??'-'; document.getElementById('sumAvg').textContent=summary?.avg_elo??0; document.getElementById('sumTopWinrate').textContent=`${summary?.top_winrate??0}%`;}
async function loadVault(){try{const data=await callRpc('get_beerpong_vault_public',{limit_count:10}); renderBoard(data.leaderboard||[]); renderRecent(data.recent_matches||[]); renderFun(data.fun_stats||{}); drawLineChart(data.elo_histories||[]); applySummary(data.summary||{});}catch(e){document.getElementById('leaderboard').innerHTML=`<div class="empty">${esc(e.message||'Kon beerpongdata niet laden.')}</div>`;}}
loadVault();
</script>

<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
