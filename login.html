<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Inloggen - Wordt er gejast?</title>
  <script>window.GEJAST_PAGE_VERSION='v496';</script>
  <style>
    :root { --gold:#9a8241; --card:#f9f7f2; --line:rgba(0,0,0,.08); --muted:#666; --ok:#1f6a46; --warn:#8b2d20; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(rgba(232,228,217,.92),rgba(232,228,217,.92)), url('./site-bg-desktop.webp') center/cover no-repeat; font-family:Inter,system-ui,sans-serif; }
    .main-card { width:min(92vw,500px); background:var(--card); border-radius:24px; padding:40px; position:relative; box-shadow:0 20px 50px rgba(0,0,0,.08); text-align:center; }
    .card-logo { position:absolute; top:24px; right:24px; width:50px; }
    h1 { margin:0 0 20px; font-size:32px; letter-spacing:-1px; }
    .state-tile { display:none; background:#fff; border:1px solid var(--line); border-radius:12px; padding:15px; margin-bottom:18px; }
    .state-tile.show { display:block; }
    .state-word { font-weight:800; }
    .small-note { margin-top:8px; color:var(--muted); font-size:12px; }
    select,input { width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px; font-size:16px; }
    .btn-row { display:flex; gap:10px; margin-top:10px; }
    .primary-btn,.secondary-btn { flex:1; border:none; padding:14px; border-radius:8px; font-weight:700; cursor:pointer; }
    .primary-btn { background:var(--gold); }
    .secondary-btn { background:#000; color:#fff; }
    .helper-links { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:14px; }
    .helper-btn,.text-link { background:none; border:none; color:#666; font-size:14px; text-decoration:underline; padding:0; cursor:pointer; }
    .status { margin-top:15px; min-height:20px; font-size:13px; color:var(--muted); }
    .status.ok { color:var(--ok); }
    .status.warn { color:var(--warn); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center; z-index:100; }
    .modal.show { display:flex; }
    .modal-panel { width:min(92vw,320px); background:#fff; border-radius:20px; padding:25px; }
    .modal-actions { display:flex; gap:10px; margin-top:10px; }
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}
  </style>
  <script src="./gejast-config.js?v496"></script>
  <script src="./gejast-family-rollout.js?v496"></script>
  <script src="./gejast-scope.js?v496"></script>
  <script src="./gejast-account-scope.js?v496"></script>
  <script src="./gejast-account-links.js?v496"></script>
</head>
<body>
  <main class="main-card">
    <a href="./index.html" aria-label="Terug naar home"><img src="./logo.png" class="card-logo" /></a>
    <h1>Inloggen</h1>
    <div class="state-tile" id="stateTile">
      <div id="loginStateWord" class="state-word"></div>
      <div id="loginStateCopy" class="small-note"></div>
    </div>
    <form id="loginForm" autocomplete="on">
      <select id="playerNameInput" name="username" autocomplete="username">
        <option value="">Kies je naam</option>
      </select>
      <input id="pinInput" name="current-password" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Pincode" autocomplete="current-password" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="btn-row">
        <button id="logoutBtn" type="button" class="secondary-btn">Uitloggen</button>
        <button id="loginBtn" type="submit" class="primary-btn">Inloggen</button>
      </div>
    </form>
    <div class="helper-links">
      <a class="text-link" href="./request.html">Naam aanvragen</a>
      <button id="forgotPinBtn" type="button" class="helper-btn">Pincode vergeten?</button>
    </div>
    <div class="small-note" id="nameLoadHint">Namen laden…</div>
    <div id="statusBox" class="status"></div>
  </main>

  <div id="forgotPinModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <h2>Pincode resetten</h2>
      <p class="small-note" style="font-size:14px;margin:0 0 12px;">Vul de gebruikersnaam en het gekoppelde e-mailadres in. We zetten het account terug naar wacht op activatie en sturen een nieuwe activatiemail.</p>
      <form id="forgotPinForm" autocomplete="on">
        <select id="resetNameInput" name="username" autocomplete="username"><option value="">Kies je naam</option></select>
        <input id="resetEmailInput" name="email" type="email" placeholder="jouw@email.com" autocomplete="email" autocapitalize="none" spellcheck="false">
        <div class="modal-actions">
          <button id="forgotPinCancelBtn" type="button" class="secondary-btn">Sluiten</button>
          <button id="forgotPinSubmitBtn" type="submit" class="primary-btn">Nieuwe activatiemail sturen</button>
        </div>
      </form>
    </div>
  </div>

  <div class="site-credit-watermark" data-version-watermark>v496 · Made by Bruis</div>

<script>
const SUPABASE_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_URL) || "";
const SUPABASE_PUBLISHABLE_KEY = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY) || "";
const MAKE_WEBHOOK_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.MAKE_WEBHOOK_URL) || "";
const SESSION_KEY = "jas_session_token_v11";
const SESSION_KEYS = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.PLAYER_SESSION_KEYS) || ["jas_session_token_v11","jas_session_token_v10"];

function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json", Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}` }; }
async function parseResponse(res) {
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
  if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
  return data;
}
function getSessionToken() {
  if (window.GEJAST_CONFIG && window.GEJAST_CONFIG.getPlayerSessionToken) return window.GEJAST_CONFIG.getPlayerSessionToken();
  for (const key of SESSION_KEYS){ const v = localStorage.getItem(key) || sessionStorage.getItem(key); if (v) return v; }
  return "";
}
function setSessionToken(token) {
  for (const key of SESSION_KEYS){ localStorage.removeItem(key); sessionStorage.removeItem(key); }
  localStorage.setItem(SESSION_KEY, token);
  sessionStorage.setItem(SESSION_KEY, token);
}
function clearSessionToken() {
  if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.clearPlayerSessionTokens) return window.GEJAST_CONFIG.clearPlayerSessionTokens();
  for (const key of SESSION_KEYS){ localStorage.removeItem(key); sessionStorage.removeItem(key); }
}
function setStatus(message = '', tone = 'info') {
  const box = document.getElementById('statusBox');
  box.className = `status ${tone === 'ok' ? 'ok' : tone === 'warn' ? 'warn' : ''}`.trim();
  box.textContent = message || '';
}
function currentScope() {
  try {
    if (window.GEJAST_SCOPE_UTILS && typeof window.GEJAST_SCOPE_UTILS.getScope === 'function') return window.GEJAST_SCOPE_UTILS.getScope();
    if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.currentScope === 'function') return window.GEJAST_ACCOUNT_SCOPE.currentScope();
  } catch (_) {}
  return new URLSearchParams(window.location.search).get('scope') === 'family' ? 'family' : 'friends';
}
function normalizeDisplayName(name) { return String(name || '').replace(/\s+/g, ' ').trim(); }
function uniqueNames(names) {
  const seen = new Set();
  return (names || []).map(normalizeDisplayName).filter((name) => name && !seen.has(name.toLowerCase()) && seen.add(name.toLowerCase())).sort((a,b)=>a.localeCompare(b,'nl'));
}
function fillNames(names, selected = '') {
  const input = document.getElementById('playerNameInput');
  const resetInput = document.getElementById('resetNameInput');
  const cleanNames = uniqueNames(names);
  const current = selected && cleanNames.includes(selected) ? selected : input.value;
  const resetCurrent = resetInput ? resetInput.value : '';
  const frag1 = document.createDocumentFragment();
  const frag2 = document.createDocumentFragment();
  const def1 = document.createElement('option'); def1.value=''; def1.textContent='Kies je naam';
  frag1.appendChild(def1);
  const def2 = def1.cloneNode(true); frag2.appendChild(def2);
  cleanNames.forEach((name)=>{
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    frag1.appendChild(option);
    frag2.appendChild(option.cloneNode(true));
  });
  input.replaceChildren(frag1);
  resetInput.replaceChildren(frag2);
  input.value = cleanNames.includes(current) ? current : '';
  resetInput.value = cleanNames.includes(resetCurrent) ? resetCurrent : (cleanNames.includes(input.value) ? input.value : '');
}
function friendlyMessage(msg) {
  const raw = String(msg || '');
  if (/rpc timeout|timeout/i.test(raw)) return 'Supabase reageert traag. Probeer opnieuw; je sessie wordt niet gewist.';
  if (/failed to fetch/i.test(raw)) return 'Netwerk/CORS-fout bij contact met Supabase.';
  return raw || 'Er ging iets mis.';
}
async function getPublicState() {
  if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
    return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('get_public_state', { session_token: getSessionToken() });
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
    method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken() })
  });
  return await parseResponse(res);
}
async function getLoginNamesFast() {
  const scope = currentScope();
  try {
    const url = `${SUPABASE_URL}/rest/v1/allowed_usernames?select=display_name,status,site_scope&status=eq.available&site_scope=eq.${encodeURIComponent(scope)}&order=display_name.asc`;
    const res = await fetch(url, { method:'GET', mode:'cors', cache:'no-store', headers: rpcHeaders() });
    const rows = await parseResponse(res);
    return { names: Array.isArray(rows) ? rows.map((row)=>row?.display_name || '') : [] };
  } catch (e) {
    console.warn('Fast username fetch failed', e);
  }
  const helper = window.GEJAST_CONFIG && typeof window.GEJAST_CONFIG.fetchScopedActivePlayerNames === 'function' ? window.GEJAST_CONFIG.fetchScopedActivePlayerNames : null;
  if (helper) {
    const names = await helper(scope);
    return { names: Array.isArray(names) ? names : [] };
  }
  return { names: [] };
}
async function touchSession() {
  const token = getSessionToken();
  if (!token) return null;
  if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
    return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('player_touch_session', { input_token: token });
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/player_touch_session`, {
    method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ input_token: token })
  });
  return await parseResponse(res);
}
function clampFourDigits(input) { input.value = String(input.value || '').replace(/\D/g, '').slice(0, 4); }
async function loginPlayer() {
  const desiredName = document.getElementById('playerNameInput').value.trim() || '';
  const enteredPin = document.getElementById('pinInput').value.trim();
  if (!desiredName) throw new Error('Kies eerst je naam');
  if (!/^\d{4}$/.test(enteredPin)) throw new Error('Voer je 4-cijferige pincode in');

  const payloads = [
    { input_username: desiredName, entered_pin: enteredPin },
    { desired_name: desiredName, entered_pin: enteredPin },
    { input_username: desiredName, input_pin: enteredPin },
    { input_display_name: desiredName, input_pin: enteredPin },
    { display_name: desiredName, pin: enteredPin },
    { input_name: desiredName, input_pin: enteredPin }
  ];
  if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
    return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('login_player', payloads);
  }
  let lastErr = null;
  for (const payload of payloads) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_player`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify(payload) });
    try { return await parseResponse(res); }
    catch (err) { lastErr = err; }
  }
  throw lastErr || new Error('Login-RPC kon niet worden aangeroepen.');
}
function targetUrl() {
  const params = new URLSearchParams(window.location.search);
  const cfg = window.GEJAST_CONFIG || {};
  const raw = params.get('return_to') || params.get('next') || (params.get('scope')==='family' ? 'index.html?scope=family' : 'index.html');
  const clean = cfg.sanitizeReturnTarget ? cfg.sanitizeReturnTarget(raw, params.get('scope')==='family' ? 'index.html?scope=family' : 'index.html') : raw;
  return clean.startsWith('./') ? clean : `./${clean}`;
}
async function requestPinReset() {
  const desiredName = normalizeDisplayName(document.getElementById('resetNameInput').value || document.getElementById('playerNameInput').value || '');
  const email = String(document.getElementById('resetEmailInput').value || '').trim().toLowerCase();
  if (!desiredName) throw new Error('Vul de gebruikersnaam in waarvoor je de pincode wilt resetten.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error('Vul het gekoppelde e-mailadres in.');
  const payload = { input_display_name: desiredName, input_email: email, base_url: new URL('./activate.html', window.location.href).toString() };
  if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
    return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('request_pin_reset_reactivation_action', payload);
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/request_pin_reset_reactivation_action`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify(payload) });
  return await parseResponse(res);
}
async function load() {
  const hint = document.getElementById('nameLoadHint');
  try {
    const scope = currentScope();
    const cached = window.GEJAST_CONFIG && typeof window.GEJAST_CONFIG.readScopedNameCache === 'function' ? window.GEJAST_CONFIG.readScopedNameCache('login_names', scope) : null;
    if (cached && Array.isArray(cached.names) && cached.names.length) {
      fillNames(cached.names, '');
      hint.textContent = 'Namen direct uit cache geladen.';
    }
  } catch (_) {}

  getLoginNamesFast().then((loginNames)=>{
    fillNames(loginNames.names || [], '');
    hint.textContent = (loginNames.names || []).length ? 'Namen geladen.' : 'Geen namen gevonden.';
  }).catch((err)=>{
    hint.textContent = 'Namenlijst tijdelijk traag.';
    setStatus(friendlyMessage(err?.message || err), 'warn');
  });

  getPublicState().then((state)=>{
    const tile = document.getElementById('stateTile');
    if (state?.my_name) {
      fillNames([state.my_name], state.my_name);
      tile.classList.add('show');
      document.getElementById('loginStateWord').textContent = state.my_name;
      document.getElementById('loginStateCopy').textContent = 'Deze browser heeft al een geldige sessie.';
    } else {
      tile.classList.remove('show');
      document.getElementById('loginStateWord').textContent = '';
      document.getElementById('loginStateCopy').textContent = '';
    }
  }).catch((err)=>{
    console.warn('Public state load failed', err);
  });

  if (getSessionToken()) {
    try { await touchSession(); }
    catch (e) { console.warn('touchSession failed, keeping session alive', e); }
  }
}
document.getElementById('loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  try {
    setStatus('Inloggen…');
    const data = await loginPlayer();
    setSessionToken(data.session_token);
    try { window.GEJAST_CONFIG && window.GEJAST_CONFIG.touchPlayerActivity && window.GEJAST_CONFIG.touchPlayerActivity(); } catch (_) {}
    window.location.href = targetUrl();
  } catch (err) {
    setStatus(friendlyMessage(err instanceof Error ? err.message : err), 'warn');
  }
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{ clearSessionToken(); setStatus('Browser-sessie gewist.', 'ok'); });
document.getElementById('pinInput').addEventListener('input', (e)=>clampFourDigits(e.target));
document.getElementById('pinInput').addEventListener('paste', ()=>requestAnimationFrame(()=>clampFourDigits(document.getElementById('pinInput'))));
const forgotPinModal = document.getElementById('forgotPinModal');
document.getElementById('forgotPinBtn').addEventListener('click', ()=>{
  document.getElementById('resetNameInput').value = document.getElementById('playerNameInput').value || '';
  document.getElementById('resetEmailInput').value = '';
  forgotPinModal.classList.add('show');
});
document.getElementById('forgotPinCancelBtn').addEventListener('click', ()=>forgotPinModal.classList.remove('show'));
document.getElementById('forgotPinForm').addEventListener('submit', async (event)=>{
  event.preventDefault();
  const submitBtn = document.getElementById('forgotPinSubmitBtn');
  submitBtn.disabled = true;
  try {
    await requestPinReset();
    setStatus('Nieuwe activatiemail klaargezet.', 'ok');
    forgotPinModal.classList.remove('show');
  } catch (err) {
    setStatus(friendlyMessage(err instanceof Error ? err.message : err), 'warn');
  } finally {
    submitBtn.disabled = false;
  }
});
load();
</script>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
