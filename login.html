<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen</title>
  <link rel="stylesheet" href="./site-shell.css" />
  <link rel="stylesheet" href="./theme-v46.css" />
  <link rel="stylesheet" href="./premium-v47.css" />
  <link rel="stylesheet" href="./ui-v52.css" />
</head>
<body>
  <div class="site-scene" aria-hidden="true">
    <div class="page-bg"></div>
    <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
        <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
    <div class="playing-card-accent"><img src="./playingcard-accent1-trimmed.png" alt="" /></div>
    <div class="top-glow"></div>
  </div>

  <main class="page">
    <div class="topbar">
      <a class="brand-link" href="./index.html">Site</a>
      <div class="topbar-actions nav-pills">
        <a class="text-link" href="./score.html">Score</a>
        <a class="text-link" href="./leaderboard.html">Leaderboard</a>
        <a class="text-link" href="./request.html">Naam</a>
        <a class="text-link" href="./admin.html">Admin</a>
      </div>
    </div>

    <section class="hero">
      <div class="hero-grid">
        <div>
          <h1>Inloggen</h1>
        </div>
        <div class="panel state-tile">
          <div id="loginStateWord" class="state-word maybe">Klaar</div>
          <div class="state-copy" id="loginStateCopy"></div>
        </div>
      </div>
    </section>

    <section class="panel" style="padding:24px; margin-top:18px;">
      <div class="form-grid">
        <label>Naam
          <select id="playerSelect"></select>
        </label>
        <label>Pincode
          <div class="pin-inline">
            <input id="pinInput" inputmode="numeric" maxlength="4" placeholder="4 cijfers" />
            <button id="pinOpenBtn" class="secondary-btn pin-open-inline" type="button">Toetsen</button>
          </div>
        </label>
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
        <button id="loginBtn" class="primary-btn" type="button">Inloggen</button>
        <button id="logoutBtn" class="secondary-btn" type="button">Uitloggen</button>
        <a class="text-link" href="./request.html">Naam aanvragen</a>
      </div>
      <div id="statusBox" class="status" style="margin-top:16px;"></div>
    </section>
  </main>
  <div id="pinModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <div class="muted" style="text-align:center;">Pincode</div>
      <div id="pinPreview" class="pin-preview" aria-live="polite"></div>
      <div class="pin-grid">
        <button class="pin-key" data-digit="1" type="button">1</button>
        <button class="pin-key" data-digit="2" type="button">2</button>
        <button class="pin-key" data-digit="3" type="button">3</button>
        <button class="pin-key" data-digit="4" type="button">4</button>
        <button class="pin-key" data-digit="5" type="button">5</button>
        <button class="pin-key" data-digit="6" type="button">6</button>
        <button class="pin-key" data-digit="7" type="button">7</button>
        <button class="pin-key" data-digit="8" type="button">8</button>
        <button class="pin-key" data-digit="9" type="button">9</button>
        <button class="pin-key pin-key-alt" data-action="clear" type="button">Wis</button>
        <button class="pin-key" data-digit="0" type="button">0</button>
        <button class="pin-key pin-key-alt" data-action="done" type="button">Klaar</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const SESSION_KEY = "jas_session_token_v11";

    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json" }; }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
    function setSessionToken(token) { localStorage.setItem(SESSION_KEY, token); }
    function clearSessionToken() { localStorage.removeItem(SESSION_KEY); }
    function setStatus(message = '', tone = 'info') {
      const box = document.getElementById('statusBox');
      if (!message) { box.className = 'status'; box.textContent = ''; return; }
      box.className = `status show ${tone}`;
      box.textContent = message;
    }
    function fillNames(names, selected = '') {
      const select = document.getElementById('playerSelect');
      select.innerHTML = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Kies je naam';
      placeholder.disabled = true;
      placeholder.selected = !selected;
      select.appendChild(placeholder);
      (names || []).forEach((name) => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
      if (selected && (names || []).includes(selected)) select.value = selected;
    }
    function nextUrl() { return new URLSearchParams(window.location.search).get('next') || './index.html'; }
    function pendingVote() { return new URLSearchParams(window.location.search).get('vote') || ''; }
    async function getPublicState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken() })
      });
      return await parseResponse(res);
    }
    async function touchSession() {
      const token = getSessionToken();
      if (!token) return null;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/player_touch_session`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ input_token: token })
      });
      return await parseResponse(res);
    }
    async function loginPlayer() {
      const desiredName = document.getElementById('playerSelect').value || '';
      const enteredPin = document.getElementById('pinInput').value.trim();
      if (!desiredName) throw new Error('Kies eerst je naam');
      if (!/^\d{4}$/.test(enteredPin)) throw new Error('Voer je 4-cijferige pincode in');
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_player`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ desired_name: desiredName, entered_pin: enteredPin })
      });
      return await parseResponse(res);
    }
    async function castVote(desired_status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken(), desired_status })
      });
      return await parseResponse(res);
    }
    async function load() {
      try {
        const state = await getPublicState();
        fillNames(state.all_names || [], state.my_name || '');
        if (state.my_name) {
          document.getElementById('loginStateWord').textContent = state.my_name;
          document.getElementById('loginStateWord').className = 'state-word yes';
          document.getElementById('loginStateCopy').textContent = 'Deze browser heeft al een geldige sessie.';
        }
        if (getSessionToken()) {
          try { await touchSession(); } catch { clearSessionToken(); }
        }
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn');
      }
    }
    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        setStatus('Inloggen...');
        const data = await loginPlayer();
        setSessionToken(data.session_token);
        if (pendingVote()) await castVote(pendingVote());
        window.location.href = nextUrl();
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn');
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => { clearSessionToken(); setStatus('Browser-sessie gewist.', 'ok'); });
    document.getElementById('pinInput').addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4); syncPinPreview(); });

    const pinModal = document.getElementById("pinModal");
    const pinPreview = document.getElementById("pinPreview");
    function openPinModal() { pinModal.classList.add("show"); pinModal.setAttribute("aria-hidden", "false"); syncPinPreview(); }
    function closePinModal() { pinModal.classList.remove("show"); pinModal.setAttribute("aria-hidden", "true"); }
    function syncPinPreview() { pinPreview.textContent = (document.getElementById('pinInput').value || '').replace(/./g, '•'); }
    document.getElementById('pinOpenBtn').addEventListener('click', openPinModal);
    document.getElementById('pinInput').addEventListener('focus', openPinModal);
    pinModal.addEventListener('click', (e) => { if (e.target === pinModal) closePinModal(); });
    document.querySelectorAll('#pinModal .pin-key').forEach((btn) => btn.addEventListener('click', () => {
      const input = document.getElementById('pinInput');
      const digit = btn.dataset.digit;
      const action = btn.dataset.action;
      if (digit && input.value.length < 4) input.value += digit;
      if (action === 'clear') input.value = input.value.slice(0, -1);
      if (action === 'done') closePinModal();
      syncPinPreview();
    }));
    load();
  </script>
</body>
</html>
