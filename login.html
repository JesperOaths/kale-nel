<!DOCTYPE html>
<html lang="nl">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen - Wordt er gejast?</title>
  <script>window.GEJAST_PAGE_VERSION='v496';</script>
  <style>
    :root { --gold: #9a8241; --card-bg: #f9f7f2; --line: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(rgba(232,228,217,0.92), rgba(232,228,217,0.92)), url('./site-bg-desktop.webp') center/cover no-repeat; }
    .main-card { background: var(--card-bg); border-radius: 24px; padding: 40px; width: 90%; max-width: 520px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); position: relative; text-align: center; }
    .card-logo { position: absolute; top: 25px; right: 25px; width: 50px; }
    h1 { font-size: 32px; margin: 0 0 20px 0; letter-spacing: -1px; }
    .state-tile { display:none; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--line); }
    .state-tile.show { display:block; }
    .state-word { font-weight: 800; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .primary-btn { flex: 1; background: var(--gold); border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .secondary-btn { flex: 1; background: #000; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .status { margin-top: 15px; font-size: 13px; min-height: 20px; }
    .helper-links { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:14px; }
    .text-link, .helper-btn { color:#666; font-size:14px; text-decoration: none; background:none; border:none; cursor:pointer; padding:0; }
    .helper-btn { text-decoration:underline; }
    .name-loading-note { margin: -6px 0 12px; font-size: 12px; color:#666; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center; z-index:100; }
    .modal.show { display:flex; }
    .modal-panel { background:#fff; padding:25px; border-radius:20px; width:300px; }
    .modal-actions { display:flex; gap:10px; margin-top:10px; }
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
  </style>
  <script src="./gejast-config.js?v496"></script>
  <script src="./gejast-family-rollout.js?v489"></script>
  <script src="./gejast-scope.js?v489"></script>
  <script src="./gejast-account-scope.js?v496"></script>
  <script src="./gejast-account-links.js?v489"></script>
</head>
<body>
  <main class="main-card">
    <a href="./index.html" aria-label="Terug naar home"><img src="./logo.png" class="card-logo" /></a>
    <h1>Inloggen</h1>
    <div class="state-tile" id="stateTile">
      <div id="loginStateWord" class="state-word"></div>
      <div id="loginStateCopy" style="font-size:12px;color:#666;"></div>
    </div>
    <form id="loginForm" autocomplete="on">
      <select id="playerNameInput" name="username" autocomplete="username"><option value="">Kies je naam</option></select>
      <div id="nameLoadingNote" class="name-loading-note">Gebruikersnamen laden…</div>
      <div style="display:flex;gap:8px;margin-bottom:15px;">
        <input id="pinInput" name="current-password" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Pincode" autocomplete="current-password" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin:0;">
      </div>
      <div class="btn-row">
        <button id="logoutBtn" type="button" class="secondary-btn">Uitloggen</button>
        <button id="loginBtn" type="submit" class="primary-btn">Inloggen</button>
      </div>
    </form>
    <div class="helper-links">
      <a class="text-link" href="./request.html">Naam aanvragen</a>
      <button id="forgotPinBtn" type="button" class="helper-btn">Pincode vergeten?</button>
    </div>
    <div id="statusBox" class="status"></div>
  </main>

  <div id="forgotPinModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <h2 style="margin:0 0 8px 0;">Pincode resetten</h2>
      <p style="margin:0 0 16px 0;color:#666;font-size:14px;line-height:1.45;">Vul de gebruikersnaam en het gekoppelde e-mailadres in. We wissen dan de oude pincode, zetten het account terug naar <strong>wacht op activatie</strong> en sturen automatisch een nieuwe activatiemail.</p>
      <form id="forgotPinForm" autocomplete="on">
        <select id="resetNameInput" name="username" autocomplete="username"><option value="">Kies je naam</option></select>
        <input id="resetEmailInput" name="email" type="email" placeholder="jouw@email.com" autocomplete="email" autocapitalize="none" spellcheck="false">
        <div class="modal-actions">
          <button id="forgotPinCancelBtn" type="button" class="secondary-btn">Sluiten</button>
          <button id="forgotPinSubmitBtn" type="submit" class="primary-btn">Nieuwe activatiemail sturen</button>
        </div>
      </form>
    </div>
  </div>

  <script>
  (function(){
    try {
      if (window.GEJAST_ACCOUNT_LINKS && typeof window.GEJAST_ACCOUNT_LINKS.applyLinks === 'function') {
        window.GEJAST_ACCOUNT_LINKS.applyLinks(document);
      }
    } catch (_) {}

    const SUPABASE_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_URL) || '';
    const SUPABASE_PUBLISHABLE_KEY = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY) || '';
    const MAKE_WEBHOOK_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.MAKE_WEBHOOK_URL) || '';
    const SESSION_KEY = 'jas_session_token_v11';
    const SESSION_KEYS = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.PLAYER_SESSION_KEYS) || ['jas_session_token_v11','jas_session_token_v10'];
    const NAME_CACHE_KEY = 'gejast_login_names_fast_v496';

    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, 'Content-Type': 'application/json', Accept: 'application/json' }; }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getSessionToken() { if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.getPlayerSessionToken) return window.GEJAST_CONFIG.getPlayerSessionToken(); for (const key of SESSION_KEYS){ const v=localStorage.getItem(key)||sessionStorage.getItem(key); if(v) return v; } return ''; }
    function setSessionToken(token) { for (const key of SESSION_KEYS){ localStorage.removeItem(key); sessionStorage.removeItem(key); } localStorage.setItem(SESSION_KEY, token); sessionStorage.setItem(SESSION_KEY, token); }
    function clearSessionToken() { if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.clearPlayerSessionTokens) return window.GEJAST_CONFIG.clearPlayerSessionTokens(); for (const key of SESSION_KEYS){ localStorage.removeItem(key); sessionStorage.removeItem(key); } }
    function setStatus(message = '', tone = 'info') { const box = document.getElementById('statusBox'); box.className = `status ${tone}`; box.textContent = message || ''; }
    function setNameLoading(message = '') { const el = document.getElementById('nameLoadingNote'); if (!el) return; el.textContent = message || ''; el.style.display = message ? '' : 'none'; }
    function normalizeDisplayName(name) { return String(name || '').replace(/\s+/g, ' ').trim(); }
    function uniqueNames(names) { const seen = new Set(); return (names || []).map(normalizeDisplayName).filter((name) => name && !seen.has(name.toLowerCase()) && seen.add(name.toLowerCase())).sort((a, b) => a.localeCompare(b, 'nl')); }
    function currentScope() {
      try {
        if (window.GEJAST_SCOPE_UTILS && typeof window.GEJAST_SCOPE_UTILS.getScope === 'function') return window.GEJAST_SCOPE_UTILS.getScope();
        if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.currentScope === 'function') return window.GEJAST_ACCOUNT_SCOPE.currentScope();
      } catch (_) {}
      return new URLSearchParams(window.location.search).get('scope') === 'family' ? 'family' : 'friends';
    }
    function targetUrl() {
      const params = new URLSearchParams(window.location.search);
      const cfg = window.GEJAST_CONFIG || {};
      const raw = params.get('return_to') || params.get('next') || (params.get('scope')==='family' ? 'index.html?scope=family' : 'index.html');
      const clean = cfg.sanitizeReturnTarget ? cfg.sanitizeReturnTarget(raw, params.get('scope')==='family' ? 'index.html?scope=family' : 'index.html') : raw;
      return clean.startsWith('./') ? clean : `./${clean}`;
    }
    function pendingVote() { return new URLSearchParams(window.location.search).get('vote') || ''; }
    function cacheNamePayload(scope, names){
      try { localStorage.setItem(`${NAME_CACHE_KEY}:${scope}`, JSON.stringify({ at: Date.now(), names: uniqueNames(names) })); } catch(_){}
    }
    function readCachedNames(scope){
      try { const raw = localStorage.getItem(`${NAME_CACHE_KEY}:${scope}`); if(!raw) return []; const parsed = JSON.parse(raw); return Array.isArray(parsed?.names) ? parsed.names : []; } catch(_) { return []; }
    }
    function fillNames(names, selected = '') {
      const input = document.getElementById('playerNameInput');
      const resetInput = document.getElementById('resetNameInput');
      const cleanNames = uniqueNames(names);
      const current = selected && cleanNames.includes(selected) ? selected : input.value;
      const resetCurrent = resetInput ? resetInput.value : '';
      const primaryFrag = document.createDocumentFragment();
      const defaultOption = document.createElement('option'); defaultOption.value = ''; defaultOption.textContent = 'Kies je naam'; primaryFrag.appendChild(defaultOption);
      const resetFrag = resetInput ? document.createDocumentFragment() : null; if (resetFrag) resetFrag.appendChild(defaultOption.cloneNode(true));
      cleanNames.forEach((name) => { const option = document.createElement('option'); option.value = name; option.textContent = name; primaryFrag.appendChild(option); if (resetFrag) resetFrag.appendChild(option.cloneNode(true)); });
      input.replaceChildren(primaryFrag); if (resetInput && resetFrag) resetInput.replaceChildren(resetFrag);
      input.value = cleanNames.includes(current) ? current : ''; if (resetInput) resetInput.value = cleanNames.includes(resetCurrent) ? resetCurrent : (cleanNames.includes(input.value) ? input.value : '');
    }
    async function getPublicState() {
      if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
        return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('get_public_state', { session_token: getSessionToken() }, { timeoutMs: 4200 });
      }
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken() }) });
      return await parseResponse(res);
    }
    async function getFastLoginNames() {
      const scope = currentScope();
      const headers = { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}` };
      const url = `${SUPABASE_URL}/rest/v1/allowed_usernames?select=display_name,site_scope,status&status=eq.available&order=display_name.asc`;
      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      const timer = controller ? setTimeout(() => { try { controller.abort(); } catch(_){} }, 2200) : null;
      try {
        const res = await fetch(url, { method:'GET', mode:'cors', cache:'no-store', headers, signal: controller ? controller.signal : undefined });
        const rows = await parseResponse(res);
        const names = uniqueNames((Array.isArray(rows) ? rows : []).filter((row) => {
          const explicitScope = String(row?.site_scope || '').trim().toLowerCase();
          return !explicitScope || explicitScope === scope;
        }).map((row) => row?.display_name || row?.name || row?.desired_name || ''));
        if (names.length) cacheNamePayload(scope, names);
        return { names };
      } catch (_) {
        const cached = readCachedNames(scope);
        return { names: cached };
      } finally {
        if (timer) clearTimeout(timer);
      }
    }
    async function touchSession() {
      const token = getSessionToken();
      if (!token) return null;
      if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
        return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('player_touch_session', { input_token: token }, { timeoutMs: 3000 });
      }
      return null;
    }
    function clampFourDigits(input) { input.value = String(input.value || '').replace(/\D/g, '').slice(0, 4); }
    function friendlyMessage(msg) {
      const raw = String(msg || '');
      if (/failed to fetch/i.test(raw)) return 'Netwerk/CORS-fout bij contact met Supabase.';
      if (/rpc timeout/i.test(raw)) return 'De loginpagina kreeg te laat antwoord van Supabase. De snelle fallbacklijst hoort de namen nu direct te tonen.';
      return raw;
    }
    async function loginPlayer() {
      const desiredName = document.getElementById('playerNameInput').value.trim() || '';
      const enteredPin = document.getElementById('pinInput').value.trim();
      if (!desiredName) throw new Error('Kies eerst je naam');
      if (!/^\d{4}$/.test(enteredPin)) throw new Error('Voer je 4-cijferige pincode in');
      const payloads = [
        { input_username: desiredName, entered_pin: enteredPin },
        { desired_name: desiredName, entered_pin: enteredPin },
        { input_username: desiredName, input_pin: enteredPin },
        { input_display_name: desiredName, input_pin: enteredPin },
        { display_name: desiredName, pin: enteredPin },
        { input_name: desiredName, input_pin: enteredPin }
      ];
      if (window.GEJAST_ACCOUNT_SCOPE && typeof window.GEJAST_ACCOUNT_SCOPE.callRpcCompat === 'function') {
        return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('login_player', payloads, { timeoutMs: 5000 });
      }
      throw new Error('Login-RPC kon niet worden aangeroepen.');
    }
    async function castVote(desired_status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken(), desired_status }) });
      return await parseResponse(res);
    }
    function formatDateTime(value) { if (!value) return ''; const date = new Date(value); if (Number.isNaN(date.getTime())) return String(value); return new Intl.DateTimeFormat('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false }).format(date); }
    function activationBaseUrl() { return new URL('./activate.html', window.location.href).toString(); }
    async function triggerMakeScenario(meta = {}) {
      if (!MAKE_WEBHOOK_URL) return { via: 'disabled' };
      const res = await fetch(MAKE_WEBHOOK_URL, { method:'POST', mode:'cors', cache:'no-store', keepalive:true, headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(meta) });
      if (!res.ok) throw new Error(`Webhook gaf HTTP ${res.status}`);
      return { via: 'raw-json', status: res.status };
    }
    async function requestPinReset() {
      const desiredName = normalizeDisplayName(document.getElementById('resetNameInput').value || document.getElementById('playerNameInput').value || '');
      const email = String(document.getElementById('resetEmailInput').value || '').trim().toLowerCase();
      if (!desiredName) throw new Error('Vul de gebruikersnaam in waarvoor je de pincode wilt resetten.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error('Vul het gekoppelde e-mailadres in.');
      return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('request_pin_reset_reactivation_action', { input_display_name: desiredName, input_email: email, base_url: activationBaseUrl() }, { timeoutMs: 5000 });
    }

    async function load() {
      const scope = currentScope();
      const cached = readCachedNames(scope);
      if (cached.length) { fillNames(cached, ''); setNameLoading(''); }
      else setNameLoading('Gebruikersnamen laden…');

      const namesPromise = getFastLoginNames();
      const statePromise = getPublicState().catch(() => null);

      const loginNames = await namesPromise;
      const names = uniqueNames(loginNames?.names || []);
      if (names.length) { fillNames(names, ''); setNameLoading(''); }
      else if (!cached.length) setNameLoading('Gebruikersnamen laden traag. Je kunt alvast je pincode invullen.');

      const state = await statePromise;
      const fallbackNames = state?.my_name ? [state.my_name] : [];
      fillNames(uniqueNames([...(names.length ? names : cached), ...fallbackNames]), state?.my_name || '');

      const stateTile = document.getElementById('stateTile');
      if (state?.my_name) {
        stateTile.classList.add('show');
        document.getElementById('loginStateWord').textContent = state.my_name;
        document.getElementById('loginStateCopy').textContent = 'Deze browser heeft al een geldige sessie.';
      } else {
        stateTile.classList.remove('show');
      }

      if (getSessionToken()) { try { await touchSession(); } catch { clearSessionToken(); } }
      if (!names.length && !cached.length) setStatus('De oude naam-RPC was te traag. Deze pagina gebruikt nu direct de snelle fallbacklijst.', 'warn');
      else setStatus('');
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        setStatus('Inloggen...');
        const data = await loginPlayer();
        setSessionToken(data.session_token);
        try{ window.GEJAST_CONFIG && window.GEJAST_CONFIG.touchPlayerActivity && window.GEJAST_CONFIG.touchPlayerActivity(); }catch(_){ }
        if (pendingVote()) await castVote(pendingVote());
        window.location.href = targetUrl();
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        setStatus(friendlyMessage(msg), 'warn');
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => { clearSessionToken(); setStatus('Browser-sessie gewist.', 'ok'); });
    document.getElementById('pinInput').addEventListener('input', (e) => { clampFourDigits(e.target); });
    document.getElementById('pinInput').addEventListener('paste', () => { requestAnimationFrame(() => { clampFourDigits(document.getElementById('pinInput')); }); });

    const forgotPinModal = document.getElementById('forgotPinModal');
    function openForgotPinModal() { document.getElementById('resetNameInput').value = document.getElementById('playerNameInput').value || ''; document.getElementById('resetEmailInput').value = ''; forgotPinModal.classList.add('show'); setStatus(''); }
    function closeForgotPinModal() { forgotPinModal.classList.remove('show'); }
    document.getElementById('forgotPinBtn').addEventListener('click', openForgotPinModal);
    document.getElementById('forgotPinCancelBtn').addEventListener('click', closeForgotPinModal);
    forgotPinModal.addEventListener('click', (e) => { if (e.target === forgotPinModal) closeForgotPinModal(); });
    document.getElementById('forgotPinForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const submitBtn = document.getElementById('forgotPinSubmitBtn');
      const cancelBtn = document.getElementById('forgotPinCancelBtn');
      try {
        submitBtn.disabled = true; cancelBtn.disabled = true; setStatus('Pincode resetten en nieuwe activatiemail klaarzetten...');
        const result = await requestPinReset();
        try { await triggerMakeScenario({ reason:'pin_reset_reactivation', request_id: result?.request_id ?? null, job_id: result?.job_id ?? null, player_id: result?.player_id ?? null, display_name: result?.display_name ?? document.getElementById('resetNameInput').value.trim(), email: result?.requester_email ?? document.getElementById('resetEmailInput').value.trim().toLowerCase(), activation_url: result?.activation_url ?? null, expires_at: result?.expires_at ?? null, created_at: result?.created_at ?? null }); } catch (_) {}
        const expiresCopy = result?.expires_at ? ` Nieuwe link verloopt op ${formatDateTime(result.expires_at)}.` : '';
        setStatus((result?.message || 'Je account staat weer op wacht op activatie. Controleer je mail voor de nieuwe activatielink.') + expiresCopy, 'ok');
        closeForgotPinModal(); await load();
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Resetten mislukt';
        setStatus(friendlyMessage(msg), 'warn');
      } finally { submitBtn.disabled = false; cancelBtn.disabled = false; }
    });

    load();
  })();
  </script>

  <div class="site-credit-watermark" data-version-watermark>v496 · Made by Bruis</div>
</body>
</html>
