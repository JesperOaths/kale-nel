<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen - Wordt er gejast?</title>
  <style>
    :root { --gold: #d4af37; --dark-bg: #111; --card-bg: #f9f7f2; --line: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(rgba(232,228,217,0.90), rgba(232,228,217,0.90)), url('./wordtergejast.png') center/cover no-repeat fixed; }
    .site-scene { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .brand-watermark { position: absolute; top: 5%; left: 5%; opacity: 0.1; width: 400px; }
    .spinoza-shadow { position: absolute; bottom: 0; right: 0; opacity: 0.15; width: 600px; }
    .main-card { background: var(--card-bg); border-radius: 24px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); position: relative; text-align: center; }
    .card-logo { position: absolute; top: 25px; right: 25px; width: 50px; }
    h1 { font-size: 32px; margin: 0 0 20px 0; letter-spacing: -1px; }
    .state-tile { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--line); }
    .state-word { font-weight: 800; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .primary-btn { flex: 1; background: var(--gold); border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .secondary-btn { flex: 1; background: #000; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .status { margin-top: 15px; font-size: 13px; min-height: 20px; }
    .text-link { display: block; margin-top: 15px; color: #666; font-size: 14px; text-decoration: none; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100; }
    .modal.show { display: flex; }
    .modal-panel { background: #fff; padding: 25px; border-radius: 20px; width: 300px; }
    .autofill-ghost{position:absolute;left:-9999px;top:auto;width:1px;height:1px;opacity:0;pointer-events:none;}
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .pin-key { padding: 15px; border-radius: 8px; border: 1px solid #eee; background: #fafafa; font-weight: bold; cursor: pointer; }
  </style>

  <style id="bruis-watermark-style">
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
    @media (max-width:640px){.site-credit-watermark{bottom:10px;font-size:12px;padding:7px 11px;max-width:calc(100vw - 24px);text-align:center}}
  </style>
  <link rel="canonical" href="https://kalenel.nl/login.html" />
  <script id="force-https">(function(){var h=window.location.hostname||'';if((h==='kalenel.nl'||h.endsWith('.kalenel.nl'))&&window.location.protocol==='http:'){window.location.replace('https://'+window.location.host+window.location.pathname+window.location.search+window.location.hash);}})();</script>
</head>
<body>
  <div class="site-scene">
    <div class="brand-watermark"><img src="./dubbeleD-goud.png" width="100%"></div>
    
  </div>

  <main class="main-card">
    <a href="./index.html" aria-label="Terug naar home"><img src="./logo.png" class="card-logo" /></a>
    <h1>Inloggen</h1>
    <div class="state-tile">
      <div id="loginStateWord" class="state-word">Klaar</div>
      <div id="loginStateCopy" style="font-size: 12px; color: #666;"></div>
    </div>
    <form id="loginForm" autocomplete="on">
      <select id="playerNameInput" name="username" autocomplete="username">
        <option value="">Kies je naam</option>
      </select>
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
      <input id="pinInput" name="current-password" type="password" inputmode="numeric" maxlength="4" placeholder="Pincode" autocomplete="current-password" style="margin:0;">
      <button id="pinOpenBtn" type="button" class="primary-btn" style="flex: 0 0 auto; width: auto; padding: 0 15px;">Toetsen</button>
    </div>
    <div class="btn-row">
      <button id="loginBtn" type="submit" class="primary-btn">Inloggen</button>
      <button id="logoutBtn" type="button" class="secondary-btn">Uitloggen</button>
    </div>
    </form>
    <a class="text-link" href="./request.html">Naam aanvragen</a>
    <div id="statusBox" class="status"></div>
  </main>
  <div id="pinModal" class="modal">
    <div class="modal-panel">
      <div id="pinPreview" style="font-size: 24px; letter-spacing: 10px; margin-bottom: 20px; font-weight: bold;"></div>
      <div class="pin-grid">
        <button class="pin-key" data-digit="1">1</button><button class="pin-key" data-digit="2">2</button><button class="pin-key" data-digit="3">3</button>
        <button class="pin-key" data-digit="4">4</button><button class="pin-key" data-digit="5">5</button><button class="pin-key" data-digit="6">6</button>
        <button class="pin-key" data-digit="7">7</button><button class="pin-key" data-digit="8">8</button><button class="pin-key" data-digit="9">9</button>
        <button class="pin-key" data-action="clear">C</button><button class="pin-key" data-digit="0">0</button><button class="pin-key" data-action="done">OK</button>
      </div>
    </div>
  </div>
  <script>
const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const SESSION_KEY = "jas_session_token_v11";

    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json" }; }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
    function setSessionToken(token) { localStorage.setItem(SESSION_KEY, token); }
    function clearSessionToken() { localStorage.removeItem(SESSION_KEY); }
    function setStatus(message = '', tone = 'info') {
      const box = document.getElementById('statusBox');
      if (!message) { box.className = 'status'; box.textContent = ''; return; }
      box.className = `status show ${tone}`;
      box.textContent = message;
    }
    function normalizeDisplayName(name) {
      return String(name || '').replace(/\s+/g, ' ').trim();
    }
    function uniqueNames(names) {
      const seen = new Set();
      return (names || [])
        .map(normalizeDisplayName)
        .filter((name) => name && !seen.has(name.toLowerCase()) && seen.add(name.toLowerCase()))
        .sort((a, b) => a.localeCompare(b, 'nl'));
    }
    function fillNames(names, selected = '') {
      const input = document.getElementById('playerNameInput');
      const cleanNames = uniqueNames(names);
      const current = selected && cleanNames.includes(selected) ? selected : input.value;
      input.innerHTML = '<option value="">Kies je naam</option>';
      cleanNames.forEach((name) => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        input.appendChild(option);
      });
      input.value = cleanNames.includes(current) ? current : '';
    }
    function nextUrl() { return new URLSearchParams(window.location.search).get('next') || './index.html'; }
    function pendingVote() { return new URLSearchParams(window.location.search).get('vote') || ''; }
    function friendlyMessage(msg) {
      const raw = String(msg || '');
      if (/login_player\(desired_name, entered_pin\).*schema cache/i.test(raw)) return 'Login-RPC ontbreekt nog in Supabase. Draai de v69 SQL-patch opnieuw en vernieuw daarna de pagina hard.';
      if (/failed to fetch/i.test(raw)) return 'Netwerk/CORS-fout bij contact met Supabase.';
      return raw;
    }
    async function getPublicState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken() })
      });
      return await parseResponse(res);
    }
    async function getLoginNames() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_login_names`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({})
      });
      if (!res.ok) return null;
      return await parseResponse(res);
    }
    async function touchSession() {
      const token = getSessionToken();
      if (!token) return null;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/player_touch_session`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ input_token: token })
      });
      return await parseResponse(res);
    }
    async function loginPlayer() {
      const desiredName = document.getElementById('playerNameInput').value.trim() || '';
      const enteredPin = document.getElementById('pinInput').value.trim();
      if (!desiredName) throw new Error('Kies eerst je naam');
      if (!/^\d{4}$/.test(enteredPin)) throw new Error('Voer je 4-cijferige pincode in');
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_player`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ desired_name: desiredName, entered_pin: enteredPin })
      });
      return await parseResponse(res);
    }
    async function castVote(desired_status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken(), desired_status })
      });
      return await parseResponse(res);
    }
    async function load() {
      try {
        const [state, loginNames] = await Promise.all([getPublicState(), getLoginNames().catch(() => null)]);
        fillNames(loginNames?.names || [], state.my_name || ''); 
        if (state.my_name) {
          document.getElementById('loginStateWord').textContent = state.my_name;
          document.getElementById('loginStateWord').className = 'state-word yes';
          document.getElementById('loginStateCopy').textContent = 'Deze browser heeft al een geldige sessie.';
        }
        if (!(loginNames?.names || []).length) setStatus('Er staan nog geen login-namen klaar.', 'warn');
        if (getSessionToken()) {
          try { await touchSession(); } catch { clearSessionToken(); }
        }
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        setStatus(friendlyMessage(msg), 'warn');
      }
    }
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        setStatus('Inloggen...');
        const data = await loginPlayer();
        setSessionToken(data.session_token);
        if (pendingVote()) await castVote(pendingVote());
        window.location.href = nextUrl();
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        setStatus(friendlyMessage(msg), 'warn');
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => { clearSessionToken(); setStatus('Browser-sessie gewist.', 'ok'); });
    document.getElementById('pinInput').addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4); syncPinPreview(); });

    const pinModal = document.getElementById("pinModal");
    const pinPreview = document.getElementById("pinPreview");
    function openPinModal() { pinModal.classList.add("show"); pinModal.setAttribute("aria-hidden", "false"); syncPinPreview(); }
    function closePinModal() { pinModal.classList.remove("show"); pinModal.setAttribute("aria-hidden", "true"); }
    function syncPinPreview() { pinPreview.textContent = (document.getElementById('pinInput').value || '').replace(/./g, '•'); }
    document.getElementById('pinOpenBtn').addEventListener('click', openPinModal);
    document.getElementById('pinInput').addEventListener('focus', openPinModal);
    pinModal.addEventListener('click', (e) => { if (e.target === pinModal) closePinModal(); });
    document.querySelectorAll('#pinModal .pin-key').forEach((btn) => btn.addEventListener('click', () => {
      const input = document.getElementById('pinInput');
      const digit = btn.dataset.digit;
      const action = btn.dataset.action;
      if (digit && input.value.length < 4) input.value += digit;
      if (action === 'clear') input.value = input.value.slice(0, -1);
      if (action === 'done') closePinModal();
      syncPinPreview();
    }));
    load();
  </script>

  <div class="site-credit-watermark">v70 · Made by Bruis</div>
</body>
</html>
