<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Inloggen - GEJAST</title>
  <script>window.GEJAST_PAGE_VERSION='v439';</script>
  <script src="./gejast-config.js?v439"></script>
  <style>
    :root { --gold:#9a8241; --paper:#f9f7f2; --ink:#111; --line:rgba(0,0,0,.08); }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; min-height:100vh; background:#ece8de; color:var(--ink); font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    body { display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:min(520px, 100%); background:var(--paper); border:1px solid var(--line); border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,.08); padding:28px; }
    h1 { margin:0 0 18px 0; font-size:2rem; }
    label { display:block; font-size:14px; font-weight:700; margin:10px 0 6px; }
    select, input { width:100%; padding:14px; border:1px solid #d8d2c6; border-radius:12px; background:#fff; font-size:16px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    button { appearance:none; border:0; border-radius:12px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; }
    .primary { background:var(--gold); color:#111; }
    .secondary { background:#111; color:#fff; }
    .links { display:flex; gap:16px; flex-wrap:wrap; margin-top:16px; }
    a { color:#555; }
    .status { margin-top:14px; min-height:20px; font-size:14px; color:#666; }
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,.18)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Inloggen</h1>
    <label for="playerNameInput">Naam</label>
    <select id="playerNameInput"><option value="">Kies je naam</option></select>
    <label for="pinInput">Pincode</label>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="Pincode" />
    <div class="row">
      <button id="logoutBtn" type="button" class="secondary">Uitloggen</button>
      <button id="loginBtn" type="button" class="primary">Inloggen</button>
    </div>
    <div class="links">
      <a id="requestLink" href="./request.html">Naam aanvragen</a>
      <a id="forgotLink" href="./request.html">Pincode vergeten?</a>
    </div>
    <div id="statusBox" class="status"></div>
  </main>
  <div class="site-credit-watermark">v439 · Made by Bruis</div>
  <script>
    (function(){
      const cfg = window.GEJAST_CONFIG || {};
      const SUPABASE_URL = cfg.SUPABASE_URL || "https://uiqntazgnrxwliaidkmy.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = cfg.SUPABASE_PUBLISHABLE_KEY || "";
      const scope = new URLSearchParams(location.search).get('scope') === 'family' ? 'family' : 'friends';
      const returnTo = (cfg.sanitizeReturnTarget ? cfg.sanitizeReturnTarget(new URLSearchParams(location.search).get('return_to') || '', scope === 'family' ? 'index.html?scope=family' : 'index.html') : (new URLSearchParams(location.search).get('return_to') || (scope === 'family' ? 'index.html?scope=family' : 'index.html')));
      const requestLink = document.getElementById('requestLink');
      const forgotLink = document.getElementById('forgotLink');
      if (requestLink) requestLink.href = (cfg.buildRequestUrl ? cfg.buildRequestUrl(returnTo, scope) : './request.html');
      if (forgotLink) forgotLink.href = requestLink ? requestLink.href : './request.html';
      function status(msg){ document.getElementById('statusBox').textContent = msg || ''; }
      function headers(){ return { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}`, 'Content-Type':'application/json', Accept:'application/json' }; }
      async function parse(res){ const txt = await res.text(); let data=null; try{ data = txt ? JSON.parse(txt) : null; }catch(_){ throw new Error(txt || ('HTTP '+res.status)); } if(!res.ok) throw new Error((data && (data.message||data.error||data.hint)) || ('HTTP '+res.status)); return data; }
      async function rpc(name,payload){ const controller = typeof AbortController !== 'undefined' ? new AbortController() : null; const timer = controller ? setTimeout(() => controller.abort(), 2500) : null; try { const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, { method:'POST', mode:'cors', cache:'no-store', headers:headers(), body:JSON.stringify(payload||{}), signal: controller ? controller.signal : undefined }); return await parse(res); } finally { if (timer) clearTimeout(timer); } }
      async function loadNames(){
        const attempts = [
          ['get_login_names_scoped',{ site_scope_input: scope }],
          ['get_login_names',{ }]
        ];
        for (const [name,payload] of attempts) {
          try {
            const data = await rpc(name,payload);
            const rows = Array.isArray(data) ? data : (Array.isArray(data?.names) ? data.names : []);
            const names = rows.map(r => typeof r === 'string' ? r : (r?.display_name || r?.name || r?.desired_name || '')).filter(Boolean);
            const input = document.getElementById('playerNameInput');
            input.innerHTML = '<option value="">Kies je naam</option>';
            names.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; input.appendChild(o); });
            return;
          } catch (_) {}
        }
        status('Namenlijst kon niet worden geladen.');
      }
      function clearTokens(){ try { ['jas_session_token_v11','jas_session_token_v10'].forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); }); } catch (_) {} }
      document.getElementById('logoutBtn').addEventListener('click', function(){ clearTokens(); status('Browser-sessie gewist.'); });
      document.getElementById('loginBtn').addEventListener('click', async function(){
        const name = document.getElementById('playerNameInput').value;
        const pin = document.getElementById('pinInput').value.trim();
        if (!name || !pin) { status('Kies je naam en vul je pincode in.'); return; }
        status('Inloggen...');
        try {
          const data = await rpc('login_player', { desired_name: name, entered_pin: pin });
          const token = data && data.session_token;
          if (!token) throw new Error('Geen sessietoken ontvangen.');
          localStorage.setItem('jas_session_token_v11', token);
          sessionStorage.setItem('jas_session_token_v11', token);
          if (cfg.touchPlayerActivity) try { cfg.touchPlayerActivity(); } catch (_) {}
          location.href = returnTo.startsWith('./') ? returnTo : ('./' + returnTo);
        } catch (err) {
          status(String(err && err.message || 'Inloggen mislukt.'));
        }
      });
      loadNames();
    })();
  </script>
</body>
</html>
