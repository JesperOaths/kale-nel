<!DOCTYPE html>
<html lang="nl">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen - Wordt er gejast?</title>
  <script>window.GEJAST_PAGE_VERSION='v635';</script>
  <style>
    :root { --gold: #9a8241; --card-bg: #f9f7f2; --line: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(rgba(232,228,217,0.92), rgba(232,228,217,0.92)), url('./site-bg-desktop.webp') center/cover no-repeat; }
    .main-card { background: var(--card-bg); border-radius: 24px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); position: relative; text-align: center; }
    .card-logo { position: absolute; top: 25px; right: 25px; width: 50px; }
    h1 { font-size: 32px; margin: 0 0 20px 0; letter-spacing: -1px; }
    .state-tile { display:none; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--line); }
    .state-tile.show { display:block; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .primary-btn { flex: 1; background: var(--gold); border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .secondary-btn { flex: 1; background: #000; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .primary-btn[disabled], .secondary-btn[disabled] { opacity:.6; cursor:not-allowed; }
    .status { margin-top: 15px; font-size: 13px; min-height: 20px; }
    .text-link { display: block; margin-top: 15px; color: #666; font-size: 14px; text-decoration: none; }
    .helper-links { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:14px; }
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(154,130,65,0.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
  </style>
  <script src="./gejast-config.js?v635"></script>
  <script src="./gejast-account-scope.js?v635"></script>
</head>
<body>
  <main class="main-card">
    <a href="./index.html" aria-label="Terug naar home"><img src="./logo.png" class="card-logo" /></a>
    <h1>Inloggen</h1>
    <div class="state-tile" id="stateTile">
      <div id="loginStateWord" style="font-weight:800;"></div>
      <div id="loginStateCopy" style="font-size: 12px; color: #666;"></div>
    </div>
    <form id="loginForm" autocomplete="on">
      <select id="playerNameInput" name="username" autocomplete="username">
        <option value="">Kies je naam</option>
      </select>
      <input id="pinInput" name="current-password" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Pincode" autocomplete="current-password">
      <div class="btn-row">
        <button id="logoutBtn" type="button" class="secondary-btn">Uitloggen</button>
        <button id="loginBtn" type="submit" class="primary-btn">Inloggen</button>
      </div>
    </form>
    <div class="helper-links">
      <a class="text-link" href="./request.html" style="margin-top:0;">Naam aanvragen</a>
    </div>
    <div id="statusBox" class="status"></div>
  </main>
  <div class="site-credit-watermark" data-version-watermark></div>
  <script>
const SUPABASE_URL = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_URL) || "";
const SUPABASE_PUBLISHABLE_KEY = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.SUPABASE_PUBLISHABLE_KEY) || "";
const SESSION_KEYS = (window.GEJAST_CONFIG && window.GEJAST_CONFIG.PLAYER_SESSION_KEYS) || ["jas_session_token_v11","jas_session_token_v10"];
const LOGIN_SUBMIT_TIMEOUT_MS = 15000;
let loginSubmitting = false;
function rpcHeaders(){ return { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization:`Bearer ${SUPABASE_PUBLISHABLE_KEY}`, "Content-Type":"application/json", Accept:"application/json" }; }
async function parseResponse(res){ const text = await res.text(); let data = null; try{ data = text ? JSON.parse(text) : null; } catch{ throw new Error(text || `HTTP ${res.status}`); } if(!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`); return data; }
function getSessionToken(){ if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.getPlayerSessionToken) return window.GEJAST_CONFIG.getPlayerSessionToken(); for(const key of SESSION_KEYS){ const v=localStorage.getItem(key)||sessionStorage.getItem(key); if(v) return v; } return ""; }
function setSessionToken(token){ if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.setPlayerSessionToken) return window.GEJAST_CONFIG.setPlayerSessionToken(token); localStorage.setItem("jas_session_token_v11", token); sessionStorage.setItem("jas_session_token_v11", token); return token; }
function clearSessionToken(){ if(window.GEJAST_CONFIG && window.GEJAST_CONFIG.clearPlayerSessionTokens) return window.GEJAST_CONFIG.clearPlayerSessionTokens(); SESSION_KEYS.forEach((key)=>{ localStorage.removeItem(key); sessionStorage.removeItem(key); }); }
function setStatus(message='', tone=''){ const box=document.getElementById('statusBox'); box.className=`status ${tone}`.trim(); box.textContent=message||''; }
function setLoginBusy(busy){ loginSubmitting=!!busy; document.querySelectorAll('#loginForm input,#loginForm select,#loginForm button').forEach((el)=>el.disabled=busy); document.getElementById('loginBtn').textContent = busy ? 'Bezig…' : 'Inloggen'; }
function normalizeDisplayName(name){ return String(name||'').replace(/\s+/g,' ').trim(); }
function uniqueNames(names){ const seen=new Set(); return (names||[]).map(normalizeDisplayName).filter((name)=>name && !seen.has(name.toLowerCase()) && seen.add(name.toLowerCase())).sort((a,b)=>a.localeCompare(b,'nl')); }
function loginNamesScope(){ return new URLSearchParams(window.location.search).get('scope') === 'family' ? 'family' : 'friends'; }
function readCachedLoginNames(scope=loginNamesScope()){ try{ return uniqueNames(window.GEJAST_CONFIG && window.GEJAST_CONFIG.readCachedLoginNames ? window.GEJAST_CONFIG.readCachedLoginNames(scope) : []); } catch(_){ return []; } }
function writeCachedLoginNames(names, scope=loginNamesScope()){ try{ return window.GEJAST_CONFIG && window.GEJAST_CONFIG.writeCachedLoginNames ? window.GEJAST_CONFIG.writeCachedLoginNames(names, scope) : uniqueNames(names); } catch(_){ return uniqueNames(names); } }
function fillNames(names, selected=''){ const input=document.getElementById('playerNameInput'); const clean=uniqueNames(names); const current=selected && clean.includes(selected) ? selected : input.value; const frag=document.createDocumentFragment(); const def=document.createElement('option'); def.value=''; def.textContent='Kies je naam'; frag.appendChild(def); clean.forEach((name)=>{ const option=document.createElement('option'); option.value=name; option.textContent=name; frag.appendChild(option); }); input.replaceChildren(frag); input.value = clean.includes(current) ? current : ''; }
function friendlyMessage(msg){ const raw=String(msg||''); if(/405 Not Allowed/i.test(raw)) return ''; if(/failed to fetch/i.test(raw)) return 'Netwerk/CORS-fout bij contact met Supabase.'; if(/timeout/i.test(raw)) return 'Supabase reageerde te traag. Probeer opnieuw.'; if(/could not find the function|schema cache|no function matches/i.test(raw)) return 'Login-RPC ontbreekt of is verouderd op de backend.'; return raw; }
async function fetchRpcWithTimeout(url,payload,timeoutMs){ const controller=typeof AbortController!=='undefined'?new AbortController():null; const timer=controller?setTimeout(()=>{ try{ controller.abort(); }catch(_){} }, timeoutMs):null; try{ const res=await fetch(url,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify(payload||{}),signal:controller?controller.signal:undefined}); return await parseResponse(res); } catch(err){ if(err && err.name==='AbortError') throw new Error('RPC timeout'); throw err; } finally{ if(timer) clearTimeout(timer); } }
async function getPublicState(){ try{ if(window.GEJAST_ACCOUNT_SCOPE && window.GEJAST_ACCOUNT_SCOPE.callRpcCompat) return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('get_public_state',{session_token:getSessionToken()}); const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`,{method:'POST',mode:'cors',cache:'no-store',headers:rpcHeaders(),body:JSON.stringify({session_token:getSessionToken()})}); return await parseResponse(res); }catch(_){ return null; } }
async function getLoginNamesFast(){ const scope=loginNamesScope(); const cached=readCachedLoginNames(scope); try{ const helper = window.GEJAST_CONFIG && (window.GEJAST_CONFIG.getActivatedPlayerNamesForScope || window.GEJAST_CONFIG.fetchScopedActivePlayerNames); if(helper){ const names=await helper(scope); const clean=uniqueNames(Array.isArray(names)?names:[]); if(clean.length) writeCachedLoginNames(clean,scope); return clean.length ? clean : cached; } }catch(_){ } return cached; }
async function loginPlayer(){ const desiredName=document.getElementById('playerNameInput').value.trim()||''; const enteredPin=document.getElementById('pinInput').value.trim(); if(!desiredName) throw new Error('Kies eerst je naam'); if(!/^\d{4}$/.test(enteredPin)) throw new Error('Voer je 4-cijferige pincode in'); const payloads=[{input_username:desiredName,entered_pin:enteredPin},{desired_name:desiredName,entered_pin:enteredPin},{input_username:desiredName,input_pin:enteredPin},{input_display_name:desiredName,input_pin:enteredPin}]; if(window.GEJAST_ACCOUNT_SCOPE && window.GEJAST_ACCOUNT_SCOPE.callRpcCompat) return await window.GEJAST_ACCOUNT_SCOPE.callRpcCompat('login_player',payloads); let lastErr=null; for(const payload of payloads){ try{ return await fetchRpcWithTimeout(`${SUPABASE_URL}/rest/v1/rpc/login_player`,payload,LOGIN_SUBMIT_TIMEOUT_MS); }catch(err){ lastErr=err; } } throw lastErr || new Error('Login-RPC kon niet worden aangeroepen.'); }
function clampFourDigits(input){ input.value=String(input.value||'').replace(/\D/g,'').slice(0,4); }
async function load(){ const scope=loginNamesScope(); const cached=readCachedLoginNames(scope); if(cached.length) fillNames(cached); setStatus(''); getLoginNamesFast().then((names)=>{ if(Array.isArray(names)&&names.length) fillNames(names); }).catch(()=>{}); const state=await getPublicState(); if(state?.my_name){ document.getElementById('stateTile').classList.add('show'); document.getElementById('loginStateWord').textContent=state.my_name; document.getElementById('loginStateCopy').textContent='Deze browser heeft al een geldige sessie.'; const merged=uniqueNames([state.my_name,...readCachedLoginNames(scope)]); writeCachedLoginNames(merged,scope); fillNames(merged,state.my_name); } else { document.getElementById('stateTile').classList.remove('show'); } }
document.getElementById('loginForm').addEventListener('submit', async (event)=>{ event.preventDefault(); if(loginSubmitting) return; try{ setLoginBusy(true); setStatus('Inloggen...'); const data=await loginPlayer(); const chosen=normalizeDisplayName(document.getElementById('playerNameInput').value || data?.display_name || data?.player_name || ''); setSessionToken(data.session_token); try{ window.GEJAST_CONFIG && window.GEJAST_CONFIG.touchPlayerActivity && window.GEJAST_CONFIG.touchPlayerActivity(); }catch(_){} if(chosen) writeCachedLoginNames([chosen,...readCachedLoginNames(loginNamesScope())],loginNamesScope()); window.location.href='./index.html'; } catch(err){ setStatus(friendlyMessage(err && err.message ? err.message : err),'warn'); } finally{ setLoginBusy(false); } });
document.getElementById('logoutBtn').addEventListener('click', ()=>{ clearSessionToken(); setStatus('Browser-sessie gewist.','ok'); });
document.getElementById('pinInput').addEventListener('input', (e)=>clampFourDigits(e.target));
load();
  </script>
  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
