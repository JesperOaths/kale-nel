<!doctype html>
<html lang="nl">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikken stats</title>
  <script>window.GEJAST_PAGE_VERSION='v657';</script>
  <script src="./gejast-config.js?v657"></script>
  <script src="./gejast-home-gate.js?v657"></script>
  <script src="./gejast-scope-context.js?v657"></script>
  <style>
    :root{--paper:#fbf6ef;--line:rgba(0,0,0,.08);--muted:#6b6257;--ink:#201b16;--shadow:0 18px 44px rgba(0,0,0,.08)}
    *{box-sizing:border-box}
    body{margin:0;padding:18px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(240,235,226,.94),rgba(240,235,226,.96)),url('./site-bg-desktop.webp') center/cover scroll;color:var(--ink)}
    .wrap{max-width:980px;margin:0 auto}
    .card{background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:22px;box-shadow:var(--shadow)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:16px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px}
    .k{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:900}
    .v{font-size:28px;font-weight:900;margin-top:6px}
    .muted{color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start">
        <div>
          <a class="btn" href="./pikken.html">Terug</a>
          <div style="display:flex;align-items:center;gap:12px;margin:14px 0 6px"><img src="./assets/pikken/pikken-icon.svg" alt="Pikken" style="width:48px;height:48px;border-radius:14px;background:#fff;padding:8px;border:1px solid rgba(0,0,0,.08)"><h1 style="margin:0">Pikken stats</h1></div>
          <div id="meta" class="muted">Laden…</div>
        </div>
        <a class="btn" href="./index.html">Home</a>
      </div>

      <div id="grid" class="grid"></div>
    </div>
  </div>

  <script>
    (()=>{
      const cfg=window.GEJAST_CONFIG||{};
      const scope=(window.GEJAST_SCOPE_UTILS&&window.GEJAST_SCOPE_UTILS.getScope&&window.GEJAST_SCOPE_UTILS.getScope())||((new URLSearchParams(location.search).get('scope')||'friends')==='family'?'family':'friends');
      function headers(){return{apikey:cfg.SUPABASE_PUBLISHABLE_KEY||'',Authorization:`Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY||''}`,'Content-Type':'application/json',Accept:'application/json'}}
      async function parse(res){const t=await res.text();let d=null;try{d=t?JSON.parse(t):null}catch{throw new Error(t||`HTTP ${res.status}`)}if(!res.ok)throw new Error(d?.message||d?.error||`HTTP ${res.status}`);return d}
      async function load(){
        const res=await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/get_pikken_stats_scoped`,{method:'POST',headers:headers(),body:JSON.stringify({site_scope_input:scope})});
        const data=await parse(res);
        document.getElementById('meta').textContent = `Scope: ${scope}`;
        const cards=Array.isArray(data?.cards)?data.cards:[];
        const raw=data?.summary||data?.totals||{};
        const extras=[];
        if(raw.bluff_callout_rate!=null) extras.push({k:'Bluff call-out %', v:`${Math.round(Number(raw.bluff_callout_rate)*100)}%`, sub:'Hoe vaak een gewaagde leugen op tijd werd doorzien.'});
        if(raw.correct_reject_rate!=null) extras.push({k:'Correct reject %', v:`${Math.round(Number(raw.correct_reject_rate)*100)}%`, sub:'Hoe vaak afkeuren uiteindelijk het juiste oordeel was.'});
        if(raw.pik_bid_rate!=null) extras.push({k:'Pik bod %', v:`${Math.round(Number(raw.pik_bid_rate)*100)}%`, sub:'Aandeel van alle biedingen dat op pik ging.'});
        const merged=[...extras,...cards];
        document.getElementById('grid').innerHTML = merged.map(c=>`<div class="stat"><div class="k">${c.k||''}</div><div class="v">${c.v||''}</div><div class="muted">${c.sub||''}</div></div>`).join('') || '<div class="muted">Nog geen pikken-stats.</div>';
      }
      load().catch(err=>{document.getElementById('meta').textContent=err.message||'Laden mislukt.';});
    })();
  </script>
<div class="site-credit-watermark" data-version-watermark></div>
<script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
</body>
</html>
