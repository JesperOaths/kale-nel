<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Pikken stats</title><script>window.GEJAST_PAGE_VERSION='v484';</script><script src="./gejast-config.js?v484"></script><style>:root{--line:rgba(0,0,0,.08);--paper:#fffaf3;--bg:#f3ede4;--muted:#6d6256}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:#17130f}.page{max-width:1180px;margin:0 auto;padding:22px 16px 40px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}.btn,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:#111;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.muted{color:var(--muted)}.list{display:grid;gap:10px}.row{padding:12px;border-radius:16px;background:#fff;border:1px solid var(--line)}@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><div class="page"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div><div class="muted">Publieke samenvatting</div><h1 style="margin:8px 0 0;font-size:clamp(2rem,4vw,3rem);letter-spacing:-.05em">Pikken stats</h1></div><a class="btn" href="./pikken.html">Terug naar pikken</a></div><section class="panel"><div id="statsBox" class="grid"></div></section><section class="panel"><h2 style="margin-top:0">Pik-waardige overzichten</h2><div id="funBox" class="grid"></div></section><section class="panel"><h2 style="margin-top:0">Top 5 laddermoment</h2><div id="recentBox" class="list"></div></section></div><script>(()=>{const cfg=window.GEJAST_CONFIG||{}; const scope=(new URLSearchParams(location.search).get('scope')==='family'?'family':'friends'); async function parse(res){const t=await res.text(); let d={}; try{d=t?JSON.parse(t):{};}catch{throw new Error(t||`HTTP ${res.status}`)} if(!res.ok) throw new Error(d?.message||d?.error||`HTTP ${res.status}`); return d;} function card(label,value,meta=''){return `<div class="card"><div class="muted">${label}</div><div style="font-size:2rem;font-weight:900;margin-top:8px">${value}</div>${meta?`<div class="muted" style="margin-top:6px">${meta}</div>`:''}</div>`;} function num(v){const n=Number(v); return Number.isFinite(n)?n:0;} function pct(v){return `${Math.round(num(v)*10)/10}%`;} function field(row, names){ for(const n of names){ if(row && row[n] != null && row[n] !== '') return row[n]; } return null; } async function load(){ const res=await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/get_public_ladder_page_scoped`,{method:'POST',headers:{apikey:cfg.SUPABASE_PUBLISHABLE_KEY||'',Authorization:`Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY||''}`,'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify({game_key:'pikken',site_scope_input:scope})}); const data=await parse(res); const src=(Array.isArray(data)?data[0]:data)?.get_public_ladder_page_scoped || (Array.isArray(data)?data[0]:data) || {}; const ladder=Array.isArray(src.ladder)?src.ladder:[]; const ratings=ladder.map(r=>num(r.elo_rating||r.rating||1000)); const avg=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):'1000'; const leader=ladder[0]; const totalGames=ladder.reduce((s,r)=>s+num(r.games_played||0),0); const totalWins=ladder.reduce((s,r)=>s+num(r.wins||0),0); const bluffCalledLeader=[...ladder].sort((a,b)=>num(field(b,['bluffs_called_out_pct','bluff_called_pct','caught_bluff_pct']))-num(field(a,['bluffs_called_out_pct','bluff_called_pct','caught_bluff_pct'])))[0]||null; const rejectCorrectLeader=[...ladder].sort((a,b)=>num(field(b,['reject_correct_pct','correct_reject_pct']))-num(field(a,['reject_correct_pct','correct_reject_pct'])))[0]||null; const chaosLeader=[...ladder].sort((a,b)=>num(field(b,['volatility','rating_volatility']))-num(field(a,['volatility','rating_volatility'])))[0]||null; const recent = ladder.slice().sort((a,b)=>num(field(b,['updated_at_ts','updated_at_epoch']))-num(field(a,['updated_at_ts','updated_at_epoch']))).slice(0,5); document.getElementById('statsBox').innerHTML=[card('Bekende spelers',ladder.length),card('Gem. rating',avg),card('Totaal geregistreerde potjes',totalGames),card('Leider',leader?(leader.player_name||leader.display_name):'—')].join(''); document.getElementById('funBox').innerHTML=[card('Bluf call-out %', bluffCalledLeader? pct(field(bluffCalledLeader,['bluffs_called_out_pct','bluff_called_pct','caught_bluff_pct'])) : '—', bluffCalledLeader?(bluffCalledLeader.player_name||bluffCalledLeader.display_name):'Nog geen bluff-data'),card('Correct bij reject %', rejectCorrectLeader? pct(field(rejectCorrectLeader,['reject_correct_pct','correct_reject_pct'])) : '—', rejectCorrectLeader?(rejectCorrectLeader.player_name||rejectCorrectLeader.display_name):'Nog geen reject-data'),card('Chaotischste speler', chaosLeader? Math.round(num(field(chaosLeader,['volatility','rating_volatility']))) : '—', chaosLeader?(chaosLeader.player_name||chaosLeader.display_name):'Nog geen volatiliteitsdata'),card('Competitieve massa', totalWins, 'Totaal aantal overwinningen')].join(''); document.getElementById('recentBox').innerHTML=(recent.length?recent:ladder.slice(0,5)).map((row,idx)=>`<div class="row"><strong>#${idx+1} ${(row.player_name||row.display_name||'Onbekend')}</strong><div class="muted">Rating: ${Math.round(num(row.elo_rating||row.rating||1000))} · Potjes: ${num(row.games_played||0)} · Wins: ${num(row.wins||0)}</div></div>`).join('') || '<div class="muted">Nog geen pikken-data.</div>'; } load().catch(err=>{document.getElementById('recentBox').innerHTML=`<div class="muted">${err.message||'Stats konden niet laden.'}</div>`;});})();</script></body></html>
