<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beerpong Shared Stats · Beheer</title>
  <script>window.GEJAST_PAGE_VERSION='v705';</script>
  <script src="./gejast-config.js?v705"></script>
  <script src="./admin-session-sync.js?v705"></script>
  <script src="./gejast-beerpong.js?v705"></script>
  <script src="./gejast-beerpong-shared-stats.js?v705"></script>
  <script src="./gejast-beerpong-odds.js?v705"></script>
  <style>
    :root{--gold:#9a8241;--paper:#f8f4ec;--line:rgba(0,0,0,.08);--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:22px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.94)),url('./site-bg-desktop.webp') center/cover fixed;color:#181512}.shell{max-width:1100px;margin:0 auto;background:rgba(255,251,245,.94);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:24px;box-shadow:0 18px 44px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:30px;letter-spacing:-.04em}.muted{color:var(--muted)}.btn{display:inline-flex;padding:11px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0;cursor:pointer}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}.grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:18px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px}.pre{white-space:pre-wrap;font:12px/1.45 ui-monospace,monospace;background:#111;color:#f4e7ba;border-radius:16px;padding:14px;overflow:auto}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top"><div><h1>Beerpong Shared Stats</h1><div class="muted">Phase 10 · v642 · additive audit surface</div></div><div><a class="btn alt" href="./admin.html">Admin</a> <button class="btn" id="refreshBtn">Ververs</button></div></div>
    <div class="toolbar"><button class="btn alt" id="rebuildBtn">Rebuild cache</button></div>
    <section class="grid"><div class="panel"><h2>Leaderboard</h2><div id="leaderboardBox"></div></div><div class="panel"><h2>Admin audit</h2><div id="auditBox" class="pre">Nog niet geladen.</div></div></section>
  </main>
  <div class="site-credit-watermark" data-version-watermark>v642 · Made by Bruis</div>
  <script>
  (function(){
    const api = window.GEJAST_BEERPONG || {};
    const stats = window.GEJAST_BEERPONG_SHARED_STATS || {};
    function adminToken(){ try { return (window.GEJAST_ADMIN_SESSION && window.GEJAST_ADMIN_SESSION.getToken && window.GEJAST_ADMIN_SESSION.getToken()) || localStorage.getItem('jas_admin_session_v8') || sessionStorage.getItem('jas_admin_session_v8') || ''; } catch (_) { return ''; } }
    async function load(){
      stats.installStyles && stats.installStyles();
      await (stats.loadLeaderboard && stats.loadLeaderboard('#leaderboardBox', { limit_input: 50 }));
      try { const audit = await api.rpc('admin_get_beerpong_shared_stats_audit_v642', { admin_session_token: adminToken(), site_scope_input: api.scope ? api.scope() : 'friends' }); document.getElementById('auditBox').textContent = JSON.stringify(audit, null, 2); } catch (err) { document.getElementById('auditBox').textContent = err.message || String(err); }
      try { window.GEJAST_CONFIG && window.GEJAST_CONFIG.applyVersionLabel && window.GEJAST_CONFIG.applyVersionLabel(); } catch (_) {}
    }
    document.getElementById('refreshBtn').addEventListener('click', load);
    document.getElementById('rebuildBtn').addEventListener('click', async()=>{ try { await api.rpc('admin_refresh_beerpong_shared_stats_v642', { admin_session_token: adminToken(), site_scope_input: api.scope ? api.scope() : 'friends' }); await load(); } catch (err) { document.getElementById('auditBox').textContent = err.message || String(err); } });
    load();
  })();
  </script>
</body>
</html>
