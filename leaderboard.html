<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranglijst (admin) - Wordt er gejast?</title>
  <style>
    :root { --gold: #d4af37; --card-bg: #f9f7f2; --line: rgba(0,0,0,0.06); --ink:#161616; --muted:#666; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: linear-gradient(rgba(232,228,217,0.90), rgba(232,228,217,0.90)), url('./wordtergejast.png') center/cover no-repeat fixed; min-height: 100vh; color:var(--ink); }
    .main-card { background: var(--card-bg); border-radius: 24px; padding: 40px; max-width: 800px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.08); position: relative; overflow:hidden; }
    .top-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; gap:20px; }
    .nav-links a { color:#666; text-decoration:none; font-size:14px; margin-left:15px; font-weight:700; }
    h1 { font-size:36px; margin:0; letter-spacing:-1px; }
    .stats-strip { display:flex; gap:20px; margin:25px 0 18px; background:#fff; padding:20px; border-radius:16px; justify-content:space-around; border:1px solid var(--line); }
    .stat-item span { display:block; font-size:11px; color:#999; text-transform:uppercase; }
    .stat-item strong { font-size:20px; color:#111; }
    .status { margin: 0 0 18px; font-size:13px; min-height:20px; color:#856404; }
    .status.show.warn { color:#8b3a30; } .status.show.ok { color:#2b5b37; }
    .leader-card { background:#fff; border-radius:12px; padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--line); gap:12px; }
    .leader-card strong { display:block; }
    .rank { background:var(--gold); width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:bold; margin-right:15px; flex:0 0 30px; }
    .section-title { font-size:18px; margin:22px 0 12px; }
    .muted { color:var(--muted); font-size:13px; }
    .empty-card { background:#fff; border-radius:12px; padding:14px; border:1px dashed var(--line); color:var(--muted); }
    .split { display:flex; align-items:center; gap:15px; }
    .recent-item { background:#fff; border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid var(--line); }
    @media (max-width: 720px) { .main-card { padding:24px; } .top-nav, .stats-strip { display:block; } .nav-links a { margin-left:0; margin-right:12px; } }
  </style>

  <style id="bruis-watermark-style">
    .site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}
    @media (max-width:640px){.site-credit-watermark{bottom:10px;font-size:12px;padding:7px 11px;max-width:calc(100vw - 24px);text-align:center}}
  </style>
  <link rel="canonical" href="https://kalenel.nl/leaderboard.html" />
  <script id="force-https">(function(){var h=window.location.hostname||'';if((h==='kalenel.nl'||h.endsWith('.kalenel.nl'))&&window.location.protocol==='http:'){window.location.replace('https://'+window.location.host+window.location.pathname+window.location.search+window.location.hash);}})();
    (function globalAdminLogout(){ const btn=document.createElement('button'); btn.textContent='Uitloggen'; btn.style.cssText='position:fixed;top:14px;right:14px;z-index:9999;border:none;border-radius:14px;padding:10px 14px;background:#111;color:#fff;font:700 14px Inter,sans-serif;cursor:pointer'; btn.onclick=()=>{ clearAdminSessionToken(); window.location.href='./admin.html'; }; document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(btn)); })();
  </script>
  <script src="./gejast-config.js"></script>
</head>
<body>
  <div id="gateNotice" class="main-card">Adminsessie controleren...</div>
  <main id="leaderApp" class="main-card" style="display:none;">
    <div class="top-nav">
      <h1>Ranglijst</h1>
      <div class="nav-links">
        <a href="./admin.html">Terug naar hub</a>
        <a href="./vault.html">Spelkluis</a>
        <a href="./scorer.html">Scorer</a>
      </div>
    </div>

    <div class="stats-strip">
      <div class="stat-item"><span>Spelers</span><strong id="lbPlayers">0</strong></div>
      <div class="stat-item"><span>Potjes</span><strong id="lbGames">0</strong></div>
      <div class="stat-item"><span>Koploper</span><strong id="lbLeader">-</strong></div>
    </div>

    <div id="statusBox" class="status"></div>
    <div id="leaderCards"></div>

    <h2 class="section-title">Recente potjes</h2>
    <div id="recentWinners"></div>
  </main>

  <script>
    const ADMIN_SESSION_KEY = "jas_admin_session_v8";
    const ADMIN_SESSION_META_KEY = 'jas_admin_session_meta_v1';
    const ADMIN_SESSION_MAX_AGE_MS = 8 * 60 * 60 * 1000;
    function getAdminSessionToken(){ return sessionStorage.getItem(ADMIN_SESSION_KEY) || localStorage.getItem(ADMIN_SESSION_KEY); }
    async function ensureAdminGate(){
      const token = getAdminSessionToken();
      const notice = document.getElementById("gateNotice");
      if(!token){
        notice.textContent = "Geen adminsessie gevonden. Je wordt doorgestuurd naar admin.";
        setTimeout(()=> window.location.href = "./admin.html", 900);
        return false;
      }
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/admin_check_session`, { method:"POST", mode:"cors", cache:"no-store", headers: rpcHeaders(), body: JSON.stringify({ admin_session_token: token }) });
        const data = await parseResponse(res);
        if (data?.admin_session_token) { sessionStorage.setItem(ADMIN_SESSION_KEY, data.admin_session_token); localStorage.setItem(ADMIN_SESSION_KEY, data.admin_session_token); }
        document.getElementById("leaderApp").style.display = "";
        notice.style.display = "none";
        return true;
      } catch (error) {
        notice.textContent = "Adminsessie verlopen of ongeldig. Je wordt doorgestuurd naar admin.";
        setTimeout(()=> window.location.href = "./admin.html", 1000);
        return false;
      }
    }

const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function rpcHeaders() {
      return {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        'Content-Type': 'application/json',
        Accept: 'application/json'
      };
    }

    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.details || data?.hint || `HTTP ${res.status}`);
      return data;
    }

    async function callRpc(name, payload = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
        method: 'POST',
        mode: 'cors',
        cache: 'no-store',
        headers: rpcHeaders(),
        body: JSON.stringify(payload)
      });
      return parseResponse(res);
    }

    function setStatus(message = '', tone = 'info') {
      const box = document.getElementById('statusBox');
      if (!message) {
        box.className = 'status';
        box.textContent = '';
        return;
      }
      box.className = `status show ${tone}`;
      box.textContent = message;
    }

    function renderLeaderboard(rows) {
      const root = document.getElementById('leaderCards');
      root.innerHTML = '';
      const filteredRows = rows.filter((row) => Number(row.games_played || 0) > 0);
      if (!filteredRows.length) {
        root.innerHTML = '<div class="empty-card small">Nog geen leaderboarddata.</div>';
        document.getElementById('lbPlayers').textContent = '0';
        document.getElementById('lbLeader').textContent = '-';
        return;
      }
      filteredRows.forEach((row, index) => {
        const card = document.createElement('article');
        card.className = 'leader-mobile-card';
        card.innerHTML = `
          <div class="leader-mobile-head">
            <div class="leader-rank">#${index + 1}</div>
            <div>
              <strong>${row.display_name}</strong>
              <div class="feed-meta">${row.games_won} winst · ${row.games_played} potjes</div>
            </div>
          </div>
          <div class="leader-mobile-grid">
            <div><span>Winrate</span><strong>${row.win_rate}%</strong></div>
            <div><span>Totaal</span><strong>${row.total_points}</strong></div>
            <div><span>Gemiddeld</span><strong>${row.avg_points}</strong></div>
            <div><span>Laatste potje</span><strong>${row.last_played_at || '-'}</strong></div>
          </div>
        `;
        root.appendChild(card);
      });
      document.getElementById('lbPlayers').textContent = `${filteredRows.length}`;
      document.getElementById('lbLeader').textContent = filteredRows[0]?.display_name || '-';
    }

    function renderRecent(games) {
      const root = document.getElementById('recentWinners');
      root.innerHTML = '';
      if (!games.length) {
        root.innerHTML = '<div class="empty-card small">Nog geen opgeslagen potjes.</div>';
        return;
      }
      games.forEach((game) => {
        const card = document.createElement('article');
        card.className = 'feed-card';
        card.innerHTML = `
          <div class="feed-top">
            <strong>${game.title || 'Klaverjas potje'}</strong>
            <span>${game.played_at || ''}</span>
          </div>
          <div class="feed-meta">${(game.players || []).join(' · ')}</div>
          <div class="feed-pill">Winnaar: ${(game.winners || []).join(', ') || 'Onbekend'}</div>
        `;
        root.appendChild(card);
      });
      document.getElementById('lbGames').textContent = `${games.length}`;
    }

    async function loadLeaderboard() {
      try {
        const data = await callRpc('get_jas_leaderboard', { limit_count: 250 });
        renderLeaderboard(data.leaderboard || []);
        renderRecent(data.recent_games || []);
        setStatus('Leaderboard geladen.', 'ok');
      } catch (error) {
        setStatus(error?.message || 'Kon leaderboard niet laden.', 'warn');
      }
    }

    (async ()=> { if (await ensureAdminGate()) loadLeaderboard(); })();
  </script>

  <div class="site-credit-watermark">v103 · Made by Bruis</div>

<style>
  .player-session-corner{position:fixed;top:14px;right:14px;z-index:9999;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.08);border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,.12);padding:8px 10px;min-width:112px;display:none;backdrop-filter:blur(8px)}
  .player-session-corner.is-visible{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .player-session-corner-label{font-size:11px;line-height:1.15;color:#5f5b53;text-align:right}
  .player-session-corner-name{font-size:13px;line-height:1.1;font-weight:800;color:#111;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-session-corner-btn{appearance:none;border:0;border-radius:999px;background:#111;color:#fff;font:inherit;font-weight:800;font-size:11px;line-height:1;padding:7px 10px;cursor:pointer;box-shadow:none}
  .player-session-corner-btn:hover{opacity:.92}
  @media (max-width:640px){.player-session-corner{top:10px;right:10px;padding:7px 9px;min-width:100px}.player-session-corner-name{max-width:120px}}
</style>
<div id="playerSessionCorner" class="player-session-corner" aria-live="polite">
  <div class="player-session-corner-label">Ingelogd als</div>
  <div id="playerSessionCornerName" class="player-session-corner-name"></div>
  <button id="playerSessionCornerLogout" type="button" class="player-session-corner-btn">Log out</button>
</div>
<script>
(function(){
  const CONFIG = window.GEJAST_CONFIG || {};
  const SUPABASE_URL = CONFIG.SUPABASE_URL || '';
  const SUPABASE_KEY = CONFIG.SUPABASE_PUBLISHABLE_KEY || '';
  const SESSION_KEYS = ['jas_session_token_v11','jas_session_token_v10'];
  const box = document.getElementById('playerSessionCorner');
  const nameEl = document.getElementById('playerSessionCornerName');
  const btn = document.getElementById('playerSessionCornerLogout');
  if (!box || !nameEl || !btn) return;
  function getToken(){
    for (const key of SESSION_KEYS){
      const value = localStorage.getItem(key) || sessionStorage.getItem(key);
      if (value) return value;
    }
    return '';
  }
  function clearTokens(){
    for (const key of SESSION_KEYS){
      localStorage.removeItem(key);
      sessionStorage.removeItem(key);
    }
  }
  function rpcHeaders(){
    return { 'Content-Type':'application/json', apikey: SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` };
  }
  async function fetchMyName(token){
    if (!token || !SUPABASE_URL || !SUPABASE_KEY) return '';
    const payload = JSON.stringify({ session_token: token });
    for (const rpc of ['get_public_state','get_gejast_homepage_state','get_jas_app_state']){
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${rpc}`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: payload });
        const data = await res.json().catch(()=>null);
        if (!res.ok) continue;
        const name = data?.my_name || data?.display_name || data?.player_name || '';
        if (name) return name;
      } catch {}
    }
    return '';
  }
  function show(name){ nameEl.textContent = name; box.classList.add('is-visible'); }
  function hide(){ box.classList.remove('is-visible'); nameEl.textContent = ''; }
  btn.addEventListener('click', function(){ clearTokens(); hide(); window.location.reload(); });
  document.addEventListener('DOMContentLoaded', async function(){
    const token = getToken();
    if (!token) return hide();
    const name = await fetchMyName(token);
    if (name) show(name); else hide();
  });
})();
</script>

</body>
</html>
