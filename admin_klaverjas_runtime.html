<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none"><meta http-equiv="Cache-Control" content="no-store, max-age=0"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Klaverjassen runtime</title><script>window.GEJAST_PAGE_VERSION='v707';</script>
  <script src="./gejast-config.js?v707"></script><script src="./gejast-home-gate.js?v707"></script><script src="./admin-session-sync.js?v707"></script><script src="./gejast-scope-context.js?v707"></script><script src="./gejast-klaverjas-runtime.js?v707"></script>
  <style>
    :root{--gold:#9a8241;--ink:#201b16;--muted:#6b6257;--line:rgba(0,0,0,.08);--bad:#8b2d20;--ok:#1f6a46}*{box-sizing:border-box}body{margin:0;padding:20px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(232,228,217,.92),rgba(232,228,217,.95)),url('./wordtergejast.png') center/cover fixed;color:var(--ink)}.main{max-width:1180px;margin:0 auto;background:rgba(248,245,238,.96);border-radius:28px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;padding:11px 15px;border-radius:999px;border:0;background:#111;color:#fff;text-decoration:none;font:800 14px/1 Inter,system-ui,sans-serif;cursor:pointer}.btn.alt{background:#fff;color:#111;border:1px solid var(--line)}.btn.gold{background:var(--gold);color:#111}.btn.warn{background:#fff;color:var(--bad);border:1px solid rgba(139,45,32,.25)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.card h2{margin:0 0 10px;font-size:1.1rem}.metric{font-size:2rem;font-weight:1000}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:8px;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:top}.status{min-height:22px;margin-top:12px;font-weight:800}.status.ok{color:var(--ok)}.status.bad{color:var(--bad)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,.88);border:1px solid rgba(154,130,65,.35);color:#f3e0ad;font:700 13px/1.2 Inter,sans-serif;letter-spacing:.03em;pointer-events:none}@media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><main class="main"><div class="top"><div><h1>Klaverjassen runtime v673</h1><p class="muted">Controle over scorer, live-state, matchhistorie, ELO rebuild en zachte deletes.</p></div><div class="row"><a class="btn alt" href="./admin.html">Admin hub</a><a class="btn alt" href="./score.html">Scorer</a><button class="btn gold" id="refreshBtn">Ververs</button><button class="btn warn" id="rebuildBtn">Rebuild ratings</button></div></div><div id="status" class="status"></div><section class="grid"><div class="card"><h2>Matches</h2><div class="metric" id="matchCount">—</div><div class="muted">niet-verwijderd</div></div><div class="card"><h2>Spelers</h2><div class="metric" id="playerCount">—</div><div class="muted">ratingregels</div></div><div class="card"><h2>Live</h2><div class="metric" id="liveCount">—</div><div class="muted">actief</div></div></section><section class="card" style="margin-top:14px"><h2>Recente matches</h2><div id="matchesBox" class="muted">Laden…</div></section><section class="card" style="margin-top:14px"><h2>Ratings</h2><div id="ratingsBox" class="muted">Laden…</div></section></main><div class="site-credit-watermark" data-version-watermark>v673 · Made by Bruis</div><script>
(function(){const rt=window.GEJAST_KLAVERJAS_RUNTIME;const $=id=>document.getElementById(id);function setStatus(m,t){$('status').textContent=m||'';$('status').className='status '+(t||'')}function table(rows,cols){return rows.length?`<table><thead><tr>${cols.map(c=>`<th>${rt.escapeHtml(c.label)}</th>`).join('')}<th></th></tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${rt.escapeHtml(c.f(r))}</td>`).join('')}<td>${r.id?`<button class="btn warn" data-delete="${rt.escapeHtml(r.id)}">Delete</button>`:''}</td></tr>`).join('')}</tbody></table>`:'<div class="muted">Geen data.</div>'}async function load(){try{setStatus('Laden…');const data=await rt.adminAudit();$('matchCount').textContent=data.match_count??0;$('playerCount').textContent=data.player_count??0;$('liveCount').textContent=data.live_count??0;$('matchesBox').innerHTML=table(data.recent_matches||[],[{label:'Datum',f:r=>rt.fmtDate(r.finished_at||r.created_at)},{label:'Team A',f:r=>(r.team_a_names||[]).join(' & ')+' '+(r.team_a_score??0)},{label:'Team B',f:r=>(r.team_b_names||[]).join(' & ')+' '+(r.team_b_score??0)},{label:'Status',f:r=>r.status||''}]);$('ratingsBox').innerHTML=table(data.ratings||[],[{label:'Speler',f:r=>r.player_name||''},{label:'Rating',f:r=>Math.round(Number(r.rating||1000))},{label:'Potjes',f:r=>r.matches_played||0},{label:'W/V',f:r=>(r.wins||0)+'/'+(r.losses||0)}]);document.querySelectorAll('[data-delete]').forEach(btn=>btn.onclick=async()=>{if(!confirm('Match zacht verwijderen en ratings rebuilden?'))return;await rt.adminDelete(btn.getAttribute('data-delete'));await load();});setStatus('Geladen','ok');}catch(e){setStatus(e.message||'Laden mislukt','bad')}}$('refreshBtn').onclick=load;$('rebuildBtn').onclick=async()=>{try{setStatus('Ratings rebuilden…');await rt.adminRebuild();await load();}catch(e){setStatus(e.message||'Rebuild mislukt','bad')}};load();})();
</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
