<style>
:root{--bg:#f4f1ea;--paper:#faf8f3;--line:#d8d1c7;--ink:#211b16;--muted:#6e665d;--gold:#b99647;--red:#b63b2f;--shadow:0 14px 32px rgba(27,20,12,.08)}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
.page{max-width:760px;margin:0 auto;min-height:100vh;padding:12px}
.card{background:var(--paper);border:1px solid rgba(0,0,0,.06);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
.top{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.title{margin:0;font-size:28px;letter-spacing:-.04em}.muted{color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid rgba(0,0,0,.08);font-size:12px;font-weight:800}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.kpi{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:12px}.kpi .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:900}.kpi .v{font-size:24px;font-weight:900;margin-top:6px}
.section{padding:0 16px 16px}.section h2{margin:0 0 10px;font-size:17px}
.row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:10px 0;border-top:1px solid rgba(0,0,0,.06)}
.row:first-child{border-top:0}.side{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.side.left{justify-content:flex-end}.pts{font-size:20px;font-weight:900;letter-spacing:-.04em}.tag{display:inline-flex;align-items:center;justify-content:center;min-height:22px;padding:2px 8px;border-radius:999px;background:#fff;border:1px solid rgba(0,0,0,.08);font-size:11px;font-weight:800}.tag.red{color:var(--red)}
.actions{padding:0 16px 16px;display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:16px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0}.btn.alt{background:#fff;color:#111;border:1px solid rgba(0,0,0,.08)}
.empty{padding:28px;text-align:center;color:var(--muted)}
@media (max-width:720px){.grid{grid-template-columns:1fr 1fr}.title{font-size:24px}}
</style>
</head>
<body data-game-watermark="soft">
<div class="page"><div class="card">
  <div class="top">
    <div><h1 class="title">Klaverjas live</h1><div class="muted" id="metaBox">Laden…</div></div>
    <div class="pill" id="statusPill">read-only</div>
  </div>
  <div class="grid">
    <div class="kpi"><div class="k">Totaal wij</div><div class="v" id="totalW">0</div></div>
    <div class="kpi"><div class="k">Totaal zij</div><div class="v" id="totalZ">0</div></div>
    <div class="kpi"><div class="k">Rondes</div><div class="v" id="roundCount">0</div></div>
    <div class="kpi"><div class="k">ELO schaal</div><div class="v" id="eloScale">0.00</div></div>
  </div>
  <div class="section">
    <h2>Teams</h2>
    <div class="row"><div class="side left"><strong id="teamW">—</strong></div><div class="muted">tegen</div><div class="side"><strong id="teamZ">—</strong></div></div>
  </div>
  <div class="section">
    <h2>Rondes</h2>
    <div id="roundsBox"></div>
  </div>
  <div class="actions">
    <a class="btn alt" href="./klaverjas_scorer_v596_repo_ready.html" id="scorerLink">Scorer</a>
    <a class="btn" href="./klaverjas_quick_stats_v596_repo.html" id="statsLink">Quick stats</a>
  </div>
</div></div>

</html>
