<!doctype html>
<html lang="nl">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikken live</title>
  <script>
    (()=>{
      const cfg = window.GEJAST_CONFIG || {};
      const UI = { gameId:'', lobbyCode:'', scope:'friends', state:null, publicState:null, pollId:null, actionBusy:false };

      function esc(v){ const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}; return String(v??'').replace(/[&<>"']/g,(m)=>map[m]); }
      function qs(sel){ return document.querySelector(sel); }
      function qsParam(name){ try { return new URLSearchParams(window.location.search).get(name) || ''; } catch(_) { return ''; } }
      function currentScope(){ try { return (window.GEJAST_SCOPE_UTILS && window.GEJAST_SCOPE_UTILS.getScope && window.GEJAST_SCOPE_UTILS.getScope()) || (qsParam('scope') === 'family' ? 'family' : 'friends'); } catch(_) { return 'friends'; } }
      function sessionToken(){ try { return (cfg.getPlayerSessionToken && cfg.getPlayerSessionToken()) || ''; } catch(_) { return ''; } }
      function headers(){ return {'Content-Type':'application/json',apikey: cfg.SUPABASE_PUBLISHABLE_KEY || '',Authorization: `Bearer ${cfg.SUPABASE_PUBLISHABLE_KEY || ''}`,Accept:'application/json'}; }
      async function parse(res){ const txt = await res.text(); let data=null; try{ data = txt ? JSON.parse(txt) : null; } catch(_){ throw new Error(txt || `HTTP ${res.status}`); } if(!res.ok) throw new Error(data?.message || data?.error || txt || `HTTP ${res.status}`); return data; }
      async function rpc(name,payload){ const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/rpc/${name}`, {method:'POST', mode:'cors', cache:'no-store', headers:headers(), body:JSON.stringify(payload||{})}); const data = await parse(res); return data && data[name] !== undefined ? data[name] : data; }
      function setStatus(text,isError){ const el=qs('#statusText'); if(!el) return; el.textContent=text||''; el.className=isError?'error':'muted'; }

      const UI_MAP = Object.freeze({
        phase: Object.freeze({
          lobby:{ cls:'pill wait', label:'Lobby', title:'Wachten in de lobby' },
          bidding:{ cls:'pill ok', label:'Bieden', title:'Plaats het volgende bod' },
          voting:{ cls:'pill wait', label:'Stemmen', title:'Geloof of verwerp het bod' },
          finished:{ cls:'pill bad', label:'Afgerond', title:'Spel afgerond' }
        }),
        voteStatus: Object.freeze({
          approved:{ cls:'pill ok', label:'goedgekeurd' },
          rejected:{ cls:'pill bad', label:'afgekeurd' },
          waiting:{ cls:'pill wait', label:'wacht' }
        }),
        penaltyMode: Object.freeze({
          wrong_loses:{ label:'Normal (fout verliest)' },
          right_loses:{ label:'Fair (goed verliest)' }
        })
      });

      function normalizePhase(raw){ const v=String(raw||'').trim().toLowerCase(); return (v==='lobby'||v==='bidding'||v==='voting'||v==='finished') ? v : 'bidding'; }
      function normalizeVoteStatus(raw){ const v=String(raw||'').trim().toLowerCase(); if(['approved','goedgekeurd','believe','true'].includes(v)) return 'approved'; if(['rejected','afgekeurd','reject','false'].includes(v)) return 'rejected'; return 'waiting'; }
      function phaseSpec(state){ const status=String(state?.status||'').toLowerCase(); const phase=(status==='finished')?'finished':normalizePhase(state?.phase); return UI_MAP.phase[phase] || UI_MAP.phase.bidding; }
      function votePillSpec(status){ const key=normalizeVoteStatus(status); return UI_MAP.voteStatus[key] || UI_MAP.voteStatus.waiting; }
      function dieClass(value){ return Number(value)===1 ? 'die pik' : 'die'; }
      function bidText(bid){ const count=Number(bid?.count || bid?.bid_count || 0); const face=Number(bid?.face || bid?.bid_face || 0); if(!count || !face) return '—'; return face===1 ? `${count} × pik` : `${count} × ${face}`; }
      function penaltyModeLabel(raw){ const key=String(raw||'').trim().toLowerCase(); return (UI_MAP.penaltyMode[key]&&UI_MAP.penaltyMode[key].label) ? UI_MAP.penaltyMode[key].label : UI_MAP.penaltyMode.wrong_loses.label; }
      function findNameBySeat(players, seat){ const s=Number(seat||0); if(!s) return '—'; const p=(Array.isArray(players)?players:[]).find(x=>Number(x?.seat||0)===s); return p?.name || '—'; }
      function metaText(state){ const updated=state?.game?.updated_at || Date.now(); return `Live bijgewerkt om ${new Date(updated).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`; }
      function buildBidCountOptions(max=24){ const sel=qs('#bidCount'); sel.innerHTML = Array.from({length:max},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join(''); }
      function bidHistoryFromState(st){ const arr=[]; const raw = Array.isArray(st?.bid_history)?st.bid_history:(Array.isArray(st?.history?.bids)?st.history.bids:[]); raw.forEach((b,idx)=>arr.push({index:idx+1,bidder_name:b.bidder_name||b.name||'',count:b.count||b.bid_count,face:b.face||b.bid_face,current:false})); if(st?.bid) arr.push({index:arr.length+1,bidder_name:st.bid.bidder_name||'',count:st.bid.count||st.bid.bid_count,face:st.bid.face||st.bid.bid_face,current:true}); return arr; }
      function renderBidHistory(st){ const wrap=qs('#bidHistory'); const items=bidHistoryFromState(st); if(!items.length){ wrap.innerHTML='<div class="empty">Nog geen eerdere biedingen zichtbaar.</div>'; return; } wrap.innerHTML = items.slice(-8).reverse().map((b)=>`<div class="history-item"><strong>${esc(b.bidder_name||'Onbekend')}</strong><div class="subtle">${b.current?'Huidig bod':'Eerder bod'} · ${esc(bidText(b))}</div></div>`).join(''); }
      function renderVoteStatus(votes){ const wrap=qs('#voteStatusList'); const list=Array.isArray(votes)?votes:[]; if(!list.length){ wrap.innerHTML='<div class="empty">Nog geen stemronde actief.</div>'; return; } wrap.innerHTML = list.map((v)=>{ const pill=votePillSpec(v.status); return `<div class="vote-item row"><div><strong>${esc(v.name||'Speler')}</strong> <span class="muted">#${Number(v.seat||0)}</span></div><span class="${pill.cls}">${pill.label}</span></div>`; }).join(''); }

      function render(state){
        UI.state = state || {};
        const game = state?.game || {};
        const st = game?.state || {};
        const viewer = state?.viewer || null;
        const players = Array.isArray(state?.players)?state.players:[];
        const votes = Array.isArray(state?.votes)?state.votes:[];
        const myHand = Array.isArray(state?.my_hand)?state.my_hand:[];
        const phase = String(st.phase||game.status||'');
        const bid = st.bid && st.bid !== null ? st.bid : null;
        const aliveSeats = players.filter((p)=>p&&p.alive).map((p)=>Number(p.seat||0)).filter(Boolean);
        const defaultAliveSeat = aliveSeats.length ? Math.min(...aliveSeats) : 0;
        const turnSeat = (phase==='voting' ? Number(st.vote_turn_seat||0) : Number(st.turn_seat||0)) || Number(bid?.bidder_seat||0) || defaultAliveSeat;

        qs('#meta').textContent = metaText(state);
        const ps = phaseSpec({ phase: st.phase, status: game.status });
        const phaseEl=qs('#phasePill'); phaseEl.className=ps.cls; phaseEl.textContent=ps.label;
        qs('#phaseTitle').textContent = ps.title;
        qs('#roundNo').textContent = String(Number(st.round_no||0));
        qs('#penaltyMode').textContent = penaltyModeLabel(game?.config?.penalty_mode);
        qs('#lobbyCode').textContent = String(game.lobby_code || UI.lobbyCode || '—');
        qs('#currentBid').textContent = bidText(bid);
        qs('#bidBy').textContent = bid && bid.bidder_name ? `door ${bid.bidder_name}` : '';
        const dt = state?.dice_totals || {};
        qs('#totalStartDice').textContent = String(Number(dt.start_total||0));
        qs('#totalCurrentDice').textContent = String(Number(dt.current_total||0));
        qs('#totalLostDice').textContent = String(Number(dt.lost_total||0));
        qs('#playerCount').textContent = String(players.length);
        qs('#turnName').textContent = findNameBySeat(players, turnSeat);

        qs('#playersList').innerHTML = players.length ? players.map((p)=>{
          const voteRow = votes.find(v=>Number(v.seat||0)===Number(p.seat||0));
          const voteBadge = voteRow ? `<span class="${votePillSpec(voteRow.status).cls}">${votePillSpec(voteRow.status).label}</span>` : '';
          const isTurn = Number(p.seat||0)===Number(turnSeat||0) && (phase==='bidding' || phase==='voting');
          const rowCls = `player-card ${p.alive?'':'dead'} ${isTurn?'turn':''}`.trim();
          const hostMark = p.is_host || (viewer && Number(viewer.seat||0)===Number(p.seat||0) && viewer.is_host);
          return `<div class="${rowCls}"><div class="player-head"><div><strong>${esc(p.name||'Speler')}</strong> <span class="muted">#${Number(p.seat||0)}</span> ${hostMark?'<span class="pill wait">host</span>':''}</div>${isTurn?'<span class="pill ok">beurt</span>':''}</div><div class="player-meta"><span class="pill ${p.alive?'ok':'bad'}">${p.alive?'levend':'dood'}</span><span class="pill wait">${Number(p.dice_count||0)} dobbelstenen</span>${p.ready!==undefined?`<span class="pill ${p.ready?'ok':'wait'}">${p.ready?'ready':'niet ready'}</span>`:''}${voteBadge}</div></div>`;
        }).join('') : '<div class="empty">—</div>';

        const myDice=qs('#myDice'); const viewerMeta=qs('#viewerMeta'); myDice.innerHTML='';
        if(viewer && myHand.length){ viewerMeta.textContent=`${viewer.name || 'Jij'} · stoel ${Number(viewer.seat||0)} · ${viewer.alive?'levend':'dood'} · ${Number(viewer.dice_count||0)} dobbelstenen`; myHand.forEach((face)=>myDice.insertAdjacentHTML('beforeend', `<img class="${dieClass(face)}" src="./assets/pikken/dice-${Number(face)}.svg" alt="die ${Number(face)}">`)); }
        else if(viewer){ viewerMeta.textContent=`${viewer.name || 'Jij'} · stoel ${Number(viewer.seat||0)} · ${viewer.alive?'levend':'dood'} · ${Number(viewer.dice_count||0)} dobbelstenen`; }
        else { viewerMeta.textContent='Alleen zichtbaar voor deelnemers in deze lobby.'; }

        const canAct = !!viewer && !!viewer.alive;
        const viewerSeat = Number(viewer?.seat||0);
        const missingBidTurn = phase==='bidding' && !Number(st.turn_seat||0);
        const missingVoteTurn = phase==='voting' && !Number(st.vote_turn_seat||0);
        const myTurn = canAct && phase==='bidding' && (viewerSeat===turnSeat || (missingBidTurn && viewerSeat>0));
        const myVoteTurn = canAct && phase==='voting' && (viewerSeat===turnSeat || (missingVoteTurn && viewerSeat>0));
        qs('#bidPanel').classList.toggle('hidden', !myTurn);
        qs('#votePanel').classList.toggle('hidden', !myVoteTurn);
        qs('#rejectBidBtn').disabled = !myTurn || !bid || UI.actionBusy;
        qs('#placeBidBtn').disabled = !myTurn || UI.actionBusy;
        qs('#voteApproveBtn').disabled = !myVoteTurn || UI.actionBusy;
        qs('#voteRejectBtn').disabled = !myVoteTurn || UI.actionBusy;

        if (!UI.actionBusy && canAct) {
          if (phase==='bidding' && missingBidTurn && myTurn) setStatus('Beurtinformatie ontbreekt in de backend-state; biedpaneel is daarom toch zichtbaar gemaakt.', false);
          else if (phase==='voting' && missingVoteTurn && myVoteTurn) setStatus('Stembeurtinformatie ontbreekt in de backend-state; stempaneel is daarom toch zichtbaar gemaakt.', false);
          else if (qs('#statusText').textContent && /beurtinformatie ontbreekt/i.test(qs('#statusText').textContent)) setStatus('', false);
        }

        renderBidHistory(st);
        renderVoteStatus(votes);

        const lr = st.last_reveal || game?.last_reveal || null;
        const revealWrap = qs('#revealBody');
        if(!lr){ revealWrap.innerHTML='<div class="empty">Nog geen reveal.</div>'; return; }
        const hands = Array.isArray(lr.hands)?lr.hands:[];
        const lrBid = lr.bid || null;
        const lrVotes = Array.isArray(lr.votes) ? lr.votes : [];
        const firstLoser = findNameBySeat(players, lr.first_loser_seat);
        const nextStarter = findNameBySeat(players, lr.next_starter_seat);

        revealWrap.innerHTML = `<div class="reveal-item"><strong>R${Number(lr.round_no||0)}</strong> · ${lr.bid_true?'gehaald':'niet gehaald'} · bod ${esc(bidText(lrBid))} · geteld ${Number(lr.counted_total||0)}</div>` +
          `<div class="reveal-item subtle">Verliezers: ${esc(lr.losing_kind||'')} · starter: ${esc(firstLoser)} → ${esc(nextStarter)}</div>` +
          (lrVotes.length ? `<div class="reveal-list" style="margin-top:10px">${lrVotes.map((v)=>{ const pill=votePillSpec(v.vote===true?'approved':'rejected'); return `<div class="vote-item row"><div><strong>${esc(v.name||'Speler')}</strong> <span class="muted">#${Number(v.seat||0)}</span></div><span class="${pill.cls}">${pill.label}</span></div>`; }).join('')}</div>` : '') +
          (hands.length ? `<div class="reveal-list" style="margin-top:10px">${hands.map((h)=>`<div class="reveal-item"><strong>${esc(h.name||'Speler')}</strong> <span class="muted">#${Number(h.seat||0)}</span><div class="dice-row">${(Array.isArray(h.dice)?h.dice:[]).map((d)=>`<img class="${dieClass(d)}" src="./assets/pikken/dice-${Number(d)}.svg" alt="die ${Number(d)}">`).join('')}</div></div>`).join('')}</div>` : '');
      }

      async function loadParticipantState(){ const token=sessionToken(); if(!token || !UI.gameId) return null; return rpc('pikken_get_state_scoped', { session_token: token, game_id_input: UI.gameId }); }
      async function loadPublicState(){ return rpc('pikken_get_live_state_public', { game_id_input: UI.gameId || null, lobby_code_input: UI.lobbyCode || null, site_scope_input: UI.scope }); }
      async function load(){ try{ let state=null; try{ state = await loadParticipantState(); }catch(_){} if(!state) state = await loadPublicState(); render(state||{}); if(!/beurtinformatie ontbreekt/i.test(qs('#statusText').textContent||'')) setStatus('', false); }catch(err){ setStatus(err.message || 'Laden mislukt.', true); } }
      async function withAction(label, fn){ if(UI.actionBusy) return; UI.actionBusy=true; setStatus(label, false); try { const out=await fn(); if(out && typeof out==='object' && out.game){ render(out); } await load(); } catch(err){ setStatus(err.message || `${label} mislukt.`, true); } finally { UI.actionBusy=false; } }
      async function placeBid(){ const count=Number(qs('#bidCount').value || 0); const face=Number(qs('#bidFace').value || 0); if(!count || !face) return setStatus('Kies een geldig bod.', true); return withAction('Bieden…', ()=>rpc('pikken_place_bid_scoped', { session_token: sessionToken() || null, game_id_input: UI.gameId, bid_count_input: count, bid_face_input: face })); }
      async function rejectBid(){ return withAction('Afkeuren…', ()=>rpc('pikken_reject_bid_scoped', { session_token: sessionToken() || null, game_id_input: UI.gameId })); }
      async function vote(v){ return withAction('Stemmen…', ()=>rpc('pikken_cast_vote_scoped', { session_token: sessionToken() || null, game_id_input: UI.gameId, vote_input: !!v })); }

      function boot(){
        UI.scope=currentScope();
        const rawClientMatchId=qsParam('client_match_id');
        const rawMatchRef=qsParam('match_ref');
        UI.gameId = rawClientMatchId && /^[0-9a-f-]{36}$/i.test(rawClientMatchId) ? rawClientMatchId : '';
        UI.lobbyCode = rawMatchRef || (!UI.gameId ? rawClientMatchId : '') || '';
        if(!UI.gameId && !UI.lobbyCode){ setStatus('Geen geldige game_id of roomcode in URL.', true); return; }
        buildBidCountOptions(24);
        qs('#placeBidBtn').addEventListener('click', placeBid);
        qs('#rejectBidBtn').addEventListener('click', rejectBid);
        qs('#voteApproveBtn').addEventListener('click', ()=>vote(true));
        qs('#voteRejectBtn').addEventListener('click', ()=>vote(false));
        const lobbyHref = UI.gameId ? `./pikken.html?game_id=${encodeURIComponent(UI.gameId)}&scope=${encodeURIComponent(UI.scope)}` : `./pikken.html?scope=${encodeURIComponent(UI.scope)}`;
        qs('#backLobbyBtn').href = lobbyHref;
        load();
        UI.pollId = setInterval(()=>{ if(!document.hidden) load(); }, 1200);
      }
      boot();
    })();
  </script>

  <script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script>
  <div class="site-credit-watermark" data-version-watermark></div>
</body>
</html>
