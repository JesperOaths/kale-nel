<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast donderdag?</title>
  <link rel="stylesheet" href="./site-shell.css" />
  <link rel="stylesheet" href="./theme-v46.css" />
  <link rel="stylesheet" href="./premium-v47.css" />
  <link rel="stylesheet" href="./ui-v52.css" />
  <style>
    :root {
      --shell-bg: rgba(247, 243, 235, 0.88);
      --panel-bg: rgba(244, 240, 232, 0.9);
      --panel-solid: #ebe7de;
      --panel-border: rgba(255, 255, 255, 0.7);
      --line: rgba(61, 52, 39, 0.12);
      --ink: #111111;
      --muted: #4a463f;
      --yes-bg: #d5b23d;
      --yes-text: #2d2300;
      --no-bg: #101010;
      --no-text: #f3efe5;
      --shadow: 0 18px 44px rgba(33, 24, 16, 0.12);
    }

    body { min-height: 100vh; }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .topbar,
    .hero-stat-strip,
    .state-mini-grid,
    .status:empty {
      display: none !important;
    }

    .hero.hero-home {
      width: 100%;
      max-width: 690px;
      margin: 0 auto;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
    }

    .hero-grid.hero-grid-home { display: block; }

    .index-shell {
      background: linear-gradient(180deg, rgba(250,248,243,0.82), var(--shell-bg));
      border: 1px solid var(--panel-border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      padding: 22px;
    }

    .hero-copy,
    .state-panel,
    .vote-shell,
    .list-box {
      background: linear-gradient(180deg, rgba(244,240,232,0.94), rgba(238,234,225,0.92));
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .hero-copy {
      position: relative;
      border-radius: 26px 26px 0 0;
      padding: 34px 84px 22px 28px;
      text-align: center;
    }

    .hero-copy::after {
      content: "";
      position: absolute;
      top: 18px;
      right: 18px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: url('./logo.png') center/contain no-repeat;
      opacity: 0.95;
    }

    .hero-copy h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(3rem, 7vw, 4.4rem);
      line-height: 0.94;
      letter-spacing: -0.075em;
      font-weight: 900;
      text-wrap: balance;
    }

    .state-panel {
      border-radius: 0;
      margin-top: 0;
      padding: 18px 26px 0;
      text-align: left;
    }

    .state-word {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.96;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .state-word.yes,
    .state-word.no,
    .state-word.maybe { color: var(--ink); }

    #stateCopy {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.99rem;
      line-height: 1.3;
    }

    .vote-shell {
      border-radius: 0;
      border-top: 1px solid var(--line);
      padding: 12px 26px 18px;
    }

    .vote-row {
      display: flex;
      gap: 12px;
      margin: 0;
    }

    .vote-btn {
      border: 0;
      border-radius: 16px;
      min-height: 54px;
      padding: 0 22px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .vote-btn.can {
      background: var(--yes-bg);
      color: var(--yes-text);
      min-width: 122px;
    }

    .vote-btn.cant {
      background: var(--no-bg);
      color: var(--no-text);
      min-width: 182px;
    }

    .status {
      margin: 12px 0 0;
      max-width: none;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 0.92rem;
    }

    .lists.compact-lists {
      margin: 18px 0 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .list-box {
      min-height: 126px;
      border-radius: 18px;
      padding: 14px 16px 16px;
    }

    .card-header {
      display: block;
      padding: 0;
      margin: 0 0 10px;
      border: 0;
      text-align: center;
    }

    .section-title {
      margin: 0;
      color: var(--ink);
      font-size: 1.05rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .name-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name-list li {
      margin: 0;
      color: #212121;
      font-size: 0.97rem;
      line-height: 1.35;
    }

    .name-list li:empty { display: none; }

    @media (max-width: 700px) {
      .page { padding: 18px 10px; }
      .hero.hero-home { max-width: 620px; }
      .index-shell { padding: 14px; border-radius: 24px; }
      .hero-copy { padding: 26px 68px 18px 20px; }
      .hero-copy::after { top: 14px; right: 14px; width: 42px; height: 42px; }
      .hero-copy h1 { font-size: clamp(2.45rem, 11.5vw, 4rem); }
      .state-panel { padding: 14px 18px 0; }
      .vote-shell { padding: 10px 18px 16px; }
      .vote-row { justify-content: flex-start; }
      .vote-btn.can { min-width: 104px; }
      .vote-btn.cant { min-width: 154px; }
      .lists.compact-lists { grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
      .list-box { min-height: 118px; padding: 12px 12px 14px; }
    }

    @media (max-width: 520px) {
      .hero-copy h1 { font-size: clamp(2.3rem, 11vw, 3.25rem); }
      .vote-btn { min-height: 50px; }
    }
  </style>
</head>
<body>
  <div class="site-scene" aria-hidden="true">
    <div class="page-bg"></div>
    <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
    <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
    <div class="playing-card-accent"><img src="./playingcard-accent1-trimmed.png" alt="" /></div>
    <div class="top-glow"></div>
  </div>
  <main class="page">
    <section class="hero hero-home">
      <div class="index-shell">
        <div class="hero-grid hero-grid-home">
          <div class="hero-copy">
            <h1>Wordt er gejast donderdag?</h1>
          </div>
          <div class="panel state-panel">
            <div id="stateWord" class="state-word no">Nee</div>
            <p id="stateCopy">0 mensen hebben Ja gezegd</p>
          </div>
          <div class="vote-shell">
            <div class="vote-row">
              <button class="vote-btn can" id="yesBtn" type="button"><strong>Ik kan</strong></button>
              <button class="vote-btn cant" id="noBtn" type="button"><strong>Ik kan niet</strong></button>
            </div>
            <div id="statusBox" class="status"></div>
          </div>
          <section class="lists compact-lists">
            <div class="panel list-box">
              <div class="card-header"><div><h2 class="section-title">Legends</h2></div></div>
              <ul id="legendsList" class="name-list"></ul>
            </div>
            <div class="panel list-box">
              <div class="card-header"><div><h2 class="section-title">Losers</h2></div></div>
              <ul id="losersList" class="name-list"></ul>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>
  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const SESSION_KEY = "jas_session_token_v11";
    function rpcHeaders() { return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json" }; }
    async function parseResponse(res) {
      const text = await res.text(); let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
    function clearSessionToken() { localStorage.removeItem(SESSION_KEY); }
    function setStatus(message = '', tone = 'info') {
      const box = document.getElementById('statusBox');
      if (!message) { box.className = 'status'; box.textContent = ''; return; }
      box.className = `status show ${tone}`; box.textContent = message;
    }
    function renderNames(id, items, emptyText) {
      const root = document.getElementById(id); root.innerHTML = '';
      if (!items || items.length === 0) { const li = document.createElement('li'); li.textContent = emptyText; root.appendChild(li); return; }
      items.forEach((name) => { const li = document.createElement('li'); li.textContent = name; root.appendChild(li); });
    }
    function computeStateLabel(canCount) {
      if (canCount >= 4) return { key: 'yes', label: 'Ja', copy: `${canCount} mensen hebben Ja gezegd` };
      if (canCount === 3) return { key: 'maybe', label: 'Bijna', copy: '3 mensen hebben Ja gezegd' };
      return { key: 'no', label: 'Nee', copy: `${canCount} ${canCount === 1 ? 'mens heeft' : 'mensen hebben'} Ja gezegd` };
    }
    function renderState(data) {
      const legends = data.legends || data.yes_names || [];
      const losers = data.losers || data.no_names || [];
      const canCount = Number(data.can_count ?? data.yes_count ?? legends.length ?? 0);
      const state = data.status_label
        ? {
            key: data.status_key || (data.status_label.toLowerCase() === 'ja' ? 'yes' : data.status_label.toLowerCase() === 'bijna' ? 'maybe' : 'no'),
            label: data.status_label,
            copy: `${canCount} ${canCount === 1 ? 'mens heeft' : 'mensen hebben'} Ja gezegd`
          }
        : computeStateLabel(canCount);
      const word = document.getElementById('stateWord');
      word.textContent = state.label;
      word.className = `state-word ${state.key}`;
      document.getElementById('stateCopy').textContent = state.copy;
      renderNames('legendsList', legends, 'Nog niemand');
      renderNames('losersList', losers, 'Nog niemand');
    }
    async function getHomepageState() {
      const session_token = getSessionToken();
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_gejast_homepage_state`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token }) });
        return await parseResponse(res);
      } catch {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token }) });
        return await parseResponse(res);
      }
    }
    async function castVote(desired_status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, { method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken(), desired_status }) });
      return await parseResponse(res);
    }
    function goToLoginWithIntent(status) {
      const url = new URL('./login.html', window.location.href);
      url.searchParams.set('next', './index.html'); url.searchParams.set('vote', status);
      window.location.href = url.toString();
    }
    async function handleVote(status) {
      if (!getSessionToken()) { goToLoginWithIntent(status); return; }
      try {
        const data = await castVote(status); renderState(data);
        setStatus(`Opgeslagen: ${status === 'ja' ? 'ik kan' : 'ik kan niet'}.`, 'ok');
      } catch (error) {
        const msg = error?.message || 'Onbekende fout';
        if (/sessie|token|login|ingelogd/i.test(msg)) { clearSessionToken(); goToLoginWithIntent(status); return; }
        setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn');
      }
    }
    async function load() {
      try { renderState(await getHomepageState()); setStatus(''); }
      catch (error) { const msg = error?.message || 'Onbekende fout'; setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn'); }
    }
    document.getElementById('yesBtn').addEventListener('click', () => handleVote('ja'));
    document.getElementById('noBtn').addEventListener('click', () => handleVote('nee'));
    load();
  </script>
</body>
</html>
