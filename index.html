<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    :root {
      --bg1: #f8fafc;
      --bg2: #e2e8f0;
      --card: rgba(255, 255, 255, 0.75);
      --text: #0f172a;
      --muted: #475569;
      --yes-bg: #dcfce7;
      --yes-text: #166534;
      --no-bg: #fee2e2;
      --no-text: #991b1b;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, transparent 35%),
        radial-gradient(circle at bottom right, #dbeafe 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 56px 32px;
      border: 1px solid rgba(255, 255, 255, 0.65);
    }

    .eyebrow {
      margin: 0 0 16px;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .answer {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 700;
      text-transform: lowercase;
    }

    .answer.yes {
      background: var(--yes-bg);
      color: var(--yes-text);
    }

    .answer.no {
      background: var(--no-bg);
      color: var(--no-text);
    }

    .hint {
      margin-top: 18px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Vanavond</p>
    <h1>Wordt er gejast vanavond?</h1>
    <div id="answer" class="answer">yes</div>
    <p class="hint">Pas dit aan in de code.</p>
  </main>

  <script>
    const answer = "yes"; // change to "no"

    const answerElement = document.getElementById("answer");
    answerElement.textContent = answer;

    if (answer === "yes") {
      answerElement.classList.add("yes");
    } else {
      answerElement.classList.add("no");
    }
  </script>
</body>
</html>
