<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wordt er gejast?</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f4f1;
  overflow-x:hidden;
}

.bg-pattern {
  position:fixed;
  inset:0;
  background-image:url('123zwartkaart.png');
  background-size:240px;
  opacity:0.12;
}

.dd-center {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:550px;
  opacity:0.15;
}

.spinoza {
  position:fixed;
  right:-30px;
  bottom:0;
  height:95vh;
  opacity:0.22;
}

.card {
  position:fixed;
  left:-30px;
  top:35%;
  width:260px;
  transform:rotate(-12deg);
  opacity:0.28;
}

.container {
  position:relative;
  z-index:2;
  max-width:820px;
  margin:80px auto;
  background:white;
  padding:40px;
  border-radius:20px;
}

.footer {
  position:fixed;
  bottom:10px;
  right:20px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>
<body>

<div class="bg-pattern"></div>
<img src="dubbeleD-goud.png" class="dd-center">
<img src="spinoza-silhouette.png" class="spinoza">
<img src="playingcard-accent.png" class="card">

<div class="container">
<h1>Wordt er gejast donderdag? <img src="logo.png" style="height:28px;vertical-align:middle;"></h1>
<p>Nee</p>
</div>

<div class="footer">Made by Bruis · v12</div>

</body>
</html>
