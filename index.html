<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      line-height: 1.15;
    }

    .answer {
      font-size: 32px;
      margin: 15px 0;
      font-weight: bold;
    }

    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 12px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }
    .remove { background: #6b7280; color: white; }

    select {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
    }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 20px;
      text-align: left;
    }

    .list-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
    }

    .list-box h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin: 6px 0;
    }

    #status {
      color: #555;
      min-height: 22px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .small-note {
      color: #666;
      font-size: 14px;
      margin-top: 12px;
    }

    @media (max-width: 700px) {
      .lists {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <select id="playerSelect"></select>

    <div>
      <button id="yesBtn" class="yes" type="button">Ik kan</button>
      <button id="noBtn" class="no" type="button">Ik kan niet</button>
      <button id="removeBtn" class="remove" type="button">Verwijder mijn stem</button>
    </div>

    <div id="status"></div>
    <div class="small-note">
      Deze versie werkt per browser. Je kunt alleen je eigen gekozen naam op dit apparaat aanpassen of verwijderen.
    </div>

    <div class="lists">
      <div class="list-box">
        <h3>Legends</h3>
        <ul id="legendsList"></ul>
      </div>

      <div class="list-box">
        <h3>Losers</h3>
        <ul id="losersList"></ul>
      </div>
    </div>
  </div>

  <script>
    const PLAYERS = [
      "Albert",
      "Antoni",
      "Boris",
      "Boudewijn",
      "Bram",
      "Bruis",
      "Bryan",
      "Daniël",
      "David",
      "Friso",
      "Jelle",
      "Jelmer D",
      "Jelmer K",
      "Jorrit",
      "Justin",
      "Koen",
      "Lyon",
      "Mart",
      "Marvin",
      "Max",
      "Melson",
      "Merijn",
      "Milan",
      "Nelis",
      "Rik",
      "Robin M",
      "Robin S",
      "Roel",
      "Ruben",
      "Sam",
      "Siem",
      "Sierd",
      "Sybren",
      "Thijs",
      "Tim",
      "Tom",
      "Tom A",
      "Tristan",
      "Vince",
      "Wolf"
    ].sort((a, b) => a.localeCompare(b, "nl"));

    const VOTES_STORAGE_KEY = "jas_votes_secure_v1";
    const IDENTITY_STORAGE_KEY = "jas_identity_secure_v1";

    function getWeekKey() {
      const now = new Date();
      const utc = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      const day = utc.getUTCDay() || 7;
      utc.setUTCDate(utc.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(utc.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((utc.getTime() - yearStart.getTime()) / 86400000) + 1) / 7);
      return `${utc.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function computeAnswer(yesCount) {
      if (yesCount >= 4) return "ja";
      if (yesCount === 3) return "bijna";
      return "nee";
    }

    function getIdentity() {
      const raw = localStorage.getItem(IDENTITY_STORAGE_KEY);
      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function saveIdentity(identity) {
      localStorage.setItem(IDENTITY_STORAGE_KEY, JSON.stringify(identity));
    }

    function ensureIdentity(name) {
      const existing = getIdentity();

      if (existing) {
        if (existing.name !== name) {
          throw new Error(`Dit apparaat is al gekoppeld aan ${existing.name}. Je kunt alleen je eigen naam aanpassen of verwijderen.`);
        }
        return existing;
      }

      const identity = {
        id: crypto.randomUUID(),
        name
      };

      saveIdentity(identity);
      return identity;
    }

    function getAllVotes() {
      const raw = localStorage.getItem(VOTES_STORAGE_KEY);
      if (!raw) return {};

      try {
        return JSON.parse(raw);
      } catch {
        return {};
      }
    }

    function saveAllVotes(votes) {
      localStorage.setItem(VOTES_STORAGE_KEY, JSON.stringify(votes));
    }

    function getCurrentWeekVotes() {
      const allVotes = getAllVotes();
      const weekKey = getWeekKey();
      return allVotes[weekKey] || {};
    }

    function setCurrentWeekVote(name, status) {
      const identity = ensureIdentity(name);
      const allVotes = getAllVotes();
      const weekKey = getWeekKey();

      if (!allVotes[weekKey]) {
        allVotes[weekKey] = {};
      }

      const existingEntries = Object.values(allVotes[weekKey]);
      const conflictingEntry = existingEntries.find(entry => entry.name === name && entry.ownerId !== identity.id);

      if (conflictingEntry) {
        throw new Error(`De naam ${name} is op dit apparaat niet van jou.`);
      }

      allVotes[weekKey][identity.id] = {
        ownerId: identity.id,
        name,
        status
      };

      saveAllVotes(allVotes);
    }

    function removeCurrentWeekVote() {
      const identity = getIdentity();
      if (!identity) {
        throw new Error("Er is geen gekoppelde naam op dit apparaat.");
      }

      const allVotes = getAllVotes();
      const weekKey = getWeekKey();

      if (!allVotes[weekKey]) return;

      delete allVotes[weekKey][identity.id];
      saveAllVotes(allVotes);
    }

    function fillPlayers() {
      const select = document.getElementById("playerSelect");
      const identity = getIdentity();

      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = !identity;
      select.appendChild(placeholder);

      PLAYERS.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      if (identity && PLAYERS.includes(identity.name)) {
        select.value = identity.name;
        select.disabled = true;
      } else {
        select.disabled = false;
      }
    }

    function renderList(elementId, names, emptyText) {
      const list = document.getElementById(elementId);
      list.innerHTML = "";

      if (names.length === 0) {
        const li = document.createElement("li");
        li.textContent = emptyText;
        list.appendChild(li);
        return;
      }

      names.forEach((name) => {
        const li = document.createElement("li");
        li.textContent = name;
        list.appendChild(li);
      });
    }

    function render() {
      fillPlayers();

      const currentVotes = Object.values(getCurrentWeekVotes());

      const legends = currentVotes
        .filter(entry => entry.status === "ja")
        .map(entry => entry.name)
        .sort((a, b) => a.localeCompare(b, "nl"));

      const losers = currentVotes
        .filter(entry => entry.status === "nee")
        .map(entry => entry.name)
        .sort((a, b) => a.localeCompare(b, "nl"));

      const answer = computeAnswer(legends.length);

      document.getElementById("answer").textContent = answer;
      document.getElementById("answer").className = "answer " + answer;
      document.getElementById("count").textContent = `${legends.length} mensen hebben ja gezegd`;

      renderList("legendsList", legends, "Nog niemand");
      renderList("losersList", losers, "Nog niemand");

      const identity = getIdentity();
      if (!identity) {
        document.getElementById("status").textContent = "";
        return;
      }

      const myVote = currentVotes.find(entry => entry.ownerId === identity.id);
      document.getElementById("status").textContent = myVote
        ? `Jouw keuze: ${myVote.status}`
        : "";
    }

    function castVote(status) {
      const select = document.getElementById("playerSelect");
      const selectedName = select.value || getIdentity()?.name;

      if (!selectedName) {
        alert("Kies eerst je naam");
        return;
      }

      try {
        setCurrentWeekVote(selectedName, status);
        render();
      } catch (error) {
        alert(error.message);
      }
    }

    function removeMyVote() {
      try {
        removeCurrentWeekVote();
        render();
      } catch (error) {
        alert(error.message);
      }
    }

    document.getElementById("yesBtn").addEventListener("click", () => castVote("ja"));
    document.getElementById("noBtn").addEventListener("click", () => castVote("nee"));
    document.getElementById("removeBtn").addEventListener("click", removeMyVote);

    render();
  </script>
</body>
</html>
