<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast donderdag?</title>
  <link rel="stylesheet" href="./site-shell.css" />
  <link rel="stylesheet" href="./theme-v46.css" />
</head>
<body>
  <div class="site-scene" aria-hidden="true">
    <div class="page-bg"></div>
    <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
    <div class="kale-hand"><img src="./kale9goed.png" alt="" /></div>
    <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
    <div class="playing-card-accent"><img src="./playingcard-accent1-trimmed.png" alt="" /></div>
    <div class="top-glow"></div>
  </div>

  <main class="page">
    <div class="topbar">
      <a class="brand-link" href="./index.html"><span>Wordt er gejast donderdag?</span></a>
      <div class="topbar-actions">
        <a class="text-link" href="./login.html">Inloggen</a>
        <a class="text-link" href="./request.html">Naam aanvragen</a>
        <img src="./logo.png" alt="Despinoza-logo" class="brand-mini" />
      </div>
    </div>

    <section class="hero hero-home">
      <div class="hero-grid hero-grid-home">
        <div class="hero-copy">
          <span class="kicker">Donderdagstatus</span>
          <h1>Wordt er<br>gejast?</h1>
          <p class="hero-intro">Twee knoppen. Meteen duidelijk.</p>
          <div class="vote-row">
            <button class="vote-btn can" id="yesBtn" type="button"><strong>Ik kan</strong><span>Stem ja</span></button>
            <button class="vote-btn cant" id="noBtn" type="button"><strong>Ik kan niet</strong><span>Stem nee</span></button>
          </div>
          <div id="statusBox" class="status"></div>
          <div class="quick-links">
            <a class="text-link" href="./activate.html">Activeren</a>
            <p class="footer-note" id="sessionHint">Stemmen gebruikt je browsersessie.</p>
          </div>
        </div>

        <div class="panel state-panel">
          <div class="kicker">Stand</div>
          <div id="stateWord" class="state-word no">Nee</div>
          <div id="stateCopy" class="state-copy">Nog niemand heeft ja gezegd.</div>
          <div class="state-mini-grid">
            <div class="mini-stat">
              <span>Legends</span>
              <strong id="yesCount">0</strong>
            </div>
            <div class="mini-stat">
              <span>Losers</span>
              <strong id="noCount">0</strong>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="lists compact-lists">
      <div class="panel list-box">
        <h2>Legends</h2>
        <ul id="legendsList" class="name-list"></ul>
      </div>
      <div class="panel list-box">
        <h2>Losers</h2>
        <ul id="losersList" class="name-list"></ul>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const SESSION_KEY = "jas_session_token_v11";

    function rpcHeaders() {
      return { apikey: SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json", Accept: "application/json" };
    }
    async function parseResponse(res) {
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text || `HTTP ${res.status}`); }
      if (!res.ok) throw new Error(data?.message || data?.error || data?.hint || `HTTP ${res.status}`);
      return data;
    }
    function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
    function clearSessionToken() { localStorage.removeItem(SESSION_KEY); }
    function setStatus(message = '', tone = 'info') {
      const box = document.getElementById('statusBox');
      if (!message) { box.className = 'status'; box.textContent = ''; return; }
      box.className = `status show ${tone}`;
      box.textContent = message;
    }
    function renderNames(id, items, emptyText) {
      const root = document.getElementById(id);
      root.innerHTML = '';
      if (!items || items.length === 0) {
        const li = document.createElement('li');
        li.textContent = emptyText;
        root.appendChild(li);
        return;
      }
      items.forEach((name) => {
        const li = document.createElement('li');
        li.textContent = name;
        root.appendChild(li);
      });
    }
    function computeStateLabel(canCount) {
      if (canCount >= 4) return { key: 'yes', label: 'Ja', copy: `${canCount} kunnen.` };
      if (canCount === 3) return { key: 'maybe', label: 'Bijna', copy: 'Nog één nodig.' };
      return { key: 'no', label: 'Nee', copy: canCount === 1 ? '1 kan.' : `${canCount} kunnen.` };
    }
    function renderState(data) {
      const legends = data.legends || data.yes_names || [];
      const losers = data.losers || data.no_names || [];
      const canCount = Number(data.can_count ?? data.yes_count ?? legends.length ?? 0);
      const state = data.status_label
        ? { key: data.status_key || 'no', label: data.status_label, copy: canCount === 1 ? '1 kan.' : `${canCount} kunnen.` }
        : computeStateLabel(canCount);
      const word = document.getElementById('stateWord');
      word.textContent = state.label;
      word.className = `state-word ${state.key}`;
      document.getElementById('stateCopy').textContent = state.copy;
      document.getElementById('yesCount').textContent = legends.length;
      document.getElementById('noCount').textContent = losers.length;
      renderNames('legendsList', legends, 'Nog niemand');
      renderNames('losersList', losers, 'Nog niemand');
      if (data.my_name) {
        document.getElementById('sessionHint').textContent = `Ingelogd als ${data.my_name}.`;
      }
    }
    async function getHomepageState() {
      const session_token = getSessionToken();
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_gejast_homepage_state`, {
          method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token })
        });
        return await parseResponse(res);
      } catch {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
          method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token })
        });
        return await parseResponse(res);
      }
    }
    async function castVote(desired_status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, {
        method:'POST', mode:'cors', cache:'no-store', headers: rpcHeaders(), body: JSON.stringify({ session_token: getSessionToken(), desired_status })
      });
      return await parseResponse(res);
    }
    function goToLoginWithIntent(status) {
      const url = new URL('./login.html', window.location.href);
      url.searchParams.set('next', './index.html');
      url.searchParams.set('vote', status);
      window.location.href = url.toString();
    }
    async function handleVote(status) {
      if (!getSessionToken()) { goToLoginWithIntent(status); return; }
      try {
        const data = await castVote(status);
        renderState(data);
        setStatus(`Opgeslagen: ${status === 'ja' ? 'ik kan' : 'ik kan niet'}.`, 'ok');
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        if (/sessie|invalid/i.test(msg)) {
          clearSessionToken();
          goToLoginWithIntent(status);
          return;
        }
        setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn');
      }
    }
    async function load() {
      try {
        renderState(await getHomepageState());
      } catch (err) {
        const msg = err instanceof Error ? err.message : 'Er ging iets mis';
        renderNames('legendsList', [], 'Nog niemand');
        renderNames('losersList', [], 'Nog niemand');
        setStatus(msg === 'Failed to fetch' ? 'Netwerkfout bij contact met Supabase.' : msg, 'warn');
      }
    }
    document.getElementById('yesBtn').addEventListener('click', () => handleVote('ja'));
    document.getElementById('noBtn').addEventListener('click', () => handleVote('nee'));
    load();
  </script>
</body>
</html>
