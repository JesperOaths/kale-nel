<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordt er gejast vanavond?</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .answer { font-size: 32px; margin: 15px 0; font-weight: bold; }
    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    select { width: 100%; padding: 10px; }

    ul { list-style: none; padding: 0; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <select id="player"></select>

    <button class="yes" onclick="vote('ja')">Ik kan</button>
    <button class="no" onclick="vote('nee')">Ik kan niet</button>

    <h3>Ja-lijst:</h3>
    <ul id="list"></ul>
  </div>

<script>
const URL = "https://uiqntazgnrxwliadkmy.supabase.co/rest/v1";
const KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

const headers = {
  apikey: KEY,
  Authorization: "Bearer " + KEY,
  "Content-Type": "application/json"
};

function week() {
  const d = new Date();
  return d.getFullYear() + "-" + Math.ceil(d.getDate()/7);
}

function result(n){
  if(n>=4) return "ja";
  if(n===3) return "bijna";
  return "nee";
}

async function load() {
  try {
    const players = await fetch(URL+"/players?select=*", {headers}).then(r=>r.json());
    const votes = await fetch(URL+"/votes?select=*", {headers}).then(r=>r.json());

    const select = document.getElementById("player");
    select.innerHTML = "<option>Kies je naam</option>";

    players
      .sort((a,b)=>a.display_name.localeCompare(b.display_name))
      .forEach(p=>{
        select.innerHTML += `<option value="${p.id}">${p.display_name}</option>`;
      });

    const yes = votes.filter(v=>v.status==="ja");

    const names = yes.map(v=>{
      return players.find(p=>p.id===v.player_id)?.display_name;
    }).sort();

    document.getElementById("answer").innerText = result(names.length);
    document.getElementById("answer").className = "answer "+result(names.length);
    document.getElementById("count").innerText = names.length+" mensen";

    const list = document.getElementById("list");
    list.innerHTML = names.map(n=>"<li>"+n+"</li>").join("") || "<li>Niemand</li>";

  } catch(e){
    document.getElementById("answer").innerText="fout";
  }
}

async function vote(status){
  const id = document.getElementById("player").value;
  if(!id) return alert("kies naam");

  await fetch(URL+"/votes", {
    method:"POST",
    headers,
    body: JSON.stringify({
      player_id: id,
      status,
      week_key: week()
    })
  });

  load();
}

load();
</script>
</body>
</html>
