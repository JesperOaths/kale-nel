<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast donderdag?</title>
  <style>

    
    :root {
  --gold: #d4af37;
  --gold-dark: #b89018;
  --black: #111111;
  --soft: #f3f1ec;
  --soft-2: #ebe7df;
  --card: rgba(255, 255, 255, 0.95);
  --line: rgba(17, 17, 17, 0.08);
  --muted: #6b7280;
  --blue: #2563eb;
  --shadow: 0 28px 70px rgba(17, 17, 17, 0.14);
}

* { box-sizing: border-box; }

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 26%),
    radial-gradient(circle at bottom right, rgba(17, 17, 17, 0.07), transparent 24%),
    linear-gradient(135deg, #f2efe8, #f8f7f3 44%, #ece8e0);
  color: var(--black);
  margin: 0;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

.page-bg,
.brand-watermark,
.spinoza-shadow,
.top-glow,
.playing-card-accent {
  position: fixed;
  pointer-events: none;
}

.page-bg,
.top-glow {
  inset: 0;
}

.page-bg {
  background-image: url('./123zwartkaart.png');
  background-size: 255px;
  background-repeat: repeat;
  background-position: center;
  opacity: 0.13;
  filter: grayscale(100%) contrast(1.12) brightness(0.98);
  mix-blend-mode: multiply;
  z-index: 0;
}

.brand-watermark {
  top: 50%;
  left: 50%;
  width: min(42vw, 560px);
  transform: translate(-50%, -50%);
  opacity: 0.2;
  z-index: 0;
  filter: saturate(1.08) brightness(1.02);
}

.brand-watermark img,
.spinoza-shadow img,
.playing-card-accent img {
  display: block;
  width: 100%;
  height: auto;
}

.spinoza-shadow {
  left: -34px;
  bottom: -4px;
  width: min(40vw, 560px);
  opacity: 0.48;
  z-index: 0;
  filter: sepia(0.22) saturate(1.18) contrast(1.08) brightness(1.03);
}

.playing-card-accent {
  right: -34px;
  bottom: 6%;
  width: min(28vw, 380px);
  opacity: 0.88;
  z-index: 0;
  filter: sepia(0.18) saturate(1.72) contrast(1.18) brightness(1.08) drop-shadow(0 18px 34px rgba(40, 18, 12, 0.2));
  transform: rotate(7deg);
  transform-origin: center right;
}

.playing-card-accent img {
  border-radius: 22px;
}

.top-glow {
  background: linear-gradient(180deg, rgba(255,255,255,0.38), transparent 24%);
  z-index: 0;
}

.watermark {
  position: fixed;
  right: 20px;
  bottom: 14px;
  color: rgba(17,17,17,0.28);
  font-size: 14px;
  user-select: none;
  pointer-events: none;
  z-index: 3;
  letter-spacing: 0.02em;
}

@media (max-width: 760px) {
  body {
    padding-left: 0;
    padding-right: 0;
  }

  .brand-watermark {
    width: min(84vw, 540px);
    opacity: 0.22;
  }

  .spinoza-shadow {
    left: -28px;
    bottom: 0;
    width: min(60vw, 380px);
    opacity: 0.54;
    filter: sepia(0.18) saturate(1.12) contrast(1.04) brightness(1.03);
  }

  .playing-card-accent {
    right: -28px;
    bottom: 8%;
    width: min(54vw, 320px);
    opacity: 0.92;
    filter: sepia(0.2) saturate(1.78) contrast(1.2) brightness(1.09) drop-shadow(0 18px 34px rgba(40, 18, 12, 0.2));
  }
}



    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      padding: 30px 34px 34px;
      border-radius: 28px;
      text-align: center;
      max-width: 900px;
      width: 100%;
      box-shadow: var(--shadow);
      position: relative;
      margin: 20px;
      z-index: 2;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(212,175,55,0.085), transparent 34%, rgba(17,17,17,0.05));
      pointer-events: none;
    }

    .logo-corner {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 84px;
      height: 84px;
      object-fit: contain;
      opacity: 0.96;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.08));
    }

    .admin-link {
      position: absolute;
      left: 18px;
      top: 20px;
      font-size: 14px;
      text-decoration: none;
      color: var(--blue);
      background: rgba(255,255,255,0.7);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 24px 0 8px 0;
      font-size: clamp(2.45rem, 4vw, 3.05rem);
      line-height: 1.02;
      padding: 0 80px;
      letter-spacing: -0.035em;
      position: relative;
      z-index: 1;
    }

    .answer {
      font-size: 42px;
      margin: 22px 0 10px 0;
      font-weight: bold;
      text-transform: capitalize;
      min-height: 42px;
      position: relative;
      z-index: 1;
    }

    .ja { color: var(--gold); }
    .bijna { color: var(--gold-dark); }
    .nee { color: var(--black); }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17,17,17,0.09);
    }

    .yes { background: var(--gold); color: #111111; }
    .no { background: var(--black); color: #ffffff; }
    .remove { background: #6b7280; color: #ffffff; }

    select, input {
      padding: 12px 13px;
      margin: 10px 0;
      width: 100%;
      font-size: 15px;
      border: 1px solid rgba(17,17,17,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    #count {
      margin: 2px 0 10px 0;
      color: rgba(17,17,17,0.78);
      position: relative;
      z-index: 1;
    }

    #status {
      color: var(--muted);
      min-height: 22px;
      margin-top: 10px;
      white-space: pre-wrap;
      position: relative;
      z-index: 1;
    }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .list-box {
      background: rgba(250, 250, 249, 0.82);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 18px 16px;
      min-height: 180px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .list-box h3 {
      text-align: center;
      margin: 0 0 10px 0;
    }

    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: 6px 0; }

    .section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      position: relative;
      z-index: 1;
    }

    .request-link-wrap { margin-top: 8px; }
    .request-link { color: var(--blue); text-decoration: none; font-size: 15px; }

    @media (max-width: 760px) {
      body { padding: 16px 0; }
      .lists, .two-col { grid-template-columns: 1fr; }
      h1 { padding: 0; margin-top: 78px; font-size: 2rem; }
      .logo-corner { top: 12px; right: 12px; width: 68px; height: 68px; }
      .admin-link { top: 12px; left: 12px; }
      .card { padding: 22px 18px; margin: 14px auto; max-width: calc(100vw - 68px); width: calc(100vw - 68px); }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="brand-watermark"><img src="./dubbeleD-goud.png" alt="" /></div>
  <div class="spinoza-shadow"><img src="./spinoza-silhouette.png" alt="" /></div>
  <div class="playing-card-accent"><img src="./playingcard-accent.png" alt="" /></div>
  <div class="top-glow"></div>

  <div class="card">
    <a href="./admin.html" class="admin-link">Admin</a>
    <img src="./logo.png" alt="Logo" class="logo-corner" />

    <h1>Wordt er gejast donderdag?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <div class="section">
      <h3>Inloggen</h3>
      <div class="two-col">
        <select id="playerSelect"></select>
        <input id="pinInput" type="password" placeholder="Pincode" />
      </div>
      <div>
        <button id="yesBtn" class="yes" type="button">Ik kan</button>
        <button id="noBtn" class="no" type="button">Ik kan niet</button>
        <button id="removeBtn" class="remove" type="button" style="display:none;">Verwijder mijn stem</button>
      </div>
      <div class="request-link-wrap">
        <a href="./request.html" class="request-link">Naam aanvragen</a>
      </div>
    </div>

    <div id="status"></div>

    <div class="lists">
      <div class="list-box">
        <h3>Legends</h3>
        <ul id="legendsList"></ul>
      </div>

      <div class="list-box">
        <h3>Losers</h3>
        <ul id="losersList"></ul>
      </div>
    </div>
  </div>

  <div class="watermark">Made by Bruis · v24</div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliaidkmy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";
    const SESSION_KEY = "jas_session_token_v9";

    function rpcHeaders() {
      return {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        "Content-Type": "application/json",
        Accept: "application/json"
      };
    }

    async function parseResponse(res) {
      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        throw new Error(text || `HTTP ${res.status}`);
      }

      if (!res.ok) {
        throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
    function setSessionToken(token) { localStorage.setItem(SESSION_KEY, token); }
    function clearSessionToken() { localStorage.removeItem(SESSION_KEY); }

    function fillNameSelect(names, selectedName = null, locked = false) {
      const select = document.getElementById("playerSelect");
      select.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = !selectedName;
      select.appendChild(placeholder);
      (names || []).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
      if (selectedName) select.value = selectedName;
      select.disabled = locked;
    }

    function renderList(id, names, emptyText) {
      const list = document.getElementById(id);
      list.innerHTML = "";
      if (!names || names.length === 0) {
        const li = document.createElement("li");
        li.textContent = emptyText;
        list.appendChild(li);
        return;
      }
      names.forEach((name) => {
        const li = document.createElement("li");
        li.textContent = name;
        list.appendChild(li);
      });
    }

    function renderState(state) {
      const answerMap = { ja: "Ja", bijna: "Bijna", nee: "Nee" };
      const answerClass = state.answer || "nee";
      const answerText = answerMap[answerClass] || "Nee";
      const yesCount = Number(state.yes_count || 0);
      document.getElementById("answer").textContent = answerText;
      document.getElementById("answer").className = `answer ${answerClass}`;
      document.getElementById("count").textContent = yesCount === 1 ? "1 mens heeft Ja gezegd" : `${yesCount} mensen hebben Ja gezegd`;
      fillNameSelect(state.all_names || [], state.my_name || null, Boolean(state.my_name));
      renderList("legendsList", state.yes_names || [], "Nog niemand");
      renderList("losersList", state.no_names || [], "Nog niemand");
      document.getElementById("removeBtn").style.display = state.my_status ? "inline-block" : "none";
      document.getElementById("status").textContent = state.my_status ? `Jouw keuze: ${state.my_status}` : "";
    }

    async function getState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: rpcHeaders(),
        body: JSON.stringify({ session_token: getSessionToken() })
      });
      return await parseResponse(res);
    }

    async function loginPlayer() {
      const desiredName = document.getElementById("playerSelect").value;
      const enteredPin = document.getElementById("pinInput").value.trim();
      if (!desiredName) throw new Error("Kies eerst je naam");
      if (!enteredPin) throw new Error("Voer je pincode in");
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_player`, {
        method: "POST", mode: "cors", cache: "no-store", headers: rpcHeaders(),
        body: JSON.stringify({ desired_name: desiredName, entered_pin: enteredPin })
      });
      const data = await parseResponse(res);
      setSessionToken(data.session_token);
      document.getElementById("pinInput").value = "";
      return data;
    }

    async function castVote(desiredStatus) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, {
        method: "POST", mode: "cors", cache: "no-store", headers: rpcHeaders(),
        body: JSON.stringify({ session_token: getSessionToken(), desired_status: desiredStatus })
      });
      return await parseResponse(res);
    }

    async function removeMyVote() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/remove_my_vote`, {
        method: "POST", mode: "cors", cache: "no-store", headers: rpcHeaders(),
        body: JSON.stringify({ session_token: getSessionToken() })
      });
      return await parseResponse(res);
    }

    async function ensureLoggedIn() { if (getSessionToken()) return; await loginPlayer(); }

    async function handleVote(status) {
      try { await ensureLoggedIn(); renderState(await castVote(status)); }
      catch (err) { if (err instanceof Error && err.message.includes("Sessie ongeldig")) clearSessionToken(); alert(err instanceof Error ? err.message : "Er ging iets mis"); }
    }

    async function handleRemove() {
      try { renderState(await removeMyVote()); }
      catch (err) { if (err instanceof Error && err.message.includes("Sessie ongeldig")) clearSessionToken(); alert(err instanceof Error ? err.message : "Er ging iets mis"); }
    }

    async function load() {
      try { renderState(await getState()); }
      catch (err) {
        document.getElementById("answer").textContent = "Fout";
        document.getElementById("answer").className = "answer nee";
        document.getElementById("count").textContent = "Kon site niet laden";
        const rawMessage = err instanceof Error ? err.message : "Onbekende fout";
        document.getElementById("status").textContent = rawMessage === "Failed to fetch" ? "Netwerk/CORS-fout bij contact met Supabase." : rawMessage;
        renderList("legendsList", [], "Nog niemand");
        renderList("losersList", [], "Nog niemand");
        fillNameSelect([], null, false);
      }
    }

    document.getElementById("yesBtn").addEventListener("click", () => handleVote("ja"));
    document.getElementById("noBtn").addEventListener("click", () => handleVote("nee"));
    document.getElementById("removeBtn").addEventListener("click", handleRemove);
    load();
  </script>
</body>
</html>
