<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      line-height: 1.15;
    }

    .answer {
      font-size: 32px;
      margin: 15px 0;
      font-weight: bold;
    }

    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 12px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    select {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    li {
      margin: 6px 0;
    }

    #vote {
      margin-top: 10px;
    }

    #me {
      margin-bottom: 8px;
      color: #444;
    }

    #status {
      color: #555;
      min-height: 22px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <div id="login">
      <select id="playerSelect">
        <option value="">Kies je naam</option>
      </select>
    </div>

    <div id="vote">
      <p id="me">Kies je naam en stem.</p>
      <button id="yesBtn" class="yes" type="button">Ik kan</button>
      <button id="noBtn" class="no" type="button">Ik kan niet</button>
      <div id="status"></div>
    </div>

    <h3>Ja-lijst:</h3>
    <ul id="list"></ul>
  </div>

  <script>
    const API = "https://uiqntazgnrxwliadkmy.supabase.co/functions/v1/jas";
    const TOKEN_KEY = "jas_token";
    const NAME_KEY = "jas_name";

    const PLAYERS = [
      { slug: "bruis", display_name: "Bruis" },
      { slug: "jelle", display_name: "Jelle" },
      { slug: "nelis", display_name: "Nelis" },
      { slug: "ruben", display_name: "Ruben" },
      { slug: "siem", display_name: "Siem" },
      { slug: "sierd", display_name: "Sierd" },
      { slug: "antoni", display_name: "Antoni" },
      { slug: "boudewijn", display_name: "Boudewijn" },
      { slug: "bram", display_name: "Bram" },
      { slug: "daniel", display_name: "Daniël" },
      { slug: "david", display_name: "David" },
      { slug: "jelmer-d", display_name: "Jelmer D" },
      { slug: "jorrit", display_name: "Jorrit" },
      { slug: "justin", display_name: "Justin" },
      { slug: "koen", display_name: "Koen" },
      { slug: "lyon", display_name: "Lyon" },
      { slug: "mart", display_name: "Mart" },
      { slug: "marvin", display_name: "Marvin" },
      { slug: "max", display_name: "Max" },
      { slug: "melson", display_name: "Melson" },
      { slug: "merijn", display_name: "Merijn" },
      { slug: "milan", display_name: "Milan" },
      { slug: "rik", display_name: "Rik" },
      { slug: "robin-s", display_name: "Robin S" },
      { slug: "robin-m", display_name: "Robin M" },
      { slug: "sam", display_name: "Sam" },
      { slug: "sybren", display_name: "Sybren" },
      { slug: "tim", display_name: "Tim" },
      { slug: "tom", display_name: "Tom" },
      { slug: "tom-a", display_name: "Tom A" },
      { slug: "tristan", display_name: "Tristan" },
      { slug: "vince", display_name: "Vince" },
      { slug: "wolf", display_name: "Wolf" },
      { slug: "bryan", display_name: "Bryan" },
      { slug: "boris", display_name: "Boris" },
      { slug: "roel", display_name: "Roel" },
      { slug: "albert", display_name: "Albert" },
      { slug: "jelmer-k", display_name: "Jelmer K" },
      { slug: "thijs", display_name: "Thijs" },
      { slug: "friso", display_name: "Friso" }
    ].sort((a, b) => a.display_name.localeCompare(b.display_name, "nl"));

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

    function getStoredName() {
      return localStorage.getItem(NAME_KEY);
    }

    function setStoredName(name) {
      localStorage.setItem(NAME_KEY, name);
    }

    function fillPlayers() {
      const select = document.getElementById("playerSelect");
      const currentSlug = select.value;

      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = !currentSlug && !getStoredName();
      select.appendChild(placeholder);

      PLAYERS.forEach((p) => {
        const option = document.createElement("option");
        option.value = p.slug;
        option.textContent = p.display_name;
        select.appendChild(option);
      });

      if (currentSlug) {
        select.value = currentSlug;
      } else {
        const storedName = getStoredName();
        if (storedName) {
          const found = PLAYERS.find(p => p.display_name === storedName);
          if (found) {
            select.value = found.slug;
          }
        }
      }
    }

    async function load() {
      try {
        fillPlayers();

        const token = getToken();
        const url = token ? `${API}?token=${encodeURIComponent(token)}` : API;

        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Kon site niet laden");
        }

        document.getElementById("answer").textContent = data.answer || "...";
        document.getElementById("answer").className = "answer " + (data.answer || "");
        document.getElementById("count").textContent = `${data.yesCount ?? 0} mensen hebben ja gezegd`;

        const list = document.getElementById("list");
        list.innerHTML = "";

        (data.yesNames || []).forEach((n) => {
          const li = document.createElement("li");
          li.textContent = n;
          list.appendChild(li);
        });

        if ((data.yesNames || []).length === 0) {
          const li = document.createElement("li");
          li.textContent = "Nog niemand";
          list.appendChild(li);
        }

        if (data.me && data.me.display_name) {
          setStoredName(data.me.display_name);
          document.getElementById("me").textContent = data.me.status
            ? `Gekoppeld als ${data.me.display_name} — jouw keuze: ${data.me.status}`
            : `Gekoppeld als ${data.me.display_name} — je hebt nog niet gestemd`;
        } else if (getStoredName()) {
          document.getElementById("me").textContent = `Gekozen naam: ${getStoredName()}`;
        } else {
          document.getElementById("me").textContent = "Kies je naam en stem.";
        }

        document.getElementById("status").textContent = "";
      } catch (err) {
        console.error(err);
        fillPlayers();
        document.getElementById("answer").textContent = "fout";
        document.getElementById("count").textContent = "Kon site niet laden";
        document.getElementById("status").textContent = err instanceof Error ? err.message : "Onbekende fout";
      }
    }

    async function ensureToken() {
      const existingToken = getToken();
      if (existingToken) {
        return existingToken;
      }

      const slug = document.getElementById("playerSelect").value;

      if (!slug) {
        throw new Error("Kies eerst je naam");
      }

      const selected = PLAYERS.find(p => p.slug === slug);
      if (selected) {
        setStoredName(selected.display_name);
      }

      const res = await fetch(`${API}?action=claim`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ slug })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Naam koppelen mislukt");
      }

      setToken(data.token);
      if (data.display_name) {
        setStoredName(data.display_name);
      }

      return data.token;
    }

    async function vote(status) {
      try {
        document.getElementById("status").textContent = "Opslaan...";

        const token = await ensureToken();

        const res = await fetch(`${API}?action=vote`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token, status })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Stem opslaan mislukt");
        }

        document.getElementById("status").textContent = "Opgeslagen";
        await load();
      } catch (err) {
        console.error(err);
        document.getElementById("status").textContent = err instanceof Error ? err.message : "Onbekende fout";
        alert(err instanceof Error ? err.message : "Er ging iets mis bij het opslaan");
      }
    }

    document.getElementById("yesBtn").addEventListener("click", () => vote("ja"));
    document.getElementById("noBtn").addEventListener("click", () => vote("nee"));

    load();
  </script>
</body>
</html>
