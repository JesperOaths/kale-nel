<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast donderdag?</title>

  <style>
    :root {
      --gold: #d4af37;
      --black: #111111;
      --soft: #f5f7fb;
      --card: #ffffff;
      --muted: #6b7280;
      --blue: #2563eb;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--soft);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: var(--card);
      padding: 32px;
      border-radius: 18px;
      text-align: center;
      max-width: 860px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    select, input {
      padding: 10px;
      margin: 10px;
      width: 45%;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .yes {
      background: var(--gold);
      color: black;
    }

    .no {
      background: black;
      color: white;
    }

    .link {
      display: inline-block;
      margin-top: 20px;
      color: var(--blue);
      text-decoration: none;
    }

    #status {
      margin-top: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Wordt er gejast donderdag?</h1>

    <div>
      <select id="nameSelect"></select>
      <input id="pinInput" placeholder="Pincode" />
    </div>

    <div>
      <button class="yes" onclick="vote('yes')">Ik kan</button>
      <button class="no" onclick="vote('no')">Ik kan niet</button>
    </div>

    <a href="./request.html" class="link">Naam aanvragen</a>

    <div id="status"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://uiqntazgnrxwliadkmy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rBDv3k3BWdnQZMDi2hjfuA_76FVf_wA";

    function headers() {
      return {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      };
    }

    async function getState() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_state`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ session_token: null })
      });

      return await res.json();
    }

    async function login(name, pin) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_player`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({
          desired_name: name,
          entered_pin: pin
        })
      });

      return await res.json();
    }

    async function castVote(token, status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/cast_vote`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({
          session_token: token,
          desired_status: status
        })
      });

      return await res.json();
    }

    async function vote(status) {
      try {
        const name = document.getElementById("nameSelect").value;
        const pin = document.getElementById("pinInput").value;

        if (!name || !pin) {
          throw new Error("Naam en pincode nodig");
        }

        document.getElementById("status").textContent = "Bezig...";

        const loginData = await login(name, pin);

        if (!loginData.session_token) {
          throw new Error("Login mislukt");
        }

        await castVote(loginData.session_token, status);

        document.getElementById("status").textContent = "Stem opgeslagen!";
      } catch (e) {
        document.getElementById("status").textContent = e.message;
      }
    }

    async function load() {
      try {
        const data = await getState();
        const select = document.getElementById("nameSelect");

        (data.all_names || []).forEach(n => {
          const opt = document.createElement("option");
          opt.value = n;
          opt.textContent = n;
          select.appendChild(opt);
        });

      } catch {
        document.getElementById("status").textContent = "Kon site niet laden";
      }
    }

    load();
  </script>
</body>
</html>
