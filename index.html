<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    .answer {
      font-size: 32px;
      margin: 15px 0;
      font-weight: bold;
    }

    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    select {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <div id="login">
      <select id="playerSelect"></select>
      <button onclick="claim()">Koppel naam</button>
    </div>

    <div id="vote" style="display:none;">
      <p id="me"></p>
      <button class="yes" onclick="vote('ja')">Ik kan</button>
      <button class="no" onclick="vote('nee')">Ik kan niet</button>
    </div>

    <h3>Ja-lijst:</h3>
    <ul id="list"></ul>
  </div>

  <script>
    const API = "https://uiqntazgnrxwliadkmy.supabase.co/functions/v1/jas";
    const KEY = "jas_token";

    function getToken() {
      return localStorage.getItem(KEY);
    }

    function setToken(t) {
      localStorage.setItem(KEY, t);
    }

    async function load() {
      const res = await fetch(API);
      const data = await res.json();

      document.getElementById("answer").textContent = data.answer;
      document.getElementById("answer").className = "answer " + data.answer;
      document.getElementById("count").textContent = data.yesCount + " mensen";

      const list = document.getElementById("list");
      list.innerHTML = "";
      data.yesNames.forEach(n => {
        const li = document.createElement("li");
        li.textContent = n;
        list.appendChild(li);
      });

      // populate players
      const select = document.getElementById("playerSelect");
      select.innerHTML = "";
      const players = [
        "Bruis","Jelle","Nelis","Ruben","Siem","Sierd","Antoni","Boudewijn","Bram","Daniël","David","Jelmer D","Jorrit","Justin","Koen","Lyon","Mart","Marvin","Max","Melson","Merijn","Milan","Rik","Robin S","Robin M","Sam","Sybren","Tim","Tom","Tom A","Tristan","Vince","Wolf","Bryan","Boris","Roel","Albert","Jelmer K","Thijs","Friso"
      ];

      players.forEach(p => {
        const o = document.createElement("option");
        o.value = p.toLowerCase().replace(" ", "-");
        o.textContent = p;
        select.appendChild(o);
      });

      if (getToken()) {
        document.getElementById("login").style.display = "none";
        document.getElementById("vote").style.display = "block";
      }
    }

    async function claim() {
      const slug = document.getElementById("playerSelect").value;

      const res = await fetch(API + "?action=claim", {
        method: "POST",
        body: JSON.stringify({ slug }),
      });

      const data = await res.json();

      if (data.token) {
        setToken(data.token);
        load();
      } else {
        alert("Naam al gebruikt");
      }
    }

    async function vote(status) {
      const token = getToken();

      await fetch(API + "?action=vote", {
        method: "POST",
        body: JSON.stringify({ token, status }),
      });

      load();
    }

    load();
  </script>
</body>
</html>
