<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      line-height: 1.15;
    }

    .answer {
      font-size: 32px;
      margin: 15px 0;
      font-weight: bold;
    }

    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 12px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    select {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    li {
      margin: 6px 0;
    }

    #vote {
      margin-top: 10px;
    }

    #me {
      margin-bottom: 8px;
      color: #444;
    }

    #status {
      color: #555;
      min-height: 22px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <div id="login">
      <select id="playerSelect">
        <option value="">Kies je naam</option>
      </select>
    </div>

    <div id="vote">
      <p id="me">Kies je naam en stem.</p>
      <button id="yesBtn" class="yes" type="button">Ik kan</button>
      <button id="noBtn" class="no" type="button">Ik kan niet</button>
      <div id="status"></div>
    </div>

    <h3>Ja-lijst:</h3>
    <ul id="list"></ul>
  </div>

  <script>
    const SUPABASE_URL = "PASTE_SUPABASE_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_SUPABASE_ANON_KEY_HERE";
    const API = `${SUPABASE_URL}/rest/v1`;

    const TOKEN_KEY = "jas_token";
    const NAME_KEY = "jas_name";

    function headers(extra = {}) {
      return {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        ...extra
      };
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

    function getStoredName() {
      return localStorage.getItem(NAME_KEY);
    }

    function setStoredName(name) {
      localStorage.setItem(NAME_KEY, name);
    }

    function getWeekKey() {
      const now = new Date();
      const utc = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      const day = utc.getUTCDay() || 7;
      utc.setUTCDate(utc.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(utc.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((utc.getTime() - yearStart.getTime()) / 86400000) + 1) / 7);
      return `${utc.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function computeAnswer(yesCount) {
      if (yesCount >= 4) return "ja";
      if (yesCount === 3) return "bijna";
      return "nee";
    }

    async function fetchPlayers() {
      const res = await fetch(
        `${API}/players?select=id,slug,display_name,claimed,active&active=eq.true&order=display_name.asc`,
        { headers: headers() }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || JSON.stringify(data));
      return data;
    }

    async function fetchSessionByToken(token) {
      const res = await fetch(
        `${API}/sessions?select=player_id,session_token_hash&session_token_hash=eq.${encodeURIComponent(token)}`,
        { headers: headers() }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || JSON.stringify(data));
      return data[0] || null;
    }

    async function fetchVotesForWeek(weekKey) {
      const res = await fetch(
        `${API}/votes?select=player_id,status&week_key=eq.${encodeURIComponent(weekKey)}`,
        { headers: headers() }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || JSON.stringify(data));
      return data;
    }

    async function claimPlayer(slug) {
      const players = await fetchPlayers();
      const player = players.find(p => p.slug === slug);

      if (!player) {
        throw new Error("Speler niet gevonden");
      }

      if (player.claimed) {
        throw new Error("Naam al gebruikt");
      }

      const token = crypto.randomUUID();

      const updateRes = await fetch(
        `${API}/players?id=eq.${player.id}`,
        {
          method: "PATCH",
          headers: headers({ Prefer: "return=minimal" }),
          body: JSON.stringify({ claimed: true })
        }
      );

      if (!updateRes.ok) {
        const data = await updateRes.json();
        throw new Error(data.message || JSON.stringify(data));
      }

      const sessionRes = await fetch(
        `${API}/sessions`,
        {
          method: "POST",
          headers: headers({ Prefer: "return=minimal" }),
          body: JSON.stringify({
            player_id: player.id,
            session_token_hash: token
          })
        }
      );

      if (!sessionRes.ok) {
        const data = await sessionRes.json();
        throw new Error(data.message || JSON.stringify(data));
      }

      setToken(token);
      setStoredName(player.display_name);

      return { token, player };
    }

    async function saveVote(playerId, status) {
      const weekKey = getWeekKey();

      const res = await fetch(
        `${API}/votes?on_conflict=week_key,player_id`,
        {
          method: "POST",
          headers: headers({
            Prefer: "resolution=merge-duplicates,return=minimal"
          }),
          body: JSON.stringify({
            week_key: weekKey,
            player_id: playerId,
            status,
            updated_at: new Date().toISOString()
          })
        }
      );

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.message || JSON.stringify(data));
      }
    }

    function fillPlayers(players) {
      const select = document.getElementById("playerSelect");
      const currentSlug = select.value;

      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = !currentSlug && !getStoredName();
      select.appendChild(placeholder);

      players.forEach((p) => {
        const option = document.createElement("option");
        option.value = p.slug;
        option.textContent = p.display_name;
        select.appendChild(option);
      });

      if (currentSlug) {
        select.value = currentSlug;
      } else {
        const storedName = getStoredName();
        if (storedName) {
          const found = players.find(p => p.display_name === storedName);
          if (found) {
            select.value = found.slug;
          }
        }
      }
    }

    function renderState(players, votes, currentPlayerId = null) {
      const yesVotes = votes.filter(v => v.status === "ja");
      const yesIds = yesVotes.map(v => v.player_id);

      const yesNames = players
        .filter(p => yesIds.includes(p.id))
        .map(p => p.display_name)
        .sort((a, b) => a.localeCompare(b, "nl"));

      document.getElementById("answer").textContent = computeAnswer(yesNames.length);
      document.getElementById("answer").className = "answer " + computeAnswer(yesNames.length);
      document.getElementById("count").textContent = `${yesNames.length} mensen hebben ja gezegd`;

      const list = document.getElementById("list");
      list.innerHTML = "";

      if (yesNames.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Nog niemand";
        list.appendChild(li);
      } else {
        yesNames.forEach((name) => {
          const li = document.createElement("li");
          li.textContent = name;
          list.appendChild(li);
        });
      }

      if (currentPlayerId) {
        const player = players.find(p => p.id === currentPlayerId);
        const vote = votes.find(v => v.player_id === currentPlayerId);

        if (player) {
          setStoredName(player.display_name);
          document.getElementById("me").textContent = vote
            ? `Gekoppeld als ${player.display_name} — jouw keuze: ${vote.status}`
            : `Gekoppeld als ${player.display_name} — je hebt nog niet gestemd`;
        }
      } else if (getStoredName()) {
        document.getElementById("me").textContent = `Gekozen naam: ${getStoredName()}`;
      } else {
        document.getElementById("me").textContent = "Kies je naam en stem.";
      }
    }

    async function load() {
      try {
        const weekKey = getWeekKey();
        const players = await fetchPlayers();
        fillPlayers(players);

        const votes = await fetchVotesForWeek(weekKey);

        let currentPlayerId = null;
        const token = getToken();

        if (token) {
          const session = await fetchSessionByToken(token);
          if (session) {
            currentPlayerId = session.player_id;
          }
        }

        renderState(players, votes, currentPlayerId);
        document.getElementById("status").textContent = "";
      } catch (err) {
        console.error(err);
        document.getElementById("answer").textContent = "fout";
        document.getElementById("count").textContent = "Kon site niet laden";
        document.getElementById("status").textContent = err instanceof Error ? err.message : "Onbekende fout";
      }
    }

    async function castVote(status) {
      try {
        document.getElementById("status").textContent = "Opslaan...";

        const players = await fetchPlayers();
        fillPlayers(players);

        let token = getToken();
        let currentPlayerId = null;

        if (token) {
          const session = await fetchSessionByToken(token);
          if (session) {
            currentPlayerId = session.player_id;
          }
        }

        if (!currentPlayerId) {
          const slug = document.getElementById("playerSelect").value;

          if (!slug) {
            throw new Error("Kies eerst je naam");
          }

          const result = await claimPlayer(slug);
          token = result.token;
          currentPlayerId = result.player.id;
        }

        await saveVote(currentPlayerId, status);

        const updatedPlayers = await fetchPlayers();
        const updatedVotes = await fetchVotesForWeek(getWeekKey());
        renderState(updatedPlayers, updatedVotes, currentPlayerId);

        document.getElementById("status").textContent = "Opgeslagen";
      } catch (err) {
        console.error(err);
        document.getElementById("status").textContent = err instanceof Error ? err.message : "Onbekende fout";
        alert(err instanceof Error ? err.message : "Er ging iets mis bij het opslaan");
      }
    }

    document.getElementById("yesBtn").addEventListener("click", () => castVote("ja"));
    document.getElementById("noBtn").addEventListener("click", () => castVote("nee"));

    load();
  </script>
</body>
</html>
