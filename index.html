<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordt er gejast vanavond?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      line-height: 1.15;
    }

    .answer {
      font-size: 32px;
      margin: 15px 0;
      font-weight: bold;
    }

    .ja { color: green; }
    .bijna { color: orange; }
    .nee { color: red; }

    button {
      padding: 12px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .yes { background: green; color: white; }
    .no { background: red; color: white; }

    select {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    li {
      margin: 6px 0;
    }

    #status {
      color: #555;
      min-height: 22px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wordt er gejast vanavond?</h1>

    <div id="answer" class="answer">...</div>
    <p id="count"></p>

    <select id="playerSelect"></select>

    <div>
      <button id="yesBtn" class="yes" type="button">Ik kan</button>
      <button id="noBtn" class="no" type="button">Ik kan niet</button>
    </div>

    <div id="status"></div>

    <h3>Ja-lijst:</h3>
    <ul id="list"></ul>
  </div>

  <script>
    const PLAYERS = [
      "Albert",
      "Antoni",
      "Boris",
      "Boudewijn",
      "Bram",
      "Bruis",
      "Bryan",
      "Daniël",
      "David",
      "Friso",
      "Jelle",
      "Jelmer D",
      "Jelmer K",
      "Jorrit",
      "Justin",
      "Koen",
      "Lyon",
      "Mart",
      "Marvin",
      "Max",
      "Melson",
      "Merijn",
      "Milan",
      "Nelis",
      "Rik",
      "Robin M",
      "Robin S",
      "Roel",
      "Ruben",
      "Sam",
      "Siem",
      "Sierd",
      "Sybren",
      "Thijs",
      "Tim",
      "Tom",
      "Tom A",
      "Tristan",
      "Vince",
      "Wolf"
    ].sort((a, b) => a.localeCompare(b, "nl"));

    const STORAGE_KEY = "jas_votes_local_v1";
    const NAME_KEY = "jas_selected_name_v1";

    function getTodayKey() {
      const now = new Date();
      const utc = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      const day = utc.getUTCDay() || 7;
      utc.setUTCDate(utc.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(utc.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((utc.getTime() - yearStart.getTime()) / 86400000) + 1) / 7);
      return `${utc.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function getVotes() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch {
        return {};
      }
    }

    function saveVotes(votes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    function getCurrentWeekVotes() {
      const allVotes = getVotes();
      const weekKey = getTodayKey();
      return allVotes[weekKey] || {};
    }

    function setCurrentWeekVote(name, status) {
      const allVotes = getVotes();
      const weekKey = getTodayKey();

      if (!allVotes[weekKey]) {
        allVotes[weekKey] = {};
      }

      allVotes[weekKey][name] = status;
      saveVotes(allVotes);
    }

    function computeAnswer(yesCount) {
      if (yesCount >= 4) return "ja";
      if (yesCount === 3) return "bijna";
      return "nee";
    }

    function fillPlayers() {
      const select = document.getElementById("playerSelect");
      const storedName = localStorage.getItem(NAME_KEY);

      select.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Kies je naam";
      placeholder.disabled = true;
      placeholder.selected = !storedName;
      select.appendChild(placeholder);

      PLAYERS.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      if (storedName && PLAYERS.includes(storedName)) {
        select.value = storedName;
      }
    }

    function render() {
      fillPlayers();

      const votes = getCurrentWeekVotes();
      const yesNames = Object.keys(votes)
        .filter((name) => votes[name] === "ja")
        .sort((a, b) => a.localeCompare(b, "nl"));

      const answer = computeAnswer(yesNames.length);

      document.getElementById("answer").textContent = answer;
      document.getElementById("answer").className = "answer " + answer;
      document.getElementById("count").textContent = `${yesNames.length} mensen hebben ja gezegd`;

      const list = document.getElementById("list");
      list.innerHTML = "";

      if (yesNames.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Nog niemand";
        list.appendChild(li);
      } else {
        yesNames.forEach((name) => {
          const li = document.createElement("li");
          li.textContent = name;
          list.appendChild(li);
        });
      }

      const selectedName = localStorage.getItem(NAME_KEY);
      if (selectedName) {
        const myVote = votes[selectedName];
        document.getElementById("status").textContent = myVote
          ? `Gekozen naam: ${selectedName} — jouw keuze: ${myVote}`
          : `Gekozen naam: ${selectedName}`;
      } else {
        document.getElementById("status").textContent = "Kies je naam en stem.";
      }
    }

    function castVote(status) {
      const select = document.getElementById("playerSelect");
      const name = select.value;

      if (!name) {
        alert("Kies eerst je naam");
        return;
      }

      localStorage.setItem(NAME_KEY, name);
      setCurrentWeekVote(name, status);
      render();
    }

    document.getElementById("yesBtn").addEventListener("click", () => castVote("ja"));
    document.getElementById("noBtn").addEventListener("click", () => castVote("nee"));

    render();
  </script>
</body>
</html>
