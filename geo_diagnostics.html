<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Geolocatie diagnostiek</title><script>window.GEJAST_PAGE_VERSION='v303';</script><script src="./gejast-config.js?v303"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257;--gold:#9a8241}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover no-repeat;color:#201b16}.wrap{max-width:960px;margin:0 auto}.card{background:rgba(255,251,245,.9);border-radius:28px;padding:24px;border:1px solid var(--line);box-shadow:0 20px 44px rgba(0,0,0,.08)}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:none;cursor:pointer}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.grid{display:grid;gap:12px;margin-top:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}.muted{color:var(--muted)}pre{white-space:pre-wrap;word-break:break-word;background:#fbfaf6;border:1px solid var(--line);border-radius:14px;padding:12px}</style></head><body><div class="wrap"><div class="card"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap"><div><h1 style="margin:0 0 8px">Geolocatie diagnostiek</h1><div class="muted">Controleer permissies, coords, accuracy en browser-support voor drinks/snelheid verificatie.</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn alt" href="./drinks.html">Drinks</a><a class="btn alt" href="./drinks_speed.html">Snelheid</a></div></div><div class="grid"><div class="panel"><div style="display:flex;gap:10px;flex-wrap:wrap"><button id="checkBtn" class="btn" type="button">Check geolocatie</button><button id="pushTestBtn" class="btn alt" type="button">Test backend push</button></div><div id="status" class="muted" style="margin-top:10px"></div></div><div class="panel"><strong>Browser info</strong><pre id="browserInfo"></pre></div><div class="panel"><strong>Locatie / permissies</strong><pre id="geoInfo"></pre></div></div></div></div><div class="site-credit-watermark" data-version-watermark></div><script src="./gejast-geo.js?v303"></script><script>(function(){const status=document.getElementById('status'); const browser=document.getElementById('browserInfo'); const geo=document.getElementById('geoInfo'); browser.textContent=JSON.stringify({userAgent:navigator.userAgent,language:navigator.language,platform:navigator.platform,online:navigator.onLine,permissions:!!navigator.permissions,geolocation:!!navigator.geolocation},null,2); async function check(){try{status.textContent='Bezig met geolocatie...'; const helper=window.GEJAST_GEO; if(!helper) throw new Error('GEJAST_GEO ontbreekt'); let permission='onbekend'; try{ if(navigator.permissions){ const res=await navigator.permissions.query({name:'geolocation'}); permission=res.state; } }catch(_){} const pos=await helper.request(true); geo.textContent=JSON.stringify({permission, latitude:pos.coords.latitude, longitude:pos.coords.longitude, accuracy:pos.coords.accuracy, altitude:pos.coords.altitude, heading:pos.coords.heading, speed:pos.coords.speed, timestamp:new Date(pos.timestamp).toISOString()},null,2); status.textContent='Geolocatie opgehaald.'; }catch(err){ geo.textContent=String(err&&err.message||err); status.textContent='Geolocatie ophalen mislukt.'; }} document.getElementById('checkBtn').onclick=check; document.getElementById('pushTestBtn').onclick=async()=>{ try{ status.textContent='Backend push-test klaarzetten...'; const helper=window.GEJAST_GEO; if(!helper) throw new Error('GEJAST_GEO ontbreekt'); const out=await helper.queueBackendTestPush(); status.textContent=out.queued ? 'Backend push-test in wachtrij gezet.' : ('Backend push-test mislukt: ' + (out.reason||'onbekend')); }catch(err){ status.textContent=String(err&&err.message||err); } }; })();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
