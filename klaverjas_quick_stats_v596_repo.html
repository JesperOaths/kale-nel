<style>
:root{--bg:#f6f2ea;--paper:#fffaf3;--line:#ddd4c8;--ink:#201b16;--muted:#6c655d;--gold:#b99647;--shadow:0 14px 34px rgba(27,20,12,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}.page{max-width:900px;margin:0 auto;padding:16px}
.hero,.card{background:var(--paper);border:1px solid rgba(0,0,0,.06);border-radius:28px;box-shadow:var(--shadow)}.hero{padding:18px}.title{margin:0 0 10px;font-size:30px;letter-spacing:-.04em}.muted{color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid rgba(0,0,0,.08);font-size:12px;font-weight:800;margin:4px 6px 0 0}
.score{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:14px}.side{text-align:center}.side .names{font-weight:800}.side .total{font-size:40px;font-weight:900;letter-spacing:-.05em}.vs{color:var(--muted);font-weight:800}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.card{padding:16px}.card h2{margin:0 0 10px;font-size:18px}.row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid rgba(0,0,0,.06)}.row:first-child{border-top:0}.taks{display:grid;gap:14px}.tak{border:1px solid rgba(0,0,0,.06);border-radius:20px;padding:12px;background:#fff}.tak-title{font-weight:900;margin-bottom:8px}.round{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:8px;padding:7px 0;border-top:1px solid rgba(0,0,0,.06)}.round:first-child{border-top:0}.left{text-align:left}.center{text-align:center}.right{text-align:right}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:16px;background:#111;color:#fff;text-decoration:none;font-weight:800;border:0}.btn.alt{background:#fff;color:#111;border:1px solid rgba(0,0,0,.08)}.empty{padding:32px;text-align:center;color:var(--muted)}
@media(max-width:800px){.grid{grid-template-columns:1fr}.round{grid-template-columns:1fr}.left,.center,.right{text-align:left}.score{grid-template-columns:1fr}}
</style>
