<!DOCTYPE html>
<html lang="nl"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,max-image-preview:none" />
<meta http-equiv="Cache-Control" content="no-store, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<title>Drinks profiel</title><script>window.GEJAST_PAGE_VERSION='v615';</script><script src="./gejast-config.js?v615"></script><script src="./gejast-scope-context.js?v615"></script><script src="./gejast-family-rollout.js?v615"></script><script src="./gejast-home-gate.js?v615"></script><script src="./gejast-drinks-analytics.js?v615"></script><style>:root{--line:rgba(0,0,0,.08);--muted:#6b6257}*{box-sizing:border-box}body{margin:0;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(244,240,232,.9),rgba(244,240,232,.92)),url('./site-bg-desktop.webp') center/cover scroll;color:#201b16}.wrap{max-width:1120px;margin:0 auto}.card{background:rgba(255,251,245,.72);border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.btn{display:inline-flex;padding:10px 14px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800}.btn.alt{background:#f3efe6;color:#111;border:1px solid rgba(0,0,0,.08)}.logo{width:64px;height:64px}.grid{display:grid;gap:18px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.metric,.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a7a55;font-weight:800;margin-bottom:8px}.metric .value{font-size:1.7rem;font-weight:900}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.muted{color:var(--muted)}.site-credit-watermark{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:9999;padding:8px 14px;border-radius:999px;background:rgba(17,17,17,0.88);border:1px solid rgba(212,175,55,0.35);color:#f3e3a6;font:700 13px/1.2 Inter,system-ui,sans-serif;letter-spacing:.03em;pointer-events:none;user-select:none;box-shadow:0 12px 24px rgba(0,0,0,0.18)}@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}}@media(max-width:640px){body{padding:16px}.metrics{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"><a class="btn alt" href="javascript:void(0)" onclick="if(history.length>1){history.back();}else{location.href='./drinks_stats.html';}">Terug</a><a class="btn" href="./drinks_add.html">Drinks toevoegen</a><a class="btn alt" href="./drinks_speed_stats.html">Snelheid stats</a></div><div id="heroName" style="font-size:42px;font-weight:900"></div><div id="heroStatus" class="muted">Drinkprofiel en verificatiegeschiedenis.</div></div><a href="./index.html"><img class="logo" src="./logo.png" alt="Logo"></a></div><div class="grid metrics" id="metrics"></div><section class="panel" style="margin-top:18px"><h2 style="margin:0 0 12px">Per dranktype</h2><div id="byType" class="list"></div></section><section class="panel" style="margin-top:18px"><h2 style="margin:0 0 12px">Recent bevestigd</h2><div id="recent" class="list"></div></section><section class="panel" style="margin-top:18px"><h2 style="margin:0 0 12px">Topverifieerders</h2><div id="verifiers" class="list"></div></section><section class="panel" style="margin-top:18px"><h2 style="margin:0 0 12px">Recente snelheid</h2><div id="speedRecent" class="list"></div></section></div></div><div class="site-credit-watermark" data-version-watermark></div><script>(()=>{const analytics=window.GEJAST_DRINKS_ANALYTICS;const player=new URLSearchParams(location.search).get('player')||'';document.getElementById('heroName').textContent=player||'Speler';function list(el,rows,fmt,empty='Nog geen data.'){el.innerHTML=(rows||[]).length?rows.map(fmt).join(''):`<div class="muted">${empty}</div>`}async function load(){try{const sessionToken=(window.GEJAST_CONFIG&&window.GEJAST_CONFIG.getPlayerSessionToken&&window.GEJAST_CONFIG.getPlayerSessionToken())||''; const [data,speed]=await Promise.all([analytics.getPlayerBundle(player,60), analytics.getSpeedBundle(sessionToken, player).catch(()=>({ recent_attempts:[], rankings_by_type:[] }))]); document.getElementById('metrics').innerHTML=`<div class="metric"><div class="label">Drankjes</div><div class="value">${data.summary?.events||0}</div></div><div class="metric"><div class="label">Units</div><div class="value">${analytics.fmtUnits(data.summary?.units||0)}</div></div><div class="metric"><div class="label">Gemiddeld / nacht</div><div class="value">${analytics.fmtUnits(data.summary?.avg_night_units||0)}</div></div><div class="metric"><div class="label">Favoriet</div><div class="value">${analytics.esc(data.summary?.favorite_type||'—')}</div></div>`; list(document.getElementById('byType'),data.by_type,(r)=>`<div class="row"><div><strong>${analytics.esc(r.label||r.event_type_label||r.event_type_key)}</strong></div><div><strong>${Number(r.events||0)}</strong><div class="muted">${analytics.fmtUnits(r.units||0)} units</div></div></div>`); list(document.getElementById('recent'),data.recent,(r)=>`<div class="row"><div><strong>${analytics.esc(r.event_type_label||r.event_type_key)}</strong><div class="muted">${analytics.dateLabel(r.verified_at||r.created_at)} · bevestigd door ${analytics.esc(Array.isArray(r.verifier_names)&&r.verifier_names.length?r.verifier_names.join(', '):'—')}</div></div><div><strong>${analytics.fmtUnits(r.total_units||0)}</strong></div></div>`); list(document.getElementById('verifiers'),data.verifiers,(r)=>`<div class="row"><div><strong>${analytics.esc(r.player_name)}</strong><div class="muted">verifieerde ${Number(r.events||0)} keer</div></div><div><strong>${analytics.fmtUnits(r.units||0)}</strong></div></div>`); list(document.getElementById('speedRecent'),speed.recent_attempts.filter((r)=>String(r.player_name||'').toLowerCase()===String(player||'').toLowerCase()).slice(0,10),(r)=>`<div class="row"><div><strong>${analytics.esc(r.speed_type_label||r.speed_type_key)}</strong><div class="muted">${analytics.dateLabel(r.verified_at||r.created_at)}</div></div><div><strong>${analytics.fmtSeconds(r.duration_seconds)}s</strong></div></div>`, 'Nog geen bevestigde snelheidsrecords.'); document.getElementById('heroStatus').textContent = data.summary?.events ? `Canoniek profiel voor ${player}.` : 'Nog geen bevestigde drinksdata gevonden.'; }catch(err){ document.getElementById('heroStatus').textContent = err.message || String(err); }}load();})();</script><script id="gejast-version-sync-inline">(function(){function sync(){try{window.GEJAST_CONFIG&&window.GEJAST_CONFIG.applyVersionLabel&&window.GEJAST_CONFIG.applyVersionLabel();}catch(_){}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',sync,{once:true});}else{sync();}})();</script></body></html>
